<h1>1週間SNS投稿カレンダー自動作成ツール</h1>
<p class="sub">業種と投稿頻度を選ぶだけ。最適な曜日・時間・テーマを自動割り振り</p>
<div class="card">
 <div class="row">
  <div><label>業種</label><select id="biz"><option value="food">飲食店・カフェ</option><option value="beauty">美容・サロン</option><option value="estate">不動産</option><option value="ec">EC・ネットショップ</option></select></div>
  <div><label>週あたり投稿数</label><select id="freq"><option value="3">3本（週3回）</option><option value="5">5本（平日毎日）</option><option value="7">7本（毎日）</option></select></div>
  <div><label>開始日（月曜）</label><input type="date" id="startDate"></div>
 </div>
 <button class="btn" onclick="generate()">カレンダーを生成</button>
</div>

 <div class="card">
  <div class="stats" id="stats"></div>
  <div class="legend"><span><span class="badge b-x">X</span> X（旧Twitter）</span><span><span class="badge b-ig">IG</span> Instagram</span><span><span class="badge b-line">LINE</span> LINE公式</span></div>
  <div style="overflow-x:auto"><table id="cal"></table></div>

  <button class="btn btn2" onclick="dlGCal()">Googleカレンダー用CSV ダウンロード</button>

<script>
var DATA={food:{label:"飲食店・カフェ",slots:[{d:5,h:"12:00",r:"金曜ランチ最大需要"},{d:0,h:"18:00",r:"日曜ディナー検索ピーク"},{d:3,h:"12:00",r:"木曜ランチ・週後半集客"},{d:1,h:"18:30",r:"火曜夕方・夕食検討"},{d:2,h:"12:00",r:"水曜ランチ帯"},{d:6,h:"11:00",r:"土曜ブランチ需要"},{d:4,h:"18:00",r:"金曜夜ディナー訴求"}],themes:["本日のおすすめメニュー","お客様の声・レビュー紹介","厨房の裏側・仕込み風景","期間限定メニュー告知","スタッフ紹介・こだわり","食材産地ストーリー","週末イベント・空席案内"],platPri:["IG","X","LINE","X","IG","IG","LINE"],tip:"飲食店は金曜12時と日曜18時がエンゲージメント最大。料理写真はIGで最も効果的。LINEクーポンは金曜配信で週末来店を促進。"},beauty:{label:"美容・サロン",slots:[{d:0,h:"20:00",r:"日曜夜セルフケア意識UP"},{d:4,h:"20:00",r:"木曜夜の美容ゴールデンタイム"},{d:1,h:"12:00",r:"月曜昼・週始め美容モチベ"},{d:2,h:"21:00",r:"火曜夜リラックスタイム"},{d:5,h:"19:00",r:"金曜夜・週末予約促進"},{d:6,h:"10:00",r:"土曜朝の美容情報収集"},{d:3,h:"12:00",r:"水曜昼・週中メンテ訴求"}],themes:["ビフォーアフター施術例","お客様の声・変化の実感","スタッフ技術紹介","季節の美容ケアTips","予約空き状況お知らせ","新メニュー・キャンペーン","ホームケアアドバイス"],platPri:["IG","X","LINE","IG","LINE","IG","X"],tip:"美容サロンは日曜20時・木曜夜がピーク。ビフォーアフター写真のIG投稿がフォロワー獲得に最も効果的。LINE予約リマインドで無断キャンセル平均30%減。"},estate:{label:"不動産",slots:[{d:6,h:"09:00",r:"土曜朝・内見日の物件チェック"},{d:1,h:"08:00",r:"月曜通勤中の物件検索"},{d:0,h:"14:00",r:"日曜午後の検討タイム"},{d:3,h:"19:00",r:"水曜帰宅後の情報収集"},{d:5,h:"18:00",r:"金曜夜・内見前の下調べ"},{d:2,h:"12:00",r:"火曜昼休み物件チェック"},{d:4,h:"12:00",r:"木曜昼・週後半情報収集"}],themes:["新着物件ハイライト","エリア情報・周辺環境","内見チェックポイント","お客様の引越し体験談","住宅ローン基礎知識","スタッフおすすめ物件","週末内見会告知"],platPri:["IG","X","LINE","X","IG","X","LINE"],tip:"不動産は土曜9時と平日朝8時台が反応◎。物件写真はIG、速報はXが効果的。LINE公式で内見予約導線を作ると成約率UP。"},ec:{label:"EC・ネットショップ",slots:[{d:2,h:"21:00",r:"火曜夜・衝動買いピーク"},{d:4,h:"21:00",r:"木曜夜・ECゴールデンタイム"},{d:5,h:"20:00",r:"金曜夜・週末セール訴求"},{d:1,h:"12:00",r:"月曜ランチ通販タイム"},{d:0,h:"21:00",r:"日曜夜・翌週準備の購買"},{d:6,h:"10:00",r:"土曜朝ショッピング"},{d:3,h:"12:00",r:"水曜昼・週中情報収集"}],themes:["人気ランキングTOP3","お客様レビュー紹介","商品の使い方・活用術","期間限定セール告知","新商品入荷お知らせ","スタッフ愛用品紹介","週末限定クーポン配布"],platPri:["X","IG","LINE","X","IG","LINE","IG"],tip:"ECは火・木の21時と金曜20時がCV率最高。LINEクーポンは金曜が最適。IGショッピング機能で直接購入導線を確保。"}};
var DAYS_JA=["月","火","水","木","金","土","日"],curPlan=[];
function nextMon(){var d=new Date(),w=d.getDay(),diff=w===0?1:8-w;d.setDate(d.getDate()+diff);return d}
function pad(n){return n<10?"0"+n:""+n}
function fmtD(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function fmtDS(d){return d.getFullYear()+"/"+pad(d.getMonth()+1)+"/"+pad(d.getDate())}
function generate(){
 var biz=document.getElementById("biz").value,freq=+document.getElementById("freq").value,d=DATA[biz],slots=d.slots.slice(0,freq),val=document.getElementById("startDate").value,mon=val?new Date(val+"T00:00:00"):nextMon();
 curPlan=[];
 for(var i=0;i<slots.length;i++){var s=slots[i],dt=new Date(mon),off=s.d===0?6:s.d-1;dt.setDate(dt.getDate()+off);var pc=d.platPri[i];curPlan.push({date:dt,dayJa:DAYS_JA[off],time:s.h,reason:s.r,theme:d.themes[i],pc:pc,cls:pc==="X"?"b-x":pc==="IG"?"b-ig":"b-line",memo:""})}
 curPlan.sort(function(a,b){return a.date-b.date||(a.time<b.time?-1:1)});
 var cx=0,ci=0,cl=0;for(var j=0;j<curPlan.length;j++){if(curPlan[j].pc==="X")cx++;else if(curPlan[j].pc==="IG")ci++;else cl++}
 document.getElementById("stats").innerHTML='<div class="stat"><b>'+freq+'</b><span>投稿/週</span></div><div class="stat"><b>'+cx+'</b><span>X投稿</span></div><div class="stat"><b>'+ci+'</b><span>IG投稿</span></div><div class="stat"><b>'+cl+'</b><span>LINE配信</span></div>';
 var h='<tr><th>曜日</th><th>日付</th><th>時間</th><th>媒体</th><th>推奨テーマ</th><th>配信理由</th><th style="min-width:150px">メモ（投稿文貼付用）</th></tr>';
 for(var k=0;k<curPlan.length;k++){var p=curPlan[k];h+='<tr><td class="day-head">'+p.dayJa+'</td><td>'+fmtD(p.date)+'</td><td class="time">'+p.time+'</td><td><span class="badge '+p.cls+'">'+p.pc+'</span></td><td class="theme">'+p.theme+'</td><td>'+p.reason+'</td><td><textarea id="m'+k+'" onchange="curPlan['+k+'].memo=this.value" placeholder="投稿文を入力..."></textarea></td></tr>'}
 document.getElementById("cal").innerHTML=h;document.getElementById("tipArea").innerHTML="<strong>"+d.label+"の投稿ポイント：</strong>"+d.tip;document.getElementById("result").style.display="block";document.getElementById("result").scrollIntoView({behavior:"smooth"})
}
function dlGCal(){
 var c="Subject,Start Date,Start Time,End Time,Description\r\n";
 for(var i=0;i<curPlan.length;i++){var p=curPlan[i],ds=fmtDS(p.date),eh=+p.time.split(":")[0]+1,et=pad(eh)+":"+p.time.split(":")[1],desc=("["+p.pc+"] "+p.theme+(p.memo?" | "+p.memo:"")).replace(/"/g,'""');c+='"[SNS] '+p.pc+" "+p.theme+'","'+ds+'","'+p.time+'","'+et+'","'+desc+'"\r\n'}dl(c,"sns_calendar_gcal.csv")
}
function dlList(){
 var c="日付,曜日,時間,媒体,推奨テーマ,配信理由,投稿文メモ\r\n";
 for(var i=0;i<curPlan.length;i++){var p=curPlan[i];c+='"'+fmtDS(p.date)+'","'+p.dayJa+'","'+p.time+'","'+p.pc+'","'+p.theme+'","'+p.reason+'","'+(p.memo||"").replace(/"/g,'""')+'"\r\n'}dl(c,"sns_posts_list.csv")
}
function dl(c,n){var b=new Blob(["\uFEFF"+c],{type:"text/csv;charset=utf-8"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=n;document.body.appendChild(a);a.click();document.body.removeChild(a)}
(function(){document.getElementById("startDate").value=fmtD(nextMon())})();
</script>
