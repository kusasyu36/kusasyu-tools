.char-info{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:.78em}

.copy-btn{padding:5px 14px;background:#4361ee;color:#fff;border:none;border-radius:6px;font-size:.78em;cursor:pointer;transition:background .2s}
.copy-btn:hover{background:#3a0ca3}
.copy-btn.copied{background:#2d6a4f}
.spec-toggle{font-size:.78em;color:#4361ee;cursor:pointer;margin-top:8px;display:inline-block;user-select:none}
.spec-panel{display:none;background:#f0f2f5;border-radius:8px;padding:10px 12px;margin-top:8px;font-size:.78em;line-height:1.7;color:#555}
.spec-panel.open{display:block}
.tracker{background:#fff;border-radius:12px;padding:16px;margin-top:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.tracker h2{font-size:1em;color:#4361ee;margin-bottom:10px}
.tracker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
.t-item{text-align:center;padding:10px;border-radius:8px;font-size:.75em;font-weight:600;border:2px solid #ddd;transition:all .2s;cursor:pointer}
.t-item.done{border-color:#2d6a4f;background:#d8f3dc;color:#2d6a4f}
.t-item.pending{border-color:#e9ecef;color:#999}
@media(max-width:600px){.wrap{padding:10px}.tracker-grid{grid-template-columns:repeat(3,1fr)}}

<div class="input-section">
<h2>&#9998; 元コンテンツを入力</h2>
<label>タイトル</label>
<input type="text" id="inTitle" placeholder="例：売上を2倍にしたSNS運用術">
<label>要約（1〜2文）</label>
<input type="text" id="inSummary" placeholder="例：少人数チームでもSNS運用を効率化できる方法を解説">
<label>本文（ポイントを箇条書きでもOK）</label>
<textarea id="inBody" rows="4" placeholder="例：1. 投稿を一括作成する&#10;2. プラットフォームごとにトーンを変える&#10;3. 分析データで改善サイクルを回す"></textarea>
<label>CTA（行動喚起）</label>
<input type="text" id="inCta" placeholder="例：詳しくはプロフィールのリンクから">
<label>URL</label>
<input type="text" id="inUrl" placeholder="https://example.com/article">

</div>
</div>
<script>
var P=[
{id:'x',name:'X（Twitter）',color:'#1da1f2',limit:140,spec:'文字数上限：140文字（URLは23文字換算）\n推奨画像：1200×675px（16:9）\nハッシュタグ：2〜3個推奨（多すぎるとリーチ低下）\nNG：外部リンク連投はインプレッション激減。画像付きが効果的'},
{id:'ig',name:'Instagram',color:'#e1306c',limit:2200,spec:'キャプション上限：2,200文字\n推奨画像：1080×1080px / 1080×1350px\nハッシュタグ：最大30個（10〜15個が最適）\nNG：キャプション内リンクはタップ不可。プロフURLへ誘導が基本'},
{id:'line',name:'LINE公式',color:'#06c755',limit:500,spec:'プッシュ通知プレビュー：最初の約100文字\nメッセージ上限：500文字/吹き出し\n推奨画像：1040×1040px\nNG：長文は離脱率上昇。短文+リッチメニュー誘導が効果的'},
{id:'tt',name:'TikTok',color:'#010101',limit:150,spec:'キャプション上限：150文字（日本）\n推奨動画：1080×1920px（9:16）\nハッシュタグ：3〜5個\nNG：売り込み感の強いCTAは非表示リスク。自然な語りかけが有効'},
{id:'note',name:'note',color:'#41c9b4',limit:0,spec:'タイトル上限：100文字\n本文上限：なし（推奨3,000〜5,000文字）\n推奨画像：1280×670px\nNG：過度な煽りタイトルはnote文化に合わない。共感・学び訴求が有効'},
{id:'mail',name:'メルマガ',color:'#f77f00',limit:0,spec:'件名：30文字前後が開封率最高（スマホ表示15〜20文字）\nプリヘッダー：40〜90文字\n本文：600文字前後が完読率高い\nNG：件名に【】多用・絵文字過多は迷惑メール判定リスク'},
{id:'yt',name:'YouTube概要欄',color:'#ff0000',limit:5000,spec:'説明文上限：5,000文字\n「もっと見る」前に表示：約100〜120文字\nタグ上限：500文字（合計）\nNG：関係ないタグ乱用はペナルティ対象。最初の2行にキーワードを含める'}
];
function tr(s,n){return s.length>n?s.slice(0,n-1)+'…':s}
function cas(s){return s.replace(/です。/g,'だよ！').replace(/ます。/g,'るよ！').replace(/ください/g,'してね')}
function pol(s){return s.replace(/だよ！/g,'です。').replace(/るよ！/g,'ます。').replace(/してね/g,'ください')}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function generate(){
var t=document.getElementById('inTitle').value.trim(),s=document.getElementById('inSummary').value.trim(),b=document.getElementById('inBody').value.trim(),c=document.getElementById('inCta').value.trim(),u=document.getElementById('inUrl').value.trim();
if(!t){alert('タイトルを入力してください');return}
var r={};
r.x=cas(tr(s||t,80))+'\n\n'+(u||'')+'\n\n#SNS運用 #マーケティング #業務効率化';
var em=['✨','📌','💡','🔥','👇'],ig=em[0]+' '+t+'\n\n'+em[1]+' '+s+'\n\n';
if(b)b.split('\n').forEach(function(l,i){if(l.trim())ig+=em[(i+2)%5]+' '+l.trim()+'\n'});
ig+='\n'+em[4]+' '+(c||'詳しくはプロフィールのリンクから！')+'\n\n#SNS運用 #マーケティング #中小企業 #業務効率化 #デジタルマーケティング #インスタ運用 #SNS集客 #コンテンツマーケティング #マーケター #ビジネス成長';
r.ig=ig;
r.line='【お知らせ】\n'+tr(t,40)+'\n\n'+pol(tr(s||b,200))+'\n\n▼ 詳しくはこちら\n'+(u||'（リンク）')+'\n\n'+(c?pol(c):'ぜひご確認ください。');
r.tt='🔥 '+tr(t,30)+'\n\n'+tr(s||b,60)+'\n\n'+(c||'続きはプロフのリンクから👆')+'\n\n#sns運用 #マーケティング #仕事効率化';
var nt='＜タイトル案3パターン＞\n① 【保存版】'+t+'\n② 「'+tr(t,20)+'」を実践してわかったこと\n③ なぜ今、'+tr(t,25)+'が必要なのか\n\n--- リード文 ---\n「SNS投稿、毎回ゼロから作るの大変じゃないですか？」\n\n実はこの悩み、多くのマーケターが抱えています。\n'+(s||'')+'\n\nこの記事では、'+t+'について詳しく解説します。\n\n';
if(b)nt+='--- 本文 ---\n'+b+'\n\n';
nt+='--- まとめ ---\n'+(c||'ぜひ実践してみてください。')+(u?'\n\n▼ 関連リンク\n'+u:'');
r.note=nt;
var ml='【件名】'+tr(t,30)+'\n【プリヘッダー】'+tr(s||t,80)+'\n\n━━━━━━━━━━━━━━━\n'+t+'\n━━━━━━━━━━━━━━━\n\n'+(s?s+'\n\n':'')+(b?b+'\n\n':'')+'▼ '+(c||'詳細はこちら')+'\n'+(u||'（リンク）')+'\n\n━━━━━━━━━━━━━━━\n※ 配信停止は下記リンクから';
r.mail=ml;
var yt=t+'\n\n'+(s?s+'\n\n':'')+(b?b+'\n\n':'')+'━━━━━━━━━━━━━━━\n🔗 関連リンク\n'+(u||'（リンク）')+'\n\n━━━━━━━━━━━━━━━\n📌 タグ\nSNS運用,マーケティング,業務効率化,中小企業,デジタルマーケティング';
r.yt=yt;
renderOut(r);
}

function renderOut(r){
var o=document.getElementById('output');o.style.display='block';
o.innerHTML='<h2 style="font-size:1.1em;margin-bottom:14px">&#128196; 生成結果</h2>';
P.forEach(function(p){
var v=r[p.id]||'',l=v.length,ov=p.limit>0&&l>p.limit,d=document.createElement('div');d.className='plat';
d.innerHTML='<div class="plat-header" onclick="togB(this)"><h3><span class="plat-badge" style="background:'+p.color+'">'+p.name+'</span></h3><span style="font-size:.8em;color:#999">▼</span></div><div class="plat-body"><textarea id="out_'+p.id+'" oninput="upCnt(\''+p.id+'\','+p.limit+')">'+esc(v)+'</textarea><div class="char-info"><span id="cnt_'+p.id+'" class="'+(ov?'char-warn':'char-count')+'">'+l+'文字'+(p.limit>0?' / '+p.limit+'文字':'')+(ov?' ⚠ 超過！':'')+'</span><button class="copy-btn" onclick="cp(\''+p.id+'\',this)">コピー</button></div><span class="spec-toggle" onclick="togS(this)">ℹ 仕様を表示</span><div class="spec-panel">'+esc(p.spec).replace(/\n/g,'<br>')+'</div></div>';
o.appendChild(d);
});
renderTk();o.scrollIntoView({behavior:'smooth'});
}
function togB(e){var b=e.parentElement.querySelector('.plat-body');b.style.display=b.style.display==='none'?'':'none'}
function togS(e){e.nextElementSibling.classList.toggle('open')}
function upCnt(id,lim){
var ta=document.getElementById('out_'+id),cn=document.getElementById('cnt_'+id),l=ta.value.length,ov=lim>0&&l>lim;
cn.className=ov?'char-warn':'char-count';cn.textContent=l+'文字'+(lim>0?' / '+lim+'文字':'')+(ov?' ⚠ 超過！':'');
}
function cp(id,btn){
var ta=document.getElementById('out_'+id);
if(navigator.clipboard){navigator.clipboard.writeText(ta.value).then(function(){btn.textContent='✓ コピー済';btn.classList.add('copied');setTimeout(function(){btn.textContent='コピー';btn.classList.remove('copied')},1500)})}
else{ta.select();document.execCommand('copy');btn.textContent='✓ コピー済'}
}
function renderTk(){
var tk=document.getElementById('tracker');tk.style.display='block';
var g=document.getElementById('trackerGrid');g.innerHTML='';
P.forEach(function(p){var d=document.createElement('div');d.className='t-item pending';d.textContent=p.name;
d.onclick=function(){this.classList.toggle('done');this.classList.toggle('pending')};g.appendChild(d)});
}
</script>
