<body>
<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/digital-marketing/" style="color:#4299e1;text-decoration:none;">kusasyu Digital Marketing</a> &gt; <span style="color:#718096;">業種別ショート動画シナリオ＆SNS投稿セットジェネレーター</span></div>
<header><h1>ショート動画シナリオ＆SNS投稿ジェネレーター</h1><p>業種別テンプレート自動生成 — 3業種×3パターン対応</p></header>
<div class="wrap">
<div class="card">
<label>業種を選択</label>
<select id="gyo"><option value="food">飲食店</option><option value="beauty">美容サロン</option><option value="pro">士業（税理士・弁護士等）</option></select>
<label>商品・サービス名</label>
<input id="pname" placeholder="例：自家製スパイスカレー">
<label>特徴・強み（2〜3個）</label>
<textarea id="feat" placeholder="例：20種のスパイスを独自ブレンド、注文後に仕上げる出来立て"></textarea>
<label>ターゲット顧客</label>
<input id="tgt" placeholder="例：ランチ難民の30代会社員">
<label>シナリオパターン</label>
<div class="patterns" id="pats">
<div class="pb on" data-v="ba">ビフォーアフター型</div>
<div class="pb" data-v="voice">お客様の声型</div>
<div class="pb" data-v="back">裏側密着型</div>
</div>
<button class="btn" onclick="gen()">ワンクリック生成</button>
</div>
<div id="out"></div>
</div>
<script>
let pat='ba';
document.querySelectorAll('.pb').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.pb').forEach(x=>x.classList.remove('on'));b.classList.add('on');pat=b.dataset.v}});
const T={food:{ba:{title:'ビフォーアフター型',bgm:'アップテンポなカフェ系BGM（BPM120）',cuts:[{t:'0-5秒',dir:'商品のない空テーブル→暗め照明',line:'「{tgt}のみなさん、こんな経験ありませんか？」'},
{t:'5-15秒',dir:'調理シーン→湯気・音のクローズアップ',line:'「実は{pname}には秘密があるんです。{feat}」'},
{t:'15-25秒',dir:'完成品を正面から→断面・盛り付けアップ',line:'「この仕上がり、見てください！」'},
{t:'25-30秒',dir:'笑顔の客→店舗ロゴ＋場所テロップ',line:'「{pname}、今だけ限定◯食。プロフのリンクから予約↓」'}]},
voice:{title:'お客様の声型',bgm:'ナチュラル系BGM（BPM100）',cuts:[{t:'0-5秒',dir:'お客様の笑顔アップ（許可済み）',line:'「ここの{pname}、もう3回目です！」'},
{t:'5-15秒',dir:'実食シーン→リアクション',line:'「{feat}って聞いて来たけど…想像以上！」'},
{t:'15-25秒',dir:'店主が語るこだわりカット',line:'「{tgt}に届けたくて試行錯誤しました」'},
{t:'25-30秒',dir:'店舗外観→地図テロップ',line:'「あなたも体験しに来ませんか？↓予約はプロフから」'}]},
back:{title:'裏側密着型',bgm:'ドキュメンタリー風BGM（BPM90）',cuts:[{t:'0-5秒',dir:'早朝の仕込み風景・暗い厨房',line:'「朝5時。まだ誰もいない厨房で——」'},
{t:'5-15秒',dir:'食材カット・計量のクローズアップ',line:'「{pname}の裏側、お見せします。{feat}」'},
{t:'15-25秒',dir:'完成までの早回し→湯気が立つ瞬間',line:'「この瞬間のために毎朝ここに立ってます」'},
{t:'25-30秒',dir:'お客様に提供→笑顔',line:'「{tgt}の"おいしい"のために。ご来店お待ちしてます↓」'}]}},
beauty:{ba:{title:'ビフォーアフター型',bgm:'おしゃれトレンド系BGM（BPM115）',cuts:[{t:'0-5秒',dir:'施術前の状態（許可済み）',line:'「このお悩み、{tgt}に多いんです」'},
{t:'5-15秒',dir:'施術プロセスのハイライト',line:'「{pname}なら{feat}」'},
{t:'15-25秒',dir:'ビフォーアフター比較（左右分割）',line:'「たった1回でこの変化！」'},
{t:'25-30秒',dir:'お客様の笑顔→サロンロゴ',line:'「初回限定クーポンはプロフのリンクから↓」'}]},
voice:{title:'お客様の声型',bgm:'リラックス系BGM（BPM95）',cuts:[{t:'0-5秒',dir:'お客様インタビュー風',line:'「ずっと{pname}探してたんです」'},
{t:'5-15秒',dir:'施術中のリラックスした表情',line:'「{feat}って本当で、初回から実感できました」'},
{t:'15-25秒',dir:'仕上がり確認→鏡を見て笑顔',line:'「もっと早く来ればよかった！」'},
{t:'25-30秒',dir:'サロン内観→予約導線テロップ',line:'「次はあなたの番です。プロフから予約↓」'}]},
back:{title:'裏側密着型',bgm:'クリーン系BGM（BPM100）',cuts:[{t:'0-5秒',dir:'開店準備・器具消毒シーン',line:'「開店前のサロンの裏側、お見せします」'},
{t:'5-15秒',dir:'カウンセリング風景',line:'「{tgt}のお悩みに合わせて{pname}をカスタマイズ。{feat}」'},
{t:'15-25秒',dir:'技術シーンのクローズアップ',line:'「この技術、実は習得に◯年かかってます」'},
{t:'25-30秒',dir:'仕上がり→お見送り',line:'「あなた専用のプランをご提案します↓」'}]}},
pro:{ba:{title:'ビフォーアフター型',bgm:'信頼感のあるピアノBGM（BPM85）',cuts:[{t:'0-5秒',dir:'困っている人のイメージカット',line:'「{tgt}、こんなお悩みありませんか？」'},
{t:'5-15秒',dir:'相談シーン→資料を見せながら説明',line:'「{pname}で解決できます。{feat}」'},
{t:'15-25秒',dir:'解決後のイメージ（笑顔・書類完了）',line:'「相談前と後で、こんなに変わります」'},
{t:'25-30秒',dir:'事務所外観→無料相談テロップ',line:'「まずは無料相談から。プロフのリンクへ↓」'}]},
voice:{title:'お客様の声型',bgm:'穏やかなBGM（BPM80）',cuts:[{t:'0-5秒',dir:'相談者の声（顔出しなしOK）',line:'「正直、最初は不安でした」'},
{t:'5-15秒',dir:'面談シーン→うなずく相談者',line:'「{pname}を勧めてもらって。{feat}が決め手でした」'},
{t:'15-25秒',dir:'解決後の感想→ほっとした表情',line:'「もっと早く相談すればよかった」'},
{t:'25-30秒',dir:'専門家の顔→事務所ロゴ',line:'「{tgt}の味方です。まずはお気軽にDMを↓」'}]},
back:{title:'裏側密着型',bgm:'知的な雰囲気のBGM（BPM90）',cuts:[{t:'0-5秒',dir:'デスクワーク・書類の山',line:'「専門家の1日、お見せします」'},
{t:'5-15秒',dir:'調査・分析シーン',line:'「{tgt}のために{pname}を準備中。{feat}」'},
{t:'15-25秒',dir:'クライアントへの説明シーン',line:'「難しいことを"わかりやすく"がモットーです」'},
{t:'25-30秒',dir:'笑顔で握手→連絡先テロップ',line:'「あなたの不安、一緒に解決しましょう↓」'}]}}};
const HT={food:['#グルメ','#飲食店','#ランチ','#食べログ','#フードスタグラム','#おいしいもの巡り','#地元グルメ'],beauty:['#美容','#サロン','#ビューティー','#美容好きと繋がりたい','#美活','#自分磨き','#変身'],pro:['#士業','#専門家','#無料相談','#お悩み解決','#暮らしの知恵','#相談窓口','#プロに聞く']};
function esc(s){return s.replace(/</g,'&lt;')}
function gen(){const g=document.getElementById('gyo').value,pn=document.getElementById('pname').value.trim()||'（未入力）',ft=document.getElementById('feat').value.trim()||'（未入力）',tg=document.getElementById('tgt').value.trim()||'（未入力）';
const d=T[g][pat],tags=HT[g],gn={food:'飲食店',beauty:'美容サロン',pro:'士業'}[g];
function r(s){return s.replace(/\{pname\}/g,esc(pn)).replace(/\{feat\}/g,esc(ft)).replace(/\{tgt\}/g,esc(tg))}
let cuts='';d.cuts.forEach(c=>{cuts+=`<div style="margin:6px 0;padding:8px;background:#fafafa;border-radius:6px"><b>${c.t}</b>｜🎬 ${r(c.dir)}<br>🗣️ ${r(c.line)}</div>`});
const x1=r(`${esc(pn)}って知ってますか？\n\n${esc(ft)}\n\n${esc(tg)}にこそ試してほしい。\n\n詳しくはプロフのリンクから👇\n${tags.slice(0,3).join(' ')}`);
const x2=r(`【${gn}の裏側】\n${esc(pn)}ができるまで、実は…\n\n${esc(ft)}\n\nこだわりを動画で公開中📱\n${tags.slice(2,5).join(' ')}`);
const ig=r(`\n${esc(pn)}のご紹介✨\n\n━━━━━━━━━━\n📌 こんな方におすすめ\n→ ${esc(tg)}\n\n📌 特徴\n${esc(ft)}\n\n📌 まずはお気軽に\nDMまたはプロフのリンクからどうぞ！\n━━━━━━━━━━\n\n${tags.join(' ')}`);
const o=document.getElementById('out');o.style.display='block';
o.innerHTML=`<div class="card"><div class="sec"><h3>🎬 30秒動画シナリオ — ${d.title}（${gn}）</h3><div class="sec-body"><b>🎵 BGM：</b>${d.bgm}<br><br>${cuts}</div></div>
<div class="sec"><h3>📋 撮影チェックリスト</h3><div class="sec-body">☐ スマホ横置き固定（三脚推奨）<br>☐ 照明確認（自然光 or リングライト）<br>☐ BGMフリー素材を事前DL<br>☐ テロップ用テキスト準備<br>☐ 出演者への許可確認</div></div>
<div class="sec"><h3>🐦 X投稿文①</h3><div class="sec-body"><pre>${x1}</pre><button class="copy" onclick="cp(this)">コピー</button></div></div>
<div class="sec"><h3>🐦 X投稿文②</h3><div class="sec-body"><pre>${x2}</pre><button class="copy" onclick="cp(this)">コピー</button></div></div>
<div class="sec"><h3>📸 Instagram投稿文</h3><div class="sec-body"><pre>${ig}</pre><button class="copy" onclick="cp(this)">コピー</button></div></div>
<div class="sec"><h3>🏷️ ハッシュタグセット</h3><div class="sec-body"><div class="row">${tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div><button class="copy" onclick="cp(this)">コピー</button></div></div></div>`;
o.scrollIntoView({behavior:'smooth'})}
function cp(b){const t=b.parentElement.querySelector('pre,div.row');if(!t)return;const s=t.innerText;navigator.clipboard.writeText(s).then(()=>{b.textContent='コピー済み✓';setTimeout(()=>b.textContent='コピー',1500)})}
</script>
</body>
