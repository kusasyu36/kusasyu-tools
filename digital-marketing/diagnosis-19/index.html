['データ・数値はXで引用されやすい','インフォグラフ化はIG工数が大きい','調査レポートはnote有料記事向き','数値サマリのカード配信が効果的','データ解説で専門性を訴求','データ可視化動画で理解度UP','意思決定の根拠資料として有用','調査リリースはメディア掲載率が高い'],
