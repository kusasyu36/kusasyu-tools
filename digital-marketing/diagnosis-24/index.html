<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/digital-marketing/" style="color:#4299e1;text-decoration:none;">kusasyu Digital Marketing</a> &gt; <span style="color:#718096;">AEO記事診断＆リライト指示書ジェネレーター（パターン検出型</span></div>
<div class="wrap">
<h1>AEO記事診断＆リライト指示書ジェネレーター</h1>
<p class="sub">AI検索エンジンに引用されやすい記事構造をパターン検出で7基準自動診断</p>
<div class="card">
<label><b>記事テキストを貼り付け</b>（プレーンテキスト／Markdown対応）</label>
<textarea id="I" placeholder="ここに記事本文を貼り付けてください…"></textarea>
<button class="btn" onclick="run()">診断を実行する</button>
</div>
<div id="R"></div>
</div>
<script>
var C=[
{id:'q',nm:'① 疑問文の存在',w:'疑問文（？を含む文、「〜か」で終わる文）が2つ以上',th:2,u:'個',
ck:function(t){var m=t.match(/[？?]/g)||[];return{v:m.length,p:m.length>=2}},
fx:'【指示】記事冒頭・各見出しに読者が検索しそうな疑問文を追加。\n例：「〇〇とは何ですか？」「費用はいくらですか？」\nAI検索は疑問形クエリへの回答を優先的に引用します。'},
{id:'n',nm:'② 数値・データの具体性',w:'数値表現（数字＋単位: %・円・倍・件・年等）が3つ以上',th:3,u:'個',
ck:function(t){var m=t.match(/\d[\d,.]*\s*[%％円万億倍件年月日回個社人本時間分秒]/g)||[];return{v:m.length,p:m.length>=3}},
fx:'【指示】主張・比較に具体的数値を追加。\n例：「大幅に削減」→「年間コストを約35%削減」\n「多くの企業が導入」→「国内2,400社以上が導入（2024年時点）」'},
{id:'l',nm:'③ リスト・箇条書き構造',w:'箇条書き行（・ - * ● や 1. 等で始まる行）が3行以上',th:3,u:'行',
ck:function(t){var ls=t.split('\n'),m=ls.filter(function(l){return/^\s*[・\-\*●▪▶]\s|^\s*\d+[.．\)）]\s/.test(l)});return{v:m.length,p:m.length>=3}},
fx:'【指示】手順・要素の列挙を箇条書きに変換。\n例：「AとBとCがあります」→\n・A：〜\n・B：〜\n・C：〜\nAI検索はリスト構造を抽出しやすい傾向があります。'},
{id:'d',nm:'④ 定義・説明文の明確さ',w:'「〇〇とは」「〜を指す」「〜と定義」等の定義表現が1つ以上',th:1,u:'個',
ck:function(t){var m=t.match(/とは[、。,.\s]|を指し|と定義|と呼ばれ|の略で|の総称/g)||[];return{v:m.length,p:m.length>=1}},
fx:'【指示】記事冒頭で主題を1〜2文で明確に定義。\n例：「AEOとは、AI検索エンジンに自社コンテンツが引用されるよう最適化する施策を指します。」\nこの定義文がそのまま引用スニペットになります。'},
{id:'c',nm:'⑤ 適切な文字数',w:'本文が1,500〜5,000文字の範囲内',th:0,u:'文字',
ck:function(t){var v=t.replace(/\s/g,'').length;return{v:v,p:v>=1500&&v<=5000}},
fx:'【指示】文字数を1,500〜5,000文字に調整。\n・1,500文字未満→具体例・データ・手順を追加\n・5,000文字超→セクション分割し各セクションを独立した回答単位に'},
{id:'a',nm:'⑥ 権威性シグナル',w:'「調査」「研究」「専門家」「実績」「データ」等の権威性ワードが2つ以上',th:2,u:'個',
ck:function(t){var m=t.match(/調査|研究|専門家|公式|実績|導入事例|データ|統計|論文|認定|監修|エビデンス|実証|検証/g)||[];return{v:m.length,p:m.length>=2}},
fx:'【指示】主張の根拠・情報源を明示。\n例：「効果がある」→「〇〇研究所の2024年調査によると導入企業の78%が効果を実感」\n出典・調査名・専門家名を具体的に記載。'},
{id:'h',nm:'⑦ 見出し構造の最適化',w:'見出し（# ## や ■ 【】等で始まる行）が2つ以上',th:2,u:'個',
ck:function(t){var m=t.match(/^#{1,4}\s.+|^[■□▪●◆【].+/gm)||[];return{v:m.length,p:m.length>=2}},
fx:'【指示】記事を論理セクションに分割し見出しを追加。\n推奨構成：\n## 〇〇とは（定義）\n## メリット・効果\n## 具体的な方法・手順\n## まとめ\nAI検索は見出し単位で回答を抽出します。'}
];
var SM=[
{tp:'How-to記事',
bf:'やり方を説明します。まずAをします。次にBをします。最後にCをして完了です。簡単にできるので試してみてください。',
af:'## 〇〇のやり方【3ステップで完了】\n\n〇〇とは、△△を実現するための手法です。所要時間は約15分、成功率は92%（2024年自社調査）。\n\n### ステップ1：Aを準備する\n具体的手順を記載…\n\n### ステップ2：Bを実行する\n数値・条件を明記…\n\n### ステップ3：Cで仕上げる\n完了基準を記載…\n\nQ. 費用は？→初期費用0円、月額約3,000円〜'},
{tp:'比較記事',
bf:'AとBを比較するとそれぞれ良いところがあります。Aは使いやすくBは高機能です。どちらも人気があります。',
af:'## AとBの違いとは？【5項目で徹底比較】\n\n結論：コスト重視ならA、機能重視ならB。\n\n・月額料金：A 3,000円 / B 8,000円\n・導入社数：A 1,200社 / B 800社\n・無料体験：A 14日間 / B 30日間\n\n### どちらを選ぶべきか？\n・従業員50名以下→A（コスパ◎）\n・100名以上→B（拡張性◎）'},
{tp:'FAQ記事',
bf:'よくある質問についてまとめました。料金や使い方について説明します。詳しくはお問い合わせください。',
af:'## 〇〇のよくある質問\n\n### Q. 料金はいくらですか？\n月額3,000円（税別）〜。年間契約で20%割引の月額2,400円。\n\n### Q. 導入期間は？\n最短3営業日。平均約2週間（2024年実績：340社の平均値）。\n\n### Q. 解約はいつでも可能？\nはい、月単位で解約可能。手数料なし。'},
{tp:'事例記事',
bf:'あるお客様に導入していただきました。とても喜んでいただけました。業務が改善されたそうです。',
af:'## 導入事例：業務時間を40%削減した方法\n\n### 導入前の課題\n・月間処理：約2,000件を手作業対応\n・残業：月平均35時間/人\n\n### 導入後の成果（6ヶ月後の調査データ）\n・処理時間：1件15分→9分（40%削減）\n・残業：月平均12時間に改善\n\n### 担当者の声\n「定型業務の自動化で分析業務に注力できるようになりました」（管理部 田中氏）'}
];
function run(){
var t=document.getElementById('I').value.trim();
if(!t){alert('記事テキストを貼り付けてください');return}
var rs=C.map(function(c){var r=c.ck(t);return{id:c.id,nm:c.nm,w:c.w,th:c.th,u:c.u,fx:c.fx,v:r.v,p:r.p}});
var pc=rs.filter(function(r){return r.p}).length;
var sc=Math.round(pc/7*100);
var gd=sc>=80?'A（高い引用可能性）':sc>=50?'B（改善の余地あり）':'C（大幅な改善が必要）';
var cl=sc>=80?'#48bb78':sc>=50?'#ecc94b':'#f56565';
var h='<div class="card"><div class="sb"><div class="sn" style="color:'+cl+'">'+sc+'<span style="font-size:.35em">点</span></div><div class="sl">AEO最適化スコア — 判定：'+gd+'</div><div class="meter"><div class="mf" style="width:'+sc+'%;background:'+cl+'"></div></div><p style="font-size:.78em;color:#718096;margin-top:6px">7基準中 '+pc+'基準クリア</p></div></div>';
h+='<div class="card"><h3 style="margin-bottom:10px;font-size:1em">診断結果（クリックで詳細展開）</h3>';
rs.forEach(function(r){
var thr=r.id==='c'?'1,500〜5,000文字':r.th+r.u+'以上';
var det=r.id==='c'?r.v.toLocaleString()+'文字':r.v+r.u;
h+='<div class="cr"><div class="ch" onclick="this.classList.toggle(\'op\')"><span class="cn">'+r.nm+'</span><span class="det">'+det+'</span><span class="bg '+(r.p?'ps':'fl')+'">'+(r.p?'達成':'未達成')+'</span></div><div class="cd"><div class="lg"><b>判定ロジック：</b>'+r.w+'（閾値: '+thr+'）→ 検出値: '+det+'</div>'+(r.p?'<p style="color:#48bb78;margin-top:6px">この基準はクリアしています</p>':'<div class="ins"><h4>リライト指示</h4><pre style="white-space:pre-wrap;font-family:inherit;margin:0">'+r.fx+'</pre><button class="cb" onclick="cp(this,\''+r.id+'\')">指示をコピー</button></div>')+'</div></div>'});
h+='</div>';
var fl=rs.filter(function(r){return!r.p});
if(fl.length){
h+='<div class="card"><h3 style="margin-bottom:10px;font-size:1em">リライト指示書（未達成項目まとめ）</h3>';
fl.forEach(function(r){h+='<div class="rw"><b>'+r.nm+'</b><br>'+r.fx.replace(/\n/g,'<br>')+'</div>'});
h+='<button class="cb" style="margin-top:6px" onclick="cpAll()">全指示をまとめてコピー</button></div>'}
h+='<div class="card"><h3 style="margin-bottom:10px;font-size:1em">記事タイプ別 Before／After サンプル</h3><div class="tabs">';
SM.forEach(function(s,i){h+='<div class="tab'+(i===0?' ac':'')+'" onclick="ss('+i+',this)">'+s.tp+'</div>'});
h+='</div>';
SM.forEach(function(s,i){
h+='<div class="sp'+(i===0?' ac':'')+'" id="s'+i+'"><div class="ba"><div class="bf"><div class="bl">Before（引用されにくい）</div>'+s.bf+'</div><div class="af"><div class="bl">After（引用されやすい）</div><pre style="white-space:pre-wrap;font-family:inherit;margin:0" id="at'+i+'">'+s.af+'</pre><button class="cb" onclick="cpS('+i+')">テンプレートをコピー</button></div></div></div>'});
h+='</div>';
var el=document.getElementById('R');el.innerHTML=h;el.style.display='block';el.scrollIntoView({behavior:'smooth'})}
function ss(i,el){document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('ac')});el.classList.add('ac');document.querySelectorAll('.sp').forEach(function(s){s.classList.remove('ac')});document.getElementById('s'+i).classList.add('ac')}
function cp(btn,id){var c=C.find(function(x){return x.id===id});if(c)navigator.clipboard.writeText(c.fx).then(function(){btn.textContent='コピー済み';setTimeout(function(){btn.textContent='指示をコピー'},1500)})}
function cpAll(){var t=document.getElementById('I').value;var fl=C.filter(function(c){return!c.ck(t).p});var tx=fl.map(function(c){return c.nm+'\n'+c.fx}).join('\n\n');navigator.clipboard.writeText(tx).then(function(){event.target.textContent='コピー済み';setTimeout(function(){event.target.textContent='全指示をまとめてコピー'},1500)})}
function cpS(i){var tx=document.getElementById('at'+i).textContent;navigator.clipboard.writeText(tx).then(function(){event.target.textContent='コピー済み';setTimeout(function(){event.target.textContent='テンプレートをコピー'},1500)})}
</script>
</body>
