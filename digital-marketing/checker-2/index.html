<h1>📋 発信実行チェックリスト</h1>
<div class="ctrl">
<select id="scene" onchange="render()">
<option value="">-- シーンを選択 --</option>
<option value="fund">資金調達発表</option>
<option value="product">新製品リリース</option>
<option value="expo">展示会出展</option>
</select>
<button class="btn" onclick="resetAll()">リセット</button>
</div>
<div class="prog" id="prog"></div>
<div id="out"></div>
<script>
const D={
fund:[
["準備フェーズ（D-14〜D-8）"],
[-14,"プレスリリース原稿作成","社内","高",""],
[-12,"メディアリスト精査・記者アプローチ開始","広報","高",""],
[-10,"SNS告知用クリエイティブ制作","制作","中",""],
[-9,"投資家向けメール文面作成","経営","高",""],
[-8,"社内共有・FAQ準備","広報","中",""],
["発表直前（D-7〜D-1）"],
[-7,"エンバーゴ付きメディアブリーフィング","広報","高",""],
[-5,"CEOインタビュー記事仕込み","広報","中",""],
[-3,"SNS投稿スケジュール設定","SNS","中",""],
[-1,"プレスリリース配信予約・最終確認","広報","高",""],
["発表当日〜フォロー（D-Day〜D+7）"],
[0,"プレスリリース配信","広報","高",""],
[0,"SNS一斉投稿（X/LinkedIn/note）","SNS","高",""],
[1,"メディア掲載確認・お礼連絡","広報","中",""],
[3,"社員向けSNSシェア依頼","人事","低",""],
[7,"掲載実績まとめ・KPIレビュー","広報","高",""]
],
product:[
["準備フェーズ（D-14〜D-8）"],
[-14,"ティザーコンテンツ企画・制作開始","制作","高",""],
[-12,"製品紹介LP作成","Web","高",""],
[-10,"デモ動画撮影・編集","制作","高",""],
[-9,"ブロガー/インフルエンサーへの事前案内","広報","中",""],
[-8,"メルマガ原稿作成","マーケ","中",""],
["発表直前（D-7〜D-1）"],
[-7,"プレスリリース原稿完成","広報","高",""],
[-5,"SNSティザー投稿開始","SNS","中",""],
[-3,"既存顧客向け先行案内メール配信","CS","高",""],
[-1,"LP公開テスト・最終チェック","Web","高",""],
["発表当日〜フォロー（D-Day〜D+7）"],
[0,"LP公開・プレスリリース配信","広報","高",""],
[0,"SNS製品発表投稿","SNS","高",""],
[1,"問い合わせ対応体制確認","CS","中",""],
[3,"ユーザーレビュー依頼","CS","中",""],
[7,"初週KPI集計・改善点洗い出し","マーケ","高",""]
],
expo:[
["準備フェーズ（D-14〜D-8）"],
[-14,"出展告知プレスリリース作成","広報","高",""],
[-12,"ブース用パネル/配布物デザイン発注","制作","高",""],
[-10,"来場誘導SNS投稿計画策定","SNS","中",""],
[-9,"アポイント取得（メディア・顧客）","営業","高",""],
[-8,"展示デモ環境構築・リハーサル","技術","高",""],
["発表直前（D-7〜D-1）"],
[-7,"来場者向け招待メール配信","マーケ","高",""],
[-5,"SNSカウントダウン投稿開始","SNS","中",""],
[-3,"スタッフ役割分担・トークスクリプト確認","営業","中",""],
[-1,"ブース設営・最終動作確認","全員","高",""],
["発表当日〜フォロー（D-Day〜D+7）"],
[0,"会場からリアルタイムSNS発信","SNS","高",""],
[0,"名刺/リード情報の即日デジタル化","営業","高",""],
[1,"お礼メール一斉送信","営業","高",""],
[3,"展示会レポート記事公開","広報","中",""],
[7,"リード分類・フォロー架電開始","営業","高",""]
]};
const K="pr-chk-v1";
function load(){try{return JSON.parse(localStorage.getItem(K))||{}}catch(e){return{}}}
function save(d){localStorage.setItem(K,JSON.stringify(d))}
function render(){
const s=document.getElementById("scene").value,o=document.getElementById("out"),p=document.getElementById("prog");
if(!s){o.innerHTML="";p.innerHTML="";return}
const items=D[s],st=load();
let h='<table><tr><th>✓</th><th>日程</th><th>タスク</th><th>優先</th><th>担当</th><th>メモ</th></tr>';
let total=0,done=0;
items.forEach((r,i)=>{
if(r.length===1){h+=`<tr><td class="phase" colspan="6">${r[0]}</td></tr>`;return}
const id=s+"-"+i,c=st[id]||{},ck=c.c?'checked':'',cls=c.c?'done':'';
const label=r[0]===0?'D-Day':r[0]>0?'D+'+r[0]:'D'+r[0];
const memo=(c.m||'').replace(/"/g,'&quot;');
total++;if(c.c)done++;
h+=`<tr class="${cls}"><td><input type="checkbox" ${ck} onchange="tog('${id}',this)"></td><td>${label}</td><td>${r[1]}</td><td class="pri-${r[3]}">${r[3]}</td><td>${r[2]}</td><td><input type="text" value="${memo}" onchange="memo('${id}',this.value)" placeholder="メモ"></td></tr>`;
});
h+='</table>';
o.innerHTML=h;
const pct=total?Math.round(done/total*100):0;
p.innerHTML=`進捗: <b>${done}/${total}</b>（${pct}%）${'█'.repeat(Math.round(pct/5))}${'░'.repeat(20-Math.round(pct/5))}`;
}
function tog(id,el){const d=load();d[id]=d[id]||{};d[id].c=el.checked;save(d);render()}
function memo(id,v){const d=load();d[id]=d[id]||{};d[id].m=v;save(d)}
function resetAll(){if(confirm('チェックとメモをすべてリセットしますか？')){localStorage.removeItem(K);render()}}
</script>
