<h1>GEO診断＆改善テンプレート出力ツール</h1>
<p class="sub">Webコンテンツを貼り付けてAI検索引用対応度を6軸100点で即時診断。弱点には改善テンプレートを自動出力。</p>
<textarea id="T" placeholder="診断したいWebコンテンツのテキストをここに貼り付けてください（見出し含む）&#10;&#10;例：&#10;## なぜDXが必要なのか？&#10;中小企業の78%がDX推進を課題と回答しています。&#10;DXとは、デジタル技術を活用して業務を変革することを指します。"></textarea>
<div class="ct"><label>業種：</label><select id="I"><option value="0">BtoB IT</option><option value="1">製造</option><option value="2">不動産</option><option value="3">飲食</option><option value="4">医療</option></select>
<button onclick="run()">診断する</button></div>
<div id="R"></div></div>
<script>
const N=['FAQ構造','エビデンス密度','結論先行度','見出し階層','引用可能要素','簡潔性'],
C=['#e53935','#fb8c00','#fdd835','#43a047','#1e88e5','#8e24aa'],
IN=['BtoB IT','製造','不動産','飲食','医療'],
BM=[[72,68,75,70,65,73],[55,78,60,72,70,65],[60,55,58,62,50,60],[45,40,50,55,35,58],[65,82,70,75,80,68]];
function run(){
const t=document.getElementById('T').value.trim();
if(!t){alert('テキストを入力してください');return}
const ind=+document.getElementById('I').value,sc=calc(t),total=Math.round(sc.reduce((a,v)=>a+v,0)/6);
let h='<div class="cd"><div class="sb">'+total+'<span style="font-size:.4em"> / 100点</span></div><div class="sl">'+(total>=70?'<span class="gd">AI引用対応度：良好</span>':total>=40?'<span style="color:#f57f17;font-weight:bold">AI引用対応度：改善余地あり</span>':'<span class="wk">AI引用対応度：要改善</span>')+'</div></div>';
h+='<div class="cd"><h2>6軸スコア詳細</h2>';
for(let i=0;i<6;i++){const v=sc[i],cls=v<40?'wk':v>=70?'gd':'';
h+='<div class="bl"><span>'+N[i]+'</span><span class="'+cls+'">'+v+'点</span></div><div class="bg"><div class="bf" style="width:'+v+'%;background:'+C[i]+'"></div></div>';}
h+='</div>';
h+='<div class="cd"><h2>業種ベンチマーク比較</h2><table><tr><th>軸</th><th>あなた</th>';
const ci=[ind,(ind+1)%5,(ind+2)%5];
ci.forEach(i=>h+='<th>'+IN[i]+'平均</th>');
h+='</tr>';
for(let i=0;i<6;i++){h+='<tr><td>'+N[i]+'</td><td'+(sc[i]<40?' class="wk"':sc[i]>=70?' class="gd"':'')+'>'+sc[i]+'</td>';
ci.forEach(j=>h+='<td>'+BM[j][i]+'</td>');h+='</tr>';}
h+='</table></div>';
const weak=sc.map((v,i)=>({v,i})).filter(x=>x.v<40);
if(weak.length){
h+='<div class="cd"><h2>改善テンプレート（スコア40未満の軸）</h2>';
weak.forEach(x=>{h+='<div class="tip"><strong>'+N[x.i]+'</strong>（'+x.v+'点）を改善</div>'+tpl(x.i,ind);});
h+='</div>';}else{h+='<div class="cd"><h2>診断結果</h2><p class="gd">全軸40点以上です。さらなる向上には、各軸70点超を目指しましょう。</p></div>';}
h+='<div class="cd"><h2>レーダーチャート</h2><canvas id="cv" width="320" height="320"></canvas></div>';
const el=document.getElementById('R');el.innerHTML=h;el.style.display='block';
drawRadar(sc,ci);el.scrollIntoView({behavior:'smooth'});}
function calc(t){
const ls=t.split('\n').filter(l=>l.trim()),ps=t.split(/\n\s*\n/).filter(p=>p.trim()),ss=t.split(/[。！？!?.]+/).filter(s=>s.trim().length>2);
const hd=ls.filter(l=>/^#{1,4}\s|^【|^■|^●|^▶|^◆/.test(l));
const qh=hd.filter(l=>/[？?]|なぜ|どう|何[がをは]|いつ|どこ|どの|でしょうか|ですか/.test(l));
const s1=hd.length?Math.min(100,qh.length/hd.length*130+10):8;
const nm=t.match(/\d+[%％万億円件人社名回倍年月日個台棟]|\d+\.\d+|約\d+|[\d,]{3,}/g)||[];
const s2=Math.min(100,nm.length/Math.max(ps.length,1)*30+5);
const f=ss[0]||'';let s3=25;
if(/です|ます|である|とは|を指[すし]|を意味|の結論/.test(f))s3+=25;
if(f.length>3&&f.length<80)s3+=20;
if(/結論|要点|つまり|端的|まず|答え/.test(t.slice(0,200)))s3+=30;
const hl=ls.map(l=>{const m=l.match(/^(#{1,6})\s/);return m?m[1].length:0}).filter(x=>x);
let s4=40;if(hl.length>=2){let ok=true;for(let i=1;i<hl.length;i++)if(hl[i]-hl[i-1]>1){ok=false;break;}
if(ok)s4+=35;if(new Set(hl).size>=2)s4+=25;}else if(!hl.length)s4=15;
const df=(t.match(/「[^」]+」|『[^』]+』|とは[、。]|を指す|と定義|と呼ぶ/g)||[]).length;
const pn=(t.match(/[A-Z][a-zA-Z]{2,}/g)||[]).length;
const s5=Math.min(100,df*12+Math.min(pn,8)*5+5);
const avg=ss.length?ss.reduce((a,s)=>a+s.trim().length,0)/ss.length:100;
const s6=avg<=50?95:avg<=70?80:avg<=90?60:Math.max(10,110-avg);
return [s1,s2,s3,s4,s5,s6].map(v=>Math.round(Math.max(0,Math.min(100,v))));}
function tpl(ax,ind){
const bz=['SaaS','部品','物件','店舗','クリニック'][ind],
kw=['導入事例','製造プロセス','査定額','集客','診療'][ind];
const T=[
`<div class="tp">【FAQ構造テンプレート】\n\n## ${bz}の${kw}でよくある質問\n\n### Q. ${kw}の費用相場はどのくらいですか？\nA. 業界平均は月額○万円〜○万円です。規模別の目安は以下の通りです。\n- 小規模：○万円／月\n- 中規模：○万円／月\n\n### Q. 導入までの期間はどれくらいですか？\nA. 標準的には○週間〜○ヶ月です。\n\n※ 各段落を「質問→即回答」の形式にしてください</div>`,
`<div class="tp">【エビデンス挿入テンプレート】\n\n改善前：「多くの企業が課題を抱えています」\n改善後：「${bz}企業の78.3%が${kw}を課題と回答（○○調査 2025年）」\n\n挿入パターン：\n- 「○○によると、市場規模は約△△億円（前年比□%増）」\n- 「導入企業の92%が効果を実感（n=150）」\n- 「平均ROIは△△%（○○社調べ）」\n\n※ 各段落に最低1つの数値根拠を含めてください</div>`,
`<div class="tp">【結論先行テンプレート】\n\n改善前：「近年、○○の重要性が高まっており…（3行後に結論）」\n改善後：「${kw}の最適解は○○です。その理由は3つあります。」\n\n冒頭パターン：\n- 「結論から言うと、${bz}に最適な○○は△△です。」\n- 「${kw}の答え：○○を選ぶべき理由を解説します。」\n\n※ 記事の最初の1文で結論を述べてください</div>`,
`<div class="tp">【見出し階層テンプレート】\n\n## H2：${kw}完全ガイド\n### H3：${kw}とは何か\n### H3：${kw}の3つのメリット\n#### H4：メリット1 - コスト削減\n#### H4：メリット2 - 効率化\n### H3：導入ステップ\n\n※ H2→H3→H4の順序を守り、H2からH4へ飛ばさないでください</div>`,
`<div class="tp">【引用可能要素テンプレート】\n\n定義文パターン：\n- 「${kw}とは、○○を目的とした△△のことを指す。」\n- 「GEOとは、Generative Engine Optimizationの略で、生成AI検索への最適化手法である。」\n\n固有名詞の追加：\n- 製品名・サービス名を正式名称で記載\n- 「○○株式会社が提供する△△」のように主語を明示\n\n※ 1記事に定義文を2つ以上含めてください</div>`,
`<div class="tp">【簡潔化テンプレート】\n\n改善前（85文字）：\n「${bz}における${kw}については、さまざまな観点から検討する必要があり、特に重要なのはコストと品質のバランスです」\n\n改善後（42文字）：\n「${bz}の${kw}はコストと品質のバランスが鍵です」\n\nルール：\n- 1文50文字以内を目安にする\n- 「〜については」「〜において」を削る\n- 主語と述語を近づける</div>`];
return T[ax];}
function drawRadar(sc,ci){
const cv=document.getElementById('cv');if(!cv)return;const x=cv.getContext('2d'),cx=160,cy=160,r=120;
x.clearRect(0,0,320,320);
for(let k=1;k<=5;k++){x.beginPath();for(let i=0;i<6;i++){const a=Math.PI*2*i/6-Math.PI/2,d=r*k/5;
i?x.lineTo(cx+d*Math.cos(a),cy+d*Math.sin(a)):x.moveTo(cx+d*Math.cos(a),cy+d*Math.sin(a));}
x.closePath();x.strokeStyle='#ddd';x.stroke();}
for(let i=0;i<6;i++){const a=Math.PI*2*i/6-Math.PI/2;x.beginPath();x.moveTo(cx,cy);
x.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));x.strokeStyle='#ddd';x.stroke();
const tx=cx+(r+16)*Math.cos(a)-12,ty=cy+(r+16)*Math.sin(a)+4;
x.fillStyle='#333';x.font='11px sans-serif';x.fillText(N[i],tx-8,ty);}
function poly(d,col,al){x.beginPath();for(let i=0;i<6;i++){const a=Math.PI*2*i/6-Math.PI/2,v=r*d[i]/100;
i?x.lineTo(cx+v*Math.cos(a),cy+v*Math.sin(a)):x.moveTo(cx+v*Math.cos(a),cy+v*Math.sin(a));}
x.closePath();x.fillStyle=col;x.globalAlpha=al;x.fill();x.globalAlpha=1;x.strokeStyle=col;x.lineWidth=2;x.stroke();}
poly(BM[ci[0]],'#90caf9',.15);poly(sc,'#1a237e',.25);}
</script></body></html>
