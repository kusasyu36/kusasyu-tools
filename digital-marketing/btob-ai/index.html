<div class="hd"><h1>BtoB製品動画 AIプロダクションエンジン</h1><p>製品情報を入力 → 5シーン台本・AIプロンプト・メタデータを15分で生成</p></div>
<div class="card"><h2>製品情報を入力</h2>
<div class="row"><div><label>製品名</label><input id="pName" placeholder="例：SpeedScan Pro 3000"></div>
<div><label>業種カテゴリ</label><select id="pCat"><option value="mfg">製造業</option><option value="it">IT・SaaS</option><option value="med">医療機器</option></select></div></div>
<label>主要特長（3つ、改行区切り）</label><textarea id="pFeat" placeholder="処理速度が従来比3倍&#10;AI搭載で自動検出&#10;導入コスト40%削減"></textarea>
<div class="row"><div><label>ターゲット購買者の役職</label><input id="pRole" placeholder="例：生産技術部長"></div>
<div><label>想定利用シーン</label><input id="pScene" placeholder="例：工場の品質検査ライン"></div></div>
<button class="btn" onclick="gen()">台本・プロンプトを一括生成</button></div>
<div class="out" id="output"><div class="card"><h2>生成結果</h2>
<div class="tab-bar" id="tabs"></div><div id="panels"></div></div></div>
<div class="card"><h2>コスト比較計算機</h2>
<div class="cp"><div><label>外注単価（万円/本）</label><input type="number" id="cCost" value="10"></div>
<div><label>月間制作本数</label><input type="number" id="cNum" value="5"></div>
<div><label>AI内製コスト（万円/本）</label><input type="number" id="cAi" value="0.5"></div></div>
<div class="res" id="cRes">入力すると年間削減額を表示</div>
<button class="btn" onclick="calc()" style="background:linear-gradient(135deg,#0f3460,#16213e)">コスト比較を計算</button></div>
</div>
<script>
const T={mfg:{bg:"製造現場",pain:"品質不良率の増加や人手不足による生産効率低下",comp:"従来の汎用装置",case:"某精密部品メーカー（従業員120名）",res:"不良率を42%削減し年間800万円のコスト圧縮を達成",vis:["工場ラインで作業者が困惑する様子","製品が課題を解決する3Dアニメーション","スペック比較表がスライドインするモーション","導入企業の工場で製品が稼働する映像","問い合わせ画面とキャンペーン情報"]},it:{bg:"業務システム",pain:"手作業によるデータ管理で月40時間の工数ロスが発生",comp:"従来のスプレッドシート管理",case:"某中堅SIer（従業員80名）",res:"業務工数を60%削減し月次決算を5日短縮",vis:["担当者がExcelと格闘する画面収録風映像","ダッシュボードが自動集計するUIアニメーション","競合製品との機能比較チャート","導入企業の担当者インタビュー風カット","無料トライアル申込画面"]},med:{bg:"医療・検査現場",pain:"検査結果の判定に時間がかかり患者待ち時間が増大",comp:"従来の手動判定プロセス",case:"某地域中核病院（病床数200床）",res:"判定時間を70%短縮し1日あたりの検査数を1.5倍に拡大",vis:["検査技師が手作業で判定するシーン","製品のAI判定画面がリアルタイム表示される映像","精度・速度の比較グラフアニメーション","病院スタッフが笑顔で使用する映像","資料請求フォームとセミナー案内"]}};
function gen(){const n=document.getElementById("pName").value||"製品X";const c=document.getElementById("pCat").value;const f=(document.getElementById("pFeat").value||"高性能\n低コスト\n簡単導入").split("\n").slice(0,3);while(f.length<3)f.push("優れた特長");const r=document.getElementById("pRole").value||"部門責任者";const s=document.getElementById("pScene").value||"現場運用";const t=T[c];const sc=[{t:"課題提起（0:00-0:30）",nar:`「${t.bg}でこんな課題はありませんか？」\n${t.pain}——${r}の皆様なら、この問題の深刻さをご存知のはずです。${s}における非効率が、年間数百万円のコスト増を招いています。`,vi:t.vis[0],tel:`${t.bg}の課題、放置していませんか？`},{t:"解決策（0:30-1:00）",nar:`${n}は、この課題を根本から解決します。\n特長①${f[0]}。特長②${f[1]}。特長③${f[2]}。\n${r}が求める「現場で即使える」設計思想で開発されました。`,vi:t.vis[1],tel:`${n}の3つの強み`},{t:"スペック比較（1:00-1:30）",nar:`${t.comp}と比較してください。${n}は${f[0]}を実現しながら、${f[2]}。導入から運用まで、トータルコストで圧倒的な優位性があります。`,vi:t.vis[2],tel:`${t.comp}との徹底比較`},{t:"導入事例（1:30-2:10）",nar:`${t.case}では、${n}の導入により${t.res}。担当者様からは「もっと早く導入すればよかった」とのお声をいただいています。`,vi:t.vis[3],tel:`導入事例：${t.res}`},{t:"CTA（2:10-2:30）",nar:`まずは無料の製品資料で${n}の全機能をご確認ください。今なら個別デモのご予約も承っています。下記リンクからお気軽にお問い合わせください。`,vi:t.vis[4],tel:`無料資料ダウンロード＆デモ予約受付中`}];
let s1="",s2="",s3="";sc.forEach((x,i)=>{s1+=`\n【シーン${i+1}】${x.t}\n━━━━━━━━━━━━━━━━━━\n[ナレーション]\n${x.nar}\n\n[映像指示] ${x.vi}\n[テロップ] ${x.tel}\n`;});
sc.forEach((x,i)=>{const style=c==="med"?"clean medical laboratory, soft lighting":"modern professional, cinematic lighting";s2+=`\n■ シーン${i+1}用（${x.t.split("（")[0]}）\n\n【Runway Gen-3】\n${x.vi}, ${style}, 4K, professional corporate video, no text overlay --ar 16:9\n\n【Kling AI】\nCinematic shot of ${x.vi}, photorealistic, shallow depth of field, corporate style\n\n【Pika】\n${x.vi}, smooth camera movement, professional lighting, 16:9 aspect ratio\n`;});
s3=`■ YouTube\nタイトル：${n}｜${f[0]}を実現する${t.bg}向けソリューション【製品デモ】\n説明文：${t.pain}を解決する${n}の製品デモ動画です。${f.join("、")}の3つの特長を2分半でご紹介。無料資料請求はこちら→[URL]\nタグ：${n},${t.bg},BtoB,製品デモ,業務効率化,DX\n\n■ LinkedIn\n投稿文：【${r}の皆様へ】${t.pain}でお悩みではありませんか？\n${n}なら${f[0]}で課題を解決。${t.case}では${t.res}。\n▶ 製品デモ動画（2分半）をぜひご覧ください。\n#BtoB #DX #業務効率化`;
const s4=`制作所要時間（目安）：約15分\nAIツール利用料：約500〜2,000円/本\n\n推奨ワークフロー：\n1. 本エンジンで台本・プロンプト生成（5分）\n2. AI動画ツールで各シーン生成（5分）\n3. 無料編集ツールで結合・テロップ追加（5分）\n\n推奨編集ツール：CapCut（無料）/ DaVinci Resolve（無料版）`;
const data=[{name:"台本（5シーン）",content:s1},{name:"AIプロンプト",content:s2},{name:"投稿メタデータ",content:s3},{name:"制作ガイド",content:s4}];
const tabs=document.getElementById("tabs");const panels=document.getElementById("panels");tabs.innerHTML="";panels.innerHTML="";
data.forEach((d,i)=>{const tb=document.createElement("div");tb.className="tab"+(i===0?" on":"");tb.textContent=d.name;tb.onclick=()=>{document.querySelectorAll(".tab").forEach(e=>e.classList.remove("on"));document.querySelectorAll(".tp").forEach(e=>e.classList.remove("on"));tb.classList.add("on");document.querySelectorAll(".tp")[i].classList.add("on")};tabs.appendChild(tb);
const p=document.createElement("div");p.className="tp"+(i===0?" on":"");p.innerHTML=`<button class="copy-btn" onclick="navigator.clipboard.writeText(this.parentElement.innerText)">コピー</button>`+d.content.replace(/\n/g,"<br>");panels.appendChild(p)});
document.getElementById("output").style.display="block";document.getElementById("output").scrollIntoView({behavior:"smooth"})}
function calc(){const u=parseFloat(document.getElementById("cCost").value)||10;const n=parseFloat(document.getElementById("cNum").value)||5;const a=parseFloat(document.getElementById("cAi").value)||0.5;const sv=(u-a)*n*12;document.getElementById("cRes").innerHTML=`年間削減額：<span style="font-size:1.5em">${sv.toFixed(0)}万円</span>（月${((u-a)*n).toFixed(1)}万円×12ヶ月）<br><span style="font-size:.7em;color:#666">外注：年${(u*n*12).toFixed(0)}万円 → AI内製：年${(a*n*12).toFixed(0)}万円｜削減率${(((u-a)/u)*100).toFixed(0)}%</span>`}
</script></body></html>
