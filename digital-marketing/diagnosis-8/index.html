<h1>AI検索被参照スコア診断＆改善ツール</h1>
<p class="sub">Perplexity・ChatGPT Search・AI Overviewに引用されやすい構造かを0〜100点で診断</p>
<div class="card">
<h2>診断するコンテンツを入力</h2>
<textarea id="inp" placeholder="自社サイトのHTMLソースまたはテキストを貼り付けてください&#10;&#10;例: ブログ記事のHTMLをまるごとコピー＆ペースト"></textarea>
<button class="btn" onclick="run()">診断する</button>
<p class="note">※ 診断はブラウザ内のJavaScriptパターンマッチングで実行します。入力内容は外部に送信されません。</p>

</div>

<h2>項目別診断（5項目）</h2>
<div id="items"></div>
</div>

<script>
function run(){
var t=document.getElementById('inp').value.trim();
if(!t){alert('コンテンツを入力してください');return}
var r=[c1(t),c2(t),c3(t),c4(t),c5(t)];
var tot=Math.round(r.reduce(function(a,b){return a+b.s},0)/5);
var el=document.getElementById('circ');
el.textContent=tot;
el.style.background=tot>=70?'#38a169':tot>=40?'#d69e2e':'#e53e3e';
var lb=tot>=70?'AI検索に引用されやすい構造です':tot>=40?'改善の余地があります':'大幅な改善が必要です';
document.getElementById('slbl').textContent=lb;
document.getElementById('slbl').className='sl '+(tot>=70?'g':tot>=40?'y':'r');
var h='';
for(var i=0;i<r.length;i++){var d=r[i],co=d.s>=70?'#38a169':d.s>=40?'#d69e2e':'#e53e3e';
h+='<div class="item"><div class="ih"><span class="in">'+d.n+'</span><span class="is" style="background:'+co+'">'+d.s+'点</span></div>';
h+='<div class="bb"><div class="bf" style="width:'+d.s+'%;background:'+co+'"></div></div>';
h+='<div class="rs">'+d.r+'</div>';
h+='<div class="fx"><b>改善アクション：</b>'+d.f;
h+='<div class="ba"><div class="bef"><span class="bl">Before</span>'+E(d.b)+'</div><div class="aft"><span class="bl">After</span>'+E(d.a)+'</div></div></div></div>';}
document.getElementById('items').innerHTML=h;
document.getElementById('result').style.display='block';
document.getElementById('result').scrollIntoView({behavior:'smooth'});}

function E(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function c1(t){
var qs=(t.match(/(<dt|<summary|質問|Q[\.:：]|？|\?[^=]|よくある|とは[？?])/gi)||[]).length;
var qa=(t.match(/FAQPage|faqpage|<dt[\s>][\s\S]*?<\/dt>\s*<dd|Q[\.:：][\s\S]*?A[\.:：]/gi)||[]).length;
var s,r;
if(qa>=3){s=100;r='FAQ構造（Q&Aペア）が'+qa+'組検出。AI検索が直接引用しやすい理想的な形式です。';}
else if(qs>=5){s=70;r='疑問文パターンが'+qs+'個検出。明確なQ&Aペア構造にするとさらに効果的です。';}
else if(qs>=2){s=40;r='疑問文が'+qs+'個。FAQ形式にまとめるとAI検索に拾われやすくなります。';}
else{s=10;r='Q&A構造・疑問文がほぼ未検出。FAQ形式の追加を強く推奨します。';}
return{n:'① FAQ形式の検出',s:s,r:r,
f:'疑問文＋回答のペアをQ&A形式で明記し、FAQPageスキーマを追加してください。',
b:'サービスの料金は状況により異なります。\nお気軽にお問い合わせください。',
a:'Q. 料金はいくらですか？\nA. 基本プランは月額5万円から。\n初期費用0円・最短1ヶ月で解約可能です。'};}

function c2(t){
var h1=(t.match(/<h1[\s>]/gi)||[]).length;
var h2=(t.match(/<h2[\s>]/gi)||[]).length;
var h3=(t.match(/<h3[\s>]/gi)||[]).length;
var s,r;
if(h1===1&&h2>=2&&h3>=1){s=100;r='H1=1, H2='+h2+', H3='+h3+'。理想的な見出し階層です。';}
else if(h1===1&&h2>=2){s=80;r='H1・H2は適切。H3を追加すると詳細の区分が明確になります。';}
else if(h2>=1){s=50;r='H2='+h2+'検出。'+(h1===0?'H1タグが未使用。':'')+'階層を整理するとAIの内容理解が向上します。';}
else{s=10;r='見出しタグが未検出。AI検索はH1〜H3で文書構造を把握します。';}
return{n:'② 見出し階層の適切さ',s:s,r:r,
f:'H1はページに1つ、H2で大項目、H3で小項目を設定してください。',
b:'<div style="font-size:24px">\n  会社概要\n</div>\n<div style="font-size:18px">\n  事業内容\n</div>',
a:'<h1>会社概要</h1>\n<h2>事業内容</h2>\n<h3>コンサルティング部門</h3>'};}

function c3(t){
var jld=(t.match(/application\/ld\+json/gi)||[]).length;
var tp=(t.match(/"@type"\s*:\s*"(FAQPage|HowTo|Article|Organization|LocalBusiness)"/gi)||[]).length;
var s,r;
if(jld>=1&&tp>=1){s=100;r='JSON-LD='+jld+'ブロック検出。AI検索に有効な@typeを含んでいます。';}
else if(jld>=1){s=60;r='JSON-LDは検出済み。FAQPage等のAI向け@type追加を推奨します。';}
else{s=0;r='schema.orgマークアップ（JSON-LD）が未検出。AI検索の引用率に大きく影響します。';}
return{n:'③ schema.orgマークアップ',s:s,r:r,
f:'JSON-LD形式でFAQPage・Article等の構造化データを追加してください。',
b:'<div class="faq">\n  <p>Q. 対応エリアは？</p>\n  <p>A. 全国対応です</p>\n</div>',
a:'<script type="application/ld+json">\n{"@context":"https://schema.org",\n "@type":"FAQPage",\n "mainEntity":[{"@type":"Question",\n  "name":"対応エリアは？",\n  "acceptedAnswer":{"@type":"Answer",\n   "text":"全国対応です"}}]}\n<\/script>'};}

function c4(t){
var nm=(t.match(/\d{1,3}(,\d{3})*(\.\d+)?\s*(％|%|円|万|億|件|社|名|人|倍|kg|km|時間|年)/g)||[]).length;
var sr=(t.match(/(出典|調査|統計|データ|レポート|※\d|according)/gi)||[]).length;
var s,r;
if(nm>=5&&sr>=1){s=100;r='数値データ'+nm+'個＋出典表記を検出。根拠ある情報源としてAIが評価しやすい構成です。';}
else if(nm>=3){s=70;r='数値データ'+nm+'個検出。出典を明記すると信頼性がさらに向上します。';}
else if(nm>=1){s=40;r='数値が'+nm+'個のみ。具体的な統計データの追加を推奨します。';}
else{s=5;r='数値・統計データが未検出。AIは数値を含む情報源を優先的に引用します。';}
return{n:'④ 数値・統計データの含有率',s:s,r:r,
f:'業界統計・自社実績・公的データの具体数値を記載し、出典を明示してください。',
b:'多くの企業が導入しており、\n高い効果が報告されています。',
a:'国内1,200社が導入し、平均コスト\n23%削減を達成（2025年自社調査、\nn=480）。'};}

function c5(t){
var au=(t.match(/(著者|執筆|監修|written by|author|<meta\s+name="author)/gi)||[]).length;
var dt=(t.match(/(更新日|公開日|20\d{2}[\-\/年]\d{1,2}[\-\/月]|datePublished|dateModified)/gi)||[]).length;
var ci=(t.match(/(出典|参考文献|引用元|参照|source|reference|<cite)/gi)||[]).length;
var fd=[];if(au)fd.push('著者情報');if(dt)fd.push('日付情報');if(ci)fd.push('出典表記');
var c=fd.length,s,r;
if(c===3){s=100;r=fd.join('・')+'を全て検出。E-E-A-Tの観点でAI検索に高評価される構成です。';}
else if(c===2){s=70;r=fd.join('・')+'を検出。'+(au?'':'著者情報')+(dt?'':'更新日')+(ci?'':'出典')+'の追加で満点になります。';}
else if(c===1){s=35;r=fd[0]+'のみ検出。残りの信頼性情報を追加してください。';}
else{s=5;r='著者名・更新日・出典のいずれも未検出。AI検索は発信者情報を重視します。';}
return{n:'⑤ 発信者信頼性情報（E-E-A-T）',s:s,r:r,
f:'著者名（資格・肩書付）、最終更新日、参考文献を必ず明記してください。',
b:'当社サービスのご案内です。\nお気軽にご相談ください。',
a:'著者：山田太郎（中小企業診断士）\n最終更新：2025年12月1日\n出典：中小企業庁「2025年版白書」'};}
</script>
