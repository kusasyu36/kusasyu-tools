<div class="container">
<h1>FAQ・HowTo JSON-LDジェネレーター</h1>
<p class="sub">AEOスコア診断ツール連携 — AI検索に引用される構造化データをノーコード生成</p>

<div class="card">
<div class="tabs">
<button class="tab active" onclick="switchMode('faq')">FAQPage スキーマ</button>
<button class="tab" onclick="switchMode('howto')">HowTo スキーマ</button>
</div>

<div id="faq-mode">
<p class="info">質問と回答のペアを入力してください。最低1つ、Googleリッチリザルトには2つ以上を推奨します。</p>
<div id="faq-list"></div>
<button class="btn-add" onclick="addFaq()">＋ 質問・回答ペアを追加</button>
</div>

<div id="howto-mode" style="display:none">
<label>手順タイトル <span class="badge">必須</span></label>
<input type="text" id="ht-name" placeholder="例：WordPressでJSON-LDを設置する方法">
<label>手順の説明</label>
<textarea id="ht-desc" rows="2" placeholder="例：この手順ではWordPressサイトにJSON-LDを追加する方法を説明します。"></textarea>
<label>手順ステップ</label>
<div id="howto-list"></div>
<button class="btn-add" onclick="addStep()">＋ ステップを追加</button>
</div>

<div class="btn-row">
<button class="btn btn-p" onclick="generate()">JSON-LDを生成</button>
<button class="btn btn-s" onclick="resetAll()">リセット</button>
</div>
</div>

<div class="warn" id="warn"></div>
<div class="ok" id="ok"></div>

<div class="out" id="out">
<div class="card">
<label>生成されたJSON-LD <span class="badge">headタグ内に貼り付け</span></label>
<div class="code-box" id="code"></div>
<div class="btn-row">
<button class="btn btn-p" onclick="copyCode()">📋 コードをコピー</button>
<button class="btn btn-s" onclick="preview()">🔍 プレビュー検証</button>
</div>
</div>
</div>

<div class="out" id="prev-section">
<div class="card">
<label>バリデーション結果</label>
<div id="prev-result" style="font-size:.84rem;margin-top:8px"></div>
</div>
</div>

<div class="copied" id="copied">コピーしました！</div>
</div>

<script>
let mode='faq',faqId=0,stepId=0;

function switchMode(m){
mode=m;
document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===(m==='faq'?0:1)));
document.getElementById('faq-mode').style.display=m==='faq'?'block':'none';
document.getElementById('howto-mode').style.display=m==='howto'?'block':'none';
hideMsg();
}

function addFaq(){
faqId++;
const d=document.createElement('div');d.className='item';d.id='faq-'+faqId;
d.innerHTML='<span class="item-num">Q'+faqId+'</span><button class="rm" onclick="this.parentElement.remove();renum(\'faq\')">&times;</button><label>質問</label><input type="text" class="fq" placeholder="例：AEOとは何ですか？"><label>回答</label><textarea class="fa" rows="2" placeholder="例：AEO（Answer Engine Optimization）はAI検索エンジンに…"></textarea>';
document.getElementById('faq-list').appendChild(d);
}

function addStep(){
stepId++;
const d=document.createElement('div');d.className='item';d.id='step-'+stepId;
d.innerHTML='<span class="item-num">Step '+stepId+'</span><button class="rm" onclick="this.parentElement.remove();renum(\'step\')">&times;</button><label>ステップ名</label><input type="text" class="sn" placeholder="例：HTMLファイルを開く"><label>ステップ詳細</label><textarea class="st" rows="2" placeholder="例：テキストエディタでHTMLファイルを開きます。"></textarea>';
document.getElementById('howto-list').appendChild(d);
}

function renum(t){
const pre=t==='faq'?'Q':'Step ';
const list=document.getElementById(t==='faq'?'faq-list':'howto-list');
list.querySelectorAll('.item-num').forEach((s,i)=>s.textContent=pre+(i+1));
}

function hideMsg(){['warn','ok','out','prev-section'].forEach(id=>{document.getElementById(id).style.display='none'});}

function showWarn(m){const e=document.getElementById('warn');e.textContent=m;e.style.display='block';}
function showOk(m){const e=document.getElementById('ok');e.textContent=m;e.style.display='block';}

function validate(){
let errs=[];
if(mode==='faq'){
const qs=document.querySelectorAll('#faq-list .fq');
const as=document.querySelectorAll('#faq-list .fa');
if(qs.length===0){errs.push('質問・回答ペアが1つもありません');return errs;}
qs.forEach((q,i)=>{
if(!q.value.trim())errs.push('Q'+(i+1)+'：質問が空です（必須フィールド）');
if(!as[i].value.trim())errs.push('Q'+(i+1)+'：回答が空です（必須フィールド）');
if(typeof q.value!=='string')errs.push('Q'+(i+1)+'：質問が文字列型ではありません');
});
if(qs.length===1)errs.push('【推奨】Googleリッチリザルトには2つ以上のFAQを推奨します');
}else{
const n=document.getElementById('ht-name').value.trim();
if(!n)errs.push('手順タイトルが空です（必須フィールド）');
const ss=document.querySelectorAll('#howto-list .sn');
const st=document.querySelectorAll('#howto-list .st');
if(ss.length===0){errs.push('ステップが1つもありません');return errs;}
ss.forEach((s,i)=>{
if(!s.value.trim())errs.push('Step '+(i+1)+'：ステップ名が空です（必須フィールド）');
if(!st[i].value.trim())errs.push('Step '+(i+1)+'：ステップ詳細が空です（必須フィールド）');
});
}
return errs;
}

function esc(s){return s.replace(/\\/g,'\\\\').replace(/"/g,'\\"').replace(/\n/g,'\\n');}

function generate(){
hideMsg();
const errs=validate();
const isWarnOnly=errs.length===1&&errs[0].startsWith('【推奨】');
if(errs.length>0&&!isWarnOnly){showWarn(errs.join('\n'));return;}
if(isWarnOnly)showWarn(errs[0]);

let obj;
if(mode==='faq'){
const qs=document.querySelectorAll('#faq-list .fq');
const as=document.querySelectorAll('#faq-list .fa');
const items=[];
qs.forEach((q,i)=>{items.push({"@type":"Question","name":q.value.trim(),"acceptedAnswer":{"@type":"Answer","text":as[i].value.trim()}});});
obj={"@context":"https://schema.org","@type":"FAQPage","mainEntity":items};
}else{
const steps=[];
document.querySelectorAll('#howto-list .sn').forEach((s,i)=>{
const t=document.querySelectorAll('#howto-list .st')[i];
steps.push({"@type":"HowToStep","name":s.value.trim(),"text":t.value.trim(),"position":i+1});
});
obj={"@context":"https://schema.org","@type":"HowTo","name":document.getElementById('ht-name').value.trim()};
const desc=document.getElementById('ht-desc').value.trim();
if(desc)obj.description=desc;
obj.step=steps;
}

const json=JSON.stringify(obj,null,2);
const tag='<script type="application/ld+json">\n'+json+'\n<\/script>';
document.getElementById('code').textContent=tag;
document.getElementById('out').style.display='block';
if(!isWarnOnly)showOk('JSON-LDを正常に生成しました（'+mode.toUpperCase()+'スキーマ）。headタグ内に貼り付けてください。');
document.getElementById('prev-section').style.display='none';
}

function copyCode(){
const t=document.getElementById('code').textContent;
if(navigator.clipboard){navigator.clipboard.writeText(t);}else{
const a=document.createElement('textarea');a.value=t;document.body.appendChild(a);a.select();document.execCommand('copy');document.body.removeChild(a);
}
const c=document.getElementById('copied');c.style.display='block';setTimeout(()=>c.style.display='none',1800);
}

function preview(){
const t=document.getElementById('code').textContent;
const match=t.match(/<script[^>]*>([\s\S]*?)<\/script>/);
if(!match){showWarn('JSON-LDコードが見つかりません');return;}
let errs=[],warns=[];
try{
const obj=JSON.parse(match[1]);
if(!obj['@context'])errs.push('@context が欠落しています');
else if(obj['@context']!=='https://schema.org')warns.push('@context は https://schema.org を推奨');
if(!obj['@type'])errs.push('@type が欠落しています');
if(obj['@type']==='FAQPage'){
if(!obj.mainEntity||!Array.isArray(obj.mainEntity))errs.push('mainEntity 配列が欠落しています');
else obj.mainEntity.forEach((e,i)=>{
if(e['@type']!=='Question')errs.push('項目'+(i+1)+'：@type が Question ではありません');
if(!e.name||typeof e.name!=='string')errs.push('項目'+(i+1)+'：name（質問文）が欠落または文字列型ではありません');
if(!e.acceptedAnswer)errs.push('項目'+(i+1)+'：acceptedAnswer が欠落しています');
else{if(e.acceptedAnswer['@type']!=='Answer')errs.push('項目'+(i+1)+'：acceptedAnswer の @type が Answer ではありません');
if(!e.acceptedAnswer.text||typeof e.acceptedAnswer.text!=='string')errs.push('項目'+(i+1)+'：回答テキストが欠落または文字列型ではありません');}
});
}else if(obj['@type']==='HowTo'){
if(!obj.name)errs.push('name（手順タイトル）が欠落しています');
if(!obj.step||!Array.isArray(obj.step))errs.push('step 配列が欠落しています');
else obj.step.forEach((s,i)=>{
if(s['@type']!=='HowToStep')errs.push('Step'+(i+1)+'：@type が HowToStep ではありません');
if(!s.name)errs.push('Step'+(i+1)+'：name が欠落しています');
if(!s.text)errs.push('Step'+(i+1)+'：text が欠落しています');
});
}
}catch(e){errs.push('JSON構文エラー：'+e.message);}

const sec=document.getElementById('prev-section');sec.style.display='block';
const r=document.getElementById('prev-result');
if(errs.length===0&&warns.length===0){
r.innerHTML='<div style="color:#86efac">✅ バリデーション通過 — schema.org準拠のJSON-LDです。<br>Googleリッチリザルトテストでも確認を推奨します。</div>';
}else{
let h='';
if(errs.length)h+='<div style="color:#fca5a5;margin-bottom:8px">❌ エラー（'+errs.length+'件）<br>'+errs.map(e=>'・'+e).join('<br>')+'</div>';
if(warns.length)h+='<div style="color:#fcd34d">⚠ 警告（'+warns.length+'件）<br>'+warns.map(w=>'・'+w).join('<br>')+'</div>';
r.innerHTML=h;
}
}

function resetAll(){
hideMsg();
document.getElementById('faq-list').innerHTML='';
document.getElementById('howto-list').innerHTML='';
document.getElementById('ht-name').value='';
document.getElementById('ht-desc').value='';
faqId=0;stepId=0;
}

addFaq();addFaq();
</script>
</body>
