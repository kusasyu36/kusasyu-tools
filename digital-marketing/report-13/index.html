<script>
const PF=['Google広告','Yahoo!広告','META広告','LINE広告'],F=['imp','cl','cv','co','rv'],FL=['表示回数','クリック数','CV数','費用(円)','売上(円)'];
let cp_=0,mo=0,lN='',lA='',lS='';
(function(){const t=document.getElementById('pt');PF.forEach((p,i)=>{const b=document.createElement('button');b.textContent=p;b.className=i?'':'on';b.onclick=()=>{cp_=i;[...t.children].forEach((x,j)=>x.className=j===i?'on':'')};t.appendChild(b)});
const m=document.getElementById('mm');['手入力','CSV貼付'].forEach((l,i)=>{const b=document.createElement('button');b.textContent=l;b.className=i?'':'on';b.onclick=()=>{mo=i;[...m.children].forEach((x,j)=>x.className=j===i?'on':'');document.getElementById('man').style.display=i?'none':'';document.getElementById('ca').style.display=i?'':'none'};m.appendChild(b)});
['cu','pr'].forEach(id=>{const g=document.getElementById(id);F.forEach((f,i)=>{const d=document.createElement('div');d.innerHTML='<label>'+FL[i]+'</label><input type="number" id="'+id+'_'+f+'" placeholder="0">';g.appendChild(d)})})})();
function gv(){let c={},p={};if(!mo){F.forEach(f=>{c[f]=+(document.getElementById('cu_'+f).value)||0;p[f]=+(document.getElementById('pr_'+f).value)||0})}else{const ls=document.getElementById('csv').value.trim().split('\n');if(ls.length<2)return alert('CSVは2行必要です'),null;const ps=s=>s.split(',').map(Number);const a=ps(ls[0]),b=ps(ls[1]);F.forEach((f,i)=>{c[f]=a[i]||0;p[f]=b[i]||0})}return{c,p}}
function calc(d){const r={},ch=(a,b)=>b?((a-b)/b*100):0;r.ctr_c=d.c.cl/d.c.imp*100||0;r.ctr_p=d.p.cl/d.p.imp*100||0;r.cvr_c=d.c.cv/d.c.cl*100||0;r.cvr_p=d.p.cv/d.p.cl*100||0;r.cpa_c=d.c.co/d.c.cv||0;r.cpa_p=d.p.co/d.p.cv||0;r.roas_c=d.c.rv/d.c.co*100||0;r.roas_p=d.p.rv/d.p.co*100||0;r.ctr_r=ch(r.ctr_c,r.ctr_p);r.cvr_r=ch(r.cvr_c,r.cvr_p);r.cpa_r=ch(r.cpa_c,r.cpa_p);r.roas_r=ch(r.roas_c,r.roas_p);return r}
function badge(v,inv){const g=inv?v<0:v>0;const cls=Math.abs(v)<3?'flat':g?'good':'bad';return'<span class="'+cls+'">'+(v>0?'+':'')+v.toFixed(1)+'%</span>'}
function rKPI(r,t){t.innerHTML=[{l:'CTR',v:r.ctr_c.toFixed(2)+'%',r:r.ctr_r,i:0},{l:'CVR',v:r.cvr_c.toFixed(2)+'%',r:r.cvr_r,i:0},{l:'CPA',v:'¥'+Math.round(r.cpa_c).toLocaleString(),r:r.cpa_r,i:1},{l:'ROAS',v:r.roas_c.toFixed(0)+'%',r:r.roas_r,i:0}].map(k=>'<div class="ki"><div style="font-size:10px;color:#888">'+k.l+'</div><div class="v">'+k.v+'</div><div class="r">前月比 '+badge(k.r,k.i)+'</div></div>').join('')}
function rCH(r,t){t.innerHTML=[{l:'CTR',c:r.ctr_c,p:r.ctr_p},{l:'CVR',c:r.cvr_c,p:r.cvr_p},{l:'CPA(千)',c:r.cpa_c/1e3,p:r.cpa_p/1e3},{l:'ROAS',c:r.roas_c,p:r.roas_p}].map(k=>{const mx=Math.max(k.c,k.p,.01);return'<div class="bg"><div class="bp"><div class="br p" style="height:'+Math.max(k.p/mx*85,2)+'px"></div><div class="br q" style="height:'+Math.max(k.c/mx*85,2)+'px"></div></div><div class="bl">'+k.l+'</div></div>'}).join('')}
const T={cpa:{up:['CPAが前月比{r}上昇し獲得効率が悪化',['クリック単価上昇による広告費増加','CVR低下に伴う獲得効率悪化','競合の入札強化による市場競争激化'],['低効率キーワードの停止・入札引下げ','LP改善によるCVR向上施策','除外設定見直しで無駄クリック削減']],dn:['CPAが前月比{r}改善し獲得効率が向上',['CVR改善による効率的なCV獲得','入札最適化・自動入札の学習進行','季節需要の高まり'],['好調要因を特定し他キャンペーンへ横展開','改善維持しつつ予算増額を検討','成功クリエイティブの分析と展開']]},ctr:{up:['CTRが前月比{r}向上し広告訴求力が強化',['広告文・クリエイティブ改善の効果','ターゲティング精度の向上','競合出稿減による相対的な露出向上'],['高CTR広告の要素分析と横展開','CTR向上をCVRにも繋げるLP最適化','好調セグメントの拡張']],dn:['CTRが前月比{r}低下し訴求力に課題',['クリエイティブの疲弊','競合の訴求強化','ターゲティングのズレ'],['広告文・バナーの刷新','オーディエンス見直し','広告フォーマット最適化']]},cvr:{up:['CVRが前月比{r}改善しサイト転換効率が向上',['LP改善施策の効果','流入トラフィック品質の向上','訴求とLPの一貫性向上'],['成功LP改善パターンの横展開','高CVRセグメントへの予算集中','フォーム最適化の継続']],dn:['CVRが前月比{r}低下し転換効率に課題',['LP体験の劣化','トラフィック品質低下','競合オファー強化'],['LP速度・モバイルUX改善','ヒートマップ分析でボトルネック特定','CTA改善テスト実施']]},roas:{up:['ROASが前月比{r}改善し投資収益性が向上',['高単価商品のCV増加','CPA改善による効率向上','LTV向上施策の効果'],['好調キャンペーンへ予算再配分','高収益商品の露出強化','成功パターンの他媒体展開']],dn:['ROASが前月比{r}悪化し収益性に課題',['低単価商品へのCV偏り','CPA上昇による効率悪化','セール終了・季節要因'],['商品別ROAS分析と見直し','高ROAS商品への予算シフト','クロスセル施策の強化']]}};
function genN(r){let txt='',acts=[],sp=[];
[{k:'cpa',r:r.cpa_r,inv:1},{k:'ctr',r:r.ctr_r},{k:'cvr',r:r.cvr_r},{k:'roas',r:r.roas_r}].forEach(p=>{
const v=p.r,abs=Math.abs(v);if(abs<10){sp.push(p.k.toUpperCase()+'は横ばい');return}
const dir=v>0?'up':'dn',t=T[p.k][dir],sev=abs>=30?'大幅':'',rs=sev+(v>0?'+':'')+v.toFixed(1)+'%';
const isG=p.inv?v<0:v>0;
txt+='【'+p.k.toUpperCase()+'】\n'+t[0].replace('{r}',rs)+'しています。\n考えられる要因:\n'+t[1].map((f,i)=>' '+(i+1)+'. '+f).join('\n')+'\n\n';
acts.push(...t[2]);sp.push(p.k.toUpperCase()+'が'+rs+(isG?'で改善':'で悪化'))});
if(!txt)txt='主要KPIに大きな変動はありません。現行施策を継続し小規模テストで改善機会を探ることを推奨します。\n';
lS=sp.join('、')+'。';lN=txt;lA=acts.length?acts.map((a,i)=>(i+1)+'. '+a).join('\n'):'現行施策の継続を推奨';return txt}
function gen(){const d=gv();if(!d)return;const r=calc(d);document.getElementById('pn').textContent='【'+PF[cp_]+'】';rKPI(r,document.getElementById('kp'));rCH(r,document.getElementById('ch'));const t=genN(r);document.getElementById('na').textContent=t+'\n推奨アクション:\n'+lA;document.getElementById('R').style.display='';document.getElementById('R').scrollIntoView({behavior:'smooth'})}
function cp(){navigator.clipboard.writeText(document.getElementById('na').textContent).then(()=>alert('コピーしました'))}
function showR(){document.getElementById('rt').textContent=PF[cp_]+' 月次パフォーマンスレポート';const n=new Date();document.getElementById('rd').textContent=n.getFullYear()+'年'+(n.getMonth()+1)+'月度';document.getElementById('rs').textContent=lS;document.getElementById('rk').innerHTML=document.getElementById('kp').innerHTML;document.getElementById('rc').innerHTML=document.getElementById('ch').innerHTML;document.getElementById('rn').textContent=lN;document.getElementById('ra').textContent=lA;document.getElementById('R').style.display='none';document.getElementById('IN').style.display='none';document.getElementById('P').style.display=''}
function hideR(){document.getElementById('P').style.display='none';document.getElementById('R').style.display='';document.getElementById('IN').style.display=''}
function res(){F.forEach(f=>{['cu_','pr_'].forEach(p=>{const e=document.getElementById(p+f);if(e)e.value=''})});document.getElementById('csv').value='';document.getElementById('R').style.display='none'}
</script>
