<body>
<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/digital-marketing/" style="color:#4299e1;text-decoration:none;">kusasyu Digital Marketing</a> &gt; <span style="color:#718096;">AEOスコア診断＆改善提案ツール</span></div>
<div class="wrap">
<h1>📊 <span>AEO</span>スコア診断ツール</h1>
<p style="text-align:center;color:#718096;margin-bottom:16px;font-size:.9em">コンテンツのAI検索引用適性を10項目で診断します</p>
<div class="card">
<label><b>コンテンツを貼り付け</b>（HTML・Markdown・テキスト）</label>
<textarea id="inp" placeholder="診断したいコンテンツをここに貼り付けてください..."></textarea>
<div class="btns">
<button class="btn-p" onclick="run()">診断する</button>
<button class="btn-s" onclick="save()">結果を保存して比較</button>
<button class="btn-s" onclick="reset()">リセット</button>
</div>

<div class="card">
<div class="score-header">

<div class="total-label">/ 100点（AEO適性スコア）</div>
</div>

</div>

<h2 style="font-size:1.1em;margin-bottom:8px">📋 項目別スコア＆改善アクション</h2>
<div class="items" id="itemList"></div>
</div>
<div id="compareBox" class="card hidden">
<h2 style="font-size:1.1em;margin-bottom:8px">🔄 改善前後の比較</h2>
<div class="compare" id="compareContent"></div>
</div>
</div>
</div>
<script>
var CRITERIA=[
{key:"faq",name:"FAQ構造",check:function(t){var m=(t.match(/(？|\?|Q[:：]|質問|よくある|A[:：])/g)||[]).length;return Math.min(10,m*2)},advice:"「Q:〜 A:〜」形式のFAQセクションを追加。AI検索は質問-回答ペアを優先引用します。"},
{key:"def",name:"定義文",check:function(t){var m=(t.match(/(とは[、。\s]|を指し|定義|意味する|概要|のこと[でです])/g)||[]).length;return Math.min(10,m*2)},advice:"「〇〇とは、△△のことです」という明確な定義文を冒頭に配置してください。"},
{key:"src",name:"出典明示",check:function(t){var m=(t.match(/(出典|参照|引用|調査|によると|データ|統計|研究|発表|レポート)/g)||[]).length;return Math.min(10,m>=5?10:m*2)},advice:"データや主張に「〇〇調べ（2024年）」等の出典を明記しましょう。"},
{key:"brief",name:"簡潔回答",check:function(t){var s=t.split(/[。\n]/).filter(function(x){return x.trim().length>0});var sh=s.filter(function(x){return x.length<=80}).length;return Math.min(10,Math.round(sh/Math.max(s.length,1)*10))},advice:"1文80文字以内を目安に。冒頭で結論→詳細は後述の構成にしましょう。"},
{key:"heading",name:"見出し階層",check:function(t){var h=(t.match(/(^#{1,4}\s|<h[1-4])/gm)||[]).length;return Math.min(10,h>=6?10:Math.round(h*1.7))},advice:"H2→H3→H4の階層構造を整備。見出しだけで内容把握できる状態が理想です。"},
{key:"schema",name:"構造化データ",check:function(t){var m=(t.match(/(schema|json-ld|itemtype|FAQ|HowTo|手順|ステップ[0-9]|step)/gi)||[]).length;return Math.min(10,Math.floor(m>=4?10:m*2.5))},advice:"FAQPage/HowTo等の構造化データを示唆する構成（手順番号等）を入れましょう。"},
{key:"list",name:"リスト・表活用",check:function(t){var m=(t.match(/(^[\-\*・●]\s|^[0-9]+[\.\)）]|<li|<tr|<td|\|.*\|)/gm)||[]).length;return Math.min(10,m>=8?10:Math.round(m*1.3))},advice:"箇条書き・番号リスト・比較表を活用。AI検索はリスト形式を引用しやすい傾向です。"},
{key:"data",name:"数値・データ",check:function(t){var m=(t.match(/[0-9０-９]+[%％万億円倍件人回年月日時間分秒割個社]/g)||[]).length;return Math.min(10,m>=6?10:Math.round(m*1.7))},advice:"具体的な数値（価格・割合・期間等）を含めると引用精度が向上します。"},
{key:"term",name:"専門用語説明",check:function(t){var m=(t.match(/(（[^）]+）|とも呼ば|つまり|言い換え|具体的には|例えば|すなわち)/g)||[]).length;return Math.min(10,m>=5?10:m*2)},advice:"専門用語に括弧書きの補足や「つまり〜」の平易な言い換えを添えてください。"},
{key:"clear",name:"文章の明確性",check:function(t){var s=t.split(/[。\n]/).filter(function(x){return x.trim().length>0});var lo=s.filter(function(x){return x.length>120}).length;var r=1-lo/Math.max(s.length,1);return Math.min(10,Math.round(r*10))},advice:"1文120文字超の長文を分割。主語-述語を明確にし曖昧表現を避けましょう。"}
];
var saved=null;
function run(){
var t=document.getElementById("inp").value.trim();
if(!t){alert("コンテンツを入力してください");return}
var scores=CRITERIA.map(function(c){return{name:c.name,score:c.check(t),advice:c.advice}});
var total=scores.reduce(function(a,b){return a+b.score},0);
document.getElementById("totalScore").textContent=total;
document.getElementById("result").classList.remove("hidden");
drawRadar(scores);
renderItems(scores);
if(saved!==null)showCompare(total);
}
function drawRadar(scores){
var cv=document.getElementById("radar"),ctx=cv.getContext("2d");
var w=cv.width,h=cv.height,cx=w/2,cy=h/2,r=110,n=scores.length;
ctx.clearRect(0,0,w,h);
for(var lv=1;lv<=5;lv++){ctx.beginPath();var lr=r*lv/5;
for(var i=0;i<=n;i++){var a=Math.PI*2*i/n-Math.PI/2;var x=cx+lr*Math.cos(a);var y=cy+lr*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
ctx.strokeStyle="#e2e8f0";ctx.stroke()}
for(var i=0;i<n;i++){var a=Math.PI*2*i/n-Math.PI/2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));ctx.strokeStyle="#e2e8f0";ctx.stroke()}
scores.forEach(function(s,i){var a=Math.PI*2*i/n-Math.PI/2;var x=cx+(r+22)*Math.cos(a);var y=cy+(r+22)*Math.sin(a);
ctx.fillStyle="#4a5568";ctx.font="11px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(s.name,x,y)});
ctx.beginPath();
scores.forEach(function(s,i){var a=Math.PI*2*i/n-Math.PI/2;var v=r*s.score/10;var x=cx+v*Math.cos(a);var y=cy+v*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
ctx.closePath();ctx.fillStyle="rgba(49,130,206,.2)";ctx.fill();ctx.strokeStyle="#3182ce";ctx.lineWidth=2;ctx.stroke();
scores.forEach(function(s,i){var a=Math.PI*2*i/n-Math.PI/2;var v=r*s.score/10;ctx.beginPath();ctx.arc(cx+v*Math.cos(a),cy+v*Math.sin(a),4,0,Math.PI*2);ctx.fillStyle="#3182ce";ctx.fill()});
}
function renderItems(scores){
var el=document.getElementById("itemList");el.innerHTML="";
var sorted=scores.slice().sort(function(a,b){return a.score-b.score});
sorted.forEach(function(s){
var cls=s.score>=7?"s-high":s.score>=4?"s-mid":"s-low";
el.innerHTML+='<div class="item"><div class="item-score '+cls+'">'+s.score+'</div><div class="item-body"><h3>'+s.name+'</h3><p>'+s.advice+'</p></div></div>'});
}
function save(){
var t=document.getElementById("inp").value.trim();
if(!t){alert("先にコンテンツを入力して診断してください");return}
var scores=CRITERIA.map(function(c){return c.check(t)});
saved=scores.reduce(function(a,b){return a+b},0);
alert("スコア "+saved+" 点を保存しました。改善後に再診断すると比較表示されます。");
}
function showCompare(current){
var box=document.getElementById("compareBox");box.classList.remove("hidden");
var diff=current-saved;var sign=diff>=0?"+":"";
var color=diff>=0?"#38a169":"#e53e3e";
document.getElementById("compareContent").innerHTML=
'<div><em>改善前</em><span>'+saved+'</span></div><div><em>改善後</em><span>'+current+'</span></div><div><em>変化</em><span style="color:'+color+'">'+sign+diff+'</span></div>';
}
function reset(){
document.getElementById("inp").value="";
document.getElementById("result").classList.add("hidden");
document.getElementById("compareBox").classList.add("hidden");
saved=null;
}
</script>
