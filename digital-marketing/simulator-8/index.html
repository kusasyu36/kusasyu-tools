<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/digital-marketing/" style="color:#4299e1;text-decoration:none;">kusasyu Digital Marketing</a> &gt; <span style="color:#718096;">EC動画広告コスト削減シミュレーター</span></div>
<div class="wrap">
<h1>EC動画広告 コスト削減シミュレーター</h1>
<p class="sub">外注・AI活用・内製の3パターンを即比較</p>
<div class="card">
<h2>① 業種を選択</h2>
<select id="industry" onchange="applyDefaults()">
<option value="food">食品</option>
<option value="cosmetics">化粧品</option>
<option value="apparel">アパレル</option>
<option value="goods">雑貨</option>
</select>
<h2>② 制作条件を入力</h2>
<div class="row">
<div><label>月間制作本数</label><input type="number" id="volume" min="1" max="200" value="5"></div>
<div><label>商材数</label><input type="number" id="products" min="1" max="100" value="3"></div>
</div>
<div class="row">
<div><label>現在の外注単価（万円/本）</label><input type="number" id="unitcost" min="1" max="200" step="0.5"></div>
<div><label>内製担当者の時給（円）</label><input type="number" id="wage" min="500" max="10000" step="100"></div>
</div>
<button onclick="calc()">シミュレーション実行</button>
</div>
<div class="result" id="result">
<div class="card">
<h2>年間コスト比較</h2>
<div class="cols">
<div class="col" id="c1"><h3>外注</h3><div class="price" id="p1"></div><div class="detail" id="d1"></div></div>
<div class="col" id="c2"><h3>AI動画ツール活用</h3><div class="price" id="p2"></div><div class="detail" id="d2"></div></div>
<div class="col" id="c3"><h3>完全内製</h3><div class="price" id="p3"></div><div class="detail" id="d3"></div></div>
</div>
<div class="bar-wrap" id="bars"></div>
<div class="save"><p>最大年間削減額</p><div class="num" id="saving"></div><p id="savepct"></p></div>
<div class="note">※AI動画ツール月額は市場参考値（3,000〜30,000円帯）を使用。内製工数は業界平均を基に算出。</div>
</div>
</div>
</div>
<script>
const DATA={food:{unit:8,ai_monthly:9800,hours:3,ai_hours:1},cosmetics:{unit:12,ai_monthly:15000,hours:4,ai_hours:1.5},apparel:{unit:10,ai_monthly:12000,hours:3.5,ai_hours:1.2},goods:{unit:6,ai_monthly:8000,hours:2.5,ai_hours:0.8}};
function applyDefaults(){const d=DATA[document.getElementById('industry').value];document.getElementById('unitcost').value=d.unit;document.getElementById('wage').value=2000}
applyDefaults();
function fmt(n){if(n>=10000)return(n/10000).toFixed(1)+'万円';return n.toLocaleString()+'円'}
function calc(){
const ind=document.getElementById('industry').value,vol=+document.getElementById('volume').value||5,prod=+document.getElementById('products').value||3,unit=(+document.getElementById('unitcost').value||DATA[ind].unit)*10000,wage=+document.getElementById('wage').value||2000;
const d=DATA[ind],yearly=vol*12;
const costOut=yearly*unit;
const costAI=d.ai_monthly*12+yearly*wage*d.ai_hours;
const costIn=yearly*wage*d.hours;
const arr=[costOut,costAI,costIn],min=Math.min(...arr),max=Math.max(...arr);
const labels=['外注','AI活用','内製'],colors=['#e53e3e','#4299e1','#48bb78'];
document.getElementById('p1').textContent=fmt(costOut);
document.getElementById('p2').textContent=fmt(costAI);
document.getElementById('p3').textContent=fmt(costIn);
document.getElementById('d1').textContent=vol+'本×'+fmt(unit)+'×12ヶ月';
document.getElementById('d2').textContent='ツール月額'+fmt(d.ai_monthly)+' + 工数';
document.getElementById('d3').textContent='1本あたり約'+d.hours+'h×時給'+fmt(wage);
['c1','c2','c3'].forEach(id=>document.getElementById(id).classList.remove('best'));
const bestIdx=arr.indexOf(min);
document.getElementById('c'+(bestIdx+1)).classList.add('best');
let bars='';
arr.forEach((v,i)=>{const pct=Math.round(v/max*100);bars+=`<div class="bar-label"><span>${labels[i]}</span><span>${fmt(v)}</span></div><div class="bar"><div class="bar-fill" style="width:${pct}%;background:${colors[i]}">${pct}%</div></div>`});
document.getElementById('bars').innerHTML=bars;
const saved=max-min;
document.getElementById('saving').textContent=fmt(saved);
document.getElementById('savepct').textContent=`外注比 ${Math.round((1-min/costOut)*100)}% 削減（${labels[bestIdx]}が最安）`;
document.getElementById('result').style.display='block';
document.getElementById('result').scrollIntoView({behavior:'smooth'});}
</script>
