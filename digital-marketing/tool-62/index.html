}h1{font-size:1.5em;margin:30px 0 10px;color:#1a1a2e}h2{font-size:1.15em;margin:24px 0 12px;color:#4361ee;border-left:4px solid #4361ee;padding-left:10px}.ds{color:#666;margin-bottom:24px}table{width:100%;border-collapse:collapse;margin:16px 0}th,td{border:1px solid #ddd;padding:10px;text-align:center;font-size:.9em}th{background:#4361ee;color:#fff}.ps{background:#eaf7ee;padding:16px;border-radius:8px;margin:12px 0}.wk{background:#fef3e7;padding:16px;border-radius:8px;margin:12px 0}ul{padding-left:20px}li{margin:6px 0}.ck{background:#f0f2f5;padding:16px;border-radius:8px;margin:16px 0}.ct{text-align:center;background:linear-gradient(135deg,#4361ee,#3a0ca3);color:#fff;padding:30px;border-radius:12px;margin:30px 0}.ct a{display:inline-block;background:#fff;color:#4361ee;padding:12px 32px;border-radius:8px;text-decoration:none;font-weight:700;margin-top:12px}footer{text-align:center;color:#999;font-size:.8em;padding:20px}</style></head><body><div class="mx"><h1>'+tt+'</h1><p class="ds">'+ds+'</p><h2>機能比較表</h2><table><tr><th>機能</th><th style="background:#27ae60">'+e(pn)+'</th>'+cth+'</tr><tr><td style="font-weight:600">価格帯</td><td style="color:#27ae60;font-weight:700">'+e(pp)+'</td>'+ctp+'</tr>'+fr+'</table><h2>'+e(pn)+'が選ばれる理由</h2><div class="ps"><ul>'+pr+'</ul></div><h2>他社製品の注意点</h2><div class="wk"><ul>'+cw+'</ul></div><h2>製品選定チェックリスト</h2><div class="ck"><ul style="list-style:none;padding:0">'+ck+'</ul></div><div class="ct"><h2 style="color:#fff;border:none;padding:0;margin:0">まずは無料で'+e(pn)+'を試す</h2><p style="margin:8px 0">'+e(pt)+'</p><a href="#">無料トライアルはこちら</a></div><footer>&copy; 2026 '+e(pn)+' | '+e(pc)+'比較ガイド</footer></div></body></html>';document.getElementById('prev').innerHTML='<iframe style="width:100%;height:500px;border:1px solid #ddd;border-radius:4px" srcdoc="'+h.replace(/"/g,'&quot;')+'"></iframe>';document.getElementById('code').textContent=h;document.getElementById('res').classList.remove('hid');document.getElementById('res').scrollIntoView({behavior:'smooth'})}
function sTab(id,b){document.querySelectorAll('.out').forEach(function(e){e.classList.remove('act')});document.getElementById(id).classList.add('act');document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('act')});b.classList.add('act')}
