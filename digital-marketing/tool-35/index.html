<h1>SNS動画広告 クリエイティブ設計エンジン<small>商品情報を入力 → 脚本・絵コンテ・コピーを一括生成 | Sora2プロンプト対応</small></h1>
<div class="card"><h2>商品情報</h2>
<label>商品名 *</label><input type="text" id="pName" placeholder="例: グロウセラムC+">
<div class="row"><div><label>カテゴリ</label><select id="pCat"><option>美容・コスメ</option><option>健康食品</option><option>ファッション</option><option>家電・ガジェット</option><option>食品・飲料</option><option>教育・学習</option><option>サービス・SaaS</option><option>その他</option></select></div>
<div><label>価格帯</label><select id="pPrice"><option>〜3,000円</option><option>3,000〜10,000円</option><option>10,000〜30,000円</option><option>30,000円〜</option></select></div></div>
<label>USP（最大の強み）*</label><textarea id="pUSP" placeholder="例: ビタミンC誘導体200%配合、7日で実感"></textarea>
<label>ターゲット層</label><input type="text" id="pTarget" placeholder="例: 30代女性、肌のくすみに悩む会社員">
</div>
<div class="card"><h2>配信プラットフォーム（複数可）</h2>
<div class="chips" id="plats">
<div class="chip on" data-v="meta"><span class="tag t-meta">Meta</span>Instagram/Facebook</div>
<div class="chip on" data-v="tt"><span class="tag t-tt">TikTok</span>TikTok Ads</div>
<div class="chip" data-v="yt"><span class="tag t-yt">YT</span>YouTube Shorts</div>
<div class="chip" data-v="line"><span class="tag t-line">LINE</span>LINE広告</div>
</div></div>
<div class="card"><h2>動画尺</h2>
<div class="radio-g"><label><input type="radio" name="dur" value="15" checked><span>15秒</span></label><label><input type="radio" name="dur" value="30"><span>30秒</span></label></div></div>
<button class="btn" onclick="generate()">クリエイティブを一括生成</button>
<div id="out" class="card" style="margin-top:16px"><h2>生成結果</h2><div class="tabs" id="tabs"></div><div id="panes"></div></div>
</div>
<script>
document.querySelectorAll('.chip').forEach(function(c){c.onclick=function(){c.classList.toggle('on')}});
function getPlats(){return[].slice.call(document.querySelectorAll('.chip.on')).map(function(c){return c.dataset.v})}
function getDur(){return document.querySelector('input[name=dur]:checked').value}
var P={meta:{name:'Meta (Instagram/Facebook)',ratio:'1:1 / 4:5',style:'洗練・ライフスタイル感',cta:'詳しくはこちら / 購入する'},
tt:{name:'TikTok',ratio:'9:16 縦型',style:'UGC風・リアル・テンポ速い',cta:'リンクはプロフから / コメントで質問'},
yt:{name:'YouTube Shorts',ratio:'9:16 縦型',style:'情報密度高め・ナレーション主導',cta:'概要欄リンク / チャンネル登録'},
line:{name:'LINE広告',ratio:'9:16 / 1:1',style:'親しみやすさ・信頼感・日本的',cta:'友だち追加 / 今すぐチェック'}};
function sc(dur,pl,nm,usp,cat,tgt){
var is15=dur==='15',n=is15?4:6;
var hk={meta:[nm+'が画面いっぱいに映る美しいクローズアップ','使用前と使用後のスプリットスクリーン'],tt:['「これ知ってる？」テロップ＋商品チラ見せ','「正直に言います…」顔出し風カット'],yt:['「'+cat+'で一番売れてる理由、知ってますか？」','結論：'+nm+'が最強だった件'],line:['「'+(tgt||'あなた')+'のその悩み、解決します」','毎日のケアに'+nm+'、始めませんか？']};
var mid=[usp+'を具体的に説明。テキストオーバーレイで数値を強調','実際の使用シーン。'+(tgt||'ユーザー')+'が自然に使っている様子','利用者の声・レビューをテロップ表示。信頼性を演出','ビフォーアフター比較。違いを視覚的に表現','商品ディテールショット。質感・高級感を伝える'];
var r=Math.random()*2|0,scenes=[];
scenes.push({t:'シーン1：フック',dur:is15?'0-3秒':'0-4秒',vis:hk[pl][r],nar:pl==='tt'?'（SE・BGMのみ）':hk[pl][0],tel:'【キャッチコピー】大きく表示'});
for(var i=0,mc=is15?2:4;i<mc;i++)scenes.push({t:'シーン'+(i+2)+'：展開'+(i+1),dur:is15?(3+i*4)+'-'+(7+i*4)+'秒':(4+i*5)+'-'+(9+i*5)+'秒',vis:mid[i%5],nar:usp+'の'+['効果','特徴','実績','秘密'][i%4]+'を伝える',tel:['USP数値を大きく表示','使い方ステップ表示','★4.8 / レビュー数','比較データ表示'][i%4]});
var bf=cat==='美容・コスメ'?'肌':cat==='健康食品'?'毎日':'体験';
scenes.push({t:'シーン'+n+'：CTA',dur:is15?'12-15秒':'25-30秒',vis:nm+'のロゴ＋CTA。'+P[pl].cta,nar:nm+'で理想の'+bf+'を。',tel:P[pl].cta+'＋ブランドロゴ'});
return scenes}
function copies(nm,usp,tgt,cat){
return[{type:'ベネフィット訴求型',head:'【'+usp.slice(0,15)+'】'+nm,body:(tgt||'あなた')+'の'+(cat==='美容・コスメ'?'肌悩み':'課題')+'に応える'+nm+'。'+usp+'。今なら特別価格でお試しいただけます。'},
{type:'問題解決型',head:'まだ'+(cat==='美容・コスメ'?'肌荒れ':'その悩み')+'で消耗してるの？',body:nm+'なら'+usp+'。もう悩まなくていい。'+(tgt||'多くの方')+'が実感した効果を、あなたも体験してみませんか？'},
{type:'社会的証明型',head:'累計10万個突破。選ばれる理由がある。',body:nm+'は'+usp+'。SNSで話題沸騰中。'+(tgt||'ユーザー')+'のリアルな声：「もっと早く出会いたかった」'}]}
function sora(scenes,pl){
return scenes.map(function(s,i){return'[Scene '+(i+1)+' | '+s.dur+' | '+P[pl].ratio+']\nVisual: '+s.vis+'\nCamera: '+(i===0?'Close-up, slow zoom in':'Medium shot, smooth pan')+'\nMood: '+P[pl].style+'\nText overlay: '+s.tel+'\nTransition: '+(i<scenes.length-1?'Quick cut':'Fade to black')}).join('\n\n')}
function generate(){
var nm=document.getElementById('pName').value.trim(),usp=document.getElementById('pUSP').value.trim();
if(!nm||!usp){alert('商品名とUSPは必須です');return}
var cat=document.getElementById('pCat').value,tgt=document.getElementById('pTarget').value.trim(),dur=getDur(),pls=getPlats();
if(!pls.length){alert('プラットフォームを1つ以上選択');return}
var te=document.getElementById('tabs'),pe=document.getElementById('panes');te.innerHTML='';pe.innerHTML='';
var bgm={meta:'Lo-fi チル / アコースティック',tt:'トレンドBGM / ベースブースト',yt:'ポップ・アップテンポ / ナレーション映え',line:'ピアノ・オルゴール / 安心感'};
pls.forEach(function(p,i){
var tab=document.createElement('div');tab.className='tab'+(i===0?' on':'');tab.textContent=P[p].name;
tab.onclick=function(){[].slice.call(document.querySelectorAll('.tab')).forEach(function(t){t.classList.remove('on')});[].slice.call(document.querySelectorAll('.pane')).forEach(function(t){t.classList.remove('on')});tab.classList.add('on');document.getElementById('pn-'+p).classList.add('on')};te.appendChild(tab);
var ss=sc(dur,p,nm,usp,cat,tgt),cp=copies(nm,usp,tgt,cat),pr=sora(ss,p);
var h='<div class="pane'+(i===0?' on':'')+'" id="pn-'+p+'">';
h+='<p style="font-size:.8em;color:#888">推奨比率: '+P[p].ratio+' | 尺: '+dur+'秒 | トーン: '+P[p].style+'</p>';
h+='<h3 style="font-size:.9em;color:#a78bfa;margin:10px 0 6px">脚本・絵コンテ</h3>';
ss.forEach(function(s){h+='<div class="scene"><h4>'+s.t+'（'+s.dur+'）</h4><p><b>映像:</b> '+s.vis+'</p><p><b>ナレーション:</b> '+s.nar+'</p><p><b>テロップ:</b> '+s.tel+'</p></div>'});
h+='<div class="bgm">BGM方向性: '+bgm[p]+'</div>';
h+='<div class="copies"><h4>広告コピー 3パターン</h4>';
cp.forEach(function(c,j){h+='<p><b>'+(j+1)+'. '+c.type+'</b><br>見出し: '+c.head+'<br>'+c.body+'</p>'});
h+='</div><h3 style="font-size:.9em;color:#a78bfa;margin:12px 0 6px">Sora2 / AI動画生成プロンプト</h3>';
h+='<div class="copy-area" id="pr-'+p+'"><button class="cpbtn" onclick="cp2(\'pr-'+p+'\')">コピー</button>'+pr.replace(/</g,'&lt;')+'</div></div>';
pe.innerHTML+=h});
document.getElementById('out').style.display='block';document.getElementById('out').scrollIntoView({behavior:'smooth'})}
function cp2(id){var el=document.getElementById(id),tx=el.textContent.replace('コピー','').trim();navigator.clipboard.writeText(tx).then(function(){var b=el.querySelector('.cpbtn');b.textContent='OK';setTimeout(function(){b.textContent='コピー'},1500)})}
</script>
</body>
