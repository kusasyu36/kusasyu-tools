<body>
<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/digital-marketing/" style="color:#4299e1;text-decoration:none;">kusasyu Digital Marketing</a> &gt; <span style="color:#718096;">ノーコード製品デモビルダー</span></div>
<header>
<h1>ノーコード製品デモビルダー</h1>
<p>スクリーンショットURL＋説明文を入力 → クリック操作型インタラクティブデモを無料生成</p>
</header>
<div class="wrap"><div class="cols">
<div class="edit">
<div class="card">
<h3>📝 ステップを追加</h3>
<label>画像URL（必須）</label><input id="iU" placeholder="https://example.com/screen1.png">
<label>ステップタイトル</label><input id="iT" placeholder="例: ダッシュボードを開く">
<label>説明文</label><textarea id="iD" placeholder="この画面で行う操作内容を入力"></textarea>
<label>ボタンテキスト</label><input id="iB" value="次へ →">
<div style="margin-top:10px"><button class="b bp" onclick="add()">＋ ステップ追加</button></div>
</div>
<div class="card">
<h3>📋 ステップ一覧（<span id="cnt">0</span>件）</h3>
<div id="sL"></div>
<p id="tip" style="font-size:.78rem;color:#999;margin-top:6px">ステップを追加すると一覧に表示されます</p>
</div>
<div class="card" style="text-align:center">
<button class="b bg" onclick="exp()">💾 HTMLエクスポート</button>
<button class="b bo" onclick="emb()">📎 iframe埋め込みコード</button>
</div>
</div>
<div class="prev">
<div class="card">
<h3>👁 ライブプレビュー</h3>
<div class="df">
<div class="dt"><span class="dot" style="background:#ff5f57"></span><span class="dot" style="background:#ffbd2e"></span><span class="dot" style="background:#28c940"></span></div>
<div class="db" id="dB"><p style="padding:50px;opacity:.5">ステップを追加するとプレビューが表示されます</p></div>
<div class="pr" id="dP"></div>
<div class="dn" id="dN"></div>
</div>
</div>
</div>
</div></div>
<div class="mo" id="mo"><div class="mc"><h3 id="mT"></h3><textarea id="mC" readonly></textarea><br><button class="b bp" onclick="cc()">📋 コピー</button> <button class="b bd" onclick="cm()">閉じる</button></div></div>
<script>
var S=[],cur=0;
function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function add(){
 var u=document.getElementById('iU').value.trim(),t=document.getElementById('iT').value.trim(),d=document.getElementById('iD').value.trim(),b=document.getElementById('iB').value.trim();
 if(!u){alert('画像URLを入力してください');return}
 S.push({url:u,title:t||'ステップ'+(S.length+1),desc:d,btn:b||'次へ →'});
 document.getElementById('iU').value='';document.getElementById('iT').value='';document.getElementById('iD').value='';
 render()
}
function rm(i){S.splice(i,1);if(cur>=S.length)cur=Math.max(0,S.length-1);render()}
function mv(i,d){var j=i+d;if(j<0||j>=S.length)return;var t=S[i];S[i]=S[j];S[j]=t;render()}
function render(){
 var sl=document.getElementById('sL');document.getElementById('cnt').textContent=S.length;
 document.getElementById('tip').style.display=S.length?'none':'block';
 sl.innerHTML=S.map(function(s,i){return'<div class="si"><span class="n">'+(i+1)+'</span><span class="t">'+e(s.title)+'</span><button class="b bp" onclick="mv('+i+',-1)">↑</button><button class="b bp" onclick="mv('+i+',1)">↓</button><button class="b bd" onclick="rm('+i+')">✕</button></div>'}).join('');
 pv()
}
function pv(){
 var b=document.getElementById('dB'),p=document.getElementById('dP'),n=document.getElementById('dN');
 if(!S.length){b.innerHTML='<p style="padding:50px;opacity:.5">ステップを追加するとプレビューが表示されます</p>';p.innerHTML='';n.innerHTML='';return}
 if(cur>=S.length)cur=0;var s=S[cur];
 b.innerHTML='<img src="'+e(s.url)+'" alt="'+e(s.title)+'" onclick="nx()" onerror="this.style.background=\'#444\';this.style.padding=\'60px\';this.alt=\'画像読込エラー\'"><h3>'+e(s.title)+'</h3><p>'+e(s.desc)+'</p>';
 p.innerHTML=S.map(function(_,i){return'<span class="'+(i===cur?'ac':'')+'"></span>'}).join('');
 var h='';if(cur>0)h+='<button onclick="go('+(cur-1)+')">← 戻る</button>';
 if(cur<S.length-1)h+='<button onclick="go('+(cur+1)+')">'+e(s.btn)+'</button>';
 else h+='<button onclick="go(0)">🔄 最初から</button>';
 n.innerHTML=h
}
function go(i){cur=i;pv()}
function nx(){cur<S.length-1?go(cur+1):go(0)}
function bld(){
 var d=JSON.stringify(S);
 return'<!DOCTYPE html>\n<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>製品デモ</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:#1a1a2e;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh}.w{max-width:800px;width:100%;padding:16px;text-align:center}img{max-width:100%;max-height:420px;border-radius:8px;cursor:pointer;margin-bottom:12px}h3{margin-bottom:6px}p{opacity:.8;margin-bottom:14px;font-size:.9rem}.pr{display:flex;justify-content:center;gap:5px;margin:10px 0}.pr span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3)}.pr span.a{background:#4fc3f7}button{background:rgba(255,255,255,.15);border:none;color:#fff;padding:8px 20px;border-radius:20px;cursor:pointer;margin:4px;font-size:.85rem}button:hover{background:rgba(255,255,255,.3)}</style></head><body><div class="w"><div id="b"></div><div class="pr" id="p"></div><div id="n"></div></div><script>var S='+d+',c=0;function r(){var s=S[c],b=document.getElementById("b"),p=document.getElementById("p"),n=document.getElementById("n");b.innerHTML=\'<img src="\'+s.url+\'" onclick="nx()"><h3>\'+s.title+\'</h3><p>\'+s.desc+\'</p>\';p.innerHTML=S.map(function(_,i){return\'<span class="\'+( i===c?"a":"")+\'"></span>\'}).join("");var h="";if(c>0)h+=\'<button onclick="g(\'+(c-1)+\')">← 戻る</button>\';if(c<S.length-1)h+=\'<button onclick="g(\'+(c+1)+\')">\'+s.btn+\'</button>\';else h+=\'<button onclick="g(0)">最初から</button>\';n.innerHTML=h}function g(i){c=i;r()}function nx(){c<S.length-1?g(c+1):g(0)}r()<\/script></body></html>'
}
function exp(){
 if(!S.length){alert('ステップを1つ以上追加してください');return}
 var h=bld(),bl=new Blob([h],{type:'text/html'}),a=document.createElement('a');
 a.href=URL.createObjectURL(bl);a.download='product-demo.html';a.click()
}
function emb(){
 if(!S.length){alert('ステップを1つ以上追加してください');return}
 document.getElementById('mT').textContent='iframe埋め込みコード';
 document.getElementById('mC').value='<!-- エクスポートしたHTMLをサーバーにアップロード後、以下のコードをLPに貼り付け -->\n<iframe src="https://your-domain.com/product-demo.html" width="100%" height="500" frameborder="0" style="border-radius:8px;border:1px solid #ddd"></iframe>';
 document.getElementById('mo').classList.add('sh')
}
function cc(){navigator.clipboard.writeText(document.getElementById('mC').value).then(function(){alert('コピーしました')})}
function cm(){document.getElementById('mo').classList.remove('sh')}
</script>
</body>
</html>
