<h1>UGC変換プロンプトジェネレーター＋ブランドNGチェッカー</h1>

<textarea id="srcUgc" rows="5" placeholder="例：このクリーム使い始めて2週間、肌の調子がすごく良くなりました！べたつかないし、朝のメイクのりも全然違う。友達にもすすめたいです。"></textarea>

<div class="disclaimer">⚠ 本チェック結果はルールベースの簡易判定です。法的判断・最終確認は必ず人間（法務・薬事担当者）が行ってください。<strong>要人間確認</strong></div></div></div>

<script>
var tabs=["ブランド設定","プロンプト生成","NGチェック"],curPur=0,purNames=["SNS投稿文","広告コピー","事例紹介文"],toneNames=["1 - 敬語・丁寧","2 - やや丁寧","3 - バランス型","4 - やや親しみ","5 - フレンドリー"];
(function(){var nav=document.getElementById("nav");tabs.forEach(function(t,i){var b=document.createElement("button");b.textContent=t;if(i===0)b.className="on";b.onclick=function(){switchTab(i)};nav.appendChild(b)});document.getElementById("tone").oninput=function(e){document.getElementById("toneL").textContent=toneNames[e.target.value-1]}})();
function switchTab(i){document.querySelectorAll(".tab").forEach(function(t,j){t.classList.toggle("on",i===j)});document.querySelectorAll("nav button").forEach(function(b,j){b.classList.toggle("on",i===j)})}
function selPur(i,el){curPur=i;document.querySelectorAll(".purpose-btns button").forEach(function(b){b.classList.remove("sel")});el.classList.add("sel")}
function getConf(){return{brand:document.getElementById("bname").value||"\uFF08\u672A\u8A2D\u5B9A\uFF09",industry:document.getElementById("industry").value,honorific:document.getElementById("honorific").value||"\u304A\u5BA2\u69D8",tone:+document.getElementById("tone").value,good:document.getElementById("goodWords").value.split("\n").filter(function(s){return s.trim()}),ng:document.getElementById("ngWords").value.split("\n").filter(function(s){return s.trim()})}}
function indLabel(v){return{cosmetics:"\u30B3\u30B9\u30E1\u30FB\u7F8E\u5BB9",food:"\u98DF\u54C1\u30FB\u98F2\u6599",apparel:"\u30A2\u30D1\u30EC\u30EB",other:"\u4E00\u822C"}[v]}
function genPrompt(){var c=getConf(),ugc=document.getElementById("srcUgc").value.trim();if(!ugc){alert("UGCテキストを入力してください");return}
var td=toneNames[c.tone-1],ng=c.ng.length?"\n- 以下のNG表現は絶対に使用しないこと："+c.ng.join("、"):"",gd=c.good.length?"\n- 以下の推奨表現を自然に取り入れること："+c.good.join("、"):"";
var rw={cosmetics:"\n- 薬機法に抵触する効能効果の断定表現（治る・消える・若返る等）は避け「～な印象に」「～をサポート」等の表現に置換",food:"\n- 健康増進法・景品表示法に留意し「痩せる」「病気が治る」等の断定表現は不可",apparel:"",other:""}[c.industry];
var fm=["【出力形式】SNS投稿文（Instagram/X向け）\n- 文字数：100〜200文字\n- ハッシュタグ3〜5個を末尾に付与\n- 絵文字は控えめに（0〜2個）\n- CTA（行動喚起）を自然に含める","【出力形式】広告コピー\n- キャッチコピー（20文字以内）×1案\n- ボディコピー（80〜120文字）×1案\n- CTA文言（15文字以内）×1案\n- 顧客の実体験に基づく説得力を維持しつつ広告として洗練させる","【出力形式】事例紹介文\n- 見出し（30文字以内）\n- 導入（課題 50文字程度）\n- 体験内容（具体的エピソード 100〜150文字）\n- 成果/変化（50文字程度）\n- 第三者視点の客観的トーンで記述"];
var p="あなたはD2Cブランドのコンテンツライターです。以下のガイドラインとUGCに基づき"+purNames[curPur]+"を作成してください。\n\n【ブランドガイドライン】\n- ブランド名："+c.brand+"\n- 業種："+indLabel(c.industry)+"\n- トーン："+td+"\n- 顧客呼称：「"+c.honorific+"」を使用"+gd+ng+rw+"\n\n"+fm[curPur]+"\n\n【元UGC（顧客の声）】\n"+ugc+"\n\n【注意事項】\n- UGCの体験談要素は活かしつつブランドトーンに合わせて調整\n- 誇張や事実と異なる表現を加えない\n- 日本語でそのまま使える完成度にすること";
document.getElementById("promptOut").innerHTML='<button class="copy-btn" onclick="copyText(\'promptOut\',this)">コピー</button>'+escH(p);
document.getElementById("purTag").textContent=purNames[curPur];document.getElementById("promptResult").classList.remove("hidden")}
var yakki=["治る","治す","治った","効く","効果がある","改善する","改善された","予防する","万能","完治","根治","シミが消え","シワがなくなる","シワが消え","痩せる","痩せた","若返","アンチエイジング","デトックス","毒素を排出","細胞が活性","免疫力が上がる","血液サラサラ","脂肪が燃焼"];
var stR=["マジで最高","神すぎ","絶対買うべき","人生変わった","世界が変わった","全人類に勧めたい","使わない理由がない","買わないと損"];
function runCheck(){var text=document.getElementById("checkText").value.trim();if(!text){alert("テキストを入力してください");return}
var c=getConf(),h=escH(text),f={ng:[],yk:[],st:[]};
c.ng.forEach(function(w){if(w&&text.indexOf(w)>=0)f.ng.push(w)});yakki.forEach(function(w){if(text.indexOf(w)>=0)f.yk.push(w)});stR.forEach(function(w){if(text.indexOf(w)>=0)f.st.push(w)});
f.ng.forEach(function(w){h=h.split(escH(w)).join('<span class="hl-r">'+escH(w)+"</span>")});f.yk.forEach(function(w){h=h.split(escH(w)).join('<span class="hl-y">'+escH(w)+"</span>")});f.st.forEach(function(w){h=h.split(escH(w)).join('<span class="hl-b">'+escH(w)+"</span>")});
var tot=f.ng.length+f.yk.length+f.st.length,sc=Math.max(0,100-tot*15);
document.getElementById("scores").innerHTML='<div class="score-item"><div class="num">'+sc+'</div><div class="lbl">安全スコア</div></div><div class="score-item"><div class="num">'+f.ng.length+'</div><div class="lbl">NG表現</div></div><div class="score-item"><div class="num">'+f.yk.length+'</div><div class="lbl">法規制リスク</div></div><div class="score-item"><div class="num">'+f.st.length+'</div><div class="lbl">ステマリスク</div></div>';
var d="";if(f.ng.length)d+='<p class="cnt"><span class="tag tag-r">NG表現</span> '+f.ng.map(function(w){return"\u300C"+w+"\u300D"}).join(" ")+"</p>";
if(f.yk.length)d+='<p class="cnt"><span class="tag tag-y">法規制</span> '+f.yk.map(function(w){return"\u300C"+w+"\u300D"}).join(" ")+" → 薬機法・景表法に抵触の可能性</p>";
if(f.st.length)d+='<p class="cnt"><span class="tag tag-b">ステマ</span> '+f.st.map(function(w){return"\u300C"+w+"\u300D"}).join(" ")+"（PR表記の確認を推奨）</p>";
if(!tot)d='<p class="cnt" style="color:#27ae60;font-weight:600">✓ 問題は検出されませんでした</p>';
document.getElementById("checkDetail").innerHTML=d;document.getElementById("hlOut").innerHTML=h;document.getElementById("checkResult").classList.remove("hidden")}
function copyText(id,btn){var el=document.getElementById(id),t=(el.innerText||el.textContent).replace(/^コピー(済)?/,"").trim();if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){btn.textContent="コピー済";btn.classList.add("done");setTimeout(function(){btn.textContent="コピー";btn.classList.remove("done")},1500)});else{var a=document.createElement("textarea");a.value=t;document.body.appendChild(a);a.select();document.execCommand("copy");document.body.removeChild(a);btn.textContent="コピー済"}}
function exportJSON(){var c=getConf(),b=new Blob([JSON.stringify(c,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="brand-settings.json";a.click();URL.revokeObjectURL(a.href)}
function importJSON(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var c=JSON.parse(ev.target.result);document.getElementById("bname").value=c.brand||"";document.getElementById("industry").value=c.industry||"other";document.getElementById("honorific").value=c.honorific||"お客様";document.getElementById("tone").value=c.tone||3;document.getElementById("toneL").textContent=toneNames[(c.tone||3)-1];document.getElementById("goodWords").value=(c.good||[]).join("\n");document.getElementById("ngWords").value=(c.ng||[]).join("\n");alert("インポート完了")}catch(x){alert("JSON読み込み失敗")}};r.readAsText(f)}
function escH(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
</script>
