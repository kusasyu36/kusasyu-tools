<script>
const D={

美容:{和モダン:{c:['#C48793','#F8F0E3','#5B4A42'],fh:'しっぽり明朝',fb:'游明朝',fa:'花鶴',tone:'和の繊細さと美意識を反映。淡い桜色に墨色のアクセントで洗練された和美容を表現。'},ナチュラル:{c:['#A8D5BA','#FFF5EE','#D2B48C'],fh:'Zen Maru Gothic',fb:'游ゴシック',fa:'こはるびより',tone:'オーガニック・無添加感。淡い緑×ベージュで清潔感と安心感を両立。'},スタイリッシュ:{c:['#2F2F2F','#E8B4B8','#FFFFFF'],fh:'Noto Sans JP',fb:'游ゴシック Light',fa:'源柔ゴシック',tone:'モード系ビューティー。黒×ピンクで大人の可愛さ。余白多め、文字は細めウェイトで上品に。'},ポップ:{c:['#FF69B4','#87CEEB','#FFFACD'],fh:'コーポレート丸ゴシック',fb:'M PLUS Rounded 1c',fa:'にくまるフォント',tone:'明るく元気な印象。パステルカラーを多用し、若年層に親しみやすいデザイン。'},プロフェッショナル:{c:['#4A4A4A','#B8860B','#FAF0E6'],fh:'游ゴシック Medium',fb:'Noto Serif JP',fa:'游明朝',tone:'医療系の信頼感。ダークグレー×ゴールドで専門性を訴求。データや実績を視覚的に配置。'}},
EC:{和モダン:{c:['#8B0000','#F5F0E1','#2F4F4F'],fh:'筑紫明朝',fb:'游明朝',fa:'貂明朝',tone:'伝統工芸品・和雑貨向け。深みのある赤と墨色で本物感を演出。'},ナチュラル:{c:['#8FBC8F','#FFFFF0','#DEB887'],fh:'Zen Maru Gothic',fb:'游ゴシック',fa:'丸フォーク',tone:'暮らし系EC向け。ナチュラルな色味で日常に溶け込むデザイン。'},スタイリッシュ:{c:['#1C1C1C','#00BFFF','#F8F8FF'],fh:'Noto Sans JP Bold',fb:'Noto Sans JP',fa:'源柔ゴシック',tone:'ガジェット・アパレル向け。黒×アクセントカラーで購買意欲を刺激。CTAを目立たせる設計。'},ポップ:{c:['#FF4500','#32CD32','#FFD700'],fh:'けいふぉんと',fb:'M PLUS Rounded 1c',fa:'ニコモジ＋',tone:'セール・キャンペーン特化。原色使いで目を引き、価格訴求を最大化。'},プロフェッショナル:{c:['#2C3E50','#E74C3C','#ECF0F1'],fh:'游ゴシック Bold',fb:'Noto Sans JP',fa:'Noto Serif JP',tone:'BtoB-EC・高単価商材向け。信頼と実績を軸にしたレイアウト。数字を大きく配置。'}},
士業:{和モダン:{c:['#2F4F4F','#F5F0E1','#8B7355'],fh:'しっぽり明朝',fb:'游明朝',fa:'Noto Serif JP',tone:'伝統と格式。和紙テクスチャ背景に毛筆風アクセントで専門家の風格を表現。'},ナチュラル:{c:['#5F9EA0','#F0FFF0','#8B8378'],fh:'Zen Maru Gothic',fb:'游ゴシック',fa:'こはるびより',tone:'親しみやすい相談窓口。柔らかい色で敷居を下げ、安心して相談できる雰囲気を演出。'},スタイリッシュ:{c:['#1A1A2E','#E0E0E0','#4A90D9'],fh:'Noto Sans JP Bold',fb:'Noto Sans JP',fa:'游ゴシック',tone:'先進的な法律事務所。ダーク×ブルーでインテリジェンスを表現。'},ポップ:{c:['#FF8C00','#4682B4','#FFFAF0'],fh:'コーポレート丸ゴシック',fb:'M PLUS Rounded 1c',fa:'丸フォーク',tone:'若年層向け相談サービス。オレンジで気軽さを演出、堅苦しさを排除。'},プロフェッショナル:{c:['#0D1B2A','#C9A227','#F5F5F5'],fh:'游ゴシック Bold',fb:'游明朝',fa:'Noto Serif JP',tone:'権威と信頼の王道デザイン。紺×金で格式を最大化。実績数を大きく配置。'}},
製造:{和モダン:{c:['#4A4A4A','#F0E6D3','#B87333'],fh:'筑紫明朝',fb:'游明朝',fa:'貂明朝',tone:'職人の技と和の美意識。銅色アクセントで「ものづくり」の重厚感を表現。'},ナチュラル:{c:['#6B8E23','#F5F5DC','#8B7765'],fh:'Zen Maru Gothic',fb:'游ゴシック',fa:'こはるびより',tone:'環境配慮・サステナブル製造。アースカラーでエコ意識を前面に。'},スタイリッシュ:{c:['#1C1C1C','#00D4FF','#F0F0F0'],fh:'Noto Sans JP Black',fb:'Noto Sans JP',fa:'源柔ゴシック',tone:'先端テクノロジー感。黒×シアンで未来的な印象。幾何学模様をアクセントに。'},ポップ:{c:['#FF6600','#0099CC','#FFFFFF'],fh:'コーポレート丸ゴシック',fb:'M PLUS Rounded 1c',fa:'ニコモジ＋',tone:'BtoC製造業の親しみやすさ。工場見学・採用サイト向けに明るくオープンな印象。'},プロフェッショナル:{c:['#0A2239','#53A2BE','#E8E8E8'],fh:'游ゴシック Bold',fb:'Noto Sans JP',fa:'Noto Serif JP',tone:'技術力と信頼性。ダークネイビー×スチールブルーで堅実さ。スペック表を整然と配置。'}}
};
const SZ={'Instagram投稿（1080×1080）':'1:1 square','Instagramストーリーズ（1080×1920）':'9:16 vertical','バナー広告（1200×628）':'wide banner 1200x628','LPヘッダー（1440×600）':'wide hero 1440x600'};
let cur={};
function genStep1(){
const ind=document.getElementById('ind').value,t=document.getElementById('taste').value;
const d=D[ind][t];cur={...d,ind,taste:t,kw:document.getElementById('kw').value||ind,tgt:document.getElementById('tgt').value||'一般消費者',bn:document.getElementById('bn').value||''};
const cb=document.getElementById('clrBox');
cb.innerHTML=d.c.map((c,i)=>`<div class="swatch" style="background:${c}">${['メイン','サブ','アクセント'][i]}<br>${c}</div>`).join('');
document.getElementById('fontBox').innerHTML=[['見出し用',d.fh],['本文用',d.fb],['アクセント用',d.fa]].map(f=>`<div class="font-t"><strong>${f[1]}</strong> <span>— ${f[0]}</span></div>`).join('');
document.getElementById('toneBox').textContent=d.tone;
document.getElementById('s1').classList.remove('hidden');
document.getElementById('s1').scrollIntoView({behavior:'smooth'});
}
function genStep2(){
const u=document.getElementById('usage').value,ar=SZ[u];
const k=cur.kw,t=cur.taste,ind=cur.ind,c=cur.c,bn=cur.bn?cur.bn+'の':'';
const styles={和モダン:'Japanese modern wabi-sabi aesthetic, zen minimalism',ナチュラル:'organic natural warm aesthetic, soft earthy tones',スタイリッシュ:'sleek modern minimalist, high contrast editorial',ポップ:'vibrant colorful pop art, energetic playful',プロフェッショナル:'corporate premium luxury, sophisticated elegant'};
const st=styles[t];
const dp=[
`${bn}${ind}ブランドの${u.split('（')[0]}デザイン。${k}をテーマに、${t}テイスト。メインカラー${c[0]}、サブカラー${c[1]}。${ar} format。日本語テキスト配置スペースを確保。高品質、プロフェッショナルなグラフィックデザイン。`,
`${t}スタイルの${ind}向けビジュアル。「${k}」を表現するイメージ写真風。配色：${c.join(', ')}。${ar}。被写体にフォーカス、背景ボケ、自然光。日本のブランド広告品質。`,
`${ind}の${u.split('（')[0]}用抽象的ブランドビジュアル。${k}を象徴するモチーフ。${t}の世界観。グラデーション${c[0]}→${c[2]}。${ar}。テキストオーバーレイ用の余白あり。`
];
const mp=[
`${st}, ${ind} brand visual for ${k}, color palette ${c.join(' ')}, ${ar}, Japanese design sensibility, clean layout with text space --ar ${ar.includes('square')?'1:1':ar.includes('vertical')?'9:16':'16:9'} --s 750 --q 2`,
`editorial photography style, ${ind} industry, ${k} concept, ${t} mood, colors ${c[0]} ${c[2]}, ${ar}, soft natural lighting, shallow depth of field, premium Japanese brand --ar ${ar.includes('square')?'1:1':ar.includes('vertical')?'9:16':'16:9'} --s 600`,
`abstract ${st}, geometric patterns inspired by ${k}, gradient ${c[0]} to ${c[2]}, ${ar}, negative space for typography, modern Japanese graphic design --ar ${ar.includes('square')?'1:1':ar.includes('vertical')?'9:16':'16:9'} --s 800 --stylize 750`
];
document.getElementById('dalle').innerHTML=dp.map((p,i)=>pb('DALL-E #'+(i+1),p)).join('');
document.getElementById('mj').innerHTML=mp.map((p,i)=>pb('MJ #'+(i+1),p)).join('');
document.getElementById('s2').classList.remove('hidden');
document.getElementById('s2').scrollIntoView({behavior:'smooth'});
}
function pb(label,txt){return `<div class="prompt-box"><button class="copy-b" onclick="cc(this)">コピー</button><strong>${label}</strong>\n${txt}</div>`}
function cc(btn){
const t=btn.parentElement.textContent.replace('コピー','').trim();
navigator.clipboard.writeText(t).then(()=>{btn.textContent='✓';setTimeout(()=>btn.textContent='コピー',1500)});
}
function copyAll(id){
const el=document.getElementById(id);
const boxes=el.querySelectorAll('.prompt-box,.tone,.font-t,.swatch');
let txt='';
if(id==='s1'){
txt=`【ブランドカラー】\n${cur.c.map((c,i)=>['メイン','サブ','アクセント'][i]+': '+c).join('\n')}\n\n【フォント】\n見出し: ${cur.fh}\n本文: ${cur.fb}\nアクセント: ${cur.fa}\n\n【トーン】\n${cur.tone}`;
}else{
boxes.forEach(b=>txt+=b.textContent.replace('コピー','')+'\n\n');
}
navigator.clipboard.writeText(txt.trim()).then(()=>{
const btn=el.querySelector('.btn-s');btn.textContent='✓ コピーしました';setTimeout(()=>btn.textContent=id==='s1'?'STEP1をコピー':'STEP2を全てコピー',1500);
});
}
</script>
