<script>
const D={
apparel:{qas:[

{q:"サイズ感を教えてください",a:"普段のサイズ感で大丈夫です！迷ったら1つ上のサイズがおすすめ。返品交換も対応しています。"},
{q:"洗濯方法は？",a:"ネットに入れて弱水流がおすすめです。色落ちしにくい素材を使っているのでご安心ください。"},
{q:"色展開はありますか？",a:"今回ご紹介のカラー以外にも展開がございます。人気色は早めにチェックしてくださいね！"},
{q:"返品はできますか？",a:"未使用・タグ付きであれば到着後7日以内で返品可能です！"}],

cosme:{qas:[
{q:"敏感肌でも使えますか？",a:"はい！{feat}なので、敏感肌の方にもお使いいただけます。パッチテストもおすすめです。"},
{q:"成分を教えてください",a:"{feat}を配合しています。パラベン・鉱物油フリーで安心です。"},
{q:"使用感はどうですか？",a:"ベタつかずスッと馴染みます。朝のメイク前にも使えるテクスチャーです。"},
{q:"何ヶ月もちますか？",a:"毎日使って約2〜3ヶ月が目安です。コスパも◎ですよ！"},
{q:"他の化粧品と併用できますか？",a:"はい、お手持ちのスキンケアと組み合わせてお使いいただけます。"}],
demo:"「手の甲につけてみますね…見てください、この浸透力！{feat}だからこそのテクスチャーです」"},
food:{qas:[
{q:"賞味期限はどのくらい？",a:"製造から約6ヶ月です。届いてからも余裕をもってお召し上がりいただけます。"},
{q:"アレルギー成分は？",a:"詳細は商品ラベルに記載しています。主な特定原材料は商品ページでもご確認いただけます。"},
{q:"産地はどこですか？",a:"国産素材にこだわっています。{feat}が自慢のポイントです！"},
{q:"保存方法を教えて",a:"直射日光を避けて常温保存でOKです。開封後は冷蔵庫で保管してくださいね。"},
{q:"子どもも食べられますか？",a:"はい！お子様にも安心してお召し上がりいただけます。"}],
demo:"「今から実際に食べてみますね…うん！{feat}で、この味わいは本当にクセになります」"},
goods:{qas:[
{q:"素材・材質は？",a:"{feat}を採用しています。耐久性にも優れています。"},
{q:"サイズを教えてください",a:"日常使いにぴったりのサイズ感です。商品ページに寸法も記載しています。"},
{q:"ギフトに使えますか？",a:"はい！パッケージもおしゃれなのでプレゼントにもぴったりです。"},
{q:"お手入れ方法は？",a:"柔らかい布で拭いていただくだけでOKです。特別なケアは不要です。"},
{q:"保証はありますか？",a:"初期不良は到着後14日以内であれば交換対応いたします！"}],
demo:"「実際に使ってみますね…ほら、{feat}なので使い心地が全然違います！」"}
};
function v(){
const n=document.getElementById('pName').value.trim(),p=document.getElementById('pPrice').value,f=document.getElementById('pFeat').value.trim();
if(!n||!p||!f){alert('商品名・価格・特徴を入力してください');return null}
return{name:n,cat:document.getElementById('pCat').value,price:Number(p).toLocaleString(),feat:f,target:document.getElementById('pTarget').value.trim()||'幅広い層'}
}
function s5(d){
return`【5分版トークスクリプト】

🎬 オープニング（0:00〜0:30）
「こんにちは！今日は本当におすすめの商品を持ってきました！
${d.target}の皆さん、これ絶対気になると思います。
今日ご紹介するのは…『${d.name}』です！」

📦 商品紹介（0:30〜2:00）
「${d.name}、お値段は${d.price}円です。
何がすごいかというと…${d.feat}
ここが他と全然違うんです！${d.target}にぴったりの商品なんですよ。」

🔍 実演パート（2:00〜3:30）
${D[d.cat].demo.replace('{feat}',d.feat)}

🎯 クロージング（3:30〜5:00）
「今日のライブ限定で特別価格でお届けします！
${d.name}、通常${d.price}円のところ、ライブ中のご購入がとってもお得。
コメント欄に『欲しい』と書いてくださいね！
リンクは概要欄に貼っておきます。それではまた次のライブで！」`
}
function s30(d){
return`【30分版トークスクリプト】

🎬 オープニング（0:00〜3:00）
「こんにちは！今日もライブ見に来てくれてありがとうございます！
初めましての方も常連さんも大歓迎です♪
コメントで『初めて』って教えてくれると嬉しいです。
さて！今日は${d.target}に超おすすめのアイテムをじっくりご紹介しますよ。」

💬 悩み共感パート（3:00〜7:00）
「${d.target}って、日々いろんな悩みがありますよね。
私も実はずっと同じ悩みを抱えてて…
そんなときに出会ったのが今日の商品なんです。
コメントで同じ悩みがある方、ぜひ教えてくださいね！」

📦 商品紹介（7:00〜12:00）
「では発表します！じゃん！『${d.name}』です！
お値段${d.price}円。まずスペックからいきますね。
${d.feat}
ここがポイントなんです。一つずつ詳しく説明していきますね。」

🔍 実演パート（12:00〜18:00）
${D[d.cat].demo.replace('{feat}',d.feat)}
「…すごくないですか？コメントで感想聞かせてください！
リアルタイムで質問にもお答えしますよ。どんどん聞いてくださいね。」

❓ Q&Aタイム（18:00〜24:00）
「ここからは皆さんの質問に答えていきます！
よくある質問をまず紹介しますね。
${D[d.cat].qas.slice(0,3).map(q=>'Q:'+q.q+'\nA:'+q.a.replace('{feat}',d.feat)).join('\n\n')}」

🎯 クロージング（24:00〜30:00）
「さあ、そろそろまとめに入ります！
${d.name}、${d.price}円で${d.feat}。
今日のライブで紹介した商品、リンクは概要欄にあります！
ライブ中にコメントで『購入』と書いてくださった方には
特典もご用意しています。
最後まで見てくれてありがとうございました！フォローもお忘れなく！」`
}
function generate(){
const d=v();if(!d)return;
const tabs=[{id:'t5',label:'⏱ 5分版'},{id:'t30',label:'⏱ 30分版'},{id:'tqa',label:'❓ Q&A集'}];
let th='',ph='';
tabs.forEach((t,i)=>{
th+=`<button class="tab${i===0?' on':''}" onclick="sw('${t.id}')">${t.label}</button>`;
let c='';
if(t.id==='t5')c=s5(d);
else if(t.id==='t30')c=s30(d);
else{c='';D[d.cat].qas.forEach(q=>{c+=`<div class="qa-item"><b>Q: ${q.q}</b><br>A: ${q.a.replace('{feat}',d.feat)}</div>`})}
ph+=`<div class="panel${i===0?' on':''}" id="${t.id}">${t.id==='tqa'?c:esc(c)}</div>`;
});
document.getElementById('tabs').innerHTML=th;
document.getElementById('panels').innerHTML=ph;
document.getElementById('snsOut').innerHTML='';
document.getElementById('result').style.display='block';
document.getElementById('result').scrollIntoView({behavior:'smooth'});
}
function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function sw(id){
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
document.getElementById(id).classList.add('on');
document.querySelectorAll('.tab').forEach(t=>{if(t.textContent.includes(id==='t5'?'5分':id==='t30'?'30分':'Q&A'))t.classList.add('on')});
event.target.classList.add('on');
}
function genSNS(){
const d=v();if(!d)return;
const posts=[
{platform:'X（Twitter）',text:`🔴ライブ配信ありがとうございました！\n\n今日ご紹介した #${d.name} 大好評でした✨\n\n✅${d.feat}\n\n${d.price}円で${d.target}にぴったり！\n見逃した方はアーカイブからチェック👇\n\n#ライブコマース #PR`},
{platform:'Instagram',text:`📣 ライブ配信ご視聴ありがとうございました！\n\n今日の主役は『${d.name}』💫\n\n${d.feat}\n\nたくさんのコメント・ご質問\n本当にありがとうございました🙏\n\nまだの方はストーリーズのリンクから\nチェックしてくださいね！\n\n#${d.name.replace(/\s/g,'')} #ライブコマース #おすすめ`},
{platform:'TikTok',text:`今日のライブで紹介した${d.name}🔥\n${d.feat}\n${d.price}円👀\nプロフィールのリンクからチェック！\n#ライブコマース #TikTokMadeMeBuyIt #おすすめ商品`}
];
let h='';posts.forEach(p=>{
h+=`<div class="sns-box" style="margin-bottom:10px"><b>【${p.platform}】</b>\n${p.text}</div><button class="copy" onclick="cp(this)">📋 コピー</button><div style="margin-bottom:16px"></div>`;
});
document.getElementById('snsOut').innerHTML=h;
}
function cp(btn){
const txt=btn.previousElementSibling.textContent;
navigator.clipboard.writeText(txt).then(()=>{btn.textContent='✅ コピーしました';setTimeout(()=>btn.textContent='📋 コピー',2000)});
}
</script>
