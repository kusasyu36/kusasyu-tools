<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/digital-marketing/" style="color:#4299e1;text-decoration:none;">kusasyu Digital Marketing</a> &gt; <span style="color:#718096;">AI動画CM制作ツール比較＆コスト診断シミュレーター</span></div>
<div class="wrap">
<h1>AI動画CM制作ツール<br>比較＆コスト診断シミュレーター</h1>
<p class="sub">最適なAIツールを診断し、外注との年間コスト差を算出</p>

<div class="card">
<h2>① あなたの情報を入力</h2>
<div class="row">
<div><label>業種</label>
<select id="biz"><option value="food">飲食</option><option value="beauty">美容</option><option value="retail">小売</option><option value="pro">士業</option><option value="estate">不動産</option></select></div>
<div><label>主な配信先</label>
<select id="plat"><option value="ig">Instagram</option><option value="yt">YouTube</option><option value="tt">TikTok</option><option value="multi">複数</option></select></div>
</div>
<label>月間の動画制作本数（目標）</label>
<div class="slider-wrap">
<input type="range" id="vids" min="1" max="20" value="4">
<div class="slider-val"><span id="vidsV">4</span> 本/月</div>
</div>
<div class="row">
<div><label>月間予算（万円）</label>
<input type="number" id="budget" value="3" min="0" max="100"></div>
<div><label>動画の長さ</label>
<select id="dur"><option value="15">15秒</option><option value="30">30秒</option></select></div>
</div>
<label>動画制作の経験</label>
<select id="exp"><option value="none">まったくない</option><option value="some">少しある（Canva等）</option><option value="mid">ある程度できる</option></select>
<button class="btn" onclick="diagnose()">診断する</button>
</div>

<div id="result">
<div class="card">
<h2>② あなたへのおすすめツール</h2>
<div class="rec-box"><div class="name" id="recName"></div><div class="reason" id="recReason"></div></div>
<div id="recDetail"></div>
</div>
<div class="card">
<h2>③ 年間コスト比較</h2>
<div class="save"><div class="label">外注と比べた年間削減額</div><div class="amount" id="saveAmt"></div></div>
<div id="costBars"></div>
<p class="note" id="costNote"></p>
</div>
<div class="card" style="overflow-x:auto">
<h2>④ AIツール比較一覧</h2>
<table id="tbl"></table>
</div>
</div>
</div>

<script>
var S=document.getElementById("vids"),V=document.getElementById("vidsV");
S.oninput=function(){V.textContent=S.value};

var tools=[
{id:"nolang",name:"NoLang",price:2980,jpn:true,res:"1080p",commercial:true,
genre:["food","retail","beauty"],ease:5,strong:"テキスト→動画の自動生成。日本語完全対応で操作が最も簡単",
weak:"映像のカスタマイズ性はやや低い",platBest:["ig","tt"],durBest:[15,30]},
{id:"pika",name:"Pika",price:1200,jpn:false,res:"1080p",commercial:true,
genre:["beauty","retail","estate"],ease:3,strong:"高品質な映像表現。スタイリッシュな広告向き",
weak:"日本語UI未対応・英語プロンプト必要",platBest:["ig","yt"],durBest:[15]},
{id:"sora",name:"Sora",price:2000,jpn:true,res:"1080p",commercial:true,
genre:["food","beauty","estate","pro"],ease:4,strong:"超高品質なリアル映像生成。ブランディング向き",
weak:"生成に時間がかかる場合がある",platBest:["yt","ig"],durBest:[15,30]},
{id:"runway",name:"Runway Gen-3",price:1800,jpn:false,res:"4K",commercial:true,
genre:["beauty","estate","retail"],ease:3,strong:"4K対応・映像編集機能が充実。プロ向け",
weak:"操作がやや複雑・英語UI",platBest:["yt"],durBest:[30]},
{id:"vrew",name:"Vrew",price:0,jpn:true,res:"1080p",commercial:true,
genre:["pro","food","retail"],ease:5,strong:"無料プラン有。字幕自動生成とナレーション付き",
weak:"AIの映像生成機能は限定的",platBest:["yt","ig","tt"],durBest:[15,30]}
];

function tag(v,l){return v===true?'<span class="tag tag-y">'+l+'</span>':v===false?'<span class="tag tag-n">非対応</span>':'<span class="tag tag-p">'+l+'</span>'}

function diagnose(){
var biz=document.getElementById("biz").value,
plat=document.getElementById("plat").value,
vids=+S.value,budget=+document.getElementById("budget").value,
dur=+document.getElementById("dur").value,
exp=document.getElementById("exp").value;

var scored=tools.map(function(t){
var s=0;
if(t.genre.indexOf(biz)>=0) s+=25;
if(plat==="multi"){s+=15}else if(t.platBest.indexOf(plat)>=0) s+=20;
if(t.durBest.indexOf(dur)>=0) s+=10;
if(t.price/100<=budget) s+=20; else if(t.price/100<=budget*1.5) s+=10;
if(exp==="none"&&t.ease>=4) s+=15; else if(exp==="some"&&t.ease>=3) s+=10; else if(exp==="mid") s+=10;
if(t.jpn) s+=10;
return {tool:t,score:s};
}).sort(function(a,b){return b.score-a.score});

var best=scored[0].tool;
document.getElementById("recName").textContent=best.name;
var reasons=[];
if(best.genre.indexOf(biz)>=0) reasons.push("あなたの業種と相性抜群");
if(best.jpn) reasons.push("日本語対応で安心");
if(best.ease>=4) reasons.push("操作がカンタン");
document.getElementById("recReason").textContent=reasons.join(" / ");
document.getElementById("recDetail").innerHTML='<p style="margin:8px 0;font-size:.9em"><strong>強み：</strong>'+best.strong+'</p><p style="font-size:.9em"><strong>注意点：</strong>'+best.weak+'</p><p style="margin-top:8px;font-size:.9em"><strong>月額：</strong>約'+best.price.toLocaleString()+'円（税込）</p>';

var unitOut=dur===15?250000:500000;
var annualOut=vids*12*unitOut;
var annualAI=best.price*12;
var saved=annualOut-annualAI;
document.getElementById("saveAmt").textContent="約"+Math.round(saved/10000).toLocaleString()+"万円/年 削減";
var mx=Math.max(annualOut,annualAI);
document.getElementById("costBars").innerHTML=
bar("制作会社 外注",annualOut,mx,"#e53e3e")+bar("AI自社制作（"+best.name+"）",annualAI,mx,"#4299e1");
document.getElementById("costNote").textContent="※外注単価は"+dur+"秒CM1本あたり"+(unitOut/10000)+"万円で試算（一般的な中小向け制作会社の相場）";

var h='<tr><th>ツール</th><th>月額</th><th>日本語</th><th>解像度</th><th>商用利用</th><th>操作性</th><th>スコア</th></tr>';
scored.forEach(function(s){
var t=s.tool,cls=t.id===best.id?' class="best"':'';
h+='<tr'+cls+'><td><strong>'+t.name+'</strong></td><td>'+(!t.price?'無料':t.price.toLocaleString()+'円')+'</td><td>'+tag(t.jpn,"対応")+'</td><td>'+t.res+'</td><td>'+tag(t.commercial,"OK")+'</td><td>'+"★".repeat(t.ease)+'</td><td>'+s.score+'点</td></tr>';
});
document.getElementById("tbl").innerHTML=h;
document.getElementById("result").style.display="block";
document.getElementById("result").scrollIntoView({behavior:"smooth"});
}

function bar(l,v,mx,c){
var p=Math.round(v/mx*100);
return '<div class="bar-wrap"><div class="bar-label"><span>'+l+'</span><span>'+Math.round(v/10000).toLocaleString()+'万円/年</span></div><div class="bar-bg"><div class="bar-fill" style="width:'+p+'%;background:'+c+'">'+p+'%</div></div></div>';
}
</script>
