<script>
const H={飲食:'飲食店,グルメ,ランチ,ディナー,食べログ,料理,おいしい,レストラン,カフェ,食事,フード,メニュー,新メニュー,テイクアウト,デリバリー,食べ歩き,ごはん,美味しい,飲食業,店舗紹介',小売:'小売,ショップ,新商品,セール,おすすめ,買い物,通販,EC,限定,新作,人気商品,ギフト,プレゼント,お得,割引,入荷,商品紹介,ショッピング,店舗情報,お買い得',士業:'士業,専門家,相談,法律,税務,会計,経営,コンサル,ビジネス,起業,中小企業,節税,確定申告,労務,契約書,知識,解説,無料相談,セミナー,お役立ち',IT:'IT,テクノロジー,DX,デジタル,SaaS,クラウド,業務効率化,自動化,AI活用,開発,スタートアップ,プログラミング,Webサービス,アプリ,セキュリティ,データ分析,イノベーション,IT活用,システム,ツール紹介'};
const TT={親しみやすい:'日常,毎日,暮らし,つながり,笑顔',専門的:'専門知識,プロ,最新情報,業界動向,徹底解説',カジュアル:'ゆるく,気軽に,今日の一言,つぶやき,リアル'};
const XP={親しみやすい:['{n}です！{m}。今日も皆さまの笑顔のために頑張ります✨','{n}は「{m}」がモットー。いつもありがとうございます😊お気軽にどうぞ！','「{m}」——{n}の想いです。皆さまとの出会いを大切にしています🌱'],専門的:['{n}の提供価値：{m}。最新知見を活かし確かな成果をお届けします。','【{n}】{m}。プロとしてお客様の課題解決に全力で取り組みます。','{m}。{n}は専門性と実績に基づくサービスで成長を支援いたします。'],カジュアル:['{n}です〜！{m}ってことで今日もゆるっとがんばってます💪','ぶっちゃけ{m}が大事。{n}はそこにこだわってます！','やっほー！{n}から→{m}。フォローしてくれたら嬉しいな🙌']};
const IP={親しみやすい:['📸 {n}の日常\n\n大切にしているのは「{m}」。\nお客様との出会いを大切に丁寧にサービスを提供しています。\nお気軽にお声がけください😊','🌿 {n}です\n\n{m}——この想いで日々取り組んでいます。\nフォロー＆いいねで応援よろしくお願いします！','✨ {n}よりお知らせ\n\n{m}をテーマに新しい取り組みを始めました！\n詳しくはプロフィールリンクから🔗'],専門的:['■ {n}の専門コラム\n\n{m}は私たちの基本理念です。\n最新動向を踏まえた確かなサービスでお客様の成果にコミットします。\n▶ 詳細はプロフィールへ','【プロの視点】{n}\n\n{m}の実現に向け専門知識と経験を活かした提案を行っています。\nお悩みがあればご相談ください。','📊 {n}の専門情報\n\n{m}に基づくアプローチで多くのお客様に満足いただいています。\n実績に裏打ちされたサービスをご体感ください。'],カジュアル:['Hey！{n}です👋\n\n{m}って大事じゃないですか？\nうちはそこにこだわってるので気になったらフォローしてね🙌','{n}の中の人です！\n\n推しポイント→{m}\nゆるく発信するのでチェックしてみてください✌️','おつかれさま〜{n}です！\n\n{m}をモットーに今日もいい感じにやってます💪\nコメント・DMお気軽に〜！']};
const TM={X:{月:'12-13時',火:'7-8時',水:'12-13時',木:'18-19時',金:'12-13時',土:'10-11時',日:'10-11時'},Instagram:{月:'18-20時',火:'18-20時',水:'12-13時',木:'18-20時',金:'17-19時',土:'11-13時',日:'11-13時'}};
const WK={飲食:['季節の新メニュー','お客様の声紹介','食材こだわり','スタッフ紹介','ランチ限定情報','テイクアウト紹介','週末おすすめ','産地レポート','調理風景の裏側','人気ランキング','季節ドリンク','お得セット','常連さん感謝','衛生管理の取組','来週の予告','記念日プラン','地域イベント','レシピ公開','お店の歴史','平日限定情報','混雑状況案内'],小売:['新商品入荷','人気TOP3','スタッフ推し','セール情報','使い方提案','お客様コーデ','限定アイテム','季節の特集','ギフト提案','在庫わずか','開発ストーリー','リピーター紹介','週末フェア','比較レビュー','入荷速報','コーデ提案','プレゼント企画','店内ディスプレイ','お手入れ方法','新作予告','まとめ買い提案'],士業:['よくある相談Q&A','法改正ニュース','事例紹介','無料相談会告知','チェックリスト','業界ニュース','お客様の声','用語解説','セミナー案内','経営Tips','税務カレンダー','契約書ポイント','補助金情報','トラブル予防','来週テーマ予告','効率化ヒント','新サービス紹介','スタッフ紹介','事例から学ぶ','年間スケジュール','まとめ記事'],IT:['新機能リリース','活用Tips','導入事例','アップデート情報','トレンド解説','FAQ紹介','比較記事','ウェビナー告知','チーム紹介','お客様の声','セキュリティ情報','API連携紹介','使い方動画','障害対応報告','ロードマップ','データ活用術','自動化レシピ','連携事例','開発裏話','性能改善','年間計画']};
let R={};function $(id){return document.getElementById(id)}
function gen(){let n=$('nm').value.trim(),i=$('ind').value,t=$('tn').value,m=$('msg').value.trim();
if(!n||!i||!t||!m){alert('すべての項目を入力してください');return}
localStorage.setItem('bv',JSON.stringify({n,i,t,m}));$('sv').textContent='✓ ブランド設定を保存しました';
let f=s=>s.replace(/\{n\}/g,n).replace(/\{m\}/g,m);
let xp=XP[t].map(s=>{let r=f(s);return r.length>140?r.slice(0,139)+'…':r});
let ip=IP[t].map(s=>f(s));
let ht=H[i].split(',').map(s=>'#'+s),tt=TT[t].split(',').map(s=>'#'+s),tags=[...ht,...tt];
R={n,i,t,m,xp,ip,tags};
let xh='';xp.forEach((p,j)=>{let l=p.length;xh+=`<div class="p"><h4>パターン${j+1}</h4><p>${p}</p><div class="cn${l>140?' ov':''}">${l}/140文字</div></div>`});
$('p0').innerHTML='<h3>X投稿文（各140文字以内）</h3>'+xh;
let ih='';ip.forEach((p,j)=>{ih+=`<div class="p"><h4>パターン${j+1}</h4><p>${p.replace(/\n/g,'<br>')}</p></div>`});
ih+='<h4 style="margin:10px 0 4px;font-size:.85em">推奨ハッシュタグ（25個）</h4><div class="tg">'+tags.map(v=>`<span>${v}</span>`).join('')+'</div>';
$('p1').innerHTML='<h3>Instagram投稿文</h3>'+ih;
let th='<h3>プラットフォーム別 最適投稿時間</h3>';
for(let pf of['X','Instagram']){th+=`<h4 style="font-size:.85em;margin:8px 0 2px">${pf}</h4><table><tr><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th><th>日</th></tr><tr>`;for(let d of'月火水木金土日')th+=`<td>${TM[pf][d]}</td>`;th+='</tr></table>'}
$('p2').innerHTML=th;$('out').classList.remove('h');sw(0)}
function sw(x){document.querySelectorAll('.t').forEach((e,j)=>e.classList.toggle('a',j===x));for(let j=0;j<3;j++)$('p'+j).classList.toggle('h',j!==x)}
function dl(){if(!R.xp)return;let rows=[['種別','内容']];
R.xp.forEach((p,j)=>rows.push(['X投稿パターン'+(j+1),'"'+p.replace(/"/g,'""')+'"']));
R.ip.forEach((p,j)=>rows.push(['IG投稿パターン'+(j+1),'"'+p.replace(/\n/g,' ').replace(/"/g,'""')+'"']));
rows.push(['推奨ハッシュタグ',R.tags.join(' ')]);
rows.push([]);rows.push(['■ 3週間投稿テーマ（'+R.i+'）']);
rows.push(['日付','曜日','テーマ','媒体']);let ds='日月火水木金土',wk=WK[R.i],d=new Date();
for(let k=0;k<21;k++){let dt=new Date(d);dt.setDate(d.getDate()+k);let wd=ds[dt.getDay()];rows.push([dt.toLocaleDateString('ja-JP'),wd,wk[k],k%2===0?'X':'Instagram'])}
let csv=rows.map(r=>r.join(',')).join('\n'),bl=new Blob(['\uFEFF'+csv],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(bl);a.download='brand_voice_posts.csv';a.click()}
window.onload=function(){let s=localStorage.getItem('bv');if(s){let d=JSON.parse(s);$('nm').value=d.n||'';$('ind').value=d.i||'';$('tn').value=d.t||'';$('msg').value=d.m||'';$('sv').textContent='✓ 前回の設定を復元しました'}};
</script></body></html>
