function sel(el){var g=el.dataset.g;document.querySelectorAll('.btn[data-g="'+g+'"]').forEach(function(b){b.classList.remove("active")});el.classList.add("active");S[g]=el.dataset.v;render()}
function setTone(el){document.querySelectorAll(".tone-btn").forEach(function(b){b.classList.remove("active")});el.classList.add("active");tone=el.dataset.v;render()}
function render(){if(!S.ind||!S.sz||!S.stg)return;var key=S.ind+"_"+S.sz+"_"+S.stg,d=D[key][tone];document.getElementById("t-mail").textContent=d.mail;document.getElementById("t-lp").textContent=d.lp;document.getElementById("t-cta").textContent=d.cta;document.getElementById("seg-info").textContent="セグメント: "+LB.ind[S.ind]+" / "+LB.sz[S.sz]+" / "+LB.stg[S.stg]+" / "+(tone==="p"?"丁寧体":"ビジネス体");document.getElementById("result").style.display="block";document.querySelectorAll(".copy-btn").forEach(function(b){b.textContent="コピー";b.classList.remove("done")})}
function cp(id,btn){var t=document.getElementById(id).textContent;if(navigator.clipboard){navigator.clipboard.writeText(t)}else{var a=document.createElement("textarea");a.value=t;document.body.appendChild(a);a.select();document.execCommand("copy");document.body.removeChild(a)}btn.textContent="OK";btn.classList.add("done");setTimeout(function(){btn.textContent="コピー";btn.classList.remove("done")},1500)}
function dlCSV(){var rows=[["業種","企業規模","購買段階","敬語","メール本文","LP見出し","CTA文言"]];var inds=["mfg","it","pro"],szs=["s","l"],stgs=["aw","co","de"],tns=["p","b"];for(var i=0;i<inds.length;i++)for(var j=0;j<szs.length;j++)for(var k=0;k<stgs.length;k++)for(var t=0;t<tns.length;t++){var key=inds[i]+"_"+szs[j]+"_"+stgs[k],d=D[key][tns[t]];rows.push([LB.ind[inds[i]],LB.sz[szs[j]],LB.stg[stgs[k]],tns[t]==="p"?"丁寧体":"ビジネス体",'"'+d.mail.replace(/\n/g," ").replace(/"/g,'""')+'"','"'+d.lp+'"','"'+d.cta+'"'])}var csv="\uFEFF"+rows.map(function(r){return r.join(",")}).join("\n");var blob=new Blob([csv],{type:"text/csv;charset=utf-8"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="btob_segment_templates.csv";a.click();URL.revokeObjectURL(url)}
