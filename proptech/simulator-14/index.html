.rw{overflow-x:auto;margin-top:10px}
.rt{width:100%;border-collapse:collapse;font-size:.68em}
.rt th,.rt td{border:1px solid #e2e8f0;padding:5px 6px;text-align:center}
.rt th{background:#2b6cb0;color:#fff;position:sticky;top:0;white-space:nowrap}
.rt td:first-child{text-align:left;white-space:nowrap;font-weight:600}
.rt tr:nth-child(even){background:#f7fafc}

footer{text-align:center;color:#a0aec0;font-size:.72em;padding:20px 0}

<div class="wrap">
<h1>用途地域×建築可能性シミュレーター</h1>
<p class="sub">敷地面積と用途地域から建築ポテンシャルを即座に判定</p>
<div class="card"><h2>1. 用途地域を選択</h2>
<select id="zone" onchange="onZ()"><option value="">-- 用途地域を選択 --</option></select>
<div class="hint" id="zh"></div></div>
<div class="card"><h2>2. 敷地条件を入力</h2>
<div class="row"><div><label>敷地面積（㎡）</label><input type="number" id="area" placeholder="例: 200" min="1"></div>
<div><label>前面道路幅員（m）</label><input type="number" id="road" placeholder="例: 6" min="0.1" step="0.1"></div></div>
<div class="row"><div><label>指定建蔽率（%）</label><input type="number" id="bcr" placeholder="例: 60" min="1" max="100"></div>
<div><label>指定容積率（%）</label><input type="number" id="far" placeholder="例: 200" min="1" max="1300"></div></div>
<button class="btn" onclick="calc()">建築可能性を判定する</button></div>
<div id="result" class="card"><h2>判定結果</h2><div class="rg" id="rg"></div><div id="ub"></div>
<div class="note">※ 防火地域・準防火地域の指定、高度地区、日影規制、北側斜線制限等は<b>別途都市計画図で確認</b>してください。本ツールは建築基準法に基づく概算値であり、実際の建築確認には個別の法規チェックが必要です。</div></div>
<details><summary>用途地域13種 建築制限 クイックリファレンス</summary>
<div class="rw"><table class="rt" id="rt"></table></div></details>
<footer>© Kusasyu PropTech — 建築基準法に基づく概算シミュレーター</footer>
</div>
<script>
var D=[
{n:"第一種低層住居専用地域",bc:"30/40/50/60",fa:"50/60/80/100/150/200",k:1.25,m:.4,h:"10mまたは12m",
u:["住宅","共同住宅","兼用住宅(50㎡以下)","幼稚園・保育所","小中高校","図書館","神社・寺院","診療所","交番・公民館","老人ホーム"]},
{n:"第二種低層住居専用地域",bc:"30/40/50/60",fa:"50/60/80/100/150/200",k:1.25,m:.4,h:"10mまたは12m",
u:["住宅","共同住宅","小規模店舗(150㎡以下2階以下)","幼稚園・保育所","小中高校","図書館","診療所","老人ホーム"]},
{n:"第一種中高層住居専用地域",bc:"30/40/50/60",fa:"100/150/200/300",k:1.25,m:.4,h:"なし",
u:["住宅","共同住宅","店舗(500㎡以下2階以下)","大学・専門学校","病院","図書館","老人ホーム","自動車車庫(300㎡以下)"]},
{n:"第二種中高層住居専用地域",bc:"30/40/50/60",fa:"100/150/200/300",k:1.25,m:.4,h:"なし",
u:["住宅","共同住宅","店舗(1500㎡以下)","事務所(1500㎡以下)","大学","病院","老人ホーム","自動車車庫"]},
{n:"第一種住居地域",bc:"50/60/80",fa:"100/150/200/300/400",k:1.25,m:.4,h:"なし",
u:["住宅","共同住宅","店舗(3000㎡以下)","事務所","ホテル・旅館","大学","病院","ボーリング場","スケート場"]},
{n:"第二種住居地域",bc:"50/60/80",fa:"100/150/200/300/400",k:1.25,m:.4,h:"なし",
u:["住宅","共同住宅","店舗","事務所","ホテル・旅館","カラオケボックス","パチンコ店","大学","病院","小規模工場"]},
{n:"準住居地域",bc:"50/60/80",fa:"100/150/200/300/400",k:1.25,m:.4,h:"なし",
u:["住宅","共同住宅","店舗","事務所","ホテル・旅館","カラオケ","映画館(200㎡未満)","自動車修理工場","営業用倉庫","劇場"]},
{n:"田園住居地域",bc:"30/40/50/60",fa:"50/60/80/100/150/200",k:1.25,m:.4,h:"10mまたは12m",
u:["住宅","共同住宅","農産物直売所(500㎡以下)","農家レストラン(500㎡以下)","幼稚園・保育所","小中高校","診療所"]},
{n:"近隣商業地域",bc:"60/80",fa:"100/150/200/300/400",k:1.5,m:.6,h:"なし",
u:["住宅","共同住宅","店舗","事務所","ホテル・旅館","映画館・劇場","大学","病院","工場(作業場150㎡以下)","自動車修理工場"]},
{n:"商業地域",bc:"80",fa:"200~1300",k:1.5,m:.6,h:"なし",
u:["住宅","共同住宅","店舗","百貨店","事務所","ホテル・旅館","映画館・劇場","遊技場","大学","病院","風俗施設","工場(150㎡以下)"]},
{n:"準工業地域",bc:"50/60/80",fa:"100/150/200/300/400",k:1.5,m:.6,h:"なし",
u:["住宅","共同住宅","店舗","事務所","ホテル・旅館","映画館","大学","病院","工場(危険物除く)","倉庫","自動車修理工場"]},
{n:"工業地域",bc:"50/60",fa:"100/150/200/300/400",k:1.5,m:.6,h:"なし",
u:["住宅","共同住宅","店舗(10000㎡以下)","事務所","工場","倉庫","自動車修理工場","ボーリング場"]},
{n:"工業専用地域",bc:"30/40/50/60",fa:"100/150/200/300/400",k:1.5,m:.6,h:"なし",
u:["事務所","工場","倉庫","自動車修理工場","トラックターミナル"]}
];
var sel=document.getElementById("zone");
D.forEach(function(z,i){var o=document.createElement("option");o.value=i;o.textContent=z.n;sel.appendChild(o)});
function onZ(){var i=sel.value,el=document.getElementById("zh");if(i===""){el.textContent="";return}var z=D[i];
el.innerHTML="法定建蔽率: <b>"+z.bc+"%</b> ／ 法定容積率: <b>"+z.fa+"%</b><br>道路斜線係数: <b>"+z.k+"</b> ／ 前面道路容積率乗数: <b>"+(z.m*10)+"/10</b>"+(z.h!=="なし"?" ／ 絶対高さ制限: <b>"+z.h+"</b>":"");}
function F(v){return v.toLocaleString("ja-JP",{maximumFractionDigits:2})}
function calc(){var zi=sel.value,area=parseFloat(document.getElementById("area").value),road=parseFloat(document.getElementById("road").value),bcr=parseFloat(document.getElementById("bcr").value),far=parseFloat(document.getElementById("far").value);
if(zi===""||!area||!road||!bcr||!far){alert("すべての項目を入力してください");return}
if(area<=0||road<=0||bcr<=0||far<=0){alert("正の数を入力してください");return}
var z=D[zi],maxBA=area*bcr/100,eFAR=far,rFAR=null;
if(road<12){rFAR=road*z.m*100;eFAR=Math.min(far,rFAR)}
var maxFA=area*eFAR/100,sH=road*z.k,mxF=Math.floor(sH/3),faF=maxFA/maxBA;
var o='<div class="ri"><div class="l">最大建築面積</div><div class="v">'+F(maxBA)+' ㎡</div></div>';
o+='<div class="ri"><div class="l">適用容積率</div><div class="v">'+F(eFAR)+' %</div></div>';
o+='<div class="ri"><div class="l">最大延床面積</div><div class="v">'+F(maxFA)+' ㎡</div></div>';
o+='<div class="ri"><div class="l">道路斜線 概算制限高さ</div><div class="v">'+F(sH)+' m</div></div>';
if(road<12&&rFAR!==null){o+='<div class="ri warn full"><div class="l">前面道路幅員による容積率制限</div><div style="font-size:.85em;margin-top:4px">道路幅員 '+road+'m × 乗数 '+(z.m*10)+'/10 ＝ 道路容積率 <b>'+F(rFAR)+'%</b>'+(rFAR<far?' → 指定容積率'+far+'%より厳しいため <b>'+F(rFAR)+'%</b> を適用':' → 指定容積率以下のため指定値'+far+'%を適用')+'</div></div>';}
if(z.h!=="なし"){o+='<div class="ri warn full"><div class="l">絶対高さ制限</div><div style="font-size:.9em">この用途地域は <b>'+z.h+'</b> の高さ制限あり（都市計画で確認）</div></div>';}
o+='<div class="ri green full"><div class="l">概算可能階数</div><div class="v">'+mxF+' 階</div><div style="font-size:.72em;color:#718096">延床÷建築面積＝'+F(faF)+'階相当（階高3m・斜線制限'+F(sH)+'m以内）</div></div>';
document.getElementById("rg").innerHTML=o;
var uh='<div class="uses"><label>この用途地域で建築可能な主な用途:</label>';
z.u.forEach(function(u){uh+='<span>'+u+'</span>'});uh+='</div>';
document.getElementById("ub").innerHTML=uh;
document.getElementById("result").style.display="block";
document.getElementById("result").scrollIntoView({behavior:"smooth"});}
(function(){var t=document.getElementById("rt"),h="<tr><th>用途地域</th><th>建蔽率(%)</th><th>容積率(%)</th><th>斜線係数</th><th>乗数</th><th>高さ制限</th><th>主な建築可能用途</th></tr>";
D.forEach(function(z){h+='<tr><td>'+z.n+'</td><td>'+z.bc+'</td><td>'+z.fa+'</td><td>'+z.k+'</td><td>'+(z.m*10)+'/10</td><td>'+z.h+'</td><td class="ul">'+z.u.join(", ")+'</td></tr>'});t.innerHTML=h})();
</script>
</body>
