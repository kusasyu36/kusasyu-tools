<script>
var Z=[
{n:"第一種低層住居専用地域",b:60,f:100,h:10,rs:1.25,rm:.4,as:"-（高さ制限で規定）",ns:"5m＋1.25勾配",sh:"1.5m測定面／3h-2h",fp:"法22条区域",u:"1102000100"},

{n:"第二種中高層住居専用地域",b:60,f:200,h:0,rs:1.25,rm:.4,as:"20m＋1.25勾配",ns:"10m＋1.25勾配",sh:"4m測定面／3h-2h",fp:"法22条区域",u:"1112010100"},
{n:"第一種住居地域",b:60,f:200,h:0,rs:1.25,rm:.4,as:"20m＋1.25勾配",ns:"-",sh:"4m測定面／4h-2.5h",fp:"法22条区域",u:"1111010100"},
{n:"第二種住居地域",b:60,f:200,h:0,rs:1.25,rm:.4,as:"20m＋1.25勾配",ns:"-",sh:"4m測定面／4h-2.5h",fp:"準防火地域",u:"1111110101"},
{n:"田園住居地域",b:60,f:100,h:10,rs:1.25,rm:.4,as:"-（高さ制限で規定）",ns:"5m＋1.25勾配",sh:"1.5m測定面／3h-2h",fp:"法22条区域",u:"1122000100"},
{n:"準住居地域",b:60,f:200,h:0,rs:1.25,rm:.4,as:"20m＋1.25勾配",ns:"-",sh:"4m測定面／4h-2.5h",fp:"準防火地域",u:"1111110111"},
{n:"近隣商業地域",b:80,f:300,h:0,rs:1.5,rm:.6,as:"31m＋2.5勾配",ns:"-",sh:"条例による",fp:"準防火地域",u:"1111110121"},
{n:"商業地域",b:80,f:400,h:0,rs:1.5,rm:.6,as:"31m＋2.5勾配",ns:"-",sh:"原則なし",fp:"防火地域",u:"1111110121"},
{n:"準工業地域",b:60,f:200,h:0,rs:1.5,rm:.6,as:"31m＋2.5勾配",ns:"-",sh:"4m測定面／4h-2.5h",fp:"法22条区域",u:"1111111111"},
{n:"工業地域",b:60,f:200,h:0,rs:1.5,rm:.6,as:"31m＋2.5勾配",ns:"-",sh:"条例による",fp:"法22条区域",u:"1111100110"},
{n:"工業専用地域",b:60,f:200,h:0,rs:1.5,rm:.6,as:"31m＋2.5勾配",ns:"-",sh:"条例による",fp:"法22条区域",u:"0001000110"}
];
var UN=["住宅","共同住宅","店舗","事務所","ホテル・旅館","病院","学校","工場","倉庫","遊戯施設"];
var UL=["&#x2705;","&#x274C;","&#x26A0;&#xFE0F; 条件付"];
var sel=document.getElementById("zn");
Z.forEach(function(z,i){var o=document.createElement("option");o.value=i;o.textContent=z.n;sel.appendChild(o)});
var LD=null;

function rw(t,a,b){var r=t.insertRow();var c1=r.insertCell();c1.innerHTML=a;r.insertCell().innerHTML=b}

function run(){
var zi=sel.value;if(zi==="")return alert("用途地域を選択してください");
var z=Z[zi],ar=+document.getElementById("ar").value,rd=+document.getElementById("rd").value;
if(!ar||ar<=0)return alert("敷地面積を正の数で入力してください");
if(!rd||rd<2)return alert("前面道路幅員を2m以上で入力してください");

var rf=rd*z.rm*100,ef=Math.min(z.f,rf);
var ba=Math.floor(ar*z.b/100*100)/100,fa=Math.floor(ar*ef/100*100)/100;
var ml=z.rm===.4?"4/10（住居系）":"6/10（商業・工業系）";

document.getElementById("R").style.display="block";
["t1","t2","t4"].forEach(function(id){document.getElementById(id).innerHTML=""});

var t1=document.getElementById("t1");
rw(t1,"用途地域","<b>"+z.n+"</b>");
rw(t1,"建ぺい率","<b>"+z.b+"%</b>");
rw(t1,"指定容積率",z.f+"%");
rw(t1,"道路幅制限容積率",rf.toFixed(0)+"%<span style='font-size:11px;color:#64748b'> （幅員"+rd+"m &times; "+ml+"）</span>");
var efTag=ef===z.f?"<span class='tag hi'>指定値適用</span>":"<span class='tag mid'>道路幅で制限</span>";
rw(t1,"<b>実効容積率</b>","<b style='font-size:17px'>"+ef+"%</b> "+efTag);
rw(t1,"高さ制限",z.h?("<b>"+z.h+"m</b>"):"なし（斜線制限で規定）");

var t2=document.getElementById("t2");
rw(t2,"道路斜線","勾配 "+z.rs+"（境界から "+rd+"m &times; "+z.rs+" = "+(rd*z.rs).toFixed(1)+"m）");
rw(t2,"隣地斜線",z.as);
rw(t2,"北側斜線",z.ns);
rw(t2,"日影規制",z.sh);
rw(t2,"防火指定","<b>"+z.fp+"</b>");

var t3=document.getElementById("t3"),ht="<table><tbody>";
UN.forEach(function(nm,i){
var v=+z.u[i],cls=v===1?"ok":v===0?"ng":"cd";
ht+="<tr><th>"+nm+"</th><td class='"+cls+"'>"+UL[v]+"</td></tr>"});
ht+="</tbody></table>";t3.innerHTML=ht;

var t4=document.getElementById("t4");
rw(t4,"敷地面積",ar.toLocaleString()+" &#x33A1;");
rw(t4,"建築面積上限","<b>"+ba.toLocaleString()+" &#x33A1;</b>（敷地 &times; "+z.b+"%）");
rw(t4,"延床面積上限","<b>"+fa.toLocaleString()+" &#x33A1;</b>（敷地 &times; "+ef+"%）");
var fl=z.h?Math.floor(z.h/3):Math.min(Math.floor(fa/ba),30);
var flTxt=z.h?(fl+"階程度（高さ"+z.h+"m &divide; 階高3m）"):(fl+"階程度（容積率から推定／斜線制限要確認）");
rw(t4,"想定階数目安",flTxt);

var uc=0;for(var i=0;i<10;i++)if(z.u[i]==="1")uc++;
var raw=Math.min(ef/10,40)+(uc*3)+(z.h>0?5:20);
var sc=raw<=20?1:raw<=35?2:raw<=50?3:raw<=65?4:5;
var sLbl=["","開発余地：極めて限定的","開発余地：限定的","開発余地：標準的","開発余地：良好","開発余地：非常に良好"];
document.getElementById("sd").className="sb s"+sc;
document.getElementById("sd").textContent=sc;
document.getElementById("st").textContent=sLbl[sc];

var bars="<div style='display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;margin-top:12px'>";
var farP=Math.min(ef/8,100),useP=uc*10,htP=z.h?30:100;
bars+="<div>容積率活用度<div class='bar'><div class='bf' style='width:"+farP+"%;background:#3b82f6'></div></div></div>";
bars+="<div>用途柔軟性<div class='bar'><div class='bf' style='width:"+useP+"%;background:#22c55e'></div></div></div>";
bars+="<div>高さ自由度<div class='bar'><div class='bf' style='width:"+htP+"%;background:#f59e0b'></div></div></div>";
bars+="<div>総合<div class='bar'><div class='bf' style='width:"+(sc*20)+"%;background:#8b5cf6'></div></div></div></div>";
document.getElementById("sm").innerHTML=bars;

LD={zone:z.n,area:ar,road:rd,bcr:z.b,far:z.f,roadFar:rf.toFixed(0),effFar:ef,height:z.h||"なし",
roadSlope:z.rs,adjSlope:z.as,northSlope:z.ns,shadow:z.sh,fire:z.fp,bArea:ba,fArea:fa,floors:fl,score:sc,
uses:UN.map(function(nm,i){return nm+":"+["○","×","△"][+z.u[i]]}).join("／")};
document.getElementById("R").scrollIntoView({behavior:"smooth"})
}

function csv(){
if(!LD)return;var d=LD;
var h="用途地域,敷地面積(㎡),前面道路幅員(m),建ぺい率(%),指定容積率(%),道路幅制限容積率(%),実効容積率(%),高さ制限,道路斜線勾配,隣地斜線,北側斜線,日影規制,防火指定,建築面積上限(㎡),延床面積上限(㎡),想定階数,スコア(5段階),建築可能用途";
var v=[d.zone,d.area,d.road,d.bcr,d.far,d.roadFar,d.effFar,d.height,d.roadSlope,'"'+d.adjSlope+'"','"'+d.northSlope+'"','"'+d.shadow+'"',d.fire,d.bArea,d.fArea,d.floors,d.score+"/5",'"'+d.uses+'"'].join(",");
var b=new Blob(["\uFEFF"+h+"\n"+v+"\n"],{type:"text/csv;charset=utf-8"});
var a=document.createElement("a");a.href=URL.createObjectURL(b);
a.download="建築制限チェック_"+d.zone+"_"+new Date().toISOString().slice(0,10)+".csv";a.click()}
</script>
