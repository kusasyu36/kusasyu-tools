<header>
<h1>追客漏れゼロ管理ダッシュボード<small>反響即レス返信文ジェネレーター 連携ツール</small></h1>
<button class="eb" onclick="csv()">&#128229; CSVエクスポート</button>
</header>
<div class="st" id="stats"></div>
<div class="card">
<h2>&#128221; リード登録</h2>
<div class="r">
<div><label>氏名</label><input id="nm" placeholder="山田太郎"></div>
<div><label>反響日</label><input id="dt" type="date"></div>
<div><label>反響元</label><select id="src"><option>SUUMO</option><option>HOME'S</option><option>at home</option><option>自社HP</option><option>電話</option><option>来店</option><option>紹介</option><option>その他</option></select></div>
</div>
<div class="r">
<div><label>物件名・エリア</label><input id="prop" placeholder="○○マンション 3LDK"></div>
<div><label>予算（万円）</label><input id="bgt" type="number" placeholder="3500"></div>
<div><label>備考</label><input id="memo" placeholder="週末内見希望"></div>
</div>
<button class="btn" onclick="add()">&#10133; 登録</button>
</div>
<div class="card">
<h2>&#128203; リード一覧</h2>
<div class="fl" id="flt"></div>
<div style="overflow-x:auto"><table><thead><tr><th>状態</th><th>氏名</th><th>経過</th><th>反響日</th><th>反響元</th><th>物件</th><th>予算</th><th>操作</th></tr></thead><tbody id="tb"></tbody></table></div>
<div class="empty" id="emp">リードが登録されていません</div>
</div>
</div>
<script>
var D=JSON.parse(localStorage.getItem('tl_leads')||'[]');
var F='all';
function sv(){localStorage.setItem('tl_leads',JSON.stringify(D))}
function dd(s){var a=new Date(s),b=new Date();a.setHours(0,0,0,0);b.setHours(0,0,0,0);return Math.floor((b-a)/864e5)}
function add(){var n=document.getElementById('nm').value.trim(),d=document.getElementById('dt').value,s=document.getElementById('src').value,p=document.getElementById('prop').value.trim(),b=document.getElementById('bgt').value,m=document.getElementById('memo').value.trim();if(!n||!d){alert('氏名と反響日は必須です');return}D.push({id:Date.now(),nm:n,dt:d,src:s,prop:p,bgt:b,memo:m,st:'new'});sv();document.getElementById('nm').value='';document.getElementById('prop').value='';document.getElementById('bgt').value='';document.getElementById('memo').value='';rr()}
function del(id){if(confirm('削除しますか？')){D=D.filter(function(x){return x.id!==id});sv();rr()}}
function ch(id,st){D.forEach(function(x){if(x.id===id)x.st=st});sv();rr()}
function badge(days,st){if(st==='done')return'<span class="bg bg-b">成約</span>';if(st==='lost')return'<span class="bg bg-b">失注</span>';if(st==='responded')return'<span class="bg bg-g">対応済</span>';if(days>=14)return'<span class="bg bg-r">'+days+'日 要対応</span>';if(days>=7)return'<span class="bg bg-y">'+days+'日 注意</span>';if(days>=3)return'<span class="bg bg-y">'+days+'日</span>';return'<span class="bg bg-g">'+days+'日 OK</span>'}
function rr(){var tb=document.getElementById('tb'),s={total:D.length,active:0,alert:0,done:0};tb.innerHTML='';var fl=D.filter(function(x){if(F==='alert'){var d=dd(x.dt);return(x.st==='new'||x.st==='responded')&&d>=3}if(F!=='all')return x.st===F;return true});D.forEach(function(x){if(x.st==='done')s.done++;if(x.st==='new'||x.st==='responded')s.active++;var d=dd(x.dt);if((x.st==='new'||x.st==='responded')&&d>=3)s.alert++});document.getElementById('stats').innerHTML='<div class="sc"><div class="n">'+s.total+'</div><div class="l">総リード</div></div><div class="sc"><div class="n">'+s.active+'</div><div class="l">対応中</div></div><div class="sc"><div class="n" style="color:#ef4444">'+s.alert+'</div><div class="l">要フォロー</div></div><div class="sc"><div class="n">'+(s.total?Math.round(s.done/s.total*100):0)+'%</div><div class="l">成約率</div></div>';
var tags=[['all','すべて'],['alert','要フォロー'],['new','未対応'],['responded','対応済'],['done','成約'],['lost','失注']];document.getElementById('flt').innerHTML=tags.map(function(t){return'<div class="ft'+(F===t[0]?' on':'')+'" onclick="F=\''+t[0]+'\';rr()">'+t[1]+'</div>'}).join('');
if(!fl.length){document.getElementById('emp').style.display='block';return}document.getElementById('emp').style.display='none';
fl.sort(function(a,b){if(a.st==='new'&&b.st!=='new')return-1;if(a.st!=='new'&&b.st==='new')return 1;return new Date(a.dt)-new Date(b.dt)});
fl.forEach(function(x){var d=dd(x.dt),tr=document.createElement('tr');var btns='';if(x.st==='new')btns='<button class="ab ab-d" onclick="ch('+x.id+',\'responded\')">対応済</button><button class="ab ab-c" onclick="ch('+x.id+',\'done\')">成約</button><button class="ab ab-x" onclick="del('+x.id+')">削除</button>';else if(x.st==='responded')btns='<button class="ab ab-c" onclick="ch('+x.id+',\'done\')">成約</button><button class="ab ab-x" onclick="ch('+x.id+',\'lost\')">失注</button><button class="ab ab-x" onclick="del('+x.id+')">削除</button>';else btns='<button class="ab ab-x" onclick="del('+x.id+')">削除</button>';tr.innerHTML='<td>'+badge(d,x.st)+'</td><td><b>'+x.nm+'</b></td><td>'+d+'日</td><td>'+x.dt+'</td><td>'+x.src+'</td><td>'+(x.prop||'-')+'</td><td>'+(x.bgt?x.bgt+'万':'-')+'</td><td><div class="act">'+btns+'</div></td>';tb.appendChild(tr)})}
function csv(){if(!D.length){alert('データがありません');return}var h='氏名,反響日,反響元,物件,予算(万円),ステータス,備考,経過日数\n';var c=D.map(function(x){return[x.nm,x.dt,x.src,'"'+(x.prop||'')+'"',x.bgt||'',x.st,'"'+(x.memo||'')+'"',dd(x.dt)].join(',')}).join('\n');var b=new Blob(['\ufeff'+h+c],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='leads_'+new Date().toISOString().slice(0,10)+'.csv';a.click()}
document.getElementById('dt').value=new Date().toISOString().slice(0,10);rr()
</script>
