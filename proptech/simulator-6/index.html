<h1>売る × 貸す × 持つ<br>3択キャッシュフロー比較シミュレーター</h1>
<div class="c"><b>物件情報</b><div class="g">
<div><label>想定売却額（万円）</label><input id="sp" type="number" value="3000"></div>
<div><label>想定月額賃料（万円）</label><input id="mr" type="number" value="12" step="0.1"></div>
<div><label>築年数（年）</label><input id="age" type="number" value="15"></div>
<div><label>取得価格（万円）※不明なら0</label><input id="ap" type="number" value="3500"></div>
</div></div>
<div class="c"><b>ローン・経費条件</b><div class="g">
<div><label>ローン残債（万円）</label><input id="lb" type="number" value="1500"></div>

<div><label>現行金利（%）</label><input id="ir" type="number" value="1.5" step="0.1"></div>
<div><label>空室率（%）</label><input id="vr" type="number" value="10"></div>
<div><label>管理費+修繕積立金（万円/月）</label><input id="me" type="number" value="2.5" step="0.1"></div>
<div><label>固定資産税（万円/年）</label><input id="pt" type="number" value="12"></div>
</div></div>
<div class="sc"><b>金利シナリオ</b><br>
<span class="rb on" onclick="sr(0)">現行金利</span>
<span class="rb" onclick="sr(1)">＋1%</span>
<span class="rb" onclick="sr(2)">＋2%</span></div>

<script>
var ra=0;
function sr(v){ra=v;document.querySelectorAll('.rb').forEach(function(b,i){b.className=i===v?'rb on':'rb'});calc()}
function gv(id){return parseFloat(document.getElementById(id).value)||0}
function mpay(b,r,y){if(b<=0||y<=0)return 0;if(r===0)return b/(y*12);var m=r/1200,n=y*12;return b*m*Math.pow(1+m,n)/(Math.pow(1+m,n)-1)}
function remB(b,r,y,mo){if(b<=0)return 0;var p=mpay(b,r,y),m=r/1200,v=b;for(var i=0;i<mo;i++){if(v<=0)return 0;v-=(p-v*m);if(v<0)v=0}return v}
function f(v){return(v>=0?'+':'')+v.toFixed(0)}
function calc(){
var sp=gv('sp'),mr=gv('mr'),age=gv('age'),ap=gv('ap')||sp*0.05,
lb=gv('lb'),ly=gv('ly'),ir=gv('ir')+ra,vr=gv('vr'),me=gv('me'),pt=gv('pt');
var bk=sp*0.033+6,tc=bk+sp*0.005;
var gn=sp-ap-tc,cg=gn>0?gn*(age>5?.20315:.3963):0;
var n1=sp-lb-tc-cg;
var mo=mpay(lb,ir,ly),tm=ly*12,cf=[],cum=0;
for(var y=1;y<=5;y++){
var gr=mr*12*(1-vr/100),ex=me*12+pt;
var mm=Math.max(0,Math.min(12,tm-(y-1)*12)),yl=mo*mm;
var tx=gr-ex,it=tx>0?tx*.3:0;
var nt=gr-ex-yl-it;cum+=nt;
cf.push({y:y,gr:gr,ex:ex,yl:yl,it:it,nt:nt,cm:cum})}
var sp5=sp*Math.pow(.985,5),rb5=remB(lb,ir,ly,60);
var tc5=(sp5*.033+6)+sp5*.005;
var gn5=sp5-ap-tc5,cg5=gn5>0?gn5*((age+5)>5?.20315:.3963):0;
var sn5=sp5-rb5-tc5-cg5,t2=cum+sn5,t3=cum;
var mx=Math.max(Math.abs(n1),Math.abs(t2),Math.abs(t3),1);
function br(v,c,l){var w=Math.max(Math.abs(v)/mx*100,8);
return'<div class="bw"><span class="bl">'+l+'</span><div class="b '+c+'" style="width:'+w+'%">'+f(v)+'万円</div></div>'}
var os=[{n:'① 即売却',v:n1},{n:'② 賃貸→売却',v:t2},{n:'③ 保有継続',v:t3}];
os.sort(function(a,b){return b.v-a.v});
var h='<div class="c"><b>5年間トータル手取り比較</b>';
h+=br(n1,'b1','① 即売却');h+=br(t2,'b2','② 賃貸→売却');h+=br(t3,'b3','③ 保有継続');
h+='<div class="best">▶ 最有利プラン：<b>'+os[0].n+'</b>（'+f(os[0].v)+'万円）</div></div>';
h+='<div class="c"><b>① 今すぐ売却</b><div class="g"><div class="sm">売却額 '+sp.toFixed(0)+'万</div><div class="sm">諸費用 '+tc.toFixed(0)+'万</div><div class="sm">譲渡税 '+cg.toFixed(0)+'万</div><div class="sm">残債返済 '+lb.toFixed(0)+'万</div></div><div class="val v1">手取り：'+f(n1)+'万円</div></div>';
var gi=cf.reduce(function(s,r){return s+r.gr},0),ge=cf.reduce(function(s,r){return s+r.ex+r.yl+r.it},0);
h+='<div class="c"><b>② 賃貸5年 → 売却</b><div class="g"><div class="sm">賃料収入計 '+gi.toFixed(0)+'万</div><div class="sm">経費+返済計 '+ge.toFixed(0)+'万</div><div class="sm">5年後売却額 '+sp5.toFixed(0)+'万</div><div class="sm">5年後残債 '+rb5.toFixed(0)+'万</div></div><div class="val v2">トータル：'+f(t2)+'万円</div></div>';
h+='<div class="c"><b>③ 保有継続（売却なし）</b><div class="val v3">5年累計CF：'+f(t3)+'万円</div><div class="sm">含み資産 約'+sp5.toFixed(0)+'万（残債差引 純資産'+(sp5-rb5).toFixed(0)+'万）</div></div>';
h+='<div class="c"><b>年次キャッシュフロー詳細（賃貸ベース・単位:万円）</b><table><tr><th>年</th><th>賃料収入</th><th>経費</th><th>返済額</th><th>所得税</th><th>年間CF</th><th>累計CF</th></tr>';
for(var i=0;i<cf.length;i++){var r=cf[i];h+='<tr><td>'+r.y+'年目</td><td>'+r.gr.toFixed(1)+'</td><td>'+r.ex.toFixed(1)+'</td><td>'+r.yl.toFixed(1)+'</td><td>'+r.it.toFixed(1)+'</td><td style="color:'+(r.nt>=0?'#1e88e5':'#e53935')+'">'+r.nt.toFixed(1)+'</td><td>'+r.cm.toFixed(1)+'</td></tr>'}
h+='</table><div class="note">※適用金利 '+ir.toFixed(1)+'%（現行'+gv('ir').toFixed(1)+'% ＋ '+ra+'%）で試算。譲渡所得税: 長期20.3%/短期39.6%、不動産所得税: 概算30%。売却額は年1.5%下落を想定。取得価格0円の場合は売却額の5%を概算取得費として計算。本ツールは簡易試算であり、実際の税額・諸費用は税理士・不動産会社にご確認ください。</div></div>';
document.getElementById('R').innerHTML=h}
