<script>
let mode=0,scene=0,D={};
function $(id){return document.getElementById(id)}
function sw(el,m){mode=m;$('modeTabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');render()}
function sc(el,s){scene=s;$('sceneTabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');render()}
function cp(){let t=$('out').innerText.replace('コピー','').trim();navigator.clipboard.writeText(t).then(()=>{let b=$('out').querySelector('.copy');b.textContent='✓';setTimeout(()=>b.textContent='コピー',1200)})}
function render(){$('out').firstChild.nextSibling;let tx=D[mode][scene];$('out').innerHTML='<button class="copy" onclick="cp()">コピー</button>'+tx}

function gen(){
let p=$('portal').value,pr=$('prop').value,st=$('status').value,bd=$('budget').value;
let nm=$('name').value||'○○ 様',ar=$('area').value||pr;
let co='株式会社△△不動産　担当：□□';

// メール版
let e0=`件名：【${p}】${ar}のお問い合わせありがとうございます

${nm}

はじめまして。${p}にて${ar}をご覧いただき、誠にありがとうございます。
${co}と申します。

ご希望の${pr}（ご予算${bd}）について、いくつかご案内させてください。

■ 現在の状況
・当該物件は現在ご案内可能です
・同条件の類似物件も${bd}帯で3件ほどございます

■ 次のステップ
ご都合のよいタイミングで、以下いずれかの方法でご連絡いただけますと幸いです。
① このメールへのご返信
② お電話（000-0000-0000／平日9-19時）
③ LINE（QRコードを添付しております）

ご質問だけでも大歓迎です。${nm}のお住まい探しを全力でサポートいたします。

${co}
TEL: 000-0000-0000`;

let e1=`件名：${ar}の内見日程のご案内

${nm}

お問い合わせいただきありがとうございます。${co}です。

${ar}の内見について、以下の日程でご案内が可能です。

■ ご案内可能日
・○月○日（土）10:00〜 / 14:00〜
・○月○日（日）10:00〜 / 13:00〜
・平日ご希望の場合もお気軽にどうぞ

■ 当日の流れ（約60分）
1. 現地集合 → 物件をじっくりご見学
2. 周辺環境（スーパー・学校・駅）のご案内
3. ご質問やご不明点の解消

■ お持ちいただくもの
・特にございません（手ぶらでOKです）

ご都合のよい日時をお知らせください。
${nm}にお会いできることを楽しみにしております。

${co}`;

let e2=`件名：ご希望条件の確認とご提案

${nm}

いつもお世話になっております。${co}です。

改めてご希望条件を整理させてください。

■ 現在の条件
・種別：${pr}
・ご予算：${bd}
・エリア：${ar}

■ 確認させていただきたい点
①間取り・広さのご希望はございますか？
②ご入居の希望時期はいつ頃でしょうか？
③その他のこだわり（駐車場・ペット・学区等）

上記をお聞かせいただければ、${nm}にピッタリの物件を厳選してご提案いたします。
箇条書きやひと言でも結構ですので、お気軽にご返信ください。

${co}`;

// LINE版
let l0=`${nm}
${p}からのお問い合わせありがとうございます！${co}です😊

${ar}（${bd}）のお問い合わせですね✨

こちらの物件、現在ご案内可能です！
同じエリアの類似物件情報もお送りできますので、お気軽にご質問ください💬

▼ ご希望の連絡方法を教えてください
① このままLINEでやり取り
② お電話（000-0000-0000）
③ メール

お待ちしております！`;

let l1=`${nm}
内見のご希望ありがとうございます！🏠

${ar}のご案内可能日です👇

📅 ○月○日（土）10:00〜 / 14:00〜
📅 ○月○日（日）10:00〜 / 13:00〜
※平日もOKです！

⏱ 所要時間：約60分
📍 現地集合（詳しい場所はお申込後にお送りします）
👜 手ぶらでOK！

ご都合のよい日時を教えてください😊`;

let l2=`${nm}
ご条件の確認をさせてください📋

現在のご希望👇
・${pr}
・${bd}
・${ar}

もう少し教えていただけると、ピッタリの物件をご提案できます💡

①間取り・広さの希望は？
②いつ頃のご入居希望？
③こだわり（駐車場・ペット・学区等）

ひと言でOKです！お気軽にどうぞ😊`;

D={0:[e0,e1,e2],1:[l0,l1,l2]};

mode=0;scene=0;
$('modeTabs').querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===0));

render();
renderPrompts(pr,bd,ar,nm);
$('result').scrollIntoView({behavior:'smooth'});
}

function renderPrompts(pr,bd,ar,nm){
let ps=[
{t:'初回返信の最適化',d:`あなたは不動産仲介のトップ営業です。以下の反響情報をもとに、初回返信メールを作成してください。\n\n【反響情報】\n・物件種別：${pr}\n・予算：${bd}\n・エリア：${ar}\n・顧客名：${nm}\n\n【条件】\n・丁寧だが堅すぎない文体\n・次のアクション（内見・電話）を促す\n・300文字以内`},
{t:'内見後フォローメール',d:`不動産営業として、内見後のフォローメールを作成してください。\n\n・物件：${ar}（${pr}）\n・予算：${bd}\n・顧客名：${nm}\n\n【ポイント】\n・内見の感想を聞く質問を入れる\n・他の候補物件を1〜2件提案する\n・決断を急かさず、寄り添うトーン`},
{t:'条件変更の提案',d:`不動産営業として、お客様に条件変更を提案するメールを作成してください。\n\n・当初条件：${pr}／${bd}／${ar}\n・顧客名：${nm}\n\n【提案方向】\n・エリアを広げる or 築年数を広げる or 間取りを変える\n・具体的なメリットを数字で示す\n・押し付けず「こういう選択肢もあります」というトーン`},
{t:'長期検討客への追客',d:`不動産営業として、2週間以上返信がないお客様への追客メールを作成してください。\n\n・物件種別：${pr}　予算：${bd}\n・顧客名：${nm}\n\n【条件】\n・しつこくない、自然なきっかけを作る\n・市場動向や新着物件など有益な情報を入れる\n・「お気持ちが変わっていたら教えてください」と逃げ道も用意`},
{t:'休眠顧客の掘り起こし',d:`不動産営業として、1ヶ月以上連絡が途絶えたお客様への掘り起こしメールを作成してください。\n\n・物件種別：${pr}　予算：${bd}\n・顧客名：${nm}\n\n【条件】\n・「その後いかがですか？」だけにしない\n・市場変化（価格動向・金利変動・新着物件）を理由にする\n・短くカジュアルに、返信ハードルを下げる\n・3行以内の選択肢（はい/まだ検討中/もう決めました）を提示`}
];
let h='';
ps.forEach((p,i)=>{h+=`<div class="pi"><h3>${'❶❷❸❹❺'[i]} ${p.t}</h3><pre>${p.d}</pre><button class="copy" style="position:absolute;top:8px;right:8px;background:#2563eb;color:#fff;border:none;padding:4px 10px;border-radius:5px;font-size:.75em;cursor:pointer" onclick="let t=this.parentElement.querySelector('pre').textContent;navigator.clipboard.writeText(t);this.textContent='✓';setTimeout(()=>this.textContent='コピー',1200)">コピー</button></div>`});
$('prompts').innerHTML=h;
}
</script>
