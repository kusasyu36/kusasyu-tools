td:first-child,th:first-child{text-align:left}
.best{background:#e8f5e9;font-weight:bold}
@media(max-width:480px){.field{min-width:100%}.bar{width:48px}}

<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/proptech/" style="color:#4299e1;text-decoration:none;">kusasyu PropTech</a> &gt; <span style="color:#718096;">賃貸トータルコスト比較シミュレーター</span></div>
<h1 id="ttl">賃貸トータルコスト比較シミュレーター</h1>
<p class="sub" id="sttl">最大3物件の総コストを比較</p>
<button class="lang-btn" onclick="tgLang()" id="lBtn">English</button>
<div class="tabs" id="tabs"></div>
<div id="pnls"></div>
<div class="calc-area">
<label id="pLbl">居住期間：</label>
<select id="per"></select>
<br><button id="calcBtn" onclick="calc()">比較計算する</button>
</div>

<h2 style="font-size:1rem;text-align:center" id="rTtl">比較結果</h2>

</div>
<script>
var ln='ja';
var T={ja:{t:'賃貸トータルコスト比較シミュレーター',st:'最大3物件の総コストを比較',lb:'English',pl:'居住期間：',cb:'比較計算する',rt:'比較結果',p:'物件',rent:'家賃（月額）',mgmt:'管理費（月額）',key:'礼金',dep:'敷金',guar:'保証会社費用',fire:'火災保険（2年分）',kex:'鍵交換費',renew:'更新料（2年毎）',rest:'退去時原状回復見積',ini:'初期費用',mo:'月額費用合計',prd:'更新関連費用',ex:'退去費用',tot:'総コスト',avg:'月額平均',y:'年'},en:{t:'Rental Total Cost Simulator',st:'Compare up to 3 properties',lb:'日本語',pl:'Duration: ',cb:'Compare',rt:'Comparison',p:'Prop.',rent:'Rent (monthly)',mgmt:'Mgmt Fee (monthly)',key:'Key Money',dep:'Deposit',guar:'Guarantor Fee',fire:'Fire Insurance (2yr)',kex:'Key Exchange',renew:'Renewal Fee (per 2yr)',rest:'Restoration Cost',ini:'Initial Costs',mo:'Monthly Total',prd:'Renewal Costs',ex:'Move-out Cost',tot:'Total Cost',avg:'Monthly Avg',y:'yr'}};
function g(k){return T[ln][k]}
var flds=[{s:'ini',f:[['rent','mgmt'],['key','dep'],['guar','fire'],['kex']]},{s:'prd',f:[['renew']]},{s:'ex',f:[['rest']]}];
function build(){
var tb='',pn='';
for(var i=0;i<3;i++){
tb+='<button class="tab'+(i===0?' active':'')+'" onclick="stab('+i+')">'+g('p')+(i+1)+'</button>';
pn+='<div class="panel'+(i===0?' active':'')+'">';
flds.forEach(function(sec){
pn+='<div class="section-title">'+g(sec.s)+'</div>';
sec.f.forEach(function(row){
pn+='<div class="row">';
row.forEach(function(f){pn+='<div class="field"><label>'+g(f)+'</label><input type="number" id="'+f+i+'" value="0" min="0"></div>';});
pn+='</div>';});});
pn+='</div>';}
document.getElementById('tabs').innerHTML=tb;
document.getElementById('pnls').innerHTML=pn;
var sl='';for(var y=1;y<=5;y++)sl+='<option value="'+y+'"'+(y===2?' selected':'')+'>'+y+g('y')+'</option>';
document.getElementById('per').innerHTML=sl;
document.getElementById('ttl').textContent=g('t');
document.getElementById('sttl').textContent=g('st');
document.getElementById('lBtn').textContent=g('lb');
document.getElementById('pLbl').textContent=g('pl');
document.getElementById('calcBtn').textContent=g('cb');
document.getElementById('rTtl').textContent=g('rt');
}
function tgLang(){ln=ln==='ja'?'en':'ja';build();if(document.getElementById('res').style.display!=='none')calc();}
function stab(n){document.querySelectorAll('.tab').forEach(function(b,i){b.classList.toggle('active',i===n)});document.querySelectorAll('.panel').forEach(function(p,i){p.classList.toggle('active',i===n)});}
function v(id){return parseInt(document.getElementById(id).value)||0;}
function fmt(n){return '¥'+n.toLocaleString()}
function calc(){
var yrs=parseInt(document.getElementById('per').value),mos=yrs*12,rs=[];
for(var i=0;i<3;i++){
var rent=v('rent'+i),mgmt=v('mgmt'+i);
if(rent===0&&mgmt===0){rs.push(null);continue;}
var ini=v('key'+i)+v('dep'+i)+v('guar'+i)+v('fire'+i)+v('kex'+i);
var mon=(rent+mgmt)*mos;
var rnw=yrs>=2?Math.floor(yrs/2)*v('renew'+i):0;
var fir=yrs>2?(Math.ceil(yrs/2)-1)*v('fire'+i):0;
var tot=ini+mon+rnw+fir+v('rest'+i);
rs.push({tot:tot,avg:Math.round(tot/mos),ini:ini,mon:mon,rnw:rnw+fir,rest:v('rest'+i),i:i});}
var valid=rs.filter(function(r){return r});
if(!valid.length)return;
var mx=Math.max.apply(null,valid.map(function(r){return r.tot}));
var mn=Math.min.apply(null,valid.map(function(r){return r.tot}));
var cls=['c1','c2','c3'],ch='';
valid.forEach(function(r){
var h=Math.max(30,Math.round((r.tot/mx)*170));
var lb=r.tot>=10000?'¥'+(r.tot/10000).toFixed(1)+'万':fmt(r.tot);
var star=r.tot===mn&&valid.length>1?' ★':'';
ch+='<div class="bar-wrap"><div style="flex:1;display:flex;align-items:flex-end"><div class="bar '+cls[r.i]+'" style="height:'+h+'px">'+lb+star+'</div></div><div class="bar-label">'+g('p')+(r.i+1)+'</div></div>';});
document.getElementById('chart').innerHTML=ch;
var hd='<tr><th></th>';valid.forEach(function(r){hd+='<th>'+g('p')+(r.i+1)+'</th>'});hd+='</tr>';
var rows=[[g('ini'),'ini'],[g('mo'),'mon'],[g('prd'),'rnw'],[g('ex'),'rest'],[g('tot'),'tot'],[g('avg'),'avg']];
var body='';
rows.forEach(function(rw){body+='<tr><td>'+rw[0]+'</td>';valid.forEach(function(r){var val=r[rw[1]];var b=rw[1]==='tot'&&val===mn&&valid.length>1?' class="best"':'';body+='<td'+b+'>'+fmt(val)+'</td>';});body+='</tr>';});
document.getElementById('tbl').innerHTML=hd+body;
document.getElementById('res').style.display='block';
document.getElementById('res').scrollIntoView({behavior:'smooth'});}
build();
</script>
