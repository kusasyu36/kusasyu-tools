.c1{background:#e53e3e}.c2{background:#ed8936}.c3{background:#38a169}
.kpi{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.kpi-box{flex:1;min-width:120px;background:#f7fafc;border-radius:10px;padding:14px 10px;text-align:center;border:1px solid #e2e8f0}
.kpi-box .num{font-size:1.5em;font-weight:800;color:#2b6cb0}
.kpi-box .lbl{font-size:.72em;color:#718096;margin-top:2px}
.kpi-box.best{border-color:#38a169;background:#f0fff4}
.kpi-box.best .num{color:#276749}
.note{font-size:.75em;color:#a0aec0;margin-top:12px;padding:10px;background:#f7fafc;border-radius:8px}
.verdict{margin-top:14px;padding:14px;border-radius:10px;background:linear-gradient(135deg,#f0fff4,#ebf8ff);border-left:4px solid #38a169;font-size:.88em}
.verdict strong{color:#276749}
@media(max-width:600px){.row{flex-direction:column;gap:8px}.kpi-box .num{font-size:1.2em}.tbl{font-size:.75em}}

<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/proptech/" style="color:#4299e1;text-decoration:none;">kusasyu PropTech</a> &gt; <span style="color:#718096;">空室ステージング投資対効果シミュレーター</span></div>
<div class="wrap">
<h1>空室ステージング<br>投資対効果シミュレーター</h1>
<p class="sub">3パターン比較で経営層への導入提案をサポート</p>

<div class="card">
<h2>物件情報を入力</h2>
<div class="row">
<div class="field"><label>管理空室数 <span class="unit">（現在の空室戸数）</span></label><input type="number" id="units" value="10" min="1" max="9999"></div>
<div class="field"><label>平均月額賃料 <span class="unit">（円）</span></label><input type="number" id="rent" value="70000" min="10000" step="1000"></div>
</div>
<div class="row">
<div class="field"><label>現在の平均空室期間 <span class="unit">（ヶ月）</span></label><input type="number" id="vacancy" value="4" min="0.5" max="36" step="0.5"></div>
<div class="field"><label>年間の退去発生回数 <span class="unit">（全体）</span></label><input type="number" id="turnover" value="15" min="1" max="999"></div>
</div>
<div class="row">
<div class="field"><label>人力ステージング単価 <span class="unit">（円/戸）</span></label><input type="number" id="manualCost" value="80000" min="0" step="1000"></div>
<div class="field"><label>AIステージング単価 <span class="unit">（円/戸）</span></label><input type="number" id="aiCost" value="3000" min="0" step="100"></div>
</div>
<button class="btn" onclick="calc()">シミュレーション実行</button>
</div>

<div id="result">
<div class="card">
<h2>年間損失・改善比較</h2>
<div class="kpi" id="kpi"></div>
<div class="bar-wrap" id="bars"></div>
</div>
<div class="card">
<h2>3パターン詳細比較表</h2>
<div style="overflow-x:auto"><table class="tbl" id="tbl"></table></div>
</div>
<div class="card">
<h2>損益分岐点・ROI</h2>
<div class="kpi" id="kpi2"></div>
<div class="verdict" id="verdict"></div>
</div>
<div class="note" id="note"></div>
</div>
</div>

<script>
function fmt(n){if(Math.abs(n)>=1e8)return (n/1e8).toFixed(1)+"億";if(Math.abs(n)>=1e4)return (n/1e4).toFixed(1)+"万";return n.toLocaleString()}
function fmtY(n){return fmt(n)+"円"}
function pct(n){return n.toFixed(1)+"%"}

function calc(){
var u=Math.max(1,+document.getElementById("units").value||10);
var r=Math.max(1e4,+document.getElementById("rent").value||7e4);
var v=Math.max(.5,+document.getElementById("vacancy").value||4);
var t=Math.max(1,+document.getElementById("turnover").value||15);
var mc=Math.max(0,+document.getElementById("manualCost").value||8e4);
var ac=Math.max(0,+document.getElementById("aiCost").value||3e3);

var mReduce=.30;
var aReduce=.25;

var vManual=v*(1-mReduce);
var vAI=v*(1-aReduce);

var lossNone=t*v*r;
var lossManual=t*vManual*r;
var lossAI=t*vAI*r;

var costNone=0;
var costManual=t*mc;
var costAI=t*ac;

var totalNone=lossNone;
var totalManual=lossManual+costManual;
var totalAI=lossAI+costAI;

var saveManual=totalNone-totalManual;
var saveAI=totalNone-totalAI;

var roiManual=costManual>0?((lossNone-lossManual-costManual)/costManual*100):0;
var roiAI=costAI>0?((lossNone-lossAI-costAI)/costAI*100):0;

var monthlyGainManual=(lossNone-lossManual)/12;
var monthlyGainAI=(lossNone-lossAI)/12;
var paybackManual=monthlyGainManual>0?Math.ceil(costManual/monthlyGainManual):"-";
var paybackAI=monthlyGainAI>0?Math.max(1,Math.ceil(costAI/monthlyGainAI)):"-";

var kpiH="<div class='kpi-box'><div class='num' style='color:#e53e3e'>"+fmtY(lossNone)+"</div><div class='lbl'>現状の年間空室損失</div></div>";
kpiH+="<div class='kpi-box'><div class='num' style='color:#ed8936'>"+fmtY(saveManual)+"</div><div class='lbl'>人力ステージング改善額</div></div>";
kpiH+="<div class='kpi-box best'><div class='num'>"+fmtY(saveAI)+"</div><div class='lbl'>AIステージング改善額</div></div>";
document.getElementById("kpi").innerHTML=kpiH;

var mx=Math.max(totalNone,totalManual,totalAI,1);
var bH="";
var items=[["ステージングなし",totalNone,"c1"],["人力ステージング",totalManual,"c2"],["AIステージング",totalAI,"c3"]];
for(var i=0;i<items.length;i++){
var w=Math.max(5,items[i][1]/mx*100);
bH+="<div class='bar-label'><span>"+items[i][0]+"</span><span>年間総コスト "+fmtY(items[i][1])+"</span></div>";
bH+="<div class='bar-bg'><div class='bar-fill "+items[i][2]+"' style='width:"+w+"%'>"+pct(items[i][1]/mx*100)+"</div></div>";
}
document.getElementById("bars").innerHTML=bH;

var tH="<tr><th>項目</th><th>なし</th><th>人力</th><th>AI</th></tr>";
var rows=[
["平均空室期間",v+"ヶ月",vManual.toFixed(1)+"ヶ月",vAI.toFixed(1)+"ヶ月"],
["空室短縮率","-",pct(mReduce*100),pct(aReduce*100)],
["年間空室損失",fmtY(lossNone),fmtY(lossManual),fmtY(lossAI)],
["年間ステージング費",fmtY(costNone),fmtY(costManual),fmtY(costAI)],
["年間総コスト",fmtY(totalNone),fmtY(totalManual),fmtY(totalAI)],
["年間改善額（なし比）","-",fmtY(saveManual),fmtY(saveAI)],
["ROI","-",pct(roiManual),pct(roiAI)],
["投資回収期間","-",paybackManual+"ヶ月",paybackAI+"ヶ月"]
];
for(var i=0;i<rows.length;i++){
var cls=i>=5?" class='hi'":"";
tH+="<tr"+cls+"><td>"+rows[i][0]+"</td><td>"+rows[i][1]+"</td><td>"+rows[i][2]+"</td><td>"+rows[i][3]+"</td></tr>";
}
document.getElementById("tbl").innerHTML=tH;

var k2="<div class='kpi-box'><div class='num' style='color:#ed8936'>"+pct(roiManual)+"</div><div class='lbl'>人力ROI</div></div>";
k2+="<div class='kpi-box best'><div class='num'>"+pct(roiAI)+"</div><div class='lbl'>AI ROI</div></div>";
k2+="<div class='kpi-box'><div class='num' style='color:#2b6cb0'>"+(typeof paybackAI==="number"?paybackAI+"ヶ月":paybackAI)+"</div><div class='lbl'>AI投資回収期間</div></div>";
document.getElementById("kpi2").innerHTML=k2;

var best=saveAI>=saveManual?"AI":"人力";
var diff=Math.abs(saveAI-saveManual);
document.getElementById("verdict").innerHTML="<strong>推奨："+best+"ステージング</strong>（年間 "+fmtY(diff)+" の差）<br>AIステージングはROI <strong>"+pct(roiAI)+"</strong> で、1戸あたり"+fmtY(ac)+"の投資に対し"+fmtY(Math.round(v*aReduce*r))+"の空室損失を削減できます。経営判断の目安として、<strong>ROI 200%以上</strong>であれば即時導入を推奨します。";

document.getElementById("note").innerHTML="※ 空室短縮率は業界平均値（人力30%・AI25%）を採用。実際の効果は物件特性・エリア・ポータルサイトにより変動します。人力ステージングにはプロカメラマン撮影・家具レンタル・搬入搬出費を含みます。AIステージングはバーチャルステージング写真生成費のみ。初期導入費・月額固定費は含みません。";

document.getElementById("result").style.display="block";
document.getElementById("result").scrollIntoView({behavior:"smooth"});
}
</script>
