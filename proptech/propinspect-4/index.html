<div class="wrap">

<p class="sub">建物劣化診断＆30年修繕計画シミュレーター<br>国交省 長期修繕計画ガイドライン準拠</p>

<div id="inputSection">
<div class="card">
<h2>建物基本情報</h2>
<div class="grid">
<div><label>築年数（年）</label><input type="number" id="age" value="25" min="1" max="80"></div>
<div><label>構造種別</label><select id="struct"><option value="RC">RC造（鉄筋コンクリート）</option><option value="SRC">SRC造（鉄骨鉄筋コンクリート）</option><option value="S">S造（鉄骨）</option><option value="W">木造</option></select></div>
<div><label>延床面積（㎡）</label><input type="number" id="area" value="3000" min="50"></div>
<div><label>階数</label><input type="number" id="floors" value="8" min="1" max="60"></div>
<div><label>総戸数</label><input type="number" id="units" value="40" min="1"></div>
<div><label>竣工年（西暦）</label><input type="number" id="builtYear" value="2001" min="1950" max="2026"></div>
</div>
</div>
<div class="card">
<h2>主要設備の有無</h2>
<div class="chk-grid">
<label><input type="checkbox" id="eqEV" checked>エレベーター</label>
<label><input type="checkbox" id="eqAuto" checked>自動火災報知設備</label>
<label><input type="checkbox" id="eqPump" checked>給水ポンプ</label>
<label><input type="checkbox" id="eqGas" checked>都市ガス配管</label>
<label><input type="checkbox" id="eqMBX" checked>宅配ボックス</label>
<label><input type="checkbox" id="eqMech">機械式駐車場</label>
</div>
</div>
<div class="card">

<div class="grid">
<div><label>月額積立金（円/戸）</label><input type="number" id="monthFund" value="12000" min="0"></div>
<div><label>現在の積立金残高（万円）</label><input type="number" id="fundBal" value="3000" min="0"></div>
</div>
</div>

</div>

<div class="tpanel" id="tp2"></div>

<script>
const CAT=[
{id:'wall',name:'外壁塗装',cycle:12,unit:5000,base:15},
{id:'roof',name:'屋上防水',cycle:12,unit:6500,base:12},
{id:'water',name:'給水管',cycle:20,unit:3500,base:20},
{id:'drain',name:'排水管',cycle:25,unit:3000,base:25},
{id:'gas',name:'ガス管',cycle:25,unit:2000,base:25,eq:'eqGas'},
{id:'elev',name:'エレベーター',cycle:15,unit:4000000,base:15,eq:'eqEV',fixed:true},
{id:'elec',name:'電気設備',cycle:15,unit:1500,base:15},
{id:'fire',name:'消防設備',cycle:10,unit:800,base:10,eq:'eqAuto'},
{id:'interior',name:'共用部内装',cycle:12,unit:2500,base:12},
{id:'balcony',name:'バルコニー防水',cycle:12,unit:3500,base:12}
];

function calcGrade(age,cycle,base){
const r=age%cycle;const p=r/cycle;
if(age<base*0.5)return{g:'A',s:1,l:'良好'};
if(p<0.5)return{g:'A',s:1,l:'良好'};
if(p<0.75)return{g:'B',s:2,l:'経過観察'};
if(p<0.95)return{g:'C',s:3,l:'修繕検討'};
return{g:'D',s:4,l:'要緊急対応'};
}

function fmt(n){return n.toLocaleString('ja-JP')}
function showTab(i){
document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('on',j===i));
document.querySelectorAll('.tpanel').forEach((t,j)=>t.classList.toggle('on',j===i));
}

function run(){
const age=+document.getElementById('age').value;
const st=document.getElementById('struct').value;
const area=+document.getElementById('area').value;
const floors=+document.getElementById('floors').value;
const units=+document.getElementById('units').value;
const mf=+document.getElementById('monthFund').value;
const bal=+document.getElementById('fundBal').value*10000;
const stMul={RC:1,SRC:1.1,S:0.9,W:0.7}[st];

let results=[];
CAT.forEach(c=>{
if(c.eq&&!document.getElementById(c.eq).checked){results.push(null);return;}
const gr=calcGrade(age,c.cycle,c.base);
const cost=c.fixed?(c.unit*stMul*floors/8):(c.unit*area*stMul);
results.push({...c,...gr,cost:Math.round(cost)});
});
results=results.filter(Boolean);
results.sort((a,b)=>b.s-a.s||(b.cost-a.cost));

// === Tab1: 劣化リスクスコアリング ===
let h='<h3 style="margin-bottom:8px">劣化リスクスコアリング結果</h3>';
h+='<table><tr><th>優先順位</th><th>カテゴリ</th><th>評価</th><th>状態</th><th>概算修繕費</th><th>周期</th></tr>';
const top3=results.filter(r=>r.s>=3).slice(0,3);
results.forEach((r,i)=>{
const isUrg=top3.includes(r);
h+=`<tr class="${isUrg?'urgent':''}"><td>${i+1}</td><td>${r.name}</td><td class="g${r.g}">${r.g}</td><td>${r.l}</td><td>¥${fmt(r.cost)}</td><td>${r.cycle}年</td></tr>`;
});
h+='</table>';
if(top3.length){
h+='<div style="margin-top:10px;padding:10px;background:#fff5f5;border-radius:6px;border:1px solid #feb2b2"><strong style="color:#e53e3e">⚠ 緊急度上位項目</strong><ul style="margin:6px 0 0 18px">';
top3.forEach(r=>h+=`<li><strong>${r.name}</strong>（${r.g}判定）— 概算 ¥${fmt(r.cost)}</li>`);
h+='</ul></div>';
}
const totalCost=results.reduce((s,r)=>s+r.cost,0);
h+=`<p style="margin-top:10px;font-weight:700">修繕費合計概算: ¥${fmt(totalCost)}</p>`;
h+=`<p style="color:#718096;font-size:.8em">※国交省長期修繕計画ガイドライン単価ベース。構造種別係数: ${stMul}</p>`;
document.getElementById('tp0').innerHTML=h;

// === Tab2: 30年修繕計画 ===
const scenarios=[{label:'現行',add:0},{label:'+500円/戸',add:500},{label:'+1,000円/戸',add:1000},{label:'+2,000円/戸',add:2000}];
let h2='<h3>30年修繕計画 ＆ 積立金キャッシュフロー</h3>';
h2+='<div class="legend"><span><span class="leg-box surplus"></span>余剰</span><span><span class="leg-box deficit"></span>不足</span></div>';

scenarios.forEach(sc=>{
h2+=`<div class="scenario-h">${sc.label}（月額 ¥${fmt(mf+sc.add)}/戸）</div>`;
const income=(mf+sc.add)*units*12;
let balance=bal;
let yearly=[];
for(let y=1;y<=30;y++){
let expense=0;
results.forEach(r=>{
const futureAge=age+y;
if(futureAge>0&&futureAge%r.cycle===0)expense+=r.cost;
});
if(y%12===0)expense+=Math.round(totalCost*0.15);
balance+=income-expense;
yearly.push({y,expense,balance,income});
}
const maxBal=Math.max(...yearly.map(d=>Math.abs(d.balance)),1);
h2+='<table><tr><th>年</th><th>収入</th><th>修繕費</th><th>残高</th><th>状況</th></tr>';
yearly.forEach(d=>{
const cls=d.balance<0?'cf-red':'cf-green';
const w=Math.min(Math.abs(d.balance)/maxBal*100,100);
const bc=d.balance<0?'deficit':'surplus';
h2+=`<tr><td class="cf-cell">${d.y}</td><td class="cf-cell">¥${fmt(d.income)}</td><td class="cf-cell">${d.expense?'¥'+fmt(d.expense):'-'}</td><td class="cf-cell ${cls}">¥${fmt(d.balance)}</td><td class="cf-cell"><div class="bar-wrap"><div class="bar-fill ${bc}" style="width:${w}%"></div></div></td></tr>`;
});
h2+='</table>';
const minBal=Math.min(...yearly.map(d=>d.balance));
if(minBal<0)h2+=`<p style="color:#e53e3e;font-size:.85em;margin:4px 0 10px">⚠ 不足額最大 ¥${fmt(Math.abs(minBal))}（${yearly.find(d=>d.balance===minBal).y}年目）</p>`;
else h2+=`<p style="color:#38a169;font-size:.85em;margin:4px 0 10px">✓ 30年間を通じて積立金不足なし</p>`;
});
h2+='<p style="color:#718096;font-size:.8em;margin-top:8px">※12年周期で大規模修繕（全体の15%追加）を想定。国交省修繕積立金ガイドライン準拠。</p>';
document.getElementById('tp1').innerHTML=h2;

// === Tab3: セルフ点検チェックリスト ===
const checks=[
{cat:'外壁塗装',items:[
['外壁タイル浮き・剥離','打診で異常音なし','一部浮き10%未満','浮き10%以上または剥落','広範囲剥落・落下危険'],
['外壁ひび割れ','幅0.2mm未満','幅0.2-0.3mm','幅0.3mm以上','貫通クラック・漏水'],
['シーリング材','弾力あり劣化なし','表面硬化・変色','ひび割れ・肉痩せ','断裂・脱落'],
['塗膜状態','光沢あり','色褪せ・チョーキング軽微','チョーキング顕著・膨れ','大面積剥離'],
['鉄部錆','錆なし','点錆','面錆・膨れ','穴あき・断面欠損']]},
{cat:'屋上防水',items:[
['防水層表面','弾力あり異常なし','表面劣化・退色','ひび割れ・膨れ','破断・水溜まり'],
['排水ドレン','詰まりなし','軽微な汚れ','排水不良','完全閉塞'],
['笠木・パラペット','異常なし','シール劣化','ひび割れ・浮き','欠損・傾き'],
['屋上設備架台','錆なし・固定良好','軽微な錆','錆進行・緩み','脱落危険'],
['漏水跡','なし','最上階天井にシミ','複数箇所にシミ','活発な漏水']]},
{cat:'給水管',items:[
['赤水','なし','朝一番のみ微量','日常的に発生','常時赤水'],
['水圧低下','問題なし','上階で若干低下','複数階で低下','使用困難'],
['管外面腐食','なし','点錆','面錆','孔食・漏水'],
['継手部','漏れなし','滲み','滴下','噴出'],
['水質検査','基準値内','一部基準超過','複数項目超過','飲用不適']]},
{cat:'排水管',items:[
['排水の流れ','良好','やや遅い','頻繁に詰まる','逆流発生'],
['管内カメラ調査','管内清浄','スケール薄い','スケール厚い','閉塞・破損'],
['排水臭','なし','時々発生','常時発生','強い悪臭'],
['管外面状態','良好','軽微な錆','腐食進行','穴あき・漏水'],
['トラップ封水','正常','時々破封','頻繁に破封','常時破封']]},
{cat:'ガス管',items:[
['ガス漏れ検査','異常なし','微量検知','検知あり','危険レベル'],
['管外面腐食','なし','表面錆','腐食進行','穴あき危険'],
['継手部状態','異常なし','軽微な劣化','劣化顕著','交換必要'],
['ガスメーター周辺','良好','軽微劣化','配管変形','漏れ危険'],
['埋設管防食','正常','一部劣化','広範囲劣化','要緊急対応']]},
{cat:'エレベーター',items:[
['運転状態','正常','時々異音','頻繁に停止','使用不能'],
['かご内装','良好','軽微な傷','劣化顕著','破損'],
['ドア開閉','正常','若干遅い','不具合あり','危険'],
['制御盤','正常','部品劣化兆候','部品製造中止','交換不可'],
['安全装置','全て正常','一部要調整','不具合あり','即時停止要']]},
{cat:'電気設備',items:[
['受変電設備','正常','部品劣化兆候','異音・異臭','停電リスク'],
['分電盤','正常','端子変色','発熱・焦げ','火災リスク'],
['幹線ケーブル','正常','被覆硬化','ひび割れ','露出・断線'],
['照明設備','全灯正常','一部不点灯','多数不点灯','器具脱落'],
['接地抵抗','基準値内','やや上昇','基準超過','測定不能']]},
