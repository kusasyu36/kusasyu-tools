vi:{sub:'So sanh tong chi phi 5 nam da ngon ngu',add:'+ Them BDS',calc:'Chan doan',reset:'Dat lai',prop:'BDS',rent:'Tien thue/thang',mgmt:'Phi quan ly/thang',dep:'Dat coc (Shikikin)',key:'Tien le (Reikin)',guar:'Phi bao lanh',fire:'Bao hiem chay',lock:'Phi doi khoa',renew:'Phi gia han',restore:'Phi khoi phuc (uoc tinh)',resTitle:'Ket qua: So sanh tong chi phi 5 nam',init:'Chi phi ban dau',monthly:'Chi phi/thang',total5:'Tong 5 nam',best:'Re nhat',chartT:'Bieu do so sanh 5 nam',note:'*Phi gia han moi 2 nam (x2). Bao hiem moi 2 nam. Phi khoi phuc 1 lan.',
t_rent:'Phi phong hang thang.\nTokyo 1K: 70K-100K yen\nThuong luong: tuy thoi diem',t_mgmt:'Phi bao tri khu vuc chung.\nTB: 3K-15K yen/thang\nThuong luong: thuong khong',t_dep:'Tien coc hoan lai.\nTB: 0-2 thang thue\nThuong luong: doi khi',t_key:'Tien cam on chu nha, khong hoan lai. Rieng Nhat.\nTB: 0-2 thang thue\nThuong luong: nha 0 reikin tang',t_guar:'Phi bao lanh. Nguoi nuoc ngoai bat buoc.\nTB: 50-100% thue\nThuong luong: chon cong ty',t_fire:'Bao hiem chay bat buoc. HD 2 nam.\nTB: 15K-20K yen\nThuong luong: doi khi tu chon',t_lock:'Thay khoa khi nhan phong.\nTB: 10K-25K yen\nThuong luong: thuong khong',t_renew:'Phi gia han moi 2 nam. Rieng Nhat.\nTB: 1 thang thue\nThuong luong: nha 0 phi tang',t_restore:'Uoc tinh sua chua khi di.\nTB: 30K-60K yen\nThuong luong: theo huong dan'}
};
const F=['rent','mgmt','dep','key','guar','fire','lock','renew','restore'];
const D=[80000,5000,80000,80000,40000,18000,15000,80000,50000];
const C=['#3498db','#e74c3c','#2ecc71','#9b59b6','#f39c12'];
let lang='ja',pCnt=0;
function t(k){return L[lang][k]||k}
function setLang(l){
lang=l;
document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
document.getElementById('subtitle').textContent=t('sub');
document.getElementById('addBtn').textContent=t('add');
document.getElementById('calcBtn').textContent=t('calc');
document.getElementById('resetBtn').textContent=t('reset');
document.querySelectorAll('.prop').forEach((p,i)=>{
p.querySelector('h3 span').textContent=t('prop')+' '+(i+1);
p.querySelectorAll('.lbl-text').forEach((lb,j)=>lb.textContent=t(F[j]));
});
if(document.getElementById('result').style.display==='block')calc();
}
function showTip(el,key){
document.querySelectorAll('.tip').forEach(t=>t.classList.remove('show'));
const tip=el.parentElement.querySelector('.tip');
if(tip){tip.textContent=t('t_'+key);tip.classList.add('show');setTimeout(()=>tip.classList.remove('show'),5000);}
}
function addProp(){
if(pCnt>=5)return;pCnt++;
const d=document.createElement('div');d.className='prop';
let h='<button class="del" onclick="delProp(this)">&times;</button>';
h+='<h3><span>'+t('prop')+' '+pCnt+'</span></h3>';
F.forEach((f,i)=>{
h+='<label><span class="lbl-text">'+t(f)+'</span><span class="info-icon" onclick="showTip(this,\''+f+'\')">?</span><div class="tip"></div></label>';
h+='<input type="number" data-f="'+f+'" value="'+D[i]+'" min="0">';
});
d.innerHTML=h;document.getElementById('propList').appendChild(d);
}
function delProp(btn){
if(pCnt<=1)return;btn.parentElement.remove();pCnt--;
document.querySelectorAll('.prop h3 span').forEach((s,i)=>s.textContent=t('prop')+' '+(i+1));
}
function resetAll(){
document.getElementById('propList').innerHTML='';document.getElementById('result').style.display='none';pCnt=0;addProp();
}
function fmt(n){return '\u00a5'+n.toLocaleString()}
function calc(){
const props=document.querySelectorAll('.prop'),data=[];
props.forEach((p,i)=>{
const v={};p.querySelectorAll('input').forEach(inp=>v[inp.dataset.f]=Number(inp.value)||0);
const init=v.dep+v.key+v.guar+v.fire+v.lock+v.rent+v.mgmt;
const mo=v.rent+v.mgmt;
const yr5=init+(mo*59)+v.renew*2+v.fire*2+v.restore;
data.push({name:t('prop')+' '+(i+1),init,mo,yr5,color:C[i]});
});
const minT=Math.min(...data.map(d=>d.yr5)),maxT=Math.max(...data.map(d=>d.yr5));
let g='';
data.forEach(d=>{
const best=d.yr5===minT&&data.length>1;
g+='<div class="res-card"><div class="name" style="color:'+d.color+'">'+d.name+'</div>';
g+='<div class="val'+(best?' best':'')+'">'+fmt(d.yr5)+(best?' \u2713':'')+'</div>';
g+='<div class="vals">'+t('init')+': '+fmt(d.init)+'<br>'+t('monthly')+': '+fmt(d.mo)+'</div></div>';
});
document.getElementById('resGrid').innerHTML=g;
document.getElementById('resTitle').textContent=t('resTitle');
document.getElementById('chartTitle').textContent=t('chartT');
document.getElementById('note').textContent=t('note');
let ch='';
data.forEach(d=>{
const pct=maxT>0?Math.max((d.yr5/maxT)*100,12):0;
ch+='<div class="bar-group"><div class="bar-label" style="color:'+d.color+'">'+d.name+'</div>';
ch+='<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+d.color+'">'+fmt(d.yr5)+'</div></div></div>';
});
document.getElementById('chart').innerHTML=ch;
let le='';data.forEach(d=>le+='<span><i style="background:'+d.color+'"></i>'+d.name+'</span>');
document.getElementById('legend').innerHTML=le;
document.getElementById('result').style.display='block';
document.getElementById('result').scrollIntoView({behavior:'smooth'});
}
['ja','en','zh','vi'].forEach(l=>{
const b=document.createElement('button');
b.textContent={ja:'\u65E5\u672C\u8A9E',en:'English',zh:'\u4E2D\u6587',vi:'Ti\u1EBFng Vi\u1EC7t'}[l];
b.dataset.l=l;b.onclick=()=>setLang(l);
document.getElementById('langBar').appendChild(b);
});
addProp();setLang('ja');
document.addEventListener('click',e=>{if(!e.target.classList.contains('info-icon'))document.querySelectorAll('.tip').forEach(t=>t.classList.remove('show'));});
</script>
