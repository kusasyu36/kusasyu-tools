<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/proptech/" style="color:#4299e1;text-decoration:none;">kusasyu PropTech</a> &gt; <span style="color:#718096;">重説リスクスキャナー【賃貸版】</span></div>

<h1>重説リスクスキャナー【賃貸版】</h1>
<p class="sub">賃貸の重要事項説明書を貼り付けて、隠れたリスクを即発見</p>
<div class="no-print">
<textarea id="inp" placeholder="重要事項説明書のテキストをここに貼り付けてください&#10;&#10;例：退去時には借主の負担でハウスクリーニングを行うものとする…"></textarea>
<button class="btn scan" onclick="scan()">リスクをスキャンする</button>
</div>
<div id="result"></div>
</div>
<script>
const RULES=[
{k:"原状回復",r:3,t:"退去時に高額な原状回復費用を請求される可能性があります。国交省ガイドラインでは通常損耗は貸主負担が原則です。"},
{k:"クリーニング",r:2,t:"退去時クリーニング代が借主負担の特約です。金額上限が明記されているか確認しましょう。"},
{k:"違約金",r:3,t:"契約違反時に違約金が発生します。金額や条件が妥当か必ず確認してください。"},
{k:"短期解約",r:2,t:"入居後すぐに退去すると違約金（家賃1〜2ヶ月分等）がかかる場合があります。"},
{k:"更新料",r:2,t:"契約更新時に追加費用が発生します。金額と頻度を確認しましょう。"},
{k:"更新拒絶",r:3,t:"貸主が契約更新を拒否できる条件です。正当事由なしの更新拒絶は借地借家法で制限されています。"},
{k:"自動更新",r:1,t:"契約が自動的に更新されます。解約したい場合の手続き期限に注意してください。"},
{k:"敷金",r:2,t:"敷金の返還条件を確認しましょう。償却（返金なし）の割合に注意が必要です。"},
{k:"償却",r:3,t:"敷金の一部または全額が返金されない「敷引き」の可能性があります。償却額を確認してください。"},
{k:"退去予告",r:1,t:"退去時に事前通知が必要です。通常1〜2ヶ月前ですが、期間を過ぎると余分な家賃が発生します。"},
{k:"連帯保証",r:2,t:"連帯保証人は借主と同等の責任を負います。保証会社利用時は二重負担でないか確認を。"},
{k:"保証会社",r:1,t:"保証会社の利用が必須の場合、初回・更新の保証料を確認しましょう。"},
{k:"特約",r:2,t:"標準契約にない特別な条件です。借主に不利な内容が含まれていないか要注意です。"},
{k:"禁止",r:1,t:"禁止事項の範囲を確認してください。ペット・楽器・同居人など生活に影響する制限がないか要確認。"},
{k:"設備",r:1,t:"設備の修繕責任の所在を確認しましょう。「残置物」扱いだと故障時に貸主は修理しません。"},
{k:"免責",r:3,t:"貸主が責任を負わない範囲の条項です。設備故障や災害時の対応が不十分になる恐れがあります。"},
{k:"賠償",r:2,t:"損害賠償の条件です。過大な賠償範囲が設定されていないか確認が必要です。"},
{k:"修繕",r:2,t:"修繕費用の負担先を確認してください。小修繕が全て借主負担だと出費がかさみます。"},
{k:"中途解約",r:2,t:"契約期間中の解約条件です。解約不可や高額な違約金が設定されていないか確認を。"},
{k:"善管注意義務",r:1,t:"借主には物件を丁寧に扱う義務があります。通常の生活での損耗まで問われることはありません。"},
{k:"鍵交換",r:1,t:"鍵交換費用が借主負担になっている場合があります。費用の相場は1〜2万円程度です。"}
];
function scan(){
const txt=document.getElementById("inp").value.trim();
if(!txt){alert("重説テキストを貼り付けてください");return}
let hits=[];
RULES.forEach(r=>{
const re=new RegExp(r.k,"g");let m;
while((m=re.exec(txt))!==null){
const s=Math.max(0,m.index-30),e=Math.min(txt.length,m.index+r.k.length+30);
let ctx=txt.substring(s,e).replace(/\n/g," ");
ctx=ctx.replace(new RegExp(r.k,"g"),'<span class="hl">'+r.k+"</span>");
if(s>0)ctx="…"+ctx;if(e<txt.length)ctx+="…";
hits.push({...r,ctx});
}
});
// dedupe by keyword, keep first
const seen=new Set();hits=hits.filter(h=>{if(seen.has(h.k))return false;seen.add(h.k);return true});
const el=document.getElementById("result");
if(!hits.length){el.innerHTML='<div class="safe">&#10003; 主要なリスクキーワードは検出されませんでした。<br><small>※ 全てのリスクを網羅するものではありません</small></div>';el.style.display="block";return}
let total=hits.reduce((s,h)=>s+h.r,0);
let g,gc,gl;
if(total<=4){g="A";gc="sA";gl="低リスク — 大きな問題は見当たりません"}
else if(total<=8){g="B";gc="sB";gl="やや注意 — いくつか確認すべき点があります"}
else if(total<=14){g="C";gc="sC";gl="要注意 — 不利な条項が複数見つかりました"}
else{g="D";gc="sD";gl="高リスク — 契約前に専門家への相談を推奨します"}
let h3=hits.filter(x=>x.r===3).length,h2=hits.filter(x=>x.r===2).length,h1=hits.filter(x=>x.r===1).length;
let html='<div class="score-box '+gc+'"><div class="grade">'+g+'</div><div class="label">'+gl+'</div></div>';
html+='<div class="stat"><span>&#9888; 高 '+h3+'件</span><span>&#9650; 中 '+h2+'件</span><span>&#9679; 低 '+h1+'件</span></div>';
hits.sort((a,b)=>b.r-a.r);
hits.forEach(h=>{
let cl=h.r===3?"card":h.r===2?"card mid":"card low";
let lv=h.r===3?"&#9888; 高リスク":h.r===2?"&#9650; 中リスク":"&#9679; 低リスク";
html+='<div class="'+cl+'"><div class="kw">'+lv+'：「'+h.k+'」を検出</div><div class="ex">'+h.ctx+'</div><div class="exp">&#128161; つまりこういうこと → '+h.t+'</div></div>';
});
html+='<p style="text-align:center;font-size:.75em;color:#a0aec0;margin-top:16px">※本ツールはキーワード解析による簡易診断です。法的助言ではありません。</p>';
html+='<div class="no-print"><button class="btn pr" onclick="window.print()">結果を印刷する</button><button class="btn reset" onclick="rs()">やり直す</button></div>';
el.innerHTML=html;el.style.display="block";el.scrollIntoView({behavior:"smooth"})
}
function rs(){document.getElementById("inp").value="";document.getElementById("result").style.display="none"}
</script>
</body>
