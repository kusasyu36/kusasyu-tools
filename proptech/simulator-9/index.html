<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/proptech/" style="color:#4299e1;text-decoration:none;">kusasyu PropTech</a> &gt; <span style="color:#718096;">住宅購入トータルコスト・ローン一括シミュレーター</span></div>
<h1>住宅購入トータルコスト<br>ローン一括シミュレーター</h1>
<p class="warn">全ての計算結果は概算です。実際の費用は物件・金融機関・時期により変動します</p>
<div class="card">
<h2>物件情報（5項目入力）</h2>
<div class="row">
<div><label>物件価格（万円）</label><input type="number" id="price" value="4500" min="100"></div>
<div><label>頭金（万円）</label><input type="number" id="down" value="500" min="0"></div>
</div>
<div class="row">
<div><label>返済期間（年）</label><input type="number" id="years" value="35" min="1" max="50"></div>
<div><label>新築／中古</label><select id="kind"><option value="new">新築</option><option value="used">中古</option></select></div>
</div>
<div class="row">
<div><label>エリア（都道府県）</label><select id="area"><option>東京都</option><option>神奈川県</option><option>大阪府</option><option>愛知県</option><option>埼玉県</option><option>千葉県</option><option>兵庫県</option><option>福岡県</option><option>北海道</option><option>その他</option></select></div>
<div><label>固定資産税評価額（万円）</label><input type="number" id="assess" value="" placeholder="未入力なら物件価格の70%"></div>
</div>
<button class="btn" onclick="calc()">シミュレーション開始</button>
</div>
<div id="result">
<div class="card"><h2>諸費用の内訳（15項目）</h2><table id="tbl"></table><canvas id="cv" width="300" height="280"></canvas><p class="note">円グラフは諸費用の構成比を示します（概算）</p></div>
<div class="card"><h2>ローンタイプ別 総返済額比較</h2><div class="lgrid" id="lg"></div><p class="note">金利は代表的水準を使用した概算です。最新金利は金融機関にご確認ください</p></div>
<div class="card"><h2>生涯トータルコスト</h2><div id="ltb"></div></div>
</div>
<footer>Kusasyu PropTech — 住宅購入トータルコストシミュレーター</footer>
<script>
var F=function(n){return n<0?'—':'¥'+n.toLocaleString('ja-JP')};
function stamp(v){return v<=1e6?200:v<=5e6?1e3:v<=1e7?5e3:v<=5e7?1e4:v<=1e8?3e4:v<=5e8?6e4:1e5}
function mpay(P,r,y){if(r===0)return P/(y*12);var m=r/12,n=y*12,x=Math.pow(1+m,n);return P*m*x/(x-1)}
function calc(){
var P=parseFloat(document.getElementById('price').value)*1e4||0;
var D=parseFloat(document.getElementById('down').value)*1e4||0;
var Y=parseInt(document.getElementById('years').value)||35;
var nw=document.getElementById('kind').value==='new';
var av=document.getElementById('assess').value;
var A=av?parseFloat(av)*1e4:P*0.7;
var L=P-D;
if(P<=0||L<=0||Y<1){alert('物件価格・頭金・返済期間を正しく入力してください');return}
var c=[
['仲介手数料（税込）',nw?0:Math.floor((P*0.03+6e4)*1.1)],
['所有権移転登記（登録免許税）',Math.floor(A*(nw?0.003:0.015))],
['抵当権設定登記（登録免許税）',Math.floor(L*(nw?0.001:0.004))],
['司法書士報酬',150000],
['不動産取得税',Math.max(0,Math.floor((A-(nw?12e6:0))*0.03))],
['固定資産税精算金（半年分）',Math.floor(A*0.014/2)],
['印紙税（売買契約書）',stamp(P)],
['印紙税（金消契約書）',stamp(L)],
['ローン事務手数料',33000],
['ローン保証料（一括前払）',Math.floor(L*0.02)],
['火災保険料（10年一括）',200000],
['地震保険料（5年一括）',50000],
['修繕積立基金',nw?300000:0],
['管理準備金',nw?30000:0],
['適合証明書・検査費用',50000]
];
var tot=0;c.forEach(function(r){tot+=r[1]});
var h='';
c.forEach(function(r){h+='<tr><td>'+r[0]+'</td><td>'+(r[1]>0?F(r[1]):'—')+'</td></tr>'});
h+='<tr class="tfoot"><td>諸費用 合計</td><td>'+F(tot)+'</td></tr>';
document.getElementById('tbl').innerHTML=h;
var cv=document.getElementById('cv'),cx=cv.getContext('2d');
cx.clearRect(0,0,cv.width,cv.height);
var cl=['#3b82f6','#ef4444','#f59e0b','#10b981','#8b5cf6','#ec4899','#06b6d4','#f97316','#6366f1','#14b8a6','#e11d48','#84cc16','#a855f7','#0ea5e9','#d946ef'];
var act=[];c.forEach(function(r,i){if(r[1]>0)act.push([r[0],r[1],cl[i]])});
var ag=-Math.PI/2,cx0=105,cy0=140,R=90;
act.forEach(function(a){
  var sl=a[1]/tot*Math.PI*2;
  cx.beginPath();cx.moveTo(cx0,cy0);cx.arc(cx0,cy0,R,ag,ag+sl);cx.closePath();
  cx.fillStyle=a[2];cx.fill();
  if(sl>0.2){var mid=ag+sl/2;cx.fillStyle='#fff';cx.font='bold 9px sans-serif';cx.textAlign='center';
    cx.fillText(Math.round(a[1]/tot*100)+'%',cx0+Math.cos(mid)*60,cy0+Math.sin(mid)*60+3)}
  ag+=sl;
});
var lx=210,ly=16;
act.forEach(function(a,i){
  cx.fillStyle=a[2];cx.fillRect(lx,ly+i*18,10,10);
  cx.fillStyle='#334155';cx.font='10px sans-serif';cx.textAlign='left';
  cx.fillText(a[0].slice(0,10),lx+14,ly+i*18+9);
});
var loans=[
  {nm:'メガバンク固定金利',rate:0.018,fee:33000,guar:Math.floor(L*0.02)},
  {nm:'ネット銀行変動金利',rate:0.005,fee:Math.floor(L*0.022),guar:0},
  {nm:'フラット35',rate:0.016,fee:Math.floor(L*0.022),guar:0}
];
var res=loans.map(function(l){
  var m=mpay(L,l.rate,Y),tr=Math.floor(m*Y*12),it=tr-L,ai=tr+l.fee+l.guar;
  return{nm:l.nm,rate:l.rate,fee:l.fee,guar:l.guar,mp:Math.floor(m),tr:tr,it:it,ai:ai};
});
var mn=Math.min.apply(null,res.map(function(r){return r.ai}));
document.getElementById('lg').innerHTML=res.map(function(r){
  var b=r.ai===mn;
  return '<div class="lc'+(b?' best':'')+'">'+
    (b?'<span class="badge">最安</span>':'')+
    '<h3>'+r.nm+'</h3>'+
    '<div class="rt">'+(r.rate*100).toFixed(1)+'%</div>'+
    '<div class="dt">月々 '+F(r.mp)+'</div>'+
    '<div class="am">総返済 '+F(r.tr)+'</div>'+
    '<div class="dt">利息 '+F(r.it)+'<br>手数料等 '+F(r.fee+r.guar)+'</div>'+
    '<div class="dt" style="margin-top:4px;font-weight:bold;color:#0f172a">合計 '+F(r.ai)+'</div></div>';
}).join('');
var best=res.reduce(function(a,b){return a.ai<b.ai?a:b});
var life=P+tot+best.it;
document.getElementById('ltb').innerHTML=
  '<div class="life"><div class="lb">物件価格＋諸費用＋ローン利息（'+best.nm+'選択時）</div>'+
  '<div class="vl">'+F(life)+'</div>'+
  '<div class="lb">物件価格の約'+(life/P*100).toFixed(0)+'%</div>'+
  '<div class="br"><span>物件 '+F(P)+'</span><span>諸費用 '+F(tot)+'</span><span>利息 '+F(best.it)+'</span></div></div>'+
  '<p class="note">変動金利は全期間同一金利で試算。金利変動リスクにご注意ください</p>';
document.getElementById('result').style.display='block';
document.getElementById('result').scrollIntoView({behavior:'smooth'});
}
</script>
