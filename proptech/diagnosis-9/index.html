<script>
const AXES=["浸水リスク","地盤強度","日照条件","人口動態","地価トレンド"];
const COLORS=["#e53e3e","#dd6b20","#d69e2e","#38a169","#3182ce"];
const QS=[[["q1_1",50],["q1_2",50]],[["q2_1",55],["q2_2",45]],[["q3_1",55],["q3_2",45]],[["q4_1",30],["q4_2",35],["q4_3",35]],[["q5_1",-1],["q5_2",50]]];

function gv(id){var e=document.getElementById(id);return e.tagName==="SELECT"?e.value:e.value}

function calcAxis(i){
var qs=QS[i],total=0,wsum=0;
for(var j=0;j<qs.length;j++){
var v=gv(qs[j][0]);
if(v==="")return null;
if(i===4&&j===0){
var r=parseFloat(v);
var s=r>=5?100:r>=2?80:r>=0?60:r>=-2?35:10;
total+=s*50;wsum+=50;
}else{
total+=parseFloat(v)*qs[j][1];wsum+=qs[j][1];
}
}
return Math.round(total/wsum);
}

function calc(){
var scores=[],miss=false;
for(var i=0;i<5;i++){var s=calcAxis(i);if(s===null){miss=true;scores.push(0)}else scores.push(s)}
if(miss){alert("全ての設問に回答してください");return}
var avg=Math.round(scores.reduce((a,b)=>a+b,0)/5);
document.getElementById("result").style.display="block";
var el=document.getElementById("totalScore");
el.textContent=avg+"/100";
el.className="score-big "+(avg>=70?"green":avg>=45?"yellow":"red");
var vd=document.getElementById("verdict");
if(avg>=70){vd.textContent="★ 仕入れ候補 — 詳細調査を推奨";vd.className="verdict go"}
else if(avg>=45){vd.textContent="▲ 要精査 — リスク項目を重点確認";vd.className="verdict check"}
else{vd.textContent="✕ スキップ推奨 — 優先度を下げてよい";vd.className="verdict skip"}
var ah="";
for(var i=0;i<5;i++){
var c=scores[i]>=70?"#38a169":scores[i]>=45?"#d69e2e":"#e53e3e";
ah+='<div class="axis-score-item"><span>'+AXES[i]+'</span><div class="bar"><div class="bar-fill" style="width:'+scores[i]+'%;background:'+c+'"></div></div><span style="min-width:40px;text-align:right;font-weight:700">'+scores[i]+'</span></div>';
}
document.getElementById("axisScores").innerHTML=ah;
drawRadar(scores);
genComment(scores,avg);
genChecklist(scores);
document.getElementById("result").scrollIntoView({behavior:"smooth"});
}

function drawRadar(sc){
var c=document.getElementById("radar"),ctx=c.getContext("2d");
var W=c.width,H=c.height,cx=W/2,cy=H/2,R=120;
ctx.clearRect(0,0,W,H);
var angles=[];for(var i=0;i<5;i++)angles.push(-Math.PI/2+2*Math.PI*i/5);
for(var lv=1;lv<=5;lv++){
ctx.beginPath();
for(var i=0;i<5;i++){var r=R*lv/5;var x=cx+r*Math.cos(angles[i]);var y=cy+r*Math.sin(angles[i]);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
ctx.closePath();ctx.strokeStyle="#e2e8f0";ctx.stroke();
}
for(var i=0;i<5;i++){ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+R*Math.cos(angles[i]),cy+R*Math.sin(angles[i]));ctx.strokeStyle="#e2e8f0";ctx.stroke()}
ctx.beginPath();
for(var i=0;i<5;i++){var r=R*sc[i]/100;var x=cx+r*Math.cos(angles[i]);var y=cy+r*Math.sin(angles[i]);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
ctx.closePath();ctx.fillStyle="rgba(43,108,176,.2)";ctx.fill();ctx.strokeStyle="#2b6cb0";ctx.lineWidth=2;ctx.stroke();
ctx.fillStyle="#1a202c";ctx.font="bold 12px sans-serif";ctx.textAlign="center";
var labels=AXES;
for(var i=0;i<5;i++){var r=R+18;var x=cx+r*Math.cos(angles[i]);var y=cy+r*Math.sin(angles[i])+4;ctx.fillText(labels[i],x,y)}
}

function genComment(sc,avg){
var z=document.getElementById("zone").value;
var a=parseFloat(document.getElementById("area").value)||0;
var lines=[];
if(sc[0]<45)lines.push("浸水リスクが高い地域です。水害保険料の上昇や開発許可の制約に注意してください。");
if(sc[1]<45)lines.push("地盤が軟弱な可能性があります。地盤改良費（坪5〜15万円）を見込んでください。");
if(sc[2]<45)lines.push("日照条件が厳しい立地です。太陽光なら発電効率、住宅なら採光基準への影響を確認してください。");
if(sc[3]<45)lines.push("人口減少エリアです。賃貸需要・出口戦略（売却）のリスクが高まります。");
if(sc[4]<45)lines.push("地価が下落傾向または割高です。取得価格の妥当性を再検証してください。");
if(z==="ie")lines.push("工業専用地域のため住宅建築不可です。用途を確認してください。");
if(a>0&&a<100&&(z==="cm"||z==="nc"))lines.push("商業系地域で面積が小さいため、容積率を最大活用できるか確認を。");
if(lines.length===0)lines.push("大きなリスク要因は見当たりません。詳細デューデリジェンスに進みましょう。");
document.getElementById("comment").innerHTML="<strong>推奨コメント：</strong><br>"+lines.join("<br>");
}

function genChecklist(sc){
var items=[
["浸水リスク","ハザードマップ確認","q1_1"],
["浸水リスク","土砂災害区域確認","q1_2"],
["地盤強度","地盤種別確認","q2_1"],
["地盤強度","液状化リスク確認","q2_2"],
["日照条件","南側建物高さ","q3_1"],
["日照条件","接道方向","q3_2"],
["人口動態","駅乗降者数傾向","q4_1"],
["人口動態","人口増減率","q4_2"],
["人口動態","駅距離","q4_3"],
["地価トレンド","公示地価変動率","q5_1"],
["地価トレンド","相場比較","q5_2"]
];
var h='<tr><th>軸</th><th>チェック項目</th><th>入力値</th><th>判定</th></tr>';
for(var i=0;i<items.length;i++){
var el=document.getElementById(items[i][2]);
var v=el.tagName==="SELECT"?(el.options[el.selectedIndex]||{}).text||"":el.value;
var n=parseFloat(el.value)||0;
var mark=n>=70?"○":n>=45?"△":"✕";
