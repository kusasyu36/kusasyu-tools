<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/proptech/" style="color:#4299e1;text-decoration:none;">kusasyu PropTech</a> &gt; <span style="color:#718096;">空き家シェア所有コストシミュレーター</span></div>
<div class="header">
<h1>空き家シェア所有コストシミュレーター</h1>
<p>フラクショナルオーナーシップで別荘を賢く持つ</p>
</div>
<div class="wrap">
<div class="card">
<h2>物件情報を入力</h2>
<div class="form-grid">
<div class="fg">
<label>物件価格 <span class="unit">（万円）</span></label>
<input type="number" id="price" value="2000" min="100" max="50000" step="100">
</div>
<div class="fg">
<label>持分割合</label>
<select id="share">
<option value="2">1/2（2名共有）</option>
<option value="4" selected>1/4（4名共有）</option>
<option value="6">1/6（6名共有）</option>
<option value="8">1/8（8名共有）</option>
</select>
</div>
<div class="fg">
<label>年間利用日数 <span class="unit">（日）</span></label>
<input type="number" id="days" value="30" min="1" max="365">
</div>
<div class="fg">
<label>地域</label>
<select id="region">
<option value="karuizawa">軽井沢</option>
<option value="hakone">箱根</option>
<option value="atami">熱海</option>
<option value="nasu">那須</option>
<option value="shonan">湘南</option>
<option value="other">その他</option>
</select>
</div>
</div>
<button class="btn" onclick="calc()">シミュレーション実行</button>
</div>
<div id="result">
<div class="card">
<h2>あなたのシェア所有コスト</h2>
<div class="metrics-grid">
<div class="metric"><div class="val" id="myCost">-</div><div class="lbl">年間コスト（あなたの負担）</div></div>
<div class="metric"><div class="val" id="perNight">-</div><div class="lbl">1泊あたり実質コスト</div></div>
<div class="metric"><div class="val" id="saving">-</div><div class="lbl">単独所有との年間差額</div></div>
<div class="metric"><div class="val" id="saving10">-</div><div class="lbl">10年間の節約総額</div></div>
</div>
</div>
<div class="card">
<h2>年間コスト内訳比較</h2>
<table>
<tr><th>項目</th><th>単独所有</th><th>シェア所有</th><th>削減額</th></tr>
<tbody id="breakdown"></tbody>
<tfoot id="totalRow"></tfoot>
</table>
</div>
<div class="card">
<h2>10年間 累計コスト推移</h2>
<canvas id="chart" height="280"></canvas>
<div style="margin-top:8px;font-size:12px;color:#718096;display:flex;gap:16px;justify-content:center">
<span>&#9632; <span style="color:#e53e3e">単独所有</span></span>
<span>&#9632; <span style="color:#2d6a4f">シェア所有</span></span>
</div>
</div>
<div class="card">
<h2>投資判断サマリー</h2>
<div id="summary"></div>
</div>
</div>
</div>
<div class="footer">© Kusasyu PropTech｜本シミュレーションは概算です。実際の費用は物件により異なります。</div>
<script>
const REGION_DATA={
karuizawa:{name:"軽井沢",mgmt:30000,repair:0.008,taxRatio:0.65},
hakone:{name:"箱根",mgmt:25000,repair:0.007,taxRatio:0.6},
atami:{name:"熱海",mgmt:22000,repair:0.007,taxRatio:0.55},
nasu:{name:"那須",mgmt:20000,repair:0.006,taxRatio:0.5},
shonan:{name:"湘南",mgmt:28000,repair:0.008,taxRatio:0.6},
other:{name:"その他",mgmt:20000,repair:0.006,taxRatio:0.5}
};
const TAX_RATE=0.014;
const INF=0.015;
function fmt(n){return Math.round(n).toLocaleString()}
function calc(){
const P=parseInt(document.getElementById("price").value)*10000;
const S=parseInt(document.getElementById("share").value);
const D=parseInt(document.getElementById("days").value);
const R=REGION_DATA[document.getElementById("region").value];
const assessed=P*R.taxRatio;
const tax=assessed*TAX_RATE;
const mgmt=R.mgmt*12;
const repair=P*R.repair;
const insurance=Math.max(P*0.002,30000);
const soloTotal=tax+mgmt+repair+insurance;
const sTax=tax/S,sMgmt=mgmt/S,sRepair=repair/S,sIns=insurance/S;
const platformFee=P/S*0.01;
const shareTotal=sTax+sMgmt+sRepair+sIns+platformFee;
document.getElementById("myCost").textContent="¥"+fmt(shareTotal);
document.getElementById("perNight").textContent="¥"+fmt(shareTotal/D);
const diff=soloTotal-shareTotal;
document.getElementById("saving").textContent="¥"+fmt(diff);
let solo10=0,share10=0;
for(let i=0;i<10;i++){const m=Math.pow(1+INF,i);solo10+=soloTotal*m;share10+=shareTotal*m;}
document.getElementById("saving10").textContent="¥"+fmt(solo10-share10);
const items=[["固定資産税",tax,sTax],["管理費",mgmt,sMgmt],["修繕積立金",repair,sRepair],["火災保険料",insurance,sIns],["プラットフォーム利用料",0,platformFee]];
let tb="";
items.forEach(r=>{tb+=`<tr><td>${r[0]}</td><td>¥${fmt(r[1])}</td><td>¥${fmt(r[2])}</td><td class="save">-¥${fmt(r[1]-r[2])}</td></tr>`;});
document.getElementById("breakdown").innerHTML=tb;
document.getElementById("totalRow").innerHTML=`<tr style="font-weight:700"><td>合計</td><td>¥${fmt(soloTotal)}</td><td>¥${fmt(shareTotal)}</td><td class="save">-¥${fmt(diff)}</td></tr>`;
drawChart(soloTotal,shareTotal);
const hotelCost=D*15000;
const yieldRate=((soloTotal-shareTotal)/(P/S)*100).toFixed(1);
let sm=`<p style="margin-bottom:10px"><span class="tag">${R.name}</span> <span class="tag">1/${S}持分</span> <span class="tag">年${D}日利用</span></p>`;
sm+=`<p style="font-size:14px;margin-bottom:8px"><b>初期投資額（持分購入費）:</b> ¥${fmt(P/S)}（物件価格 ¥${fmt(P)} の 1/${S}）</p>`;
sm+=`<p style="font-size:14px;margin-bottom:8px"><b>ホテル利用との比較:</b> 年${D}泊×15,000円 = ¥${fmt(hotelCost)} → シェア所有なら ¥${fmt(shareTotal)}`;
sm+=shareTotal<hotelCost?`<span style="color:#2d6a4f;font-weight:700"> （年間¥${fmt(hotelCost-shareTotal)}お得）</span>`:`<span style="color:#e53e3e"> （ホテルの方が¥${fmt(shareTotal-hotelCost)}安い）</span>`;
sm+=`</p><p style="font-size:14px;margin-bottom:8px"><b>実質利回り換算:</b> ${yieldRate}%（単独所有との維持費差÷持分投資額）</p>`;
sm+=`<p style="font-size:13px;color:#718096;margin-top:12px">※ 固定資産税率1.4%、評価額は市場価格の${Math.round(R.taxRatio*100)}%で計算。管理費は${R.name}エリア相場（月額¥${fmt(R.mgmt)}）を適用。年${INF*100}%のインフレ率で10年推計。</p>`;
document.getElementById("summary").innerHTML=sm;
document.getElementById("result").style.display="block";
document.getElementById("result").scrollIntoView({behavior:"smooth"});
}
function drawChart(solo,share){
const c=document.getElementById("chart");
const ctx=c.getContext("2d");
const dpr=window.devicePixelRatio||1;
const W=c.offsetWidth,H=280;
c.width=W*dpr;c.height=H*dpr;
ctx.scale(dpr,dpr);
c.style.width=W+"px";c.style.height=H+"px";
const pad={t:20,r:20,b:36,l:70};
const gw=W-pad.l-pad.r,gh=H-pad.t-pad.b;
let soloD=[],shareD=[],s1=0,s2=0;
for(let i=0;i<=10;i++){
if(i>0){s1+=solo*Math.pow(1+INF,i-1);s2+=share*Math.pow(1+INF,i-1);}
soloD.push(s1);shareD.push(s2);
}
const maxV=soloD[10]*1.1;
ctx.clearRect(0,0,W,H);
ctx.fillStyle="#f7fafc";ctx.fillRect(pad.l,pad.t,gw,gh);
ctx.strokeStyle="#e2e8f0";ctx.lineWidth=1;
ctx.fillStyle="#a0aec0";ctx.font="11px sans-serif";ctx.textAlign="right";
for(let i=0;i<=5;i++){
const y=pad.t+gh-gh*(i/5);
ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+gw,y);ctx.stroke();
ctx.fillText(fmt(maxV*(i/5)/10000)+"万",pad.l-6,y+4);
}
ctx.textAlign="center";
for(let i=0;i<=10;i++){ctx.fillText(i+"年",pad.l+gw*(i/10),H-pad.b+16);}
function drawLine(data,color){
ctx.strokeStyle=color;ctx.lineWidth=2.5;ctx.beginPath();
data.forEach((v,i)=>{const x=pad.l+gw*(i/10),y=pad.t+gh-gh*(v/maxV);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
ctx.stroke();
data.forEach((v,i)=>{const x=pad.l+gw*(i/10),y=pad.t+gh-gh*(v/maxV);
ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();});
}
drawLine(soloD,"#e53e3e");drawLine(shareD,"#2d6a4f");
const gap=soloD[10]-shareD[10];
const mx=pad.l+gw*0.65,my=pad.t+30;
ctx.fillStyle="rgba(45,106,79,.12)";ctx.beginPath();ctx.arc(mx+50,my+10,32,0,Math.PI*2);ctx.fill();
ctx.fillStyle="#2d6a4f";ctx.font="bold 13px sans-serif";ctx.textAlign="center";
ctx.fillText("10年で",mx+50,my+4);ctx.fillText("¥"+fmt(gap),mx+50,my+20);ctx.fillText("お得",mx+50,my+34);
}
window.addEventListener("resize",()=>{if(document.getElementById("result").style.display==="block")calc();});
</script>
