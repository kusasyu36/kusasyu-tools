<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/proptech/" style="color:#4299e1;text-decoration:none;">kusasyu PropTech</a> &gt; <span style="color:#718096;">重説コストスキャナー「PropCostScan」</span></div>
<div class="wrap">
<h1>PropCostScan</h1>
<p class="sub">重説6セクションの隠れコストを可視化</p>

<div class="sec"><h2>① 権利関係</h2>
<label>所有権の状態</label>
<select id="s1"><option value="0">完全所有権（単独）</option><option value="1">共有持分あり</option><option value="2">借地権</option><option value="3">抵当権付き（複数）</option></select>
</div>

<div class="sec"><h2>② 法令上の制限</h2>
<label>用途地域リスク</label>
<select id="s2"><option value="0">住居系（低リスク）</option><option value="1">商業系（中リスク）</option><option value="2">工業系・調整区域</option></select>
<label>再建築可否</label>
<select id="s2b"><option value="0">再建築可</option><option value="1">再建築不可</option></select>
</div>

<div class="sec"><h2>③ インフラ状況</h2>
<label>上下水道・ガスの整備</label>
<select id="s3"><option value="0">全て公営整備済み</option><option value="1">一部私設管・浄化槽</option><option value="2">井戸・浄化槽・プロパン</option></select>
</div>

<div class="sec"><h2>④ 管理費・修繕積立金</h2>
<div class="row">
<div><label>管理費（月額・円）</label><input type="number" id="s4a" value="12000" min="0" step="1000"></div>
<div><label>修繕積立金（月額・円）</label><input type="number" id="s4b" value="8000" min="0" step="1000"></div>
</div>
<label>築年数</label>
<select id="s4c"><option value="0">10年未満</option><option value="1">10〜20年</option><option value="2">20〜30年</option><option value="3">30年超</option></select>
</div>

<div class="sec"><h2>⑤ 手付金・違約金</h2>
<label>物件価格（万円）</label>
<input type="number" id="s5a" value="3000" min="0" step="100">
<label>手付金割合</label>
<select id="s5"><option value="5">5%</option><option value="10">10%</option><option value="20">20%</option></select>
</div>

<div class="sec"><h2>⑥ 契約不適合責任（瑕疵担保）</h2>
<label>売主の種別</label>
<select id="s6"><option value="0">宅建業者（2年保証）</option><option value="1">個人（期間限定）</option><option value="2">個人（免責特約あり）</option></select>
</div>

<button class="btn" onclick="calc()">隠れコストを診断する</button>

<div id="result">
<div id="cards"></div>
<div class="summary">
<h3>コスト内訳グラフ</h3>
<div id="bars"></div>
<div id="totals"></div>
</div>
</div>
<footer>© Kusasyu PropTech｜概算値です。正確な判断は専門家にご相談ください。</footer>
</div>
<script>
function calc(){
var items=[];
var v1=+document.getElementById('s1').value;
var c1=[0,300000,600000,1200000][v1];
items.push({name:'権利関係',c5:c1,c10:c1*1.3,risk:v1<=0?0:v1<=1?1:2});
var v2=+document.getElementById('s2').value,v2b=+document.getElementById('s2b').value;
var c2=v2*200000+v2b*2000000;
items.push({name:'法令制限',c5:c2,c10:c2*1.2,risk:c2<200000?0:c2<1000000?1:2});
var v3=+document.getElementById('s3').value;
var c3=[0,500000,1500000][v3];
items.push({name:'インフラ',c5:c3,c10:c3*1.8,risk:v3});
var ma=+document.getElementById('s4a').value||0,mb=+document.getElementById('s4b').value||0;
var age=+document.getElementById('s4c').value;
var rate=[1.0,1.25,1.5,1.8][age];
var c4_5=(ma+mb*rate)*60,c4_10=(ma+mb*rate*1.3)*120;
items.push({name:'管理費・修繕',c5:c4_5,c10:c4_10,risk:age<=1?0:age<=2?1:2});
var price=+document.getElementById('s5a').value*10000,pct=+document.getElementById('s5').value;
var c5v=price*pct/100;
items.push({name:'手付・違約リスク',c5:c5v,c10:c5v,risk:pct<=5?0:pct<=10?1:2});
var v6=+document.getElementById('s6').value;
var c6=[0,500000,1500000][v6];
items.push({name:'契約不適合責任',c5:c6,c10:c6*1.5,risk:v6});
var rc=['rg','ry','rr'],rl=['低リスク','中リスク','高リスク'];
var h='',t5=0,t10=0,mx=0;
items.forEach(function(it){t5+=it.c5;t10+=it.c10;if(it.c10>mx)mx=it.c10});
items.forEach(function(it){
h+='<div class="risk-card '+rc[it.risk]+'"><span>'+it.name+'<br><small>'+rl[it.risk]+'</small></span><span class="rv">'+fm(it.c5)+'<br><small>→'+fm(it.c10)+'</small></span></div>';
});
document.getElementById('cards').innerHTML=h;
var b='',co=['#3182ce','#805ad5','#38a169','#d69e2e','#e53e3e','#dd6b20'];
items.forEach(function(it,i){
var w=mx>0?(it.c10/mx*100):0;
b+='<div class="bar-wrap"><div class="bar-label"><span>'+it.name+'</span><span>'+fm(it.c10)+'</span></div><div class="bar-bg"><div class="bar-fill" style="width:'+w+'%;background:'+co[i]+'"></div></div></div>';
});
document.getElementById('bars').innerHTML=b;
document.getElementById('totals').innerHTML='<div class="total-box t5">5年後の隠れコスト概算：<br>'+fm(t5)+'</div><div class="total-box t10">10年後の隠れコスト概算：<br>'+fm(t10)+'</div>';
document.getElementById('result').style.display='block';
document.getElementById('result').scrollIntoView({behavior:'smooth'});
}
function fm(n){return Math.round(n).toLocaleString('ja-JP')+'円'}
</script>
