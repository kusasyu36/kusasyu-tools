}

<div class="header">
<h1>物件キャッシュフローシミュレーター</h1>
<p>3シナリオ比較 ─ 楽観 / 基本 / 悲観</p>
</div>
<div class="container">
<div class="card">
<h2>物件情報・ローン条件</h2>
<div class="form-grid">
<div class="form-group"><label>物件価格（万円）</label><input type="number" id="price" value="3000" min="100"></div>
<div class="form-group"><label>想定月額家賃（万円）</label><input type="number" id="rent" value="15" min="1" step="0.1"></div>
<div class="form-group"><label>管理費・修繕積立金（万円/月）</label><input type="number" id="mgmt" value="1.5" min="0" step="0.1"></div>
<div class="form-group"><label>固定資産税等（万円/年）</label><input type="number" id="tax" value="15" min="0" step="0.5"></div>
<div class="form-group"><label>自己資金（万円）</label><input type="number" id="equity" value="600" min="0"></div>
<div class="form-group"><label>ローン期間（年）</label><input type="number" id="term" value="35" min="1" max="45"></div>
</div>
<div class="slider-section">
<h2 style="margin-top:12px">シナリオ調整スライダー</h2>
<div class="slider-row"><label>基本空室率</label><input type="range" id="vacBase" min="0" max="30" value="5"><span class="slider-val" id="vacBaseV">5%</span></div>
<div class="slider-row"><label>基本修繕費率</label><input type="range" id="repBase" min="0" max="20" value="5"><span class="slider-val" id="repBaseV">5%</span></div>
<div class="slider-row"><label>基本金利</label><input type="range" id="rateBase" min="0" max="80" value="15"><span class="slider-val" id="rateBaseV">1.5%</span></div>
</div>
<div class="btn-group">
<button class="btn btn-primary" onclick="calc()">シミュレーション実行</button>
<button class="btn btn-secondary" onclick="window.print()">印刷</button>
</div>

<div class="card">
<h2>基本指標サマリー（基本シナリオ）</h2>

<div class="summary-item"><div class="num" id="sGross">-</div><div class="lbl">表面利回り</div></div>
<div class="summary-item"><div class="num" id="sNet">-</div><div class="lbl">実質利回り</div></div>

<script>
const $=id=>document.getElementById(id);
const fmt=n=>{if(Math.abs(n)>=10000)return (n/10000).toFixed(1)+'億';return n.toFixed(1)+'万'};
const pct=n=>n.toFixed(2)+'%';

['vacBase','repBase','rateBase'].forEach(id=>{
$(id).addEventListener('input',()=>{
if(id==='rateBase') $(id+'V').textContent=($(id).value/10).toFixed(1)+'%';
else $(id+'V').textContent=$(id).value+'%';
});
});

function pmt(rate,nper,pv){
if(rate===0)return pv/nper;
const r=rate;const q=Math.pow(1+r,nper);
return pv*r*q/(q-1);
}

function calcIRR(cashflows,guess){
let r=guess||0.1;
for(let i=0;i<100;i++){
let npv=0,dnpv=0;
for(let t=0;t<cashflows.length;t++){
npv+=cashflows[t]/Math.pow(1+r,t);
dnpv-=t*cashflows[t]/Math.pow(1+r,t+1);
}
if(Math.abs(dnpv)<1e-10)break;
const nr=r-npv/dnpv;
if(Math.abs(nr-r)<1e-7){r=nr;break;}
r=nr;
}
return isFinite(r)?r:NaN;
}

function runScenario(p,rent,mgmt,tax,equity,term,vac,rep,rate){
const loan=p-equity;
const annualRent=rent*12;
const grossYield=annualRent/p*100;
const monthlyPmt=loan>0?pmt(rate/100/12,term*12,loan):0;
const annualPmt=monthlyPmt*12;
const cfs=[];
let cumCF=0;
const balances=[];
let bal=loan;
for(let y=1;y<=10;y++){
const effRent=annualRent*(1-vac/100);
const repCost=annualRent*(rep/100);
const noi=effRent-mgmt*12-tax-repCost;
const cf=noi-annualPmt;
const intPaid=bal*(rate/100);
const princPaid=annualPmt-intPaid;
bal=Math.max(0,bal-princPaid);
cumCF+=cf;
cfs.push({y,effRent,repCost,noi,annualPmt,cf,cumCF,bal});
balances.push(bal);
}
const noi1=cfs[0].noi;
const netYield=noi1/p*100;
const cf1=cfs[0].cf;
const ccr=equity>0?cf1/equity*100:0;
const irrFlows=[-equity,...cfs.map(c=>c.cf)];
const irr=calcIRR(irrFlows,0.05)*100;
return{grossYield,netYield,ccr,irr,cfs,annualPmt,loan};
}

function calc(){
const p=+$('price').value;const rent=+$('rent').value;const mgmt=+$('mgmt').value;
const tax=+$('tax').value;const equity=+$('equity').value;const term=+$('term').value;
const vB=+$('vacBase').value;const rB=+$('repBase').value;const iB=+$('rateBase').value/10;

const scenarios=[
{name:'楽観',cls:'optimistic',vac:Math.max(0,vB-3),rep:Math.max(0,rB-2),rate:Math.max(0.1,iB-0.5)},
{name:'基本',cls:'base',vac:vB,rep:rB,rate:iB},
{name:'悲観',cls:'pessimistic',vac:vB+5,rep:rB+3,rate:iB+1.0}
];

const results=scenarios.map(s=>{
const r=runScenario(p,rent,mgmt,tax,equity,term,s.vac,s.rep,s.rate);
return{...s,...r};
});

$('sGross').textContent=pct(results[1].grossYield);
$('sNet').textContent=pct(results[1].netYield);
$('sCCR').textContent=pct(results[1].ccr);

let sa='';
results.forEach(r=>{
sa+=`<div class="scenario ${r.cls}"><h3><span class="tag">${r.name}</span></h3>
<div class="metric"><span>空室率</span><span class="val">${r.vac.toFixed(1)}%</span></div>
<div class="metric"><span>修繕費率</span><span class="val">${r.rep.toFixed(1)}%</span></div>
<div class="metric"><span>金利</span><span class="val">${r.rate.toFixed(2)}%</span></div>
<div class="metric"><span>表面利回り</span><span class="val">${pct(r.grossYield)}</span></div>
<div class="metric"><span>実質利回り</span><span class="val">${pct(r.netYield)}</span></div>
<div class="metric"><span>CCR</span><span class="val ${r.ccr>=0?'positive':'negative'}">${pct(r.ccr)}</span></div>
<div class="metric"><span>年間CF(1年目)</span><span class="val ${r.cfs[0].cf>=0?'positive':'negative'}">${r.cfs[0].cf.toFixed(1)}万</span></div>
<div class="metric"><span>10年累計CF</span><span class="val ${r.cfs[9].cumCF>=0?'positive':'negative'}">${fmt(r.cfs[9].cumCF)}</span></div>
</div>`;
});
$('scenarioArea').innerHTML=sa;

// CF table
let tb=`<table class="cf-table"><thead><tr><th>年</th><th>楽観CF</th><th>基本CF</th><th>悲観CF</th><th>楽観累計</th><th>基本累計</th><th>悲観累計</th></tr></thead><tbody>`;
for(let y=0;y<10;y++){
tb+=`<tr><td>${y+1}</td>`;
results.forEach(r=>{const c=r.cfs[y];tb+=`<td class="${c.cf>=0?'positive':'negative'}">${c.cf.toFixed(1)}</td>`;});
results.forEach(r=>{const c=r.cfs[y];tb+=`<td class="${c.cumCF>=0?'positive':'negative'}">${c.cumCF.toFixed(1)}</td>`;});
tb+=`</tr>`;
}
tb+=`</tbody></table>`;
$('cfTableWrap').innerHTML=tb;

// Chart
drawChart(results);

// IRR
let irHTML=`<h4>詳細指標（IRR等）</h4>`;
results.forEach(r=>{
irHTML+=`<div class="metric"><span>${r.name} IRR</span><span class="val ${r.irr>=0?'positive':'negative'}">${isNaN(r.irr)?'算出不可':pct(r.irr)}</span></div>`;
irHTML+=`<div class="metric"><span>${r.name} ローン返済額/年</span><span class="val">${r.annualPmt.toFixed(1)}万</span></div>`;
});
irHTML+=`<div class="metric"><span>借入額</span><span class="val">${fmt(results[0].loan)}</span></div>`;
$('irrArea').innerHTML=irHTML;
$('irrArea').style.display='none';

$('results').style.display='block';
$('results').scrollIntoView({behavior:'smooth'});
}

function drawChart(results){
const ca=$('chart');ca.innerHTML='';
const W=ca.clientWidth;const H=ca.clientHeight;
const allCF=results.flatMap(r=>r.cfs.map(c=>c.cf));
const maxV=Math.max(...allCF.map(Math.abs),1);
const chartH=H-40;const mid=chartH*0.6;
const gw=(W-40)/10;

for(let y=0;y<10;y++){
const x=20+y*gw;
const vals=[results[0].cfs[y].cf,results[1].cfs[y].cf,results[2].cfs[y].cf];
const bw=Math.max(4,gw/4-1);
vals.forEach((v,i)=>{
const bar=document.createElement('div');bar.className='bar b-'+['opt','base','pes'][i];
const h=Math.abs(v)/maxV*mid;
bar.style.height=h+'px';bar.style.width=bw+'px';
if(v>=0){bar.style.bottom=(H-mid-10)+'px';}
else{bar.style.bottom=(H-mid-10-h)+'px';}
bar.style.left=(x+i*bw+i)+'px';bar.style.position='absolute';
bar.title=`${['楽観','基本','悲観'][i]} ${y+1}年: ${v.toFixed(1)}万`;
ca.appendChild(bar);
});
const lbl=document.createElement('div');lbl.className='chart-label';
lbl.textContent=(y+1)+'年';lbl.style.left=x+'px';lbl.style.width=gw+'px';
ca.appendChild(lbl);
}
const line=document.createElement('div');
line.style.cssText=`position:absolute;left:10px;right:10px;bottom:${H-mid-10}px;height:1px;background:#aaa;`;
ca.appendChild(line);
}

function toggleIRR(){
const a=$('irrArea');a.style.display=a.style.display==='none'?'block':'none';
}

calc();
</script>
