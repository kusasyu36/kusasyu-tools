{n:"原状回復の範囲",s:"国交省ガイドライン: 通常損耗・経年劣化は貸主負担。借主は故意過失部分のみ",o:["ガイドライン準拠","一部が借主負担","全面的に借主負担","記載なし"],r:[0,1,3,2]},
{n:"解約通知期間",s:"標準: 借主からは1ヶ月前まで。3ヶ月以上は借主に不利",o:["1ヶ月前","2ヶ月前","3ヶ月以上前","記載なし"],r:[0,1,3,2]},
{n:"更新料の条件",s:"標準契約書: 更新料の定めなし。地域慣行により賃料1ヶ月分が上限目安",o:["更新料なし","賃料0.5〜1ヶ月","賃料1.5ヶ月以上","記載なし"],r:[0,1,3,2]},
{n:"敷金返還条件",s:"民法改正: 原状回復費を除き退去時に全額返還義務あり",o:["全額返還を明記","一部償却条項あり","大幅償却条項あり","記載なし"],r:[0,1,3,2]},
{n:"修繕費の負担区分",s:"標準: 小修繕（電球等）は借主、設備故障・構造は貸主負担",o:["標準通り区分明記","借主範囲がやや広い","借主負担が過大","記載なし"],r:[0,1,3,2]},
{n:"禁止事項の範囲",s:"標準: 合理的な使用制限のみ。過度な制限は借地借家法上問題あり",o:["合理的範囲のみ","やや広範な制限","過度に制限的","記載なし"],r:[0,1,3,2]},
{n:"家賃改定条項",s:"借地借家法32条: 経済事情変動時に当事者協議で改定",o:["協議条項あり","貸主判断で改定可","一方的値上げ可","記載なし"],r:[0,1,3,2]},
{n:"連帯保証人の極度額",s:"民法改正（2020年）: 個人保証は極度額の明記が必須。未記載は無効",o:["極度額を明記","金額が不明確","極度額の記載なし","保証会社利用"],r:[0,2,3,0]},

],[

{n:"契約不適合責任期間",s:"宅建業法40条: 宅建業者売主は引渡しから2年以上。個人売主は協議",o:["2年以上","1〜2年未満","免責/1年未満","記載なし"],r:[0,1,3,2]},
{n:"手付金の額と保全",s:"宅建業法39条: 代金の20%以内。未完成物件5%超等は保全措置必須",o:["5〜10%＋保全あり","10〜20%","20%超/保全なし","記載なし"],r:[0,1,3,2]},

{n:"引渡し条件",s:"標準: 残代金支払と同時に引渡し・所有権移転登記（同時履行）",o:["同時履行を明記","条件付き引渡し","売主有利な条件","記載なし"],r:[0,1,3,2]},

{n:"土地の境界確認",s:"標準: 確定測量または公簿売買を明記。境界紛争リスクを回避",o:["確定測量済み","公簿売買を明記","境界未確定","記載なし"],r:[0,1,3,2]},
{n:"危険負担の取決め",s:"民法改正: 引渡前の目的物滅失は売主の危険負担（債務者主義）",o:["売主負担を明記","双方協議","買主負担","記載なし"],r:[0,1,3,2]},

{n:"重要事項説明の実施",s:"宅建業法35条: 宅建士が記名した書面で契約前に説明義務",o:["対面で説明済み","IT重説で実施済","説明が不十分","未実施/不明"],r:[0,0,2,3]}

function sw(m){mode=m;document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',i===m)});render();}
function render(){var c=document.getElementById('ls');c.innerHTML='';D[mode].forEach(function(it,i){var d=document.createElement('div');d.className='item';d.id='it'+i;d.innerHTML='<div class="ih"><span>'+(i+1)+'. '+it.n+'</span></div><select onchange="calc()"><option value="-1">— 選択してください —</option>'+it.o.map(function(o,j){return'<option value="'+j+'">'+o+'</option>'}).join('')+'</select><div class="std">'+it.s+'</div>';c.appendChild(d);});document.getElementById('sc').textContent='― 点';document.getElementById('bf').style.width='0';document.getElementById('sm').innerHTML='';calc();}
function calc(){var items=D[mode],tot=0,mx=0,ans=0,hi=0,mid=0,lo=0;var sels=document.querySelectorAll('#ls select');sels.forEach(function(sel,i){var v=+sel.value,el=document.getElementById('it'+i);el.className='item';var old=el.querySelector('.tag');if(old)old.remove();if(v>=0){ans++;var r=items[i].r[v];tot+=r;mx+=3;if(r>=3){hi++;el.classList.add('rh');el.querySelector('.ih').insertAdjacentHTML('beforeend','<span class="tag th">高リスク</span>')}else if(r>=2){mid++;el.classList.add('rm');el.querySelector('.ih').insertAdjacentHTML('beforeend','<span class="tag tm">要注意</span>')}else{lo++;el.classList.add('rl');el.querySelector('.ih').insertAdjacentHTML('beforeend','<span class="tag tl">安全</span>')}}});var sm=document.getElementById('sm');if(ans===0){document.getElementById('sc').textContent='― 点';document.getElementById('bf').style.width='0';sm.innerHTML='';return;}var score=Math.round(100-tot/mx*100);document.getElementById('sc').textContent=score+'点';var bf=document.getElementById('bf');bf.style.width=score+'%';bf.style.background=score>=70?'#38a169':score>=40?'#ed8936':'#e53e3e';sm.innerHTML='<div class="scard"><b style="color:#e53e3e">'+hi+'</b><span style="font-size:.78em">高リスク</span></div><div class="scard"><b style="color:#ed8936">'+mid+'</b><span style="font-size:.78em">要注意</span></div><div class="scard"><b style="color:#38a169">'+lo+'</b><span style="font-size:.78em">安全</span></div><div class="scard"><b>'+ans+'/10</b><span style="font-size:.78em">回答済</span></div>';}
