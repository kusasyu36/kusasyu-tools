.tag.ai{background:#c6f6d5;color:#276749}
.foot{font-size:.7em;color:#a0aec0;margin-top:12px;border-top:1px solid #e2e8f0;padding-top:8px}
@media print{body{background:#fff}.wrap{max-width:100%;padding:0}.steps,.btn,.no-print{display:none!important}.card{box-shadow:none;border:1px solid #ddd;page-break-inside:avoid}}
@media(max-width:600px){.row{flex-direction:column}.grid2{grid-template-columns:1fr}}

<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/proptech/" style="color:#4299e1;text-decoration:none;">kusasyu PropTech</a> &gt; <span style="color:#718096;">PropStage_ROIシミュレーター＆提案書ジェネレータ</span></div>
<div class="wrap">
<h1>PropStage ROIシミュレーター</h1>
<p class="sub">バーチャルステージング導入の費用対効果を3ステップで試算</p>
<div class="steps">
<div class="step-ind active" id="si1">STEP1 物件情報</div>
<div class="step-ind" id="si2">STEP2 ROI試算</div>
<div class="step-ind" id="si3">STEP3 提案書</div>
</div>

<div id="s1" class="card">
<h3>物件情報を入力してください</h3>
<label>取引区分</label>
<select id="txType"><option value="rent">賃貸</option><option value="sale">売買</option></select>
<label>物件タイプ</label>
<select id="pType"><option value="1R">ワンルーム・1K</option><option value="2LDK">2LDK〜3LDK</option><option value="4LDK">4LDK以上・戸建</option><option value="office">オフィス・店舗</option></select>
<div class="row">
<div><label>面積（㎡）</label><input type="number" id="area" value="45" min="10" max="500"></div>
<div><label id="priceLabel">想定月額賃料（万円）</label><input type="number" id="price" value="12" min="1" max="100000"></div>
</div>
<label>現在の空室期間（日）</label>
<input type="number" id="vacancy" value="60" min="0" max="730">
<button class="btn" onclick="calcROI()">ROIを試算する →</button>
</div>

<div id="s2" class="card hidden">
<h3>ROI試算結果</h3>
<div class="grid2" id="metrics"></div>
<div id="bar" style="margin:14px 0"></div>
<h3 style="margin-top:16px">推奨ステージングサービス</h3>
<div id="svcList"></div>
<div class="foot" id="notes"></div>
<div style="display:flex;gap:8px;flex-wrap:wrap">
<button class="btn btn-s no-print" onclick="goStep(1)">← 戻る</button>
<button class="btn btn-g" onclick="goStep(3)">提案書を生成 →</button>
</div>
</div>

<div id="s3" class="card hidden">
<div id="proposal"></div>
<div class="no-print" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">
<button class="btn btn-s" onclick="goStep(2)">← 戻る</button>
<button class="btn btn-o" onclick="window.print()">印刷 / PDF保存</button>
</div>
</div>
</div>

<script>
const SVC=[
{name:"RoomCo",type:"AI",price:[8000,15000],target:["1R","2LDK"],speed:"最短即日",note:"AI自動生成。低価格帯に強い"},
{name:"VR STAGING Lab",type:"AI",price:[12000,30000],target:["1R","2LDK","4LDK"],speed:"1〜2営業日",note:"高品質AI。幅広い物件対応"},
{name:"スタジオアンビルト",type:"手動",price:[30000,80000],target:["2LDK","4LDK","office"],speed:"3〜5営業日",note:"デザイナー手動。高級物件向き"},
{name:"BoxBrownie",type:"AI+手動",price:[5000,20000],target:["1R","2LDK","4LDK"],speed:"24〜48時間",note:"海外大手。コスパ良好"},
{name:"LUCIAS",type:"手動",price:[25000,60000],target:["2LDK","4LDK","office"],speed:"5営業日",note:"商業物件に強い。提案力高"}
];
let R={};
const $=id=>document.getElementById(id);
$('txType').onchange=()=>{$('priceLabel').textContent=$('txType').value==='rent'?'想定月額賃料（万円）':'売出価格（万円）';$('price').value=$('txType').value==='rent'?12:3500;};

function goStep(n){
['s1','s2','s3'].forEach((s,i)=>{$(s).classList.toggle('hidden',i!==n-1)});
['si1','si2','si3'].forEach((s,i)=>{let e=$(s);e.className='step-ind'+(i<n-1?' done':'')+(i===n-1?' active':'')});
if(n===3)genProposal();
}

function calcROI(){
const tx=$('txType').value,pt=$('pType').value,area=+$('area').value,pr=+$('price').value,vd=+$('vacancy').value;
const isRent=tx==='rent';
const vacLoss=isRent?Math.round(pr*10000/30*vd):Math.round(pr*10000*0.05/365*vd);
const stgCost=pt==='1R'?15000:pt==='2LDK'?25000:pt==='office'?50000:40000;
const daysSaved=Math.round(vd*0.35);
const priceUp=isRent?0:Math.round(pr*10000*0.03);
const roi=stgCost>0?Math.round((isRent?(pr*10000/30*daysSaved):priceUp)/stgCost*100):0;
R={tx,pt,area,pr,vd,isRent,vacLoss,stgCost,daysSaved,priceUp,roi};

$('metrics').innerHTML=`
<div class="metric warn"><div class="num">¥${vacLoss.toLocaleString()}</div><div class="lbl">${isRent?'空室による逸失賃料':'保有コスト（税・管理費概算）'}</div></div>
<div class="metric"><div class="num">¥${stgCost.toLocaleString()}</div><div class="lbl">ステージング費用概算（${pt}タイプ）</div></div>
<div class="metric good"><div class="num">${daysSaved}日短縮</div><div class="lbl">期待される成約期間短縮</div></div>
<div class="metric good"><div class="num">${isRent?'¥'+Math.round(pr*10000/30*daysSaved).toLocaleString()+' 回収':'¥'+priceUp.toLocaleString()+' UP'}</div><div class="lbl">${isRent?'短縮による賃料回収額':'期待売価上昇額（約3%）'}</div></div>`;

const w=Math.min(R.roi,500),c=R.roi>=200?'#38a169':R.roi>=100?'#dd6b20':'#e53e3e';
$('bar').innerHTML=`<div style="font-weight:700;font-size:.85em;margin-bottom:4px">投資対効果（ROI）：${R.roi}%</div><div style="background:#e2e8f0;border-radius:6px;height:22px;overflow:hidden"><div style="width:${w/5}%;background:${c};height:100%;border-radius:6px;transition:.5s"></div></div>`;

const matched=SVC.filter(s=>s.target.includes(pt)).sort((a,b)=>a.price[0]-b.price[0]);
$('svcList').innerHTML=matched.map((s,i)=>`<div class="svc${i<2?' rec':''}"><h4>${s.name} ${i<2?'⭐推奨':''}  <span class="tag${s.type.includes('AI')?' ai':''}">${s.type}</span></h4><p>費用：¥${s.price[0].toLocaleString()}〜¥${s.price[1].toLocaleString()} ／ 納期：${s.speed}</p><p>${s.note}</p></div>`).join('');

$('notes').innerHTML=`<b>出典・根拠</b><br>※1 NAR(全米不動産協会)2023調査：ステージング実施物件は非実施比で平均成約期間35%短縮<br>※2 NAR調査：売買物件で平均約3%（中央値300万円相当）の売価上昇効果<br>※3 サービス価格はaspicjapan.org掲載情報および各社公式サイト（2025年時点）を参考に概算`;
goStep(2);
}

function genProposal(){
const d=new Date(),ds=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
const matched=SVC.filter(s=>s.target.includes(R.pt)).slice(0,2);
$('proposal').innerHTML=`
<div style="text-align:center;border-bottom:3px double #2b6cb0;padding-bottom:12px;margin-bottom:16px">
<h2 style="color:#2b6cb0;font-size:1.3em">バーチャルステージング導入のご提案</h2>
<p style="font-size:.8em;color:#718096">作成日：${ds}｜Kusasyu PropTech</p></div>
<p style="font-size:.9em">オーナー様<br>平素よりお世話になっております。このたび、空室物件の早期成約に向けて<b>バーチャルステージング</b>の導入をご提案申し上げます。</p>

<h3 style="color:#2b6cb0;margin:14px 0 6px;font-size:1em;border-left:4px solid #2b6cb0;padding-left:8px">1. 対象物件</h3>
<table style="width:100%;border-collapse:collapse;font-size:.85em">
<tr><td style="padding:4px 8px;border:1px solid #ddd;background:#f7fafc;width:35%">取引区分</td><td style="padding:4px 8px;border:1px solid #ddd">${R.isRent?'賃貸':'売買'}</td></tr>
<tr><td style="padding:4px 8px;border:1px solid #ddd;background:#f7fafc">物件タイプ</td><td style="padding:4px 8px;border:1px solid #ddd">${R.pt}</td></tr>
<tr><td style="padding:4px 8px;border:1px solid #ddd;background:#f7fafc">面積</td><td style="padding:4px 8px;border:1px solid #ddd">${R.area}㎡</td></tr>
<tr><td style="padding:4px 8px;border:1px solid #ddd;background:#f7fafc">${R.isRent?'想定賃料':'売出価格'}</td><td style="padding:4px 8px;border:1px solid #ddd">${R.pr}万円${R.isRent?'／月':''}</td></tr>
<tr><td style="padding:4px 8px;border:1px solid #ddd;background:#f7fafc">空室期間</td><td style="padding:4px 8px;border:1px solid #ddd">${R.vd}日</td></tr>
</table>

<h3 style="color:#2b6cb0;margin:14px 0 6px;font-size:1em;border-left:4px solid #2b6cb0;padding-left:8px">2. 費用対効果</h3>
<table style="width:100%;border-collapse:collapse;font-size:.85em">
<tr style="background:#2b6cb0;color:#fff"><th style="padding:6px;text-align:left">項目</th><th style="padding:6px;text-align:right">金額</th></tr>
<tr><td style="padding:6px;border:1px solid #ddd">${R.isRent?'空室逸失賃料':'保有コスト'}（${R.vd}日分）</td><td style="padding:6px;border:1px solid #ddd;text-align:right;color:#e53e3e;font-weight:700">¥${R.vacLoss.toLocaleString()}</td></tr>
<tr><td style="padding:6px;border:1px solid #ddd">ステージング費用（概算）</td><td style="padding:6px;border:1px solid #ddd;text-align:right">¥${R.stgCost.toLocaleString()}</td></tr>
<tr><td style="padding:6px;border:1px solid #ddd">期待される成約期間短縮</td><td style="padding:6px;border:1px solid #ddd;text-align:right;color:#38a169;font-weight:700">${R.daysSaved}日</td></tr>
<tr style="background:#f0fff4"><td style="padding:6px;border:1px solid #ddd;font-weight:700">${R.isRent?'短縮による賃料回収額':'期待売価上昇額'}</td><td style="padding:6px;border:1px solid #ddd;text-align:right;color:#38a169;font-weight:700">¥${(R.isRent?Math.round(R.pr*10000/30*R.daysSaved):R.priceUp).toLocaleString()}</td></tr>
<tr style="background:#ebf8ff"><td style="padding:6px;border:1px solid #ddd;font-weight:700">投資対効果（ROI）</td><td style="padding:6px;border:1px solid #ddd;text-align:right;font-weight:700;font-size:1.1em;color:#2b6cb0">${R.roi}%</td></tr>
</table>

<h3 style="color:#2b6cb0;margin:14px 0 6px;font-size:1em;border-left:4px solid #2b6cb0;padding-left:8px">3. Before / After イメージ</h3>
<div style="display:flex;gap:10px;margin:8px 0">
<div style="flex:1;border:2px dashed #cbd5e0;border-radius:8px;padding:30px 10px;text-align:center;font-size:.8em;color:#a0aec0;background:#f7fafc">Before写真<br>（貼付欄）</div>
<div style="flex:1;border:2px dashed #2b6cb0;border-radius:8px;padding:30px 10px;text-align:center;font-size:.8em;color:#2b6cb0;background:#ebf8ff">After写真<br>（貼付欄）</div>
</div>

<h3 style="color:#2b6cb0;margin:14px 0 6px;font-size:1em;border-left:4px solid #2b6cb0;padding-left:8px">4. 推奨サービス</h3>
${matched.map(s=>`<div style="border:1px solid #e2e8f0;border-radius:6px;padding:10px;margin:6px 0;font-size:.85em"><b>${s.name}</b>（${s.type}）<br>費用：¥${s.price[0].toLocaleString()}〜¥${s.price[1].toLocaleString()} ／ 納期：${s.speed}<br>${s.note}</div>`).join('')}

<h3 style="color:#2b6cb0;margin:14px 0 6px;font-size:1em;border-left:4px solid #2b6cb0;padding-left:8px">5. お見積り</h3>
<table style="width:100%;border-collapse:collapse;font-size:.85em">
<tr><td style="padding:6px;border:1px solid #ddd;background:#f7fafc">ステージング費用</td><td style="padding:6px;border:1px solid #ddd;text-align:right">¥_____________</td></tr>
<tr><td style="padding:6px;border:1px solid #ddd;background:#f7fafc">撮影費用（必要な場合）</td><td style="padding:6px;border:1px solid #ddd;text-align:right">¥_____________</td></tr>
<tr style="background:#ebf8ff"><td style="padding:6px;border:1px solid #ddd;font-weight:700">合計（税込）</td><td style="padding:6px;border:1px solid #ddd;text-align:right;font-weight:700">¥_____________</td></tr>
</table>

<div style="margin-top:16px;font-size:.7em;color:#a0aec0;border-top:1px solid #e2e8f0;padding-top:8px">
<b>出典</b>：NAR(全米不動産協会)2023 Profile of Home Staging／aspicjapan.org サービス比較情報（2025年）<br>
※ 試算値は統計データに基づく概算であり、成果を保証するものではありません。<br>
Powered by PropStage｜Kusasyu PropTech
</div>`;
}
</script>
</body>
