<div class="hd" id="hd"><h1>退去修繕AI見積もりシミュレーター</h1><p>国交省「原状回復をめぐるトラブルとガイドライン」準拠 ─ 経年劣化自動控除</p></div>
<div class="cd"><h2>物件情報</h2><div class="gr"><div><label>間取り</label><select id="rm"><option>1R / 1K</option><option>1DK / 1LDK</option><option selected>2DK / 2LDK</option><option>3DK / 3LDK</option><option>4LDK以上</option></select></div><div><label>入居年数</label><input type="number" id="yr" min="0" max="50" value="4"></div><div><label>エリア</label><select id="zn"><option>首都圏</option><option selected>政令指定都市・県庁所在地</option><option>その他地方</option></select></div></div></div>
<div class="cd"><h2>損傷箇所の選択</h2><div id="items"></div></div>
<button class="btn np" onclick="calc()">見積もりを算出</button>
<div id="res" class="hide"></div>
<div style="text-align:center;padding:14px 0;font-size:.72em;color:#a0aec0" class="np">Powered by Kusasyu PropTech</div>
<script>
const RM=[20,35,55,70,90],RN=["1R/1K","1DK/1LDK","2DK/2LDK","3DK/3LDK","4LDK以上"],ZN=["首都圏","政令指定都市","その他地方"];
const CL=[[28000,38000,52000,65000,80000],[23000,30000,42000,55000,68000],[18000,25000,35000,45000,55000]];
const IT=[
{n:"壁紙（クロス）",y:6,f:(a,z)=>Math.round(a*2.5*[1500,1300,1100][z])},
{n:"クッションフロア",y:6,f:(a,z)=>Math.round(a*[4500,3800,3200][z])},
{n:"フローリング",y:22,f:(a,z)=>Math.round(a*[8000,6500,5500][z])},
{n:"畳",y:6,f:(a,z,r)=>[6,8,12,16,20][r]*[6000,5000,4000][z]},
{n:"襖・障子",y:0,f:(a,z,r)=>[2,3,4,5,6][r]*[4500,3500,3000][z]},
{n:"エアコン",y:6,f:(a,z)=>[45000,38000,32000][z]},
{n:"給湯器",y:15,f:(a,z)=>[180000,150000,130000][z]},
{n:"鍵交換",y:0,f:(a,z)=>[15000,12000,10000][z]},
{n:"ハウスクリーニング",y:0,f:(a,z,r)=>CL[z][r]},
{n:"設備（水回り）",y:15,f:(a,z)=>[55000,45000,38000][z]}];
const SV=["損傷なし","経年劣化・通常損耗","借主過失・軽微","借主過失・中程度","借主過失・重度"],SM=[0,1,.3,.7,1],ST=[0,0,1,1,1];
const $=i=>document.getElementById(i);
$("items").innerHTML=IT.map((t,i)=>'<div class="it"><span class="nm">'+t.n+'</span><span class="yr">'+(t.y?("耐用"+t.y+"年"):"─")+'</span><select id="s'+i+'">'+SV.map((s,j)=>'<option value="'+j+'">'+s+'</option>').join("")+"</select></div>").join("");
function fmt(n){return"\xA5"+n.toLocaleString()}
function calc(){
var r=$("rm").selectedIndex,y=+$("yr").value,z=$("zn").selectedIndex,a=RM[r],rs=[],tT=0,lT=0,cT=0;
if(y<0||isNaN(y)){alert("入居年数を正しく入力してください");return}
IT.forEach(function(it,i){var sv=+$("s"+i).value;if(!sv)return;var base=it.f(a,z,r),cost=Math.round(base*SM[sv]),tb=0,lb=0;
if(!ST[sv]){lb=cost}else if(it.y>0){var rem=Math.max(1-y/it.y,.1);tb=Math.round(cost*rem);lb=cost-tb}else{tb=cost}
rs.push({n:it.n,sv:SV[sv],cost:cost,tb:tb,lb:lb,dep:it.y>0?Math.round((1-Math.max(1-y/it.y,.1))*100):0});tT+=tb;lT+=lb;cT+=cost});
if(!rs.length){alert("損傷箇所を1つ以上選択してください");return}
$("hd").setAttribute("data-d",new Date().toLocaleDateString("ja-JP"));
var pri=rs.filter(function(x){return x.tb>0}).sort(function(a,b){return b.tb-a.tb}),pct=cT?Math.round(tT/cT*100):0;
var h='<div class="cd"><h2>見積もり結果</h2><div class="info">'+RN[r]+' ／ 入居'+y+'年 ／ '+ZN[z]+' ／ 専有面積 約'+a+'㎡</div><div class="sum"><div class="s1"><div class="sl">修繕総額</div><div class="sv">'+fmt(cT)+'</div></div><div class="s2"><div class="sl">貸主負担</div><div class="sv">'+fmt(lT)+'</div></div><div class="s3"><div class="sl">借主負担</div><div class="sv">'+fmt(tT)+'</div></div></div><div style="font-size:.82em;margin-bottom:10px">借主負担率 <b>'+pct+'%</b><div class="bar"><div style="width:'+pct+'%"></div></div></div><table><tr><th>項目</th><th>状態</th><th class="r">修繕費</th><th class="r">経年控除</th><th class="r">貸主負担</th><th class="r">借主負担</th></tr>';
rs.forEach(function(x){h+='<tr><td>'+x.n+'</td><td style="font-size:.76em">'+x.sv+'</td><td class="r">'+fmt(x.cost)+'</td><td class="r">'+x.dep+'%</td><td class="r">'+fmt(x.lb)+'</td><td class="r" style="color:#e53e3e;font-weight:600">'+fmt(x.tb)+'</td></tr>'});
h+='<tr style="font-weight:700;background:#f7fafc"><td colspan="2">合計</td><td class="r">'+fmt(cT)+'</td><td></td><td class="r">'+fmt(lT)+'</td><td class="r" style="color:#e53e3e">'+fmt(tT)+'</td></tr></table>';
if(pri.length){h+='<h2 style="margin-top:10px">借主負担 優先度ランキング</h2><div class="pri">';pri.forEach(function(x){h+='<div>'+x.n+'：'+fmt(x.tb)+'（経年控除 '+x.dep+'%）</div>'});h+='</div>'}
h+='<div class="note">※ 国交省「原状回復をめぐるトラブルとガイドライン」（再改訂版）に基づく概算です。実際の精算額は契約内容・特約により異なります。<br>※ 経年控除は定額法（残存価値10%下限）。耐用年数：クロス・CF・畳・エアコン＝6年、給湯器・設備＝15年、フローリング＝22年（木造基準）。<br>※ 修繕単価はエリア別の市場相場参考値です。襖・障子・鍵・クリーニングは経年控除なし。</div>';
h+='<button class="btn2 np" onclick="window.print()">精算書として印刷</button> <button class="btn2 np" style="background:#4a5568" onclick="$(\'res\').classList.add(\'hide\');window.scrollTo(0,0)">条件を変更</button></div>';
var rd=$("res");rd.innerHTML=h;rd.classList.remove("hide");rd.scrollIntoView({behavior:"smooth"})}
</script></body></html>
