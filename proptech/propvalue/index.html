tr:nth-child(even){background:#f8f9fb}
.disc{font-size:.6em;color:#999;text-align:center;margin-top:12px;padding:8px;border:1px dashed #ccc;border-radius:6px}
.hidden{display:none}
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.72em;color:#fff;font-weight:600}
.tag-buy{background:#27ae60}.tag-hold{background:#f39c12}.tag-avoid{background:#c0392b}
</style>

<div class="wrap">
<h1>PropValue</h1>
<p class="sub">不動産投資スコアリングシミュレーター｜Kusasyu PropTech</p>

<div class="card">
<h2>物件情報</h2>
<div class="grid">
<div class="fg"><label>購入価格（万円）</label><input id="price" type="number" value="3000"></div>
<div class="fg"><label>想定月額賃料（万円）</label><input id="rent" type="number" value="12" step="0.1"></div>
<div class="fg"><label>管理費（月額・万円）</label><input id="mgmt" type="number" value="1.0" step="0.1"></div>
<div class="fg"><label>修繕積立金（月額・万円）</label><input id="repair" type="number" value="0.8" step="0.1"></div>
</div>
</div>

<div class="card">
<h2>ローン条件</h2>
<div class="grid">
<div class="fg"><label>頭金（万円）</label><input id="down" type="number" value="300"></div>
<div class="fg"><label>金利（年%）</label><input id="rate" type="number" value="1.5" step="0.1"></div>
<div class="fg"><label>返済期間（年）</label><input id="term" type="number" value="35"></div>
<div class="fg"><label>エリア区分</label>
<select id="area">
<option value="0">東京23区</option>
<option value="1" selected>首都圏（23区外）</option>
<option value="2">地方中核市</option>
<option value="3">地方</option>
</select></div>
</div>
</div>

<button class="btn" onclick="run()">PropValueスコアを算出</button>

<div id="result" class="hidden"></div>

<div class="disc">※本ツールは投資判断の参考情報であり、投資助言ではありません。固定資産税は評価額（購入価格の70%想定）×1.4%、都市計画税は×0.3%で概算。空室損失は想定賃料の5%。実際の投資は専門家にご相談ください。</div>
</div>

<script>
function g(id){return parseFloat(document.getElementById(id).value)||0}

function pmt(r,n,pv){
if(r===0)return pv/n;
var x=Math.pow(1+r,n);
return pv*r*x/(x-1);
}

var BM=[
[3.8,5.5,2.3,3.5,4.0],
[5.0,7.5,3.2,5.0,5.5],
[6.5,10.0,4.5,7.0,7.0],
[8.0,15.0,5.5,10.0,9.0]
];
var AREA_NAME=['東京23区','首都圏','地方中核市','地方'];

function run(){
var price=g('price'),rent=g('rent'),mgmt=g('mgmt'),repair=g('repair');
var down=g('down'),rate=g('rate'),term=g('term'),ai=parseInt(document.getElementById('area').value);

if(price<=0||rent<=0){alert('購入価格と賃料を入力してください');return}
if(down>=price){alert('頭金は購入価格未満にしてください');return}
if(down<=0)down=1;

var annualRent=rent*12;
var annualMgmt=(mgmt+repair)*12;
var assessed=price*0.7;
var propTax=assessed*0.014;
var cityTax=assessed*0.003;
var vacancy=annualRent*0.05;
var totalExp=annualMgmt+propTax+cityTax+vacancy;
var netIncome=annualRent-totalExp;

var loan=price-down;
var mr=rate/100/12;
var months=term*12;
var annualPmt=(loan>0)?pmt(mr,months,loan)*12:0;
var annualCF=netIncome-annualPmt;
var grossY=annualRent/price*100;
var netY=netIncome/price*100;
var ccr=annualCF/down*100;
var repayRatio=annualRent>0?annualPmt/annualRent*100:0;

var cf10=[],cumCF=0,bal=loan;
for(var y=1;y<=10;y++){
  var intY=0,prinY=0;
  for(var m=0;m<12;m++){
    if(bal<=0)break;
    var intM=bal*mr;
    var pmtM=pmt(mr,months-(y-1)*12-m,bal);
    if(pmtM>bal+intM)pmtM=bal+intM;
    intY+=intM;prinY+=pmtM-intM;bal-=(pmtM-intM);
  }
  var cfY=netIncome-intY-prinY;
  cumCF+=cfY;
  cf10.push({year:y,cf:cfY,cum:cumCF,bal:Math.max(bal,0)});
}

var bm=BM[ai];
var s1=scoreYield(netY,bm);
var s2=scoreRepay(repayRatio);
var s3=scoreCCR(ccr,bm[4]);
var s4=scoreCF(annualCF,annualRent);
var total=s1.s+s2.s+s3.s+s4.s;

var judge,jcls;
if(total>=75){judge='割安 — 投資妙味あり';jcls='tag-buy'}
else if(total>=50){judge='適正 — 条件次第で検討可';jcls='tag-hold'}
else{judge='割高 — 慎重な検討が必要';jcls='tag-avoid'}

var sc=total>=75?'#27ae60':total>=50?'#f39c12':'#c0392b';

var h='<div class="card"><h2>PropValueスコア</h2>';
h+='<div class="score-circle" style="background:'+sc+'"><span class="n">'+total+'</span><span class="u">/ 100</span></div>';
h+='<div class="judge"><span class="tag '+jcls+'">'+judge+'</span></div>';
h+='<p style="text-align:center;font-size:.75em;color:#888;margin-top:4px">エリア: '+AREA_NAME[ai]+'基準で評価</p>';
h+=bar('利回り水準',s1.s,30,s1.c);
h+=bar('返済比率',s2.s,20,s2.c);
h+=bar('CCR（自己資金利回り）',s3.s,25,s3.c);
h+=bar('CF安定性',s4.s,25,s4.c);
h+='</div>';

h+='<div class="card"><h2>収益指標</h2><div class="kpi-row">';
h+=kpi(grossY.toFixed(2)+'%','表面利回り');
h+=kpi(netY.toFixed(2)+'%','実質利回り');
h+=kpi(ccr.toFixed(2)+'%','CCR');
h+=kpi(fmt(annualCF)+'万','年間CF');
h+=kpi(fmt(cumCF)+'万','10年累計CF');
h+=kpi(repayRatio.toFixed(1)+'%','返済比率');
h+='</div></div>';

h+='<div class="card"><h2>経費内訳（年額）</h2><div class="kpi-row">';
h+=kpi(fmt(annualMgmt)+'万','管理費+修繕');
h+=kpi(fmt(propTax)+'万','固定資産税');
h+=kpi(fmt(cityTax)+'万','都市計画税');
h+=kpi(fmt(vacancy)+'万','空室損失(5%)');
h+=kpi(fmt(totalExp)+'万','経費合計');
h+=kpi(fmt(annualPmt)+'万','年間返済額');
h+='</div></div>';

h+='<div class="card"><h2>10年キャッシュフロー推移</h2>';
h+='<canvas id="chart" width="800" height="280"></canvas>';
h+='<table><tr><th>年</th><th>年間CF</th><th>累計CF</th><th>残債</th></tr>';
for(var i=0;i<10;i++){
  var r=cf10[i];
  h+='<tr><td style="text-align:center">'+r.year+'年目</td><td>'+fmt(r.cf)+'万</td><td>'+fmt(r.cum)+'万</td><td>'+fmt(r.bal)+'万</td></tr>';
}
h+='</table></div>';

var adv=[];
if(s1.s<20)adv.push('実質利回りがエリア平均を下回っています。<strong>購入価格を'+fmt(price*0.9)+'万円以下</strong>に交渉できれば利回りが改善します。');
if(s2.s<12)adv.push('返済比率が'+repayRatio.toFixed(1)+'%と高めです。<strong>頭金を'+fmt(down*1.5)+'万円に増額</strong>すると返済負担が軽減されます。');
if(s3.s<15)adv.push('CCRが低く自己資金の効率が悪い状態です。<strong>金利'+Math.max(rate-0.3,0.5).toFixed(1)+'%以下</strong>のローンを探すか、頭金比率を見直しましょう。');
if(s4.s<15)adv.push('年間CFがマイナスまたは薄利です。<strong>賃料'+fmt(rent*1.1)+'万円/月</strong>以上が見込めるか、管理コスト削減を検討してください。');
if(adv.length===0)adv.push('各指標が良好なバランスです。物件の現地調査・修繕履歴の確認を行った上で、購入検討を進めて問題ありません。');

h+='<div class="card"><h2>改善アドバイス</h2><div class="advice-box">';
for(var i=0;i<adv.length;i++)h+='<p style="margin-bottom:6px">'+adv[i]+'</p>';
h+='</div></div>';

document.getElementById('result').innerHTML=h;
document.getElementById('result').classList.remove('hidden');
drawChart(cf10);
}

function scoreYield(netY,bm){
var mid=(bm[2]+bm[3])/2;
var r=netY/mid;
var s=Math.min(Math.round(r*22),30);
if(s<0)s=0;
var c=netY>=bm[3]?'#27ae60':netY>=bm[2]?'#f39c12':'#c0392b';
return{s:s,c:c};
}
function scoreRepay(rr){
var s;
if(rr<=40)s=20;else if(rr<=50)s=16;else if(rr<=60)s=12;else if(rr<=70)s=7;else s=3;
var c=rr<=45?'#27ae60':rr<=55?'#f39c12':'#c0392b';
return{s:s,c:c};
}
function scoreCCR(ccr,target){
var r=ccr/target;
var s=Math.min(Math.round(r*18),25);
if(s<0)s=0;
var c=ccr>=target?'#27ae60':ccr>=target*0.6?'#f39c12':'#c0392b';
return{s:s,c:c};
}
function scoreCF(cf,rent){
var ratio=rent>0?cf/rent:0;
var s;
if(ratio>=0.25)s=25;else if(ratio>=0.15)s=20;else if(ratio>=0.05)s=14;else if(ratio>=0)s=8;else s=3;
var c=ratio>=0.15?'#27ae60':ratio>=0.05?'#f39c12':'#c0392b';
return{s:s,c:c};
}

function bar(label,val,max,color){
var pct=val/max*100;
return '<div class="bar-wrap"><div class="bar-label"><span>'+label+'</span><span>'+val+' / '+max+'点</span></div><div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+color+'"></div></div></div>';
}
function kpi(v,l){return '<div class="kpi"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>'}
function fmt(n){return Math.round(n*10)/10}

function drawChart(data){
var c=document.getElementById('chart');
if(!c)return;
var ctx=c.getContext('2d');
var W=c.width,H=c.height;
ctx.clearRect(0,0,W,H);

var vals=data.map(function(d){return d.cf});
var cums=data.map(function(d){return d.cum});
var all=vals.concat(cums);
var mn=Math.min.apply(null,all);
var mx=Math.max.apply(null,all);
if(mn>0)mn=0;
var range=mx-mn||1;

var pad={l:60,r:20,t:20,b:30};
var pw=W-pad.l-pad.r;
var ph=H-pad.t-pad.b;
var bw=pw/10*0.35;

function yPos(v){return pad.t+ph*(1-(v-mn)/range)}
var zeroY=yPos(0);

ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1;
for(var i=0;i<=4;i++){
  var v=mn+(mx-mn)*i/4;
  var y=yPos(v);
  ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
  ctx.fillStyle='#888';ctx.font='11px sans-serif';ctx.textAlign='right';
  ctx.fillText(Math.round(v)+'万',pad.l-6,y+4);
}

for(var i=0;i<10;i++){
  var x=pad.l+pw/10*i+pw/10*0.15;
  var h1=zeroY-yPos(vals[i]);
  ctx.fillStyle=vals[i]>=0?'rgba(39,174,96,.7)':'rgba(192,57,43,.7)';
  if(vals[i]>=0)ctx.fillRect(x,yPos(vals[i]),bw,h1);
  else ctx.fillRect(x,zeroY,bw,-h1);
  ctx.fillStyle='#555';ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText((i+1)+'年',x+bw/2+bw*0.7,H-pad.b+14);
}

ctx.beginPath();ctx.strokeStyle='#e94560';ctx.lineWidth=2.5;
for(var i=0;i<10;i++){
  var x=pad.l+pw/10*i+pw/10*0.5;
  var y=yPos(cums[i]);
  if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
}
ctx.stroke();
for(var i=0;i<10;i++){
  var x=pad.l+pw/10*i+pw/10*0.5;
  var y=yPos(cums[i]);
  ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);ctx.fillStyle='#e94560';ctx.fill();
}

ctx.fillStyle='rgba(39,174,96,.7)';ctx.fillRect(pad.l+10,pad.t-2,14,10);
ctx.fillStyle='#333';ctx.font='11px sans-serif';ctx.textAlign='left';ctx.fillText('年間CF',pad.l+28,pad.t+8);
ctx.strokeStyle='#e94560';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(pad.l+100,pad.t+3);ctx.lineTo(pad.l+116,pad.t+3);ctx.stroke();
ctx.fillStyle='#333';ctx.fillText('累計CF',pad.l+120,pad.t+8);

ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.setLineDash([4,3]);
ctx.beginPath();ctx.moveTo(pad.l,zeroY);ctx.lineTo(W-pad.r,zeroY);ctx.stroke();
ctx.setLineDash([]);
}
</script>
