<div class="w">
<header><h1>PropCost</h1><p class="sub">不動産契約書 条項別コストインパクト診断ツール ― 隠れコストを金額で可視化</p></header>
<div class="tabs">
<button class="tab on" onclick="sw(0)">単一物件診断</button>
<button class="tab" onclick="sw(1)">物件比較モード（最大3件）</button>
</div>
<div id="S"></div>
<div id="C" style="display:none"></div>
<button class="btn" onclick="run()">&#9654; 診断を実行する</button>
<div class="res" id="R"></div>
<p class="note" style="margin-top:12px;text-align:center">※ 本ツールの試算は最悪ケースの概算です。実際の契約内容・地域慣行により異なります。<br>Powered by Kusasyu PropTech</p>
</div>
<script>
const CL=[
{n:'原状回復',o:['軽微(500円/㎡)','標準(2,000円/㎡)','全面(5,000円/㎡)','負担なし'],f:(i,r,a,y)=>[a*500,a*2e3,a*5e3,0][i],tip:'退去時の原状回復工事費用'},
{n:'違約金(中途解約)',o:['なし','賃料1ヶ月分','賃料2ヶ月分','賃料3ヶ月分以上'],f:(i,r)=>[0,r,r*2,r*3][i],tip:'契約期間内の中途解約時ペナルティ'},
{n:'更新料',o:['なし','0.5ヶ月/2年毎','1ヶ月/2年毎','1.5ヶ月/2年毎'],f:(i,r,a,y)=>[0,r*.5,r,r*1.5][i]*Math.max(0,Math.floor(y/2)),tip:'契約更新ごとに発生する費用の累計'},
{n:'修繕負担',o:['貸主全額負担','借主30%負担','借主50%負担','借主全額負担'],f:(i,r,a,y)=>[0,a*800*.3,a*800*.5,a*800][i]*y,tip:'年間の修繕費用のうち借主負担分の累計'},
{n:'解約予告期間',o:['1ヶ月前(標準)','3ヶ月前','6ヶ月前','即時解約不可'],f:(i,r)=>[0,r*2,r*5,r*6][i],tip:'標準より長い予告期間分の余剰家賃'},
{n:'敷金償却',o:['償却なし(全額返還)','1ヶ月分償却','2ヶ月分償却','3ヶ月分償却'],f:(i,r)=>[0,r,r*2,r*3][i],tip:'退去時に返還されない敷金'},
{n:'保証金',o:['なし','3ヶ月(償却20%)','6ヶ月(償却20%)','6ヶ月(償却30%)'],f:(i,r)=>[0,r*3*.2,r*6*.2,r*6*.3][i],tip:'退去時に返還されない保証金の償却分'},
{n:'賃料改定条項',o:['賃料固定','上限3%/年','上限5%/年','上限定めなし'],f:(i,r,a,y)=>{let p=[0,.03,.05,.1][i];let t=0;for(let k=1;k<=y;k++)t+=r*12*Math.pow(1+p,k)-r*12;return Math.round(t)},tip:'賃料値上げによる契約期間中の累計増額'},
{n:'禁止事項違反金',o:['規定なし','上限10万円','上限30万円','上限50万円超'],f:(i)=>[0,1e5,3e5,5e5][i],tip:'用途違反・ペット・騒音等の違反ペナルティ'},
{n:'特約条項リスク',o:['特約なし','低リスク(賃料1ヶ月相当)','中リスク(賃料3ヶ月相当)','高リスク(賃料6ヶ月相当)'],f:(i,r)=>[0,r,r*3,r*6][i],tip:'競業避止・用途制限等の特約による損失'}
];
let M=0;
function sw(m){M=m;document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',i===m));S.style.display=m?'none':'';C.style.display=m?'':'none';R.style.display='none'}
function pf(id,ttl){
let h='<div class="cd"><h3>'+(ttl||'物件情報の入力')+'</h3>';
if(ttl)h+='<label>物件名</label><input id="'+id+'N" placeholder="例：○○ビル3F">';
h+='<div class="g2"><div><label>月額賃料（円）</label><input type="number" id="'+id+'R" value="120000"></div><div><label>専有面積（㎡）</label><input type="number" id="'+id+'A" value="35"></div></div>';
h+='<div class="g2"><div><label>契約期間（年）</label><select id="'+id+'Y"><option value="2">2年</option><option value="3">3年</option><option value="5">5年</option><option value="10">10年</option></select></div><div></div></div></div>';
h+='<div class="cd"><h3>条項別チェック（10項目）</h3><div class="g2">';
CL.forEach((c,i)=>{h+='<div><label title="'+c.tip+'">'+c.n+' <span style="color:#a0aec0">&#8505;</span></label><select id="'+id+'_'+i+'">';c.o.forEach((op,j)=>h+='<option value="'+j+'">'+op+'</option>');h+='</select></div>'});
return h+'</div></div>'}
function init(){S.innerHTML=pf('p','');let h='<div class="g3">';for(let i=1;i<=3;i++)h+='<div>'+pf('q'+i,'物件'+i)+'</div>';C.innerHTML=h+'</div>'}
function gv(id){
let r=+(document.getElementById(id+'R').value)||0,a=+(document.getElementById(id+'A').value)||0,y=+(document.getElementById(id+'Y').value)||2;
let cs=CL.map((c,i)=>{let o=+(document.getElementById(id+'_'+i).value);let v=Math.round(c.f(o,r,a,y));let g=v>r*5?'A':v>r*1.5?'B':'C';return{n:c.n,v,g,d:c.o[o]}});
return{r,a,y,cs,t:cs.reduce((s,c)=>s+c.v,0)}}
function fm(n){return n.toLocaleString()+'円'}
function mksvg(cs,w,ht){
let mx=Math.max(...cs.map(c=>c.v),1),bh=(ht-20)/cs.length;
let s='<svg viewBox="0 0 '+w+' '+ht+'" style="width:100%;max-width:'+w+'px;display:block;margin:0 auto">';
cs.forEach((c,i)=>{let bw=Math.max(c.v/mx*(w-170),2),cy=10+i*bh,cl=c.g==='A'?'#c53030':c.g==='B'?'#c05621':'#38a169';
s+='<text x="0" y="'+(cy+bh*.65)+'" font-size="11" fill="#4a5568" font-family="sans-serif">'+c.n+'</text>';
s+='<rect x="110" y="'+(cy+2)+'" width="'+bw+'" height="'+(bh-5)+'" rx="3" fill="'+cl+'" opacity=".85"/>';
if(c.v>0)s+='<text x="'+(114+bw)+'" y="'+(cy+bh*.65)+'" font-size="10" fill="#333" font-family="sans-serif">'+fm(c.v)+'</text>'});
return s+'</svg>'}
function rhtml(d,nm){
let sorted=[...d.cs].sort((a,b)=>b.v-a.v);
let h='<div class="cd">';if(nm)h+='<p class="pn">'+nm+'</p>';
h+='<div class="tot">隠れコスト総額: <span>'+fm(d.t)+'</span></div>';
h+='<div class="legend"><span><i style="background:#c53030"></i>A: 交渉最優先</span><span><i style="background:#c05621"></i>B: 要交渉</span><span><i style="background:#38a169"></i>C: 許容範囲</span></div>';
h+='<div class="cht">'+mksvg(sorted,480,300)+'</div>';
h+='<table><tr><th>#</th><th>条項</th><th>契約条件</th><th style="text-align:right">想定損失額</th><th>交渉度</th></tr>';
sorted.forEach((c,i)=>{h+='<tr><td>'+(i+1)+'</td><td>'+c.n+'</td><td style="font-size:.78em;color:#718096">'+c.d+'</td><td class="r">'+fm(c.v)+'</td><td class="r'+c.g+'">'+c.g+'</td></tr>'});
h+='</table><p class="note">交渉推奨度: A=月額賃料5ヶ月超 B=1.5ヶ月超 C=1.5ヶ月以下 ／ 契約期間'+d.y+'年での最悪ケース累計</p></div>';
return h}
function run(){
let h='';
if(M===0){h=rhtml(gv('p'),'')}
else{
let ds=[];
h+='<div class="g3">';
for(let i=1;i<=3;i++){let nm=document.getElementById('q'+i+'N').value||'物件'+i;let d=gv('q'+i);d.nm=nm;ds.push(d);h+='<div>'+rhtml(d,nm)+'</div>'}
h+='</div>';
ds.sort((a,b)=>a.t-b.t);
h+='<div class="cd cmpsum"><h3>総合比較サマリー</h3><table><tr><th>推奨順位</th><th>物件名</th><th style="text-align:right">隠れコスト総額</th><th style="text-align:right">月額換算</th></tr>';
ds.forEach((d,i)=>{let cl=i===0?' class="best"':'';h+='<tr><td>'+(i+1)+'位'+(i===0?' ★':'')+'</td><td'+cl+'>'+d.nm+'</td><td class="r"'+cl+'>'+fm(d.t)+'</td><td class="r"'+cl+'>'+fm(Math.round(d.t/(d.y*12)))+'/月</td></tr>'});
h+='</table><p class="note">★ 隠れコストが最も少ない物件を推奨。月額換算は契約期間で除算した参考値です。</p></div>'}
R.innerHTML=h;R.style.display='block';R.scrollIntoView({behavior:'smooth'})}
init();
</script></body></html>
