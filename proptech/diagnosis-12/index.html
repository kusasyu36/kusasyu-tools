<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/proptech/" style="color:#4299e1;text-decoration:none;">kusasyu PropTech</a> &gt; <span style="color:#718096;">不動産投資スコア即診断ツール</span></div>
<div class="wrap">
<h1>不動産投資スコア即診断ツール</h1>
<p class="sub">物件情報を入力するだけで投資判定を即座に算出</p>

<div class="card">
<h2>物件情報</h2>
<div class="grid">
<div><label>物件価格</label><input id="price" type="number" value="2500" step="10"><div class="unit">万円</div></div>
<div><label>専有面積</label><input id="area" type="number" value="25" step="0.1"><div class="unit">㎡</div></div>
<div><label>築年数</label><input id="age" type="number" value="15" step="1"><div class="unit">年</div></div>
<div><label>最寄駅（徒歩）</label><input id="dist" type="number" value="7" step="1"><div class="unit">分</div></div>
<div><label>想定月額家賃</label><input id="rent" type="number" value="8.5" step="0.1"><div class="unit">万円</div></div>
<div><label>管理費＋修繕積立金</label><input id="mgmt" type="number" value="1.5" step="0.1"><div class="unit">万円/月</div></div>
<div><label>エリア区分</label>
<select id="areaType"><option value="1">政令市中心部</option><option value="2" selected>地方中核市</option><option value="3">郊外</option></select></div>
</div>
</div>

<div class="card">
<h2>ローン条件</h2>
<div class="grid">
<div><label>借入金利（年）</label><input id="rate" type="number" value="1.8" step="0.1"><div class="unit">%</div></div>
<div><label>借入期間</label><input id="term" type="number" value="35" step="1"><div class="unit">年</div></div>
<div><label>頭金</label><input id="down" type="number" value="500" step="10"><div class="unit">万円</div></div>
</div>
</div>

<button class="btn" onclick="calc()">診断する</button>

<div id="result">
<div class="card">
<h2>総合投資判定</h2>
<div id="gradeBox" class="grade-box"></div>
<div class="metrics" id="metrics"></div>
</div>
<div class="card">
<h2>リスク分析</h2>
<div id="bars"></div>
<div class="note">※空室リスクスコアはエリア区分・築年数・駅距離の加重平均による概算値です。実際の空室率は周辺相場・物件固有条件により変動します。投資判断は専門家への相談を推奨します。</div>
</div>
<div class="card">
<h2>収支シミュレーション</h2>
<table id="cfTable"></table>
</div>
</div>
</div>

<script>
function v(id){return parseFloat(document.getElementById(id).value)||0}
function fmt(n){return n>=1e4?(n/1e4).toFixed(1)+'億':n>=1?n.toFixed(1)+'万':Math.round(n*1e4).toLocaleString()+'円'}

function calc(){
 var P=v('price'),A=v('area'),AG=v('age'),D=v('dist'),R=v('rent'),MG=v('mgmt'),AT=v('areaType'),
     RT=v('rate'),TM=v('term'),DN=v('down');
 if(P<=0||R<=0){alert('価格と家賃を入力してください');return}

 var annRent=R*12, annMgmt=MG*12;
 // 固定資産税概算（価格の0.7%）
 var tax=P*0.007;
 // 空室リスクスコア算出
 var aS=AT, agS=AG<=10?1:AG<=20?2:AG<=30?3:4, dS=D<=5?1:D<=10?2:D<=15?3:4;
 var vacScore=Math.min(10,Math.round((aS*0.4+agS*0.3+dS*0.3)*2.5));
 var vacRate=vacScore*0.02;// スコア1→2%, 10→20%

 var annVacLoss=annRent*vacRate;
 var annExp=annMgmt+tax+annVacLoss;
 var grossY=(annRent/P)*100;
 var netY=((annRent-annExp)/P)*100;

 // ローン計算
 var loan=P-DN, monthPay=0, annLoan=0;
 if(loan>0&&RT>0&&TM>0){
  var mr=RT/100/12, n=TM*12;
  monthPay=loan*mr*Math.pow(1+mr,n)/(Math.pow(1+mr,n)-1);
  annLoan=monthPay*12;
 }else if(loan>0){annLoan=loan/TM}

 var annCF=annRent-annExp-annLoan;
 var recoverY=annCF>0?Math.round(P/annCF*10)/10:999;

 // 総合スコア算出（100点満点）
 var sY=Math.min(30,netY*5);// 実質利回り6%→30点
 var sCF=annCF>0?Math.min(25,annCF/P*100*5):0;
 var sR=recoverY<=15?25:recoverY<=25?15:recoverY<=35?8:0;
 var sV=Math.max(0,(10-vacScore)*2);// 空室低→高得点
 var total=Math.round(sY+sCF+sR+sV);

 var grade,gCol,gBg;
 if(total>=80){grade='S';gCol='#276749';gBg='#c6f6d5'}
 else if(total>=65){grade='A';gCol='#2b6cb0';gBg='#bee3f8'}
 else if(total>=50){grade='B';gCol='#975a16';gBg='#fefcbf'}
 else if(total>=35){grade='C';gCol='#c05621';gBg='#feebc8'}
 else{grade='D';gCol='#c53030';gBg='#fed7d7'}

 var msgs={S:'非常に優良な投資案件です',A:'良好な投資案件です',B:'標準的な投資案件です',C:'リスクに注意が必要です',D:'投資は慎重に再検討してください'};

 document.getElementById('gradeBox').innerHTML='<div class="g" style="color:'+gCol+'">'+grade+'</div><div class="gt" style="color:'+gCol+'">'+msgs[grade]+'（'+total+'点/100点）</div>';
 document.getElementById('gradeBox').style.background=gBg;

 var mets=[
  {l:'表面利回り',v:grossY.toFixed(2)+'%',c:grossY>=5?'pos':'neg'},
  {l:'実質利回り',v:netY.toFixed(2)+'%',c:netY>=3?'pos':'neg'},
  {l:'年間CF',v:(annCF>=0?'+':'')+annCF.toFixed(1)+'万',c:annCF>=0?'pos':'neg'},
  {l:'回収年数',v:recoverY>=999?'−':recoverY+'年',c:recoverY<=25?'pos':'neg'},
  {l:'月額ローン',v:monthPay.toFixed(2)+'万',c:''},
  {l:'空室リスク',v:vacScore+'/10',c:vacScore<=4?'pos':'neg'}
 ];
 document.getElementById('metrics').innerHTML=mets.map(function(m){return '<div class="metric"><div class="val '+m.c+'">'+m.v+'</div><div class="lbl">'+m.l+'</div></div>'}).join('');

 // リスクバー
 var bars=[
  {l:'空室リスク',v:vacScore*10,c:vacScore<=3?'#38a169':vacScore<=6?'#d69e2e':'#e53e3e'},
  {l:'利回り安全性',v:Math.min(100,netY*15),c:netY>=4?'#38a169':netY>=2?'#d69e2e':'#e53e3e'},
  {l:'キャッシュフロー',v:Math.min(100,Math.max(0,(annCF+10)/20*100)),c:annCF>=5?'#38a169':annCF>=0?'#d69e2e':'#e53e3e'}
 ];
 document.getElementById('bars').innerHTML=bars.map(function(b){return '<div class="bar-wrap"><div class="bar-label"><span>'+b.l+'</span><span>'+Math.round(b.v)+'%</span></div><div class="bar-bg"><div class="bar-fill" style="width:'+b.v+'%;background:'+b.c+'"></div></div></div>'}).join('');

 // 収支表（5年分）
 var rows='<tr><th>年</th><th>家賃収入</th><th>経費</th><th>ローン返済</th><th>CF</th><th>累計CF</th></tr>';
 var cumCF=0;
 for(var y=1;y<=5;y++){
  var r2=annRent*(1-0.005*(y-1));// 年0.5%家賃下落
  var e2=annExp*(1+0.003*(y-1));
  var cf2=r2-e2-annLoan; cumCF+=cf2;
  rows+='<tr><td>'+y+'年目</td><td>'+r2.toFixed(1)+'</td><td>'+e2.toFixed(1)+'</td><td>'+annLoan.toFixed(1)+'</td><td class="'+(cf2>=0?'pos':'neg')+'">'+cf2.toFixed(1)+'</td><td class="'+(cumCF>=0?'pos':'neg')+'">'+cumCF.toFixed(1)+'</td></tr>';
 }
 document.getElementById('cfTable').innerHTML=rows;
 document.getElementById('result').style.display='block';
 document.getElementById('result').scrollIntoView({behavior:'smooth'});
}
</script>
