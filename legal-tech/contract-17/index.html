<div id="s1" class="step active">
<h2 style="margin:16px 0 8px">契約書タイプを選択</h2>

<label class="tb" onclick="selT(1)"><input type="radio" name="ct" value="1">発注書・注文書</label>
<label class="tb" onclick="selT(2)"><input type="radio" name="ct" value="2">取引基本契約書</label>

<script>
var Q=[
[{q:"秘密情報の定義が明確に記載されているか？",c:"秘密保持",w:2},{q:"秘密保持義務の期間が定められているか？",c:"秘密保持",w:2},{q:"情報漏洩時の損害賠償条項があるか？",c:"秘密保持",w:3},{q:"従業員・再委託先への義務波及条項があるか？",c:"秘密保持",w:2},{q:"契約終了後の情報返却・破棄義務が明記されているか？",c:"秘密保持",w:2},{q:"秘密情報の例外規定（公知情報等）が定められているか？",c:"秘密保持",w:1},{q:"管轄裁判所が自社に不利でない場所か？",c:"製造物責任",w:1},{q:"知的財産権の帰属が明確か？",c:"秘密保持",w:2},{q:"目的外使用の禁止条項があるか？",c:"秘密保持",w:2},{q:"アクセス者の範囲が限定されているか？",c:"秘密保持",w:1},{q:"契約違反発見時の通知義務があるか？",c:"秘密保持",w:2},{q:"複写・複製の制限条項があるか？",c:"秘密保持",w:1}],
[{q:"発注書に数量・単価・納期が明記されているか？",c:"下請法",w:3},{q:"支払期日が受領日から60日以内か？",c:"下請法",w:3},{q:"不当な返品・やり直しの禁止条項があるか？",c:"下請法",w:3},{q:"買いたたき防止の価格決定プロセスがあるか？",c:"下請法",w:2},{q:"製造物の検収基準・期間が明確か？",c:"製造物責任",w:2},{q:"瑕疵担保（契約不適合）責任の範囲が適切か？",c:"製造物責任",w:3},{q:"PL保険の付保が求められているか？",c:"製造物責任",w:2},{q:"原材料・部品の支給条件が明確か？",c:"下請法",w:2},{q:"秘密保持条項が含まれているか？",c:"秘密保持",w:1},{q:"知的財産権の帰属が明記されているか？",c:"秘密保持",w:2},{q:"不可抗力条項（天災・疫病等）があるか？",c:"製造物責任",w:1},{q:"下請法3条書面の交付がなされているか？",c:"下請法",w:3}],
[{q:"契約期間と自動更新条件が明確か？",c:"下請法",w:2},{q:"支払条件が下請法に適合しているか？",c:"下請法",w:3},{q:"製造物責任の負担割合が明記されているか？",c:"製造物責任",w:3},{q:"品質保証基準と検査方法が定められているか？",c:"製造物責任",w:2},{q:"秘密保持義務と情報管理体制が規定されているか？",c:"秘密保持",w:2},{q:"解約条件と予告期間が適切か？",c:"下請法",w:2},{q:"損害賠償の上限・範囲が定められているか？",c:"製造物責任",w:3},{q:"下請法の禁止行為への対応条項があるか？",c:"下請法",w:3},{q:"知的財産・技術情報の取扱いが明確か？",c:"秘密保持",w:2},{q:"再委託の可否と条件が明記されているか？",c:"秘密保持",w:1},{q:"反社会的勢力排除条項があるか？",c:"製造物責任",w:1},{q:"紛争解決方法が定められているか？",c:"製造物責任",w:1}]
];
var TN=["秘密保持契約書（NDA）","発注書・注文書","取引基本契約書"],ct=-1,ans=[];
function selT(i){ct=i;document.querySelectorAll('.tb').forEach(function(e,j){e.classList.toggle('sel',j===i)});document.getElementById('b1').disabled=false}
function goQ(){document.getElementById('s1').classList.remove('active');document.getElementById('s2').classList.add('active');var a=document.getElementById('qa');ans=new Array(12).fill(null);Q[ct].forEach(function(q,i){var d=document.createElement('div');d.className='qc';d.innerHTML='<p>Q'+(i+1)+'. '+q.q+'</p><span>観点：'+q.c+'</span><div class="yn"><button onclick="pk('+i+',1,this)">はい</button><button onclick="pk('+i+',0,this)">いいえ</button></div>';a.appendChild(d)})}
function pk(i,v,el){ans[i]=v;el.parentElement.querySelectorAll('button').forEach(function(b){b.className=''});el.className=v?'yes':'no';document.getElementById('b2').disabled=ans.includes(null)}
function calc(){
var qs=Q[ct],total=0,max=0,cats={};
qs.forEach(function(q,i){max+=q.w;if(ans[i])total+=q.w;if(!cats[q.c])cats[q.c]={s:0,m:0,issues:[]};cats[q.c].m+=q.w;if(ans[i])cats[q.c].s+=q.w;else cats[q.c].issues.push(q.q)});
var pct=Math.round(total/max*100);
var rank=pct>=85?'A':pct>=65?'B':pct>=40?'C':'D';
var rl={A:'低リスク — 概ね適切に管理されています',B:'中リスク — 一部条項の改善が必要です',C:'高リスク — 早急な契約見直しを推奨します',D:'重大リスク — 直ちに専門家への相談を推奨します'};
var co={A:'#38a169',B:'#d69e2e',C:'#dd6b20',D:'#e53e3e'};
var h='<h2 style="text-align:center">診断結果</h2><p style="text-align:center;font-size:.9em;color:#718096">'+TN[ct]+'</p><div class="rank r'+rank+'">ランク '+rank+'</div><p style="text-align:center">'+rl[rank]+'</p><div class="bg"><div class="bf" style="width:'+pct+'%;background:'+co[rank]+'"></div></div><p style="text-align:center;font-size:.9em">スコア: '+total+'/'+max+'（'+pct+'%）</p>';
for(var c in cats){var ct2=cats[c];var cp=ct2.m?Math.round(ct2.s/ct2.m*100):0;h+='<div class="ct">'+c+'（'+cp+'%）</div>';if(ct2.issues.length){h+='<ul class="al">';ct2.issues.forEach(function(is){h+='<li>⚠ '+is+' → <strong>条項の追加・修正を検討</strong></li>'});h+='</ul>'}else h+='<p style="font-size:.9em;color:#38a169;margin:4px 0">✓ 問題なし</p>'}
h+='<p style="margin-top:16px;font-size:.8em;color:#a0aec0;text-align:center">診断日: '+new Date().toLocaleDateString('ja-JP')+' | Kusasyu Legal Tech</p>';
document.getElementById('res').innerHTML=h;document.getElementById('s2').classList.remove('active');document.getElementById('s3').classList.add('active')}
</script>
