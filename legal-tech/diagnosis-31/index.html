<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/legal-tech/" style="color:#4299e1;text-decoration:none;">kusasyu Legal Tech</a> &gt; <span style="color:#718096;">下請法違反リスク_セルフ診断ツール</span></div>
<div class="wrap">
<h1>下請法違反リスク セルフ診断ツール</h1>
<p class="sub">Kusasyu Legal Tech — 禁止行為11類型を自動判定（2024年改正対応）</p>

<div class="card"><h2>1. 取引基本情報</h2>
<label>取引種別</label>
<select id="txType"><option value="manufacturing">製造委託</option><option value="repair">修理委託</option><option value="info">情報成果物作成委託</option><option value="service">役務提供委託</option></select>
<div class="row">
<div><label>親事業者の資本金</label><select id="pCap"><option value="300">3億円超</option><option value="100">1千万円超〜3億円以下</option><option value="10">1千万円以下</option></select></div>
<div><label>下請事業者の資本金</label><select id="sCap"><option value="100">3億円以下</option><option value="10">1千万円超〜3億円以下</option><option value="1">1千万円以下</option></select></div>
</div>
<p class="note">※ 親事業者3億円超 × 下請3億円以下、又は親1千万超〜3億 × 下請1千万以下が適用対象</p>
</div>

<div class="card"><h2>2. 支払条件（確定判定6類型）</h2>
<div class="row">
<div><label>支払サイト（日数）</label><input type="number" id="payDays" value="60" min="0" max="365"></div>
<div><label>手形サイト（日数）</label><input type="number" id="billDays" value="60" min="0" max="365"></div>
</div>
<label>下請代金の減額</label>
<select id="deduction"><option value="0">減額なし</option><option value="1">協賛金・歩引き等で減額あり</option><option value="2">振込手数料を差し引いて支払い</option></select>
<label>返品の状況</label>
<select id="returnSt"><option value="0">返品なし</option><option value="1">受領後に不良品以外を返品</option><option value="2">受領後6ヶ月超で不良品を返品</option></select>
<label>有償支給原材料の対価決済</label>
<select id="supplyPay"><option value="0">下請代金支払時に相殺</option><option value="1">下請代金支払より早期に決済</option><option value="2">該当なし</option></select>
<label>受領拒否の有無</label>
<select id="refusal"><option value="0">拒否なし</option><option value="1">正当理由なく受領拒否あり</option></select>
</div>

<div class="card"><h2>3. リスク要因チェック（要注意5類型）</h2>
<div class="chk"><input type="checkbox" id="c1"><label for="c1">通常支払価格より著しく低い単価を一方的に設定</label></div>
<div class="chk"><input type="checkbox" id="c2"><label for="c2">単価改定の協議記録が残っていない</label></div>
<div class="chk"><input type="checkbox" id="c3"><label for="c3">自社製品・サービスの購入を要請している</label></div>
<div class="chk"><input type="checkbox" id="c4"><label for="c4">金銭・役務の提供を要請（協賛金・従業員派遣等）</label></div>
<div class="chk"><input type="checkbox" id="c5"><label for="c5">発注後に仕様変更し、費用増分を負担しない</label></div>
<div class="chk"><input type="checkbox" id="c6"><label for="c6">やり直しを指示し、費用を負担しない</label></div>
<div class="chk"><input type="checkbox" id="c7"><label for="c7">下請事業者が公取委に相談したことを理由に取引縮小</label></div>
</div>

<button class="btn" onclick="diagnose()">診断を実行する</button>

<div id="result">
<div class="card"><h2>診断結果</h2>
<div class="score" id="scoreArea"></div>
<div id="details"></div>
<div class="guide" id="guideArea"></div>
</div>
</div>

<script>
function diagnose(){
const r=[];
const txType=document.getElementById('txType').value;
const pCap=+document.getElementById('pCap').value;
const sCap=+document.getElementById('sCap').value;
const payDays=+document.getElementById('payDays').value;
const billDays=+document.getElementById('billDays').value;
const ded=+document.getElementById('deduction').value;
const ret=+document.getElementById('returnSt').value;
const sup=+document.getElementById('supplyPay').value;
const ref=+document.getElementById('refusal').value;

let applicable=false;
if(pCap>=300&&sCap<=100)applicable=true;
if(pCap>=100&&pCap<300&&sCap<=10)applicable=true;
if(pCap==100&&sCap<=1)applicable=true;
if(!applicable){
r.push({type:'ok',title:'適用対象外',law:'',desc:'入力された資本金区分では下請法の適用対象外です。ただし独禁法の優越的地位の濫用に該当する可能性があります。',action:''});
}else{
if(payDays>60)r.push({type:'vio',title:'①支払遅延【違反】',law:'第4条1項2号',desc:'受領日から'+payDays+'日で支払サイトが60日超過。法定上限は60日以内。',action:'支払サイトを60日以内に短縮し、遅延利息（年14.6%）を支払う。'});
else r.push({type:'ok',title:'①支払遅延【適法】',law:'第4条1項2号',desc:'支払サイト'+payDays+'日は法定上限60日以内。',action:''});

if(ded==1)r.push({type:'vio',title:'②下請代金の減額【違反】',law:'第4条1項3号',desc:'協賛金・歩引き等による減額は、名目を問わず禁止。',action:'減額分を直ちに支払い、今後の減額行為を中止する。'});
else if(ded==2)r.push({type:'vio',title:'②下請代金の減額【違反】',law:'第4条1項3号',desc:'振込手数料の一方的差引は減額に該当。',action:'実費を超える手数料差引を中止し、差額を支払う。'});
else r.push({type:'ok',title:'②下請代金の減額【適法】',law:'第4条1項3号',desc:'減額行為は確認されません。',action:''});

if(ret==1)r.push({type:'vio',title:'③返品【違反】',law:'第4条1項4号',desc:'不良品以外の返品は原則禁止。',action:'返品した物品を引き取り、代金を支払う。'});
else if(ret==2)r.push({type:'vio',title:'③返品【違反】',law:'第4条1項4号',desc:'受領後6ヶ月超の返品は不良品でも原則禁止。',action:'受入検査体制を整備し、早期に不良品を発見する体制を構築。'});
else r.push({type:'ok',title:'③返品【適法】',law:'第4条1項4号',desc:'不当な返品は確認されません。',action:''});

if(sup==1)r.push({type:'vio',title:'④有償支給原材料の早期決済【違反】',law:'第4条2項1号',desc:'下請代金の支払期日より早く原材料対価を決済することは禁止。',action:'原材料対価の決済を下請代金支払時以降に変更。'});
else r.push({type:'ok',title:'④有償支給原材料の早期決済【適法】',law:'第4条2項1号',desc:'早期決済は確認されません。',action:''});

if(billDays>120)r.push({type:'vio',title:'⑤割引困難な手形【違反】',law:'第4条2項2号',desc:'手形サイト'+billDays+'日は120日超。繊維業は90日超で違反。',action:'手形サイトを120日以内（繊維業90日以内）に短縮、又は現金払いに移行。'});
else if(billDays>90)r.push({type:'warn',title:'⑤割引困難な手形【要注意】',law:'第4条2項2号',desc:'手形サイト'+billDays+'日。繊維業の場合90日超で違反。',action:'業種を確認し、繊維業であれば90日以内に短縮。'});
else r.push({type:'ok',title:'⑤割引困難な手形【適法】',law:'第4条2項2号',desc:'手形サイト'+billDays+'日は基準内。',action:''});

if(ref==1)r.push({type:'vio',title:'⑥受領拒否【違反】',law:'第4条1項1号',desc:'正当理由のない受領拒否は禁止。',action:'発注取消・数量変更時は下請事業者の損害を賠償。'});
else r.push({type:'ok',title:'⑥受領拒否【適法】',law:'第4条1項1号',desc:'不当な受領拒否は確認されません。',action:''});

if(document.getElementById('c1').checked||document.getElementById('c2').checked)
r.push({type:'warn',title:'⑦買いたたき【要注意】',law:'第4条1項5号',desc:'通常支払価格と比べ著しく低い単価設定、又は協議不十分の可能性。',action:'【専門家確認推奨】類似取引の市場価格を調査し、単価決定の協議記録を整備。'});
if(document.getElementById('c3').checked)
r.push({type:'warn',title:'⑧購入・利用強制【要注意】',law:'第4条1項6号',desc:'自社製品の購入要請が確認されました。',action:'【専門家確認推奨】任意性を担保し、購入しなくても不利益がない旨を書面で明示。'});
if(document.getElementById('c4').checked)
r.push({type:'warn',title:'⑨不当な経済上の利益提供要請【要注意】',law:'第4条2項3号',desc:'金銭・役務の不当な提供要請の可能性。',action:'【専門家確認推奨】合理的対価を支払うか、要請を取り下げる。'});
if(document.getElementById('c5').checked||document.getElementById('c6').checked)
r.push({type:'warn',title:'⑩不当な給付内容の変更・やり直し【要注意】',law:'第4条2項4号',desc:'費用負担なき仕様変更・やり直し指示の可能性。',action:'【専門家確認推奨】変更に伴う費用増分を負担する覚書を締結。'});
if(document.getElementById('c7').checked)
r.push({type:'warn',title:'⑪報復措置【要注意】',law:'第4条1項7号',desc:'公取委への相談を理由とした取引縮小は報復措置に該当。',action:'【専門家確認推奨】直ちに取引条件を復元し、再発防止策を講じる。'});
}

let vCnt=r.filter(x=>x.type=='vio').length;
let wCnt=r.filter(x=>x.type=='warn').length;
let sa=document.getElementById('scoreArea');
if(vCnt>0)sa.innerHTML='<span style="color:#c53030;font-size:1.4em">違反判定: '+vCnt+'件</span>'+(wCnt?' / 要注意: '+wCnt+'件':'');
else if(wCnt>0)sa.innerHTML='<span style="color:#d69e2e;font-size:1.2em">要注意: '+wCnt+'件</span>（違反確定なし）';
else sa.innerHTML='<span style="color:#2f855a;font-size:1.2em">現時点で違反リスクは検出されませんでした</span>';
sa.style.background=vCnt?'#fff5f5':wCnt?'#fffff0':'#f0fff4';

let h='';
r.forEach(i=>{
let t=i.type=='vio'?'<span class="tag tag-v">違反</span>':i.type=='warn'?'<span class="tag tag-w">要注意</span>':'<span class="tag tag-o">適法</span>';
h+='<div class="res-item '+i.type+'">'+t+'<strong>'+i.title+'</strong>'+(i.law?' <small>（'+i.law+'）</small>':'')+'<br>'+i.desc+(i.action?'<br><strong>是正アクション:</strong> '+i.action:'')+'</div>';
});
document.getElementById('details').innerHTML=h;

let g='';
if(txType=='manufacturing'&&vCnt+wCnt>0)g='<strong>製造委託の場合:</strong> 適法な製造委託契約テンプレートの活用を推奨します。3条書面の記載事項を網羅した契約書雛形で、違反リスクを構造的に排除できます。';
else if(vCnt+wCnt>0)g='<strong>'+{repair:'修理委託',info:'情報成果物作成委託',service:'役務提供委託'}[txType]+'の場合:</strong> 本取引類型は専門的判断が必要です。弁護士または公正取引委員会の相談窓口への確認を推奨します。';
if(vCnt>0)g+='<br><br><strong>2024年改正:</strong> 勧告時の企業名公表に加え課徴金制度が強化。早期の自主改善が重要です。';
document.getElementById('guideArea').innerHTML=g||'現時点でリスクは検出されていません。定期的なセルフチェックを推奨します。';
document.getElementById('result').style.display='block';
document.getElementById('result').scrollIntoView({behavior:'smooth'});
}
</script>
