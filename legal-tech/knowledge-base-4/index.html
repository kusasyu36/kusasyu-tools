<script>
const DB='CaseKB',STORE='cases';let db;
function openDB(){return new Promise((r,j)=>{const q=indexedDB.open(DB,1);q.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(STORE)){const s=d.createObjectStore(STORE,{keyPath:'id',autoIncrement:true});s.createIndex('type','type');s.createIndex('result','result')}};q.onsuccess=e=>{db=e.target.result;r(db)};q.onerror=e=>j(e)})}
function tx(mode){return db.transaction(STORE,mode).objectStore(STORE)}
function getAll(){return new Promise(r=>{tx('readonly').getAll().onsuccess=e=>r(e.target.result)})}
function put(c){return new Promise(r=>{const req=c.id?tx('readwrite').put(c):tx('readwrite').add(c);req.onsuccess=e=>r(e.target.result)})}
function del(id){return new Promise(r=>{tx('readwrite').delete(id).onsuccess=()=>r()})}
function showTab(i){document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',i===j));document.querySelectorAll('.pane').forEach((p,j)=>p.classList.toggle('active',i===j));if(i===2)loadStats()}
function v(id){return document.getElementById(id).value.trim()}
function split(s){return s.split(/[,、，|]/).map(x=>x.trim()).filter(Boolean)}
function saveCase(){
const name=v('cName'),facts=v('cFacts');
if(!name||!facts)return showMsg('regMsg','案件名と事実概要は必須です','er');
const c={name,type:v('cType'),facts,laws:split(v('cLaws')),tags:split(v('cTags')),result:v('cResult'),lawyer:v('cLawyer'),year:parseInt(v('cYear'))||null,analysis:v('cAnalysis'),keywords:split(v('cKeys')),created:new Date().toISOString()};
const eid=v('editId');if(eid){c.id=parseInt(eid)}
put(c).then(()=>{showMsg('regMsg',eid?'更新しました':'登録しました','ok');resetForm()})
}
function resetForm(){['cName','cType','cFacts','cLaws','cTags','cResult','cLawyer','cYear','cAnalysis','cKeys','editId'].forEach(id=>{const el=document.getElementById(id);el.value=''});document.getElementById('formTitle').textContent='新規案件登録'}
function editCase(id){getAll().then(all=>{const c=all.find(x=>x.id===id);if(!c)return;document.getElementById('editId').value=c.id;document.getElementById('cName').value=c.name;document.getElementById('cType').value=c.type||'';document.getElementById('cFacts').value=c.facts;document.getElementById('cLaws').value=(c.laws||[]).join(',');document.getElementById('cTags').value=(c.tags||[]).join(',');document.getElementById('cResult').value=c.result||'';document.getElementById('cLawyer').value=c.lawyer||'';document.getElementById('cYear').value=c.year||'';document.getElementById('cAnalysis').value=c.analysis||'';document.getElementById('cKeys').value=(c.keywords||[]).join(',');document.getElementById('formTitle').textContent='案件編集: '+c.name;showTab(0)})}
function deleteCase(id){if(confirm('この案件を削除しますか？'))del(id).then(()=>search())}
function calcScore(c,q){
let score=0,max=0;
const W={type:10,law:15,tag:12,key:5};
if(q.type){max+=W.type;if(c.type===q.type)score+=W.type}
const cText=[c.name,c.facts,c.analysis||'',(c.keywords||[]).join(' ')].join(' ').toLowerCase();
if(q.laws.length){max+=q.laws.length*W.law;const cl=(c.laws||[]).map(x=>x.toLowerCase());q.laws.forEach(l=>{const ll=l.toLowerCase();if(cl.some(x=>x===ll))score+=W.law;else if(cText.includes(ll))score+=W.law*0.4})}
if(q.tags.length){max+=q.tags.length*W.tag;const ct=(c.tags||[]).map(x=>x.toLowerCase());q.tags.forEach(t=>{const tl=t.toLowerCase();if(ct.some(x=>x===tl))score+=W.tag;else if(cText.includes(tl))score+=W.tag*0.3})}
if(q.keys.length){max+=q.keys.length*W.key;q.keys.forEach(k=>{const kl=k.toLowerCase();const tf=(cText.match(new RegExp(kl.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'))||[]).length;if(tf>0)score+=W.key*Math.min(tf,3)/3*1.2})}
if(max===0)return q.keys.length===0&&q.laws.length===0&&q.tags.length===0?50:0;
return Math.min(Math.round(score/max*100),100);
}
function search(){
const q={keys:v('sKey').split(/[\s　]+/).filter(Boolean),type:v('sType'),laws:split(v('sLaw')),tags:split(v('sTag')),result:v('sResult')};
getAll().then(all=>{
let res=all;
if(q.result)res=res.filter(c=>c.result===q.result);
res=res.map(c=>({...c,score:calcScore(c,q)})).filter(c=>c.score>0||(!q.keys.length&&!q.laws.length&&!q.tags.length&&!q.type));
res.sort((a,b)=>b.score-a.score);
const el=document.getElementById('results');
document.getElementById('sCount').textContent=`${res.length}件ヒット（全${all.length}件中）`;
if(!res.length){el.innerHTML='<div class="card" style="text-align:center;color:#888">該当する案件がありません</div>';return}
el.innerHTML=res.slice(0,50).map(c=>`<div class="card">
<div style="display:flex;justify-content:space-between;align-items:start">
<h3>${esc(c.name)}</h3>
<span style="font-size:20px;font-weight:700;color:#1a237e">${c.score}点</span>
</div>
<div class="score-bar"><div class="score-fill" style="width:${c.score}%"></div></div>
<div style="margin:4px 0">${c.type?'<span class="tag">'+esc(c.type)+'</span>':''}${c.result?'<span class="tag">'+esc(c.result)+'</span>':''}${c.year?'<span class="tag">'+c.year+'年</span>':''}${c.lawyer?'<span class="tag">'+esc(c.lawyer)+'</span>':''}</div>
<div style="font-size:12px;color:#666;margin:4px 0">${esc((c.facts||'').substring(0,120))}${c.facts&&c.facts.length>120?'…':''}</div>
${(c.laws||[]).length?'<div style="margin:2px 0"><b style="font-size:11px">法令:</b> '+(c.laws||[]).map(t=>'<span class="tag">'+esc(t)+'</span>').join('')+'</div>':''}
${(c.tags||[]).length?'<div style="margin:2px 0"><b style="font-size:11px">争点:</b> '+(c.tags||[]).map(t=>'<span class="tag">'+esc(t)+'</span>').join('')+'</div>':''}
<div class="acts"><button class="btn btn-s" onclick="editCase(${c.id})">編集</button><button class="btn btn-d" onclick="deleteCase(${c.id})">削除</button></div>
</div>`).join('')})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function showMsg(id,msg,type){const el=document.getElementById(id);el.innerHTML=`<div class="msg msg-${type==='ok'?'ok':'er'}">${msg}</div>`;setTimeout(()=>el.innerHTML='',3000)}
function loadStats(){getAll().then(all=>{const types={};all.forEach(c=>{types[c.type||'未分類']=(types[c.type||'未分類']||0)+1});const wins=all.filter(c=>c.result==='勝訴'||c.result==='一部勝訴').length;document.getElementById('stats').innerHTML=`<div class="stat"><b>${all.length}</b><br>総案件数</div><div class="stat"><b>${wins}</b><br>勝訴系</div><div class="stat"><b>${Object.keys(types).length}</b><br>案件種別数</div>`})}
function exportJSON(){getAll().then(all=>{const blob=new Blob([JSON.stringify(all,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='knowledgebase_'+new Date().toISOString().slice(0,10)+'.json';a.click();showMsg('mgrMsg',all.length+'件エクスポートしました','ok')})}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(!Array.isArray(data))throw'';let n=0;const add=()=>{if(n>=data.length){showMsg('mgrMsg',n+'件インポート完了','ok');e.target.value='';return}const c={...data[n]};delete c.id;put(c).then(()=>{n++;add()})};add()}catch{showMsg('mgrMsg','JSONの形式が不正です','er')}};r.readAsText(f)}
function importCSV(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const lines=ev.target.result.split('\n').filter(Boolean);if(lines.length<2){showMsg('mgrMsg','データがありません','er');return}const hdr=parseCsvLine(lines[0]);const map={};const keys=['name','type','facts','laws','tags','result','lawyer','year','analysis','keywords'];const labels=['案件名','案件種別','事実概要','適用法令コード','争点タグ','結果','担当弁護士','案件年度','勝因敗因分析','フリーキーワード'];hdr.forEach((h,i)=>{const idx=labels.indexOf(h.trim());if(idx>=0)map[keys[idx]]=i});let n=0;const add=(i)=>{if(i>=lines.length){showMsg('mgrMsg',n+'件インポート完了','ok');e.target.value='';return}const cols=parseCsvLine(lines[i]);const c={name:cols[map.name||0]||'',type:cols[map.type||1]||'',facts:cols[map.facts||2]||'',laws:(cols[map.laws||3]||'').split('|').filter(Boolean),tags:(cols[map.tags||4]||'').split('|').filter(Boolean),result:cols[map.result||5]||'',lawyer:cols[map.lawyer||6]||'',year:parseInt(cols[map.year||7])||null,analysis:cols[map.analysis||8]||'',keywords:(cols[map.keywords||9]||'').split('|').filter(Boolean),created:new Date().toISOString()};if(c.name){put(c).then(()=>{n++;add(i+1)})}else add(i+1)};add(1)};r.readAsText(f)}
function parseCsvLine(line){const res=[];let cur='',inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++}else inQ=!inQ}else if(ch===','&&!inQ){res.push(cur);cur=''}else cur+=ch}res.push(cur);return res}
function printCard(){const name=v('cName');if(!name){showMsg('regMsg','案件名を入力してから出力してください','er');return}
const el=document.getElementById('printArea');el.innerHTML=`<h2>案件引継ぎカード</h2><dl>
<dt>案件名</dt><dd>${esc(name)}</dd>
<dt>案件種別</dt><dd>${esc(v('cType'))||'―'}</dd>
<dt>担当弁護士</dt><dd>${esc(v('cLawyer'))||'―'}</dd>
<dt>案件年度</dt><dd>${v('cYear')||'―'}</dd>
<dt>事実概要</dt><dd>${esc(v('cFacts'))}</dd>
<dt>適用法令</dt><dd>${esc(v('cLaws'))||'―'}</dd>
<dt>争点タグ</dt><dd>${esc(v('cTags'))||'―'}</dd>
<dt>結果</dt><dd>${esc(v('cResult'))||'―'}</dd>
<dt>勝因・敗因分析</dt><dd>${esc(v('cAnalysis'))||'―'}</dd>
<dt>キーワード</dt><dd>${esc(v('cKeys'))||'―'}</dd>
</dl><p style="margin-top:16px;font-size:11px;color:#888">出力日: ${new Date().toLocaleDateString('ja-JP')} ｜ 事務所案件ナレッジベース</p>`;
window.print()}
function clearAll(){if(!confirm('全データを削除します。よろしいですか？'))return;const q=indexedDB.deleteDatabase(DB);q.onsuccess=()=>{openDB().then(()=>{showMsg('mgrMsg','全データを削除しました','ok');loadStats()})}}
openDB().then(()=>{loadStats()});
</script>
