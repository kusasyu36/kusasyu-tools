var P=[
{n:"損害賠償上限の未設定",r:"h",k:["損害賠償.*(?:上限|制限).*(?:なし|ない|なく|設けない|定めない)","一切の損害を賠償","損害の全額を賠償","損害賠償の額を制限しない","無制限.*賠償"],w:"賠償額に上限がないと、些細な契約違反でも際限なく請求される恐れがあります。",f:"「損害賠償の上限は契約金額（または年間取引額）を上限とする」条項の追加を求めましょう。"},
{n:"一方的解除権",r:"h",k:["(?:甲|発注者|委託者)は.*(?:いつでも|何時でも|理由.*問わず|任意に|自由に).*(?:解除|解約|終了)","催告.*(?:なし|なく|要せず|することなく).*解除","無催告.*解除","直ちに.*(?:解除|解約)できる"],w:"相手方だけが自由に契約を解除できると、突然取引を打ち切られるリスクがあります。",f:"「双方同条件での解除権」または「解除の30日前書面通知」を追加しましょう。"},
{n:"知的財産権の包括的帰属",r:"h",k:["(?:一切|全て|すべて|全部)の.*(?:知的財産|著作権|特許|知財).*(?:甲|発注者|委託者)に(?:帰属|移転|譲渡)","著作権法第27条.*28条","著作者人格権.*(?:行使しない|行使せず|不行使)"],w:"成果物だけでなく、過程で生まれた全知財が相手に渡ると自社の技術蓄積がなくなります。",f:"「本業務の成果物に限り帰属」「既存知財は除外」「著作者人格権不行使の削除」を要求しましょう。"},
{n:"競業避止義務",r:"h",k:["競業(?:避止|禁止)","競合.*(?:事業|業務).*(?:行わない|行ってはならない|禁止|従事しない)","同種.*(?:事業|業務|サービス).*(?:禁止|制限|行わない)"],w:"契約終了後も同業種の事業ができなくなり、本業に支障が出る可能性があります。",f:"「競業避止期間は6か月以内」「地理的範囲を限定」「正当な対価の支払い」を求めましょう。"},
{n:"無限連帯保証・個人保証",r:"h",k:["連帯保証","個人保証","代表者.*(?:保証|連帯)","連帯して.*(?:責任|賠償|保証)"],w:"会社の債務を個人で無限に保証することになり、最悪の場合個人資産を失います。",f:"保証条項の削除を最優先で求めましょう。やむを得ない場合は「保証上限額の設定」と「保証期間の限定」を。"},
{n:"瑕疵担保・契約不適合の無期限責任",r:"h",k:["(?:瑕疵|契約不適合).*(?:期間|期限).*(?:なし|ない|なく|制限.*ない|定めない)","永続.*(?:瑕疵|担保|保証)","(?:瑕疵|不適合).*(?:いつまでも|無期限|永久)"],w:"納品後いつまでも無償修正を求められる可能性があり、事業継続の大きなリスクです。",f:"「契約不適合の通知期限は検収後6か月（最長1年）」と明記を求めましょう。"},
{n:"過大な違約金・損害賠償の予定",r:"h",k:["違約金.*(?:\\d{2,}%|[２-９][０-９]%|[1-9]\\d{2,}万|[１-９][０-９]{2,}万)","賠償.*(?:予定|予め定め).*(?:倍|200%|300%)"],w:"契約違反時に売上規模に見合わない高額を支払わされる恐れがあります。",f:"「違約金は契約金額の10〜20%を上限」など合理的な範囲への修正を求めましょう。"},
{n:"反社会的勢力排除条項の欠如",r:"h",k:["(?!.*反社)(?!.*暴力団)^[\\s\\S]*$"],w:"反社条項がないと、相手が反社と判明しても契約解除の根拠がなくなります。",f:"反社排除条項（表明保証＋即時解除＋損害賠償免責）の追加を求めましょう。",custom:true},
{n:"秘密保持義務の残存期間が過長",r:"m",k:["秘密.*(?:保持|守秘).*(?:永久|無期限|期間.*(?:なし|ない|定めない))","(?:5|6|7|8|9|10|５|６|７|８|９|１０)年間.*秘密","契約終了後.*(?:5|6|7|8|9|10)年"],w:"情報管理の義務が長期間残り、業務負担が続きます。IT業界では技術の陳腐化が早く、3年超は過長です。",f:"「秘密保持期間は契約終了後2〜3年」への短縮を求めましょう。"},
{n:"秘密情報の定義が広すぎる",r:"m",k:["(?:一切|全て|すべて)の(?:情報|資料|データ).*秘密","業務.*(?:関連|関係).*(?:一切|全て|すべて).*秘密","口頭.*(?:含む|含め).*秘密"],w:"何でも秘密情報とされると、自社の通常業務にまで制約がかかります。",f:"「秘密情報は秘密と明示したものに限定」「口頭開示は14日以内に書面確認」に修正を。"},
{n:"自動更新条項",r:"m",k:["自動.*(?:更新|延長|継続)","(?:申し出|申出|通知).*(?:ない|なき|ないとき).*(?:同一|同条件).*(?:更新|延長|継続)","(?:1|2|１|２)年間.*(?:自動|更新)"],w:"更新拒否の通知を忘れると、望まない条件で契約が続きます。",f:"「更新の30日前までに書面通知で終了可能」を明記し、通知期限をカレンダー管理しましょう。"},
{n:"準拠法が相手方所在地",r:"m",k:["準拠法.*(?:米国|アメリカ|中国|韓国|シンガポール|香港|英国|イギリス|カリフォルニア|ニューヨーク|デラウェア)","(?:foreign|governing).*law"],w:"海外法が準拠法だと、紛争時に現地弁護士が必要になり莫大なコストがかかります。",f:"「準拠法は日本法」への変更を求めましょう。国際取引でも日本企業同士なら日本法が合理的です。"},
{n:"管轄裁判所が相手方所在地",r:"m",k:["(?:甲|発注者|委託者)の(?:本店|本社).*(?:所在地|所在).*(?:管轄|裁判所)","(?:東京|大阪|名古屋|福岡|札幌|仙台|横浜|さいたま|千葉|神戸).*(?:地方裁判所|地裁).*(?:専属|合意)"],w:"遠方の裁判所が管轄だと、紛争時の移動コスト・時間が大きな負担になります。",f:"「被告の本店所在地」または「自社に近い裁判所」への変更を求めましょう。"},
{n:"再委託の無制限許可",r:"m",k:["再委託.*(?:自由|制限.*ない|できる|妨げない)","(?:第三者|下請).*(?:委託|発注).*(?:自由|できる)"],w:"品質管理が行き届かない第三者に作業が回され、情報漏えいリスクも高まります。",f:"「再委託は事前の書面承諾を要する」「再委託先にも同等の義務を課す」条項を求めましょう。"},
{n:"検収条件の不明確",r:"m",k:["検収.*(?:基準|条件|方法).*(?:甲|発注者|委託者).*(?:定める|判断|決定)","(?:甲|発注者).*(?:合理的.*理由.*なく|理由.*問わず).*(?:不合格|やり直し)"],w:"相手の主観だけで不合格にされ、何度もやり直しを要求される可能性があります。",f:"「検収基準は仕様書に基づく」「検収期間は14日以内」「不合格理由の書面通知」を明記しましょう。"},
{n:"支払条件が不利",r:"m",k:["(?:支払|払い).*(?:90日|120日|180日|手形|でんさい)","(?:検収|納品).*(?:翌々月|3[ヶか]月|4[ヶか]月).*(?:末|払い)"],w:"支払いサイトが長すぎると資金繰りが悪化し、事業継続が困難になります。",f:"「月末締め翌月末払い（30日サイト）」が標準。60日超は下請法違反の可能性もあります。"},
{n:"中途解約時の高額違約金",r:"m",k:["(?:中途|途中|期間内).*(?:解約|解除).*(?:残期間|残額|全額|違約)","(?:残存|残り).*(?:期間|契約料).*(?:全額|一括).*(?:支払|払い)"],w:"契約途中で解約すると残期間分を全額請求され、サービス不要でも払い続ける羽目になります。",f:"「中途解約の違約金は残期間の50%以内」または「3か月分を上限」への修正を求めましょう。"},
{n:"契約上の地位の一方的譲渡",r:"m",k:["(?:甲|発注者|委託者).*(?:地位|権利義務).*(?:譲渡|移転).*できる","(?:事前.*(?:承諾|同意).*(?:不要|要しない|なく)).*(?:譲渡|移転)"],w:"知らない間に契約相手が変わり、想定外の企業と取引させられるリスクがあります。",f:"「地位の譲渡は相手方の事前書面承諾を要する」に変更しましょう。"},
{n:"不可抗力条項の偏り",r:"l",k:["不可抗力.*(?:甲|発注者|委託者).*(?:のみ|に限り|だけ).*(?:免責|免除)","不可抗力.*(?:乙|受注者|受託者).*(?:含まない|適用.*ない|除く)"],w:"天災等の不可抗力時に一方だけが免責されるのは不公平です。",f:"「双方同条件での不可抗力免責」に修正を。対象事由のリストも確認しましょう。"},
{n:"通知方法の制限",r:"l",k:["通知.*(?:書留郵便|配達証明).*(?:のみ|限る|に限定)","(?:メール|電子メール|電磁的).*(?:認めない|不可|効力.*ない)"],w:"書留郵便のみだと緊急時の対応が遅れます。",f:"「電子メールまたは書面による通知」を有効な通知方法として追加しましょう。"},
{n:"権利不行使と権利放棄",r:"l",k:["権利.*(?:行使しない|不行使).*(?:放棄|みなす|みなされ)","(?:一度|一回).*(?:行使しな|放棄).*(?:その後|将来|以後)"],w:"一度権利を行使しなかっただけで、将来の権利まで放棄したとみなされる恐れがあります。",f:"「権利の不行使は放棄とみなさない」条項を追加しましょう。"},
{n:"遅延損害金の高料率",r:"l",k:["遅延損害金.*(?:年|年率).*(?:1[5-9]|[2-9][0-9]|[１][５-９]|[２-９][０-９]).*%","遅延.*(?:14\\.6|14．6)%"],w:"年14.6%（法定上限）を超える料率は無効になる場合があり、トラブルの原因です。",f:"「年3%（民法法定利率）」または「年14.6%以内」であることを確認しましょう。"},

function scan(){
var t=document.getElementById("src").value.trim();
if(!t){alert("契約書テキストを貼り付けてください");return}
var hs=[],ms=[],ls=[],noAnti=true,noJuris=true,noConsult=true;
t.replace(/\n/g," ");
for(var i=0;i<P.length;i++){
var p=P[i],found=[];
if(p.custom){
if(p.n.indexOf("反社")>-1){noAnti=!/反社|暴力団/.test(t);if(!noAnti)continue;found=["（条項が見つかりません）"];}
else if(p.n.indexOf("合意管轄")>-1){noJuris=!/管轄|裁判所/.test(t);if(!noJuris)continue;found=["（条項が見つかりません）"];}
else if(p.n.indexOf("協議")>-1){
var cm=t.match(/協議[^。]{0,30}解決/g);
if(cm&&!/管轄|裁判所|仲裁/.test(t)){found=cm;}else continue;
}
}else{
for(var j=0;j<p.k.length;j++){
try{var re=new RegExp(p.k[j],"gi");var m=t.match(re);if(m)found=found.concat(m);}catch(e){}
}
}
if(found.length==0)continue;
var obj={n:p.n,r:p.r,w:p.w,f:p.f,hits:found.slice(0,3)};
if(p.r=="h")hs.push(obj);else if(p.r=="m")ms.push(obj);else ls.push(obj);
}
var all=hs.concat(ms,ls),el=document.getElementById("result");
if(all.length==0){
el.innerHTML='<div class="no-risk"><span>&#10003;</span><b>検出された危険パターンはありません</b><p style="margin-top:8px;color:#718096;font-size:.9em">30項目のパターンチェックで問題は見つかりませんでした。<br>ただし、本ツールで検出できない問題が存在する可能性があります。</p></div>';
el.style.display="block";return;
}
var h='<div class="summary"><div class="stat s-h"><span>'+hs.length+'</span>高リスク</div><div class="stat s-m"><span>'+ms.length+'</span>中リスク</div><div class="stat s-l"><span>'+ls.length+'</span>低リスク</div><div class="stat s-ok"><span>'+(30-all.length)+'</span>問題なし</div></div>';
for(var i=0;i<all.length;i++){
var a=all[i],bc=a.r=="h"?"b-h":a.r=="m"?"b-m":"b-l",mc=a.r=="h"?"":a.r=="m"?" m":" l",rl=a.r=="h"?"高":"中";if(a.r=="l")rl="低";
h+='<div class="finding"><div class="f-head" onclick="tog(this)"><span class="badge '+bc+'">'+rl+'</span><span class="f-name">'+a.n+'</span><span class="arrow">&#9654;</span></div><div class="f-body">';
for(var j=0;j<a.hits.length;j++) h+='<div class="matched'+mc+'">&#128269; '+esc(a.hits[j])+'</div>';
h+='<div class="explain">&#9888;&#65039; <b>なぜ危険か：</b>'+a.w+'</div><div class="fix"><b>&#128295; 修正案：</b>'+a.f+'</div></div></div>';
}
h+='<div class="note" style="margin-top:16px">&#9888; 本結果はキーワードパターンマッチングによる参考情報です。重要な契約は必ず弁護士にご相談ください。</div>';
el.innerHTML=h;el.style.display="block";el.scrollIntoView({behavior:"smooth"});
}
function tog(el){el.nextElementSibling.classList.toggle("open");el.querySelector(".arrow").classList.toggle("open")}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

</script>
