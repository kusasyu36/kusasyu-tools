{q:"契約交渉の前に、どの程度準備をしていますか？",c:"準備",o:[

{t:"相手の出方を見てから考える",s:2},

{q:"損害賠償の上限条項について、どの程度理解していますか？",c:"法的",o:[

{t:"考えたことがない",s:1}]},
{q:"不利な条項に気づいたが、相手は大手企業。どうしますか？",c:"心理",o:[

{q:"過去の契約書や交渉記録を管理していますか？",c:"準備",o:[

{t:"ファイルに保存しているが検索しにくい",s:3},

{t:"ほぼ管理していない",s:1}]},
{q:"納期遅延ペナルティとして契約金額の20%と提示された場合は？",c:"法的",o:[

{q:"契約交渉後、結果を振り返る機会はありますか？",c:"準備",o:[
{t:"毎回振り返り、改善点を次回に活かしている",s:4},

var cur=0,ans=[];
function render(){
var el=document.getElementById("quiz"),h="";
if(cur<Q.length){

for(var i=0;i<Q[cur].o.length;i++){
h+='<button class="btn" onclick="pick('+i+')">'+Q[cur].o[i].t+'</button>';}
h+='</div>';
}
el.innerHTML=h;
}
function pick(i){ans.push({c:Q[cur].c,s:Q[cur].o[i].s});cur++;if(cur<Q.length){render();}else{showResult();}}
function showResult(){
document.getElementById("quiz").classList.add("hide");
var r=document.getElementById("result");r.classList.remove("hide");
var sc={準備:0,法的:0,心理:0},mx={準備:16,法的:12,心理:12},total=0;
for(var i=0;i<ans.length;i++){sc[ans[i].c]+=ans[i].s;total+=ans[i].s;}
var pct=Math.round((total/40)*100);
var rank,rc;
if(total>=34){rank="S";rc="g";}
else if(total>=27){rank="A";rc="g";}
else if(total>=20){rank="B";rc="o";}
else if(total>=13){rank="C";rc="b";}
else{rank="D";rc="b";}
var labels={準備:"交渉準備力",法的:"法的知識",心理:"心理的耐性"};
var colors={準備:"#3498db",法的:"#27ae60",心理:"#e67e22"};
var h='<div class="card"><div class="sb"><p class="sl">あなたの交渉力スコア</p><p class="sn '+rc+'">'+total+' <span style="font-size:.4em">/ 40</span></p>';
h+='<p class="rank '+rc+'">ランク：'+rank+'</p></div></div>';
h+='<div class="card"><p style="font-weight:bold;margin-bottom:8px">3軸スコア</p><div class="ax">';
for(var k in sc){
var p2=Math.round((sc[k]/mx[k])*100);
var c2=p2>=75?"g":p2>=50?"o":"b";
h+='<div class="ax-item"><span class="lbl">'+labels[k]+'</span><p class="val '+c2+'">'+sc[k]+'</p><span class="mx">/ '+mx[k]+'</span></div>';}
h+='</div>';
for(var k2 in sc){
var p3=Math.round((sc[k2]/mx[k2])*100);
h+='<div class="bar-wrap"><div class="bar-lbl"><span>'+labels[k2]+'</span><span>'+p3+'%</span></div><div class="bar-bg"><div class="bar-fg" style="width:'+p3+'%;background:'+colors[k2]+'"></div></div></div>';}
h+='</div>';
h+='<div class="card"><p style="font-weight:bold;margin-bottom:10px">改善アクション</p>';
var acts=[],sorted=[];
for(var k3 in sc)sorted.push({k:k3,r:sc[k3]/mx[k3]});
sorted.sort(function(a,b){return a.r-b.r;});
var tips={
準備:[
"交渉前チェックシートを作成し、①譲歩可能な条件 ②絶対に譲れない条件 ③代替案の3点を毎回整理してから交渉に臨みましょう。",
"過去の契約書をスプレッドシートで管理し、条件（支払サイト・ペナルティ率・保持期間）を比較できる状態にしましょう。"],
法的:[
"NDA秘密保持期間の業界標準は3〜5年です。「永久」や「10年」は修正交渉の対象になると認識しましょう。",
"損害賠償上限は契約金額の100%以内が目安です。納期遅延ペナルティは5〜10%が相場と覚えておきましょう。"],
心理:[
"「他社はこの条件で…」は典型的な交渉テクニックです。自社の事情を冷静に伝える練習をしましょう。",
"大手企業でも条件交渉は可能です。修正依頼は関係悪化ではなく、ビジネス上の正当な行為と捉えましょう。"]
};
var cnt=0;
for(var s=0;s<sorted.length&&cnt<3;s++){
var key=sorted[s].k;
if(sorted[s].r<0.75){
h+='<div class="act"><b>'+labels[key]+'を強化</b>'+tips[key][0]+'</div>';
cnt++;
if(cnt<3&&tips[key][1]){h+='<div class="act"><b>'+labels[key]+'・追加</b>'+tips[key][1]+'</div>';cnt++;}
}}
if(cnt===0)h+='<div class="act"><b>優秀です！</b>現在の水準を維持しつつ、実践的な交渉シミュレーションで更にスキルを磨きましょう。</div>';
h+='</div>';
h+='<div class="card" style="text-align:center"><p style="font-size:.92em;margin-bottom:10px;line-height:1.6">診断結果を踏まえて、AIと実践的な<br>交渉シミュレーションを体験しませんか？</p>';
h+='<a class="cta" href="./nda-simulator.html">NDA秘密保持期間 交渉シミュレーターを試す →</a>';
h+='<p style="font-size:.72em;color:#999;margin-top:8px">AIが取引先担当者を演じ、NDA交渉を疑似体験できます</p></div>';
h+='<button class="rst" onclick="reset()">もう一度診断する</button>';
r.innerHTML=h;
}
