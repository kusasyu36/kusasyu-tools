<div class="container">

<div class="legend"><span><span class="badge b-r"></span>高リスク（赤）</span><span><span class="badge b-y"></span>中リスク（黄）</span><span><span class="badge b-b"></span>低リスク（青）</span></div>

<script>
const C=[
["会社設立・登記","登記簿謄本の確認と現況一致","R"],["定款","定款の最新版・変更履歴の確認","R"],["株主名簿","株主構成・名義株の有無","R"],["株式譲渡制限","譲渡制限条項・承認手続","R"],["取締役会・株主総会","議事録の整備状況","Y"],["役員構成","役員の兼任・競業の有無","Y"],["関連当事者取引","関連会社との取引条件の公正性","R"],["重要契約一覧","主要取引先との契約書の存否","R"],["契約のCoC条項","チェンジオブコントロール条項の確認","R"],["長期契約","長期拘束条件・自動更新の有無","Y"],
["保証・担保契約","連帯保証・担保提供の有無","R"],["リース契約","リース資産・残債務の確認","Y"],["ライセンス契約","ソフトウェア・知的財産ライセンス","Y"],["雇用契約","就業規則・雇用条件の適法性","R"],["未払残業代","未払賃金リスクの試算","R"],["退職金制度","退職金規程・引当金の充足性","Y"],["労使紛争","労働審判・訴訟の有無","R"],["社会保険","社会保険の加入状況","Y"],["特許・商標","知的財産権の保有・登録状況","Y"],["営業秘密管理","秘密管理体制・NDA整備","Y"],
["訴訟・紛争","係属中訴訟・潜在的紛争","R"],["行政処分","過去の行政処分・指導歴","R"],["許認可","事業に必要な許認可の有効性","R"],["コンプライアンス","反社チェック・内部通報制度","R"],["個人情報保護","個人情報管理体制・漏洩歴","Y"],["不動産","所有・賃借不動産の権利関係","Y"],["環境問題","土壌汚染・環境規制対応","Y"],["税務","税務申告の適正性・税務調査歴","Y"],["簿外債務","偶発債務・簿外負債の有無","R"],["表明保証","表明保証条項の設計方針","Y"]
];
const I={
"製造":[["製造物責任","PL法対応・リコール歴の確認","R"],["品質管理体系","ISO認証・品質管理規程","Y"],["環境規制","排出基準・廃棄物処理の適法性","R"],["工場用地","土壌汚染調査・アスベスト","R"],["設備保全","主要設備の老朽度・更新計画","Y"],["下請法","下請法遵守状況","Y"],["輸出管理","安全保障輸出管理","R"],["特許侵害","製品の特許クリアランス","R"],["労災","労災事故歴・安全衛生管理","Y"],["在庫","滞留在庫・評価損リスク","Y"],["サプライチェーン","主要仕入先の集中リスク","Y"],["技術者","キーパーソンの退職リスク","Y"]],
"IT":[["SaaS契約","顧客契約のSLA・解約条件","R"],["ソースコード","コードの帰属・第三者権利","R"],["OSS","OSSライセンス汚染リスク","R"],["情報セキュリティ","ISMS・脆弱性管理体制","R"],["個人データ越境","GDPR・海外データ移転","Y"],["SES契約","偽装請負リスク","R"],["技術的負債","システム老朽化・刷新コスト","Y"],["ドメイン・SSL","ドメイン・証明書の名義","B"],["クラウド依存","AWS等の契約条件・ロックイン","Y"],["エンジニア離職","開発キーパーソンの流出リスク","R"],["API連携","外部API依存度・契約条件","Y"]],
"小売":[["店舗賃貸借","賃貸借契約・定借の期限","R"],["フランチャイズ","FC契約のCoC・競業避止","R"],["食品表示","景品表示法・食品表示法遵守","R"],["POS・顧客DB","顧客データの帰属・移行","Y"],["在庫評価","季節商品・滞留在庫リスク","Y"],["EC規約","特定商取引法対応","Y"],["テナント契約","商業施設の出店条件・違約金","R"],["商標・ブランド","ブランドの権利関係","Y"],["物流契約","物流委託契約の継続性","Y"],["パート雇用","非正規雇用の無期転換リスク","Y"],["ポイント制度","ポイント引当金・債務承継","Y"]],
"飲食":[["食品衛生許可","営業許可・HACCP対応","R"],["店舗賃貸借","賃貸借契約・原状回復義務","R"],["フランチャイズ","FC契約の制約・ロイヤリティ","R"],["食中毒","食中毒事故歴・保険加入","R"],["酒類免許","酒類販売免許の承継可否","R"],["深夜営業","風営法届出の確認","Y"],["アレルギー表示","アレルゲン管理体制","Y"],["仕入先","食材仕入先の集中度","Y"],["人手不足","離職率・採用コスト","Y"],["Uber等契約","デリバリー契約条件","B"],["厨房設備","設備リース・老朽化","Y"],["衛生管理者","食品衛生責任者の配置","Y"]],
"建設":[["建設業許可","許可区分・更新時期の確認","R"],["経営事項審査","経審スコア・入札参加資格","R"],["工事瑕疵","瑕疵担保・アフター対応履歴","R"],["下請関係","建設業法・下請法遵守","R"],["安全管理","労災事故率・安全衛生体制","R"],["技術者","監理技術者・主任技術者の確保","R"],["JV契約","共同企業体の責任関係","Y"],["産廃処理","産廃マニフェスト管理","Y"],["アスベスト","石綿対策・調査履歴","R"],["入札談合","過去の処分歴・コンプラ体制","R"],["工事保証","完成保証・履行保証の状況","Y"],["資材高騰","資材価格変動リスク条項","Y"]]
};
let items=[];
function generate(){
const ind=document.getElementById("ind").value,deal=document.getElementById("deal").value,sz=document.getElementById("size").value;
if(!ind||!deal||!sz){alert("すべての項目を選択してください");return}
items=[];let id=1;
C.forEach(c=>{items.push({id:id++,cat:"共通",name:c[0],desc:c[1],risk:c[2],checked:false,memo:""})});
(I[ind]||[]).forEach(c=>{items.push({id:id++,cat:ind+"業種別",name:c[0],desc:c[1],risk:c[2],checked:false,memo:""})});
if(deal==="事業譲渡"){items.push({id:id++,cat:"取引形態別",name:"個別承継",desc:"債権債務・契約の個別移転手続",risk:"R",checked:false,memo:""});items.push({id:id++,cat:"取引形態別",name:"債権者保護",desc:"詐害的事業譲渡リスクの検討",risk:"R",checked:false,memo:""});}
if(deal==="合併"){items.push({id:id++,cat:"取引形態別",name:"債権者異議",desc:"債権者異議手続の要否・スケジュール",risk:"R",checked:false,memo:""});items.push({id:id++,cat:"取引形態別",name:"合併比率",desc:"合併対価の公正性・算定根拠",risk:"R",checked:false,memo:""});}
if(sz==="L"){items.push({id:id++,cat:"規模別",name:"独禁法届出",desc:"企業結合届出の要否判定",risk:"R",checked:false,memo:""});items.push({id:id++,cat:"規模別",name:"外為法届出",desc:"外国投資家規制の該当性",risk:"Y",checked:false,memo:""});}
render();document.getElementById("result").style.display="block";document.getElementById("result").scrollIntoView({behavior:"smooth"});
}
function render(){
const cl=document.getElementById("checklist");let cats=[...new Set(items.map(i=>i.cat))];let html="";
cats.forEach(cat=>{
html+=`<div class="cl-section"><h3>${cat}（${items.filter(i=>i.cat===cat).length}項目）</h3>`;
items.filter(i=>i.cat===cat).forEach(i=>{
const bc=i.risk==="R"?"b-r":i.risk==="Y"?"b-y":"b-b";
const hi=!i.checked&&i.risk==="R"?"hi-risk":"";
const ck=i.checked?"checked":"";
html+=`<div class="cl-item ${hi} ${ck}"><input type="checkbox" ${i.checked?"checked":""} onchange="toggle(${i.id})"><span class="badge ${bc}"></span><div class="text"><div class="title">${i.name}</div><div class="desc">${i.desc}</div></div><input class="memo" placeholder="メモ" value="${i.memo}" onchange="setMemo(${i.id},this.value)"></div>`;
});html+="</div>";});
cl.innerHTML=html;updateStats();
}
function toggle(id){const i=items.find(x=>x.id===id);i.checked=!i.checked;render();}
function setMemo(id,v){items.find(x=>x.id===id).memo=v;}
function updateStats(){
const r=items.filter(i=>!i.checked&&i.risk==="R").length;
const y=items.filter(i=>!i.checked&&i.risk==="Y").length;
const b=items.filter(i=>!i.checked&&i.risk!=="R"&&i.risk!=="Y").length;
const d=items.filter(i=>i.checked).length;
document.getElementById("s-r").textContent=r;document.getElementById("s-y").textContent=y;document.getElementById("s-b").textContent=b;document.getElementById("s-done").textContent=d;
document.getElementById("prog-fill").style.width=(items.length?Math.round(d/items.length*100):0)+"%";
}
function exportCSV(){
const ind=document.getElementById("ind").value,deal=document.getElementById("deal").value;
let csv="\uFEFF契約書名,リスク区分,確認状況,担当者メモ,カテゴリ,業種,取引形態\n";
items.forEach(i=>{
const rk=i.risk==="R"?"高（赤）":i.risk==="Y"?"中（黄）":"低（青）";
const st=i.checked?"確認済":"未確認";
csv+=`"${i.name}","${rk}","${st}","${i.memo.replace(/"/g,'""')}","${i.cat}","${ind}","${deal}"\n`;
});
const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));
a.download=`DD_Checklist_${ind}_${deal}_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
</script>
