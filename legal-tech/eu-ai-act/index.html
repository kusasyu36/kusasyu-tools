<div class="hd"><h1>EU AI Act × 日本AI事業者ガイドライン<br>リスク分類 自己診断ツール</h1>
<p>Kusasyu Legal Tech — 初期自己診断（専門家確認前の内部評価用）</p></div>

<script>
const Q=[
{cat:'info',lbl:'基本情報',cls:'cat-r',q:'診断対象AIシステムの情報',fields:true},
{cat:'role',lbl:'義務区分',cls:'cat-r',q:'このAIシステムに対する貴社の立場は？',note:'EU AI Actでは立場により義務が異なります。自社でAIを開発・販売・提供する場合はProvider、外部のAIサービスを業務利用する場合はOperatorです。',opts:['Provider（AI開発・提供者）','Operator（外部AI利用者）','両方（開発かつ利用）']},
{cat:'prohib',lbl:'禁止AI',cls:'cat-p',q:'個人の社会的行動や人格特性に基づく信頼性スコアリングを行い、不利益な取扱いにつなげていますか？',note:'Article 5(1)(c) — 社会的スコアリングの禁止'},
{cat:'prohib',lbl:'禁止AI',cls:'cat-p',q:'法執行目的で公共空間においてリアルタイム遠隔生体認証を行っていますか？',note:'Article 5(1)(h) — リアルタイム遠隔生体認証の原則禁止'},
{cat:'prohib',lbl:'禁止AI',cls:'cat-p',q:'職場または教育機関で感情認識AIを使用していますか？',note:'Article 5(1)(f) — 職場・教育機関での感情認識の禁止'},
{cat:'prohib',lbl:'禁止AI',cls:'cat-p',q:'人の意識が及ばない潜在的手法（サブリミナル技術等）で行動を歪めていますか？',note:'Article 5(1)(a) — サブリミナル操作の禁止'},
{cat:'prohib',lbl:'禁止AI',cls:'cat-p',q:'年齢・障害・社会経済的状況による脆弱性を悪用して行動を歪めていますか？',note:'Article 5(1)(b) — 脆弱性の悪用禁止'},
{cat:'high',lbl:'高リスク',cls:'cat-h',q:'自然人の生体認証による本人識別・分類を行いますか？',note:'Annex III (1) — 遠隔生体認証（リアルタイム以外）、生体分類'},
{cat:'high',lbl:'高リスク',cls:'cat-h',q:'エネルギー・交通・水道・ガス等の重要インフラの管理・運用に使用しますか？',note:'Annex III (2) — 重要インフラの安全コンポーネント'},
{cat:'high',lbl:'高リスク',cls:'cat-h',q:'教育・職業訓練における入学審査・成績評価・試験監督に使用しますか？',note:'Annex III (3) — 教育・職業訓練'},
{cat:'high',lbl:'高リスク',cls:'cat-h',q:'採用選考・人事評価・昇進・解雇等の雇用判断に使用しますか？',note:'Annex III (4) — 雇用・労働者管理'},
{cat:'high',lbl:'高リスク',cls:'cat-h',q:'与信審査・保険引受・社会保障給付等の必須サービスへのアクセス判断に使用しますか？',note:'Annex III (5) — 必須公共・民間サービス'},
{cat:'high',lbl:'高リスク',cls:'cat-h',q:'法執行におけるリスク評価・犯罪予測・証拠分析に使用しますか？',note:'Annex III (6) — 法執行'},
{cat:'high',lbl:'高リスク',cls:'cat-h',q:'出入国管理・亡命申請・ビザ審査に使用しますか？',note:'Annex III (7) — 移民・国境管理'},
{cat:'high',lbl:'高リスク',cls:'cat-h',q:'裁判所の判決支援や選挙結果への影響を目的として使用しますか？',note:'Annex III (8) — 司法・民主的プロセス'},
{cat:'trans',lbl:'透明性',cls:'cat-t',q:'テキスト・画像・音声・動画を生成し、本物と区別しにくいコンテンツを作成しますか？',note:'Article 50 — ディープフェイク・生成AI'},
{cat:'trans',lbl:'透明性',cls:'cat-t',q:'チャットボット・バーチャルアシスタント等、自然人と直接対話する機能がありますか？',note:'Article 50 — AI対話の透明性義務'}
];
let cur=0,ans={},sysInfo={name:'',dept:'',desc:''};
const $=id=>document.getElementById(id),main=$('main'),pb=$('pb');
function render(){
  const q=Q[cur],total=Q.length;
  pb.style.width=((cur/total)*100)+'%';
  let h='<div class="c">';
  if(q.fields){
    h+=`<span class="cat ${q.cls}">${q.lbl}</span><div class="qt">${q.q}</div>
    <label style="font-size:.9em;font-weight:600;color:#4a5568">AIシステム名称 <span style="color:#e53e3e">*</span></label>
    <input type="text" id="sn" placeholder="例：社内文書要約AI" value="${sysInfo.name}">
    <label style="font-size:.9em;font-weight:600;color:#4a5568">管轄部門</label>
    <input type="text" id="sd" placeholder="例：情報システム部" value="${sysInfo.dept}">
    <label style="font-size:.9em;font-weight:600;color:#4a5568">用途・概要</label>
    <input type="text" id="ss" placeholder="例：契約書レビューの自動化" value="${sysInfo.desc}">
    <div class="bn"><div></div><button class="bt bt-p" onclick="goNext()">診断開始 →</button></div>`;
  } else {
    h+=`<span class="cat ${q.cls}">${q.lbl}</span><div class="qt">${q.q}</div>`;
    if(q.note) h+=`<div class="qn">${q.note}</div>`;
    if(q.opts){
      q.opts.forEach((o,i)=>{h+=`<label class="op"><input type="radio" name="q${cur}" value="${i}" ${ans[cur]===i?'checked':''}><span>${o}</span></label>`;});
    } else {
      h+=`<label class="op"><input type="radio" name="q${cur}" value="1" ${ans[cur]===1?'checked':''}><span>はい</span></label>`;
      h+=`<label class="op"><input type="radio" name="q${cur}" value="0" ${ans[cur]===0?'checked':''}><span>いいえ</span></label>`;
    }
    h+=`<div class="bn">`;
    h+=cur>0?`<button class="bt bt-s" onclick="goPrev()">← 戻る</button>`:'<div></div>';
    h+=cur<total-1?`<button class="bt bt-p" onclick="goNext()">次へ →</button>`:`<button class="bt bt-g" onclick="goNext()">診断結果を表示</button>`;
    h+=`</div><div class="step-i">質問 ${cur} / ${total-1}</div>`;
  }
  h+='</div>';main.innerHTML=h;
}
function goNext(){
  const q=Q[cur];
  if(q.fields){
    sysInfo.name=$('sn').value.trim();sysInfo.dept=$('sd').value.trim();sysInfo.desc=$('ss').value.trim();
    if(!sysInfo.name){alert('AIシステム名称を入力してください');return;}
    cur++;render();return;
  }
  const sel=document.querySelector(`input[name="q${cur}"]:checked`);
  if(!sel){alert('選択してください');return;}
  ans[cur]=parseInt(sel.value);
  if(q.cat==='prohib'&&ans[cur]===1){
    let next=cur+1;
    while(next<Q.length&&(Q[next].cat==='prohib'||Q[next].cat==='high'))next++;
    if(next>=Q.length){showReport();return;}
    cur=next;render();return;
  }
  if(cur>=Q.length-1){showReport();return;}
  cur++;render();
}
function goPrev(){if(cur>0){cur--;render();}}
function classify(){
  let prohib=false,high=false,limited=false;
  for(let i=0;i<Q.length;i++){
    if(Q[i].cat==='prohib'&&ans[i]===1)prohib=true;
    if(Q[i].cat==='high'&&ans[i]===1)high=true;
    if(Q[i].cat==='trans'&&ans[i]===1)limited=true;
  }
  if(prohib)return{level:'Prohibited',code:'P',desc:'禁止対象AI — 原則としてEU域内での運用が禁止されます。直ちに法務専門家に相談し、運用停止を含む対応を検討してください。'};
  if(high)return{level:'High-risk',code:'H',desc:'高リスクAI — Annex IIIに該当するため、適合性評価、技術文書整備、品質管理体制、EU登録等の厳格な義務が課されます。'};
  if(limited)return{level:'Limited risk',code:'L',desc:'限定リスクAI — 透明性義務（AI利用の告知、生成コンテンツの表示等）が課されます。'};
  return{level:'Minimal risk',code:'M',desc:'最小リスクAI — 特段の法的義務はありませんが、任意の行動規範の遵守が推奨されます。'};
}
function getRole(){const v=ans[1];return v===0?'Provider':v===1?'Operator':'Provider & Operator';}
function jpCheck(r){
  const lv=r.code,items=[];
  const isH=lv==='P'||lv==='H',hasBio=ans[8]===1,hasEmp=ans[11]===1,hasT=ans[16]===1||ans[17]===1;
  items.push({item:'透明性確保',st:hasT||isH?'要対応':'適合',pri:hasT||isH?'高':'—',act:hasT?'AI利用の事実を利用者に明示する仕組みを構築':'特段の対応不要'});
  items.push({item:'公平性確保',st:isH||hasEmp?'要対応':'要確認',pri:isH?'高':'中',act:'学習データのバイアス検証と公平性テストを実施'});
  items.push({item:'安全性確保',st:isH?'要対応':'要確認',pri:isH?'高':'中',act:'リスクアセスメントと安全性テストの実施'});
  items.push({item:'プライバシー保護',st:hasBio||isH?'要対応':'要確認',pri:hasBio?'高':'中',act:'個人情報保護影響評価（PIA）の実施'});
  items.push({item:'セキュリティ確保',st:isH?'要対応':'要確認',pri:isH?'高':'中',act:'サイバーセキュリティ対策の文書化'});
  items.push({item:'アカウンタビリティ',st:isH?'要対応':'要確認',pri:isH?'高':'低',act:'AI管理責任者の任命と説明体制の整備'});
  items.push({item:'人間の判断介在',st:isH?'要対応':'適合',pri:isH?'高':'—',act:isH?'人間による監視・介入メカニズムの整備':'既存運用で対応可能'});
  return items;
}
function showReport(){
  const r=classify(),role=getRole(),jp=jpCheck(r),now=new Date().toLocaleDateString('ja-JP');
  const pI=[],hI=[],tI=[];
  for(let i=2;i<=6;i++)if(ans[i]===1)pI.push(Q[i].q);
  for(let i=7;i<=14;i++)if(ans[i]===1)hI.push(Q[i].q);
  for(let i=15;i<=16;i++)if(ans[i]===1)tI.push(Q[i].q);
  let h=`<div class="c"><div class="rpt-hd"><h2>初期自己診断レポート</h2><p>EU AI Act × 日本AI事業者ガイドライン リスク分類診断</p><p style="font-size:.78em;color:#a0aec0">専門家確認前の内部評価用 — Kusasyu Legal Tech</p></div>
  <div class="meta"><div><span>診断日：</span><strong>${now}</strong></div><div><span>システム名：</span><strong>${sysInfo.name}</strong></div><div><span>管轄部門：</span><strong>${sysInfo.dept||'—'}</strong></div><div><span>用途：</span><strong>${sysInfo.desc||'—'}</strong></div></div>
  <div class="sec"><h3>1. 義務区分</h3><p>貴社の立場：<strong>${role}</strong></p>
  <p style="font-size:.88em;color:#718096;margin-top:4px">${role.includes('Provider')?'Providerとして、適合性評価・技術文書・品質管理・EU登録等の義務を負います。':'Operatorとして、使用監視・データガバナンス・人間の監督等の義務を負います。'}</p></div>
  <div class="sec"><h3>2. EU AI Act リスク分類結果</h3><div style="text-align:center;padding:12px 0"><span class="rb rb-${r.code}">${r.level}</span></div><p style="font-size:.9em">${r.desc}</p>`;
  if(pI.length)h+=`<div style="margin-top:10px;padding:10px;background:#fff5f5;border-radius:8px"><strong style="color:#c53030">禁止該当項目：</strong><ul style="margin:6px 0 0 18px;font-size:.88em">${pI.map(x=>'<li>'+x+'</li>').join('')}</ul></div>`;
  if(hI.length)h+=`<div style="margin-top:10px;padding:10px;background:#fffaf0;border-radius:8px"><strong style="color:#c05621">高リスク該当：</strong><ul style="margin:6px 0 0 18px;font-size:.88em">${hI.map(x=>'<li>'+x+'</li>').join('')}</ul></div>`;
  if(tI.length)h+=`<div style="margin-top:10px;padding:10px;background:#f0fff4;border-radius:8px"><strong style="color:#276749">透明性義務対象：</strong><ul style="margin:6px 0 0 18px;font-size:.88em">${tI.map(x=>'<li>'+x+'</li>').join('')}</ul></div>`;
  h+=`</div><div class="sec"><h3>3. 日本AI事業者ガイドライン 適合状況</h3><table><tr><th>項目</th><th>状況</th><th>優先度</th><th>推奨アクション</th></tr>`;
  jp.forEach(j=>{const sc=j.st==='要対応'?'ph':j.st==='要確認'?'pm':'pl';h+=`<tr><td>${j.item}</td><td class="${sc}">${j.st}</td><td>${j.pri}</td><td style="font-size:.85em">${j.act}</td></tr>`;});
  h+=`</table></div>`;
  const urg=jp.filter(j=>j.st==='要対応');
