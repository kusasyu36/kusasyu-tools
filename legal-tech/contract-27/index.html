<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/legal-tech/" style="color:#4299e1;text-decoration:none;">kusasyu Legal Tech</a> &gt; <span style="color:#718096;">スタートアップ契約書リスクチェッカー</span></div>
<div class="wrap">
<h1>📋 スタートアップ契約書リスクチェッカー</h1>
<div class="disc">⚠️ <b>免責事項：</b>本ツールはキーワード・パターン検出による簡易スクリーニングであり、法的助言や弁護士相談の代替にはなりません。重要な契約は必ず弁護士にご相談ください。即時・無料のセルフチェック用途としてご利用ください。</div>
<textarea id="inp" placeholder="ここに契約書のテキストを貼り付けてください（NDA、業務委託契約、投資契約など）"></textarea>
<button class="btn" onclick="analyze()">🔍 リスクチェック実行</button>
<div id="out"></div>
</div>
<script>
const RULES=[
{id:"noncompete_period",name:"競業避止：期間の過剰制限",level:"high",
p:[/競業避止[^。]{0,30}(3年|4年|5年|[6-9]年|10年|無期限|永久|期間の定めなく)/,/競業[^。]{0,20}禁止[^。]{0,20}(3年|5年|無期限)/],
fix:"競業避止期間は退職後1〜2年が一般的な上限です。3年以上は裁判で無効とされるリスクが高く、1年以内への短縮を交渉してください。"},
{id:"noncompete_geo",name:"競業避止：地理的範囲の過剰制限",level:"mid",
p:[/競業避止[^。]{0,40}(日本全国|全世界|世界中|全地域|国内外|無制限)/,/競業[^。]{0,30}(一切の地域|あらゆる地域)/],
fix:"地理的制限は事業展開地域に限定すべきです。『日本全国』『全世界』は過剰であり、具体的な都道府県・地域に限定する交渉を推奨します。"},
{id:"liability_cap",name:"損害賠償上限条項の欠如",level:"high",
p:[/損害賠償[^。]{0,30}(一切の|全ての|無制限|上限なく|制限なく)/,/賠償[^。]{0,20}(全額|無限|際限なく)/,/損害の全てを賠償/],
fix:"損害賠償の上限（例：契約金額の○倍、直接損害に限定）を必ず設定してください。上限なしは青天井リスクです。"},
{id:"unilateral_term",name:"一方的解除権",level:"high",
p:[/甲は[^。]{0,20}(いつでも|何時でも|理由なく|任意に|自由に)[^。]{0,15}(解除|解約|終了)/,/(理由の如何を問わず|理由なく|催告なく|催告なしに)[^。]{0,20}(解除|解約)/,/直ちに[^。]{0,10}(解除|解約)[^。]{0,15}ことができ/],
fix:"解除権は双方対等にし、事前通知期間（30日〜90日前）と解除事由の明記を求めてください。一方的解除権は極めて不利です。"},
{id:"ip_transfer",name:"知的財産権の包括的無償譲渡",level:"high",
p:[/知的財産[^。]{0,30}(全て|一切|包括的に)[^。]{0,15}(譲渡|帰属|移転)/,/(著作権|特許|発明)[^。]{0,20}(無償|無条件)[^。]{0,10}(譲渡|帰属)/,/成果物[^。]{0,15}(一切の|全ての)[^。]{0,10}(権利|著作権)[^。]{0,15}(甲|発注者|委託者)/],
fix:"IP帰属は対価の支払いと紐づけ、自社利用のライセンスバック条項を追加してください。包括的な無償譲渡は避けるべきです。"},
{id:"nda_indefinite",name:"秘密保持の無期限義務",level:"mid",
p:[/秘密保持[^。]{0,30}(無期限|永久|永続|期限の定めな|終了後も.*存続)/,/機密[^。]{0,20}(無期限|永久|半永久)/,/秘密[^。]{0,30}存続[^。]{0,10}(期限なし|無期限|定めない)/],
fix:"秘密保持期間は契約終了後3〜5年が一般的です。無期限は負担が過大なため、期間の明記を求めてください。"},
{id:"jurisdiction",name:"専属的裁判管轄の不利設定",level:"mid",
p:[/専属的合意管轄[^。]{0,20}(地方裁判所|簡易裁判所)/,/管轄[^。]{0,15}(のみ|に限る|を専属)/,/(大阪|名古屋|福岡|札幌|仙台|広島|高松)[^。]{0,10}(地方裁判所|裁判所)[^。]{0,10}(専属|合意管轄)/],
fix:"自社所在地の裁判所、または被告地主義（被告の住所地）を提案してください。遠方の裁判所指定は訴訟コスト増大の原因になります。"},
{id:"auto_renew",name:"自動更新・解約制限条項",level:"low",
p:[/自動(的に|で)?(更新|延長)[^。]{0,20}(申し出がない限り|届出がない|通知がない)/,/(3ヶ月|6ヶ月|1年)前[^。]{0,15}(通知|届出|申出)[^。]{0,10}ない限り[^。]{0,10}(更新|延長)/],
fix:"自動更新自体は一般的ですが、解約通知期間が長すぎないか（30日前が標準）、更新後の条件変更の可否を確認してください。"},
{id:"penalty",name:"過大な違約金・ペナルティ",level:"mid",
p:[/違約金[^。]{0,20}(\d{3,}万|億|[2-9]倍|10倍)/,/ペナルティ[^。]{0,15}(全額|倍額|2倍)/,/損害賠償額の予定[^。]{0,20}(\d{3,}万|契約金額の[2-9])/],
fix:"違約金は実損害と均衡すべきです。契約金額を大幅に超える違約金は公序良俗違反で無効となる可能性があります。上限の設定を交渉してください。"},
{id:"guarantee",name:"連帯保証・個人保証条項",level:"high",
p:[/連帯保証/,/個人保証/,/代表者[^。]{0,10}(保証|連帯)/,/(代表取締役|取締役)[^。]{0,15}連帯して/],
fix:"2020年民法改正で個人保証には極度額の定めが必須です。経営者保証は可能な限り削除を交渉し、やむを得ない場合は極度額の上限を明記してください。"}
];
function analyze(){
const txt=document.getElementById("inp").value.trim();
if(!txt){alert("契約書テキストを貼り付けてください。");return}
let hits=[],h=0,m=0,l=0;
RULES.forEach(r=>{let found=[];r.p.forEach(re=>{let ma=txt.match(re);if(ma)found.push(ma[0])});
if(found.length){hits.push({...r,matches:[...new Set(found)]});
if(r.level==="high")h++;else if(r.level==="mid")m++;else l++}});
let html='<div class="summary">';
html+='<div class="sbox sh"><span class="n">'+h+'</span>高リスク</div>';
html+='<div class="sbox sm"><span class="n">'+m+'</span>中リスク</div>';
html+='<div class="sbox sl"><span class="n">'+l+'</span>低リスク</div>';
html+='<div class="sbox s0"><span class="n">'+(10-h-m-l)+'</span>検出なし</div></div>';
if(!hits.length){html+='<div class="empty">✅ 10種類のパターンに該当する危険条項は検出されませんでした。<br>ただし本ツールはキーワード検出のため、文言が異なるリスク条項が存在する可能性があります。</div>'}
else{const ord={high:0,mid:1,low:2};hits.sort((a,b)=>ord[a.level]-ord[b.level]);
hits.forEach(r=>{let lv=r.level==="high"?"high":r.level==="mid"?"mid":"low";
let ln=r.level==="high"?"高":"中";if(r.level==="low")ln="低";
html+='<div class="card '+lv+'"><h3>'+r.name+' <span class="tag '+lv+'">リスク：'+ln+'</span></h3>';
r.matches.forEach(mt=>{html+='<div class="match">📌 検出：「'+mt.replace(/</g,"&lt;")+'」</div>'});
html+='<div class="fix"><b>💡 修正案：</b>'+r.fix+'</div></div>'})}
document.getElementById("out").innerHTML=html}
</script>
</body>
