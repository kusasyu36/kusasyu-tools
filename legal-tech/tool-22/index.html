<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;background:#f0f4f8;color:#1a202c;line-height:1.6}
.wrap{max-width:760px;margin:0 auto;padding:16px}
header{background:linear-gradient(135deg,#1e3a5f,#2d5a87);color:#fff;padding:24px 20px;border-radius:12px;margin-bottom:20px;text-align:center}
header h1{font-size:1.25em;margin-bottom:4px}
header p{font-size:.82em;opacity:.85}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card h2{font-size:1em;color:#1e3a5f;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e2e8f0}
label{display:block;font-size:.85em;font-weight:600;margin-bottom:4px;color:#4a5568}
select,input{width:100%;padding:10px 12px;border:1.5px solid #cbd5e0;border-radius:8px;font-size:.95em;margin-bottom:12px;background:#fff}
select:focus,input:focus{outline:none;border-color:#2d5a87;box-shadow:0 0 0 3px rgba(45,90,135,.15)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.row{grid-template-columns:1fr}}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#1e3a5f,#2d5a87);color:#fff;border:none;border-radius:8px;font-size:1em;font-weight:700;cursor:pointer;transition:.2s}
.btn:hover{opacity:.9;transform:translateY(-1px)}
.prog{background:#e2e8f0;border-radius:20px;height:24px;margin:12px 0;overflow:hidden;position:relative}
.prog-bar{height:100%;background:linear-gradient(90deg,#2d5a87,#38a169);border-radius:20px;transition:.4s}
.prog-txt{position:absolute;top:0;left:0;right:0;text-align:center;font-size:.75em;font-weight:700;line-height:24px;color:#1a202c}
.month-sec{margin-bottom:14px}
.month-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;cursor:pointer;font-weight:700;font-size:.95em;user-select:none;transition:.15s}
.month-hd:hover{opacity:.85}
.month-hd .arrow{transition:.2s;font-size:.8em}
.month-hd.open .arrow{transform:rotate(90deg)}
.month-hd .badge{margin-left:auto;font-size:.75em;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.3)}
.month-body{display:none;padding:6px 0 6px 16px}
.month-body.show{display:block}
.task{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;margin:4px 0;border-radius:8px;background:#f7fafc;border-left:3px solid #cbd5e0;font-size:.85em;transition:.15s}
.task.done{opacity:.55;border-left-color:#38a169}
.task input[type=checkbox]{margin-top:3px;cursor:pointer;accent-color:#2d5a87;width:16px;height:16px;flex-shrink:0}
.task .info{flex:1}
.task .tname{font-weight:600}
.task .tdesc{font-size:.82em;color:#718096;margin-top:2px}
.tag{display:inline-block;font-size:.68em;padding:1px 6px;border-radius:4px;margin-left:6px;font-weight:400;vertical-align:middle}
.tag-labor{background:#fef3c7;color:#92400e}
.tag-tax{background:#dbeafe;color:#1e40af}
.tag-compliance{background:#d1fae5;color:#065f46}
.tag-contract{background:#ede9fe;color:#5b21b6}
.tag-safety{background:#fce7f3;color:#9d174d}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;font-size:.75em}
.legend span{padding:3px 8px;border-radius:4px}
#calendar{display:none}
.reset{background:none;border:1px solid #e53e3e;color:#e53e3e;padding:8px 16px;border-radius:8px;font-size:.82em;cursor:pointer;margin-top:8px}
.reset:hover{background:#e53e3e;color:#fff}
.mcolors{--labor:#f6ad55;--tax:#63b3ed;--comp:#68d391;--cont:#b794f4;--safe:#f687b3}
</style>

<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/legal-tech/" style="color:#4299e1;text-decoration:none;">kusasyu Legal Tech</a> &gt; <span style="color:#718096;">中小企業_法務タスク年間カレンダー</span></div>
<div class="wrap">
<header>
<h1>中小企業 法務タスク年間カレンダー</h1>
<p>会社情報を入力 → 必要な法務タスクを月別に自動表示<br>チェックで進捗管理・LocalStorageで自動保存</p>
</header>

<div class="card" id="form-card">
<h2>会社情報を入力</h2>
<div class="row">
<div><label>業種</label>
<select id="industry"><option value="it">IT・ソフトウェア</option><option value="mfg">製造業</option><option value="svc">サービス業</option><option value="retail">小売・卸売業</option><option value="const">建設業</option><option value="other">その他</option></select></div>
<div><label>従業員数</label>
<select id="empCount"><option value="5">5〜9名</option><option value="10">10〜29名</option><option value="30">30〜49名</option><option value="50">50名以上</option></select></div>
</div>
<div class="row">
<div><label>決算月</label>
<select id="fiscal"></select></div>
<div><label>主な取引形態</label>
<select id="bizType"><option value="b2b">BtoB（法人間取引）</option><option value="b2c">BtoC（消費者向け）</option><option value="both">両方</option></select></div>
</div>
<button class="btn" onclick="generate()">カレンダーを生成する</button>
</div>

<div id="calendar">
<div class="card">
<h2>年間進捗</h2>
<div class="legend">
<span class="tag tag-labor">労務</span><span class="tag tag-tax">税務・届出</span><span class="tag tag-compliance">コンプライアンス</span><span class="tag tag-contract">契約</span><span class="tag tag-safety">安全衛生</span>
</div>
<div class="prog"><div class="prog-bar" id="pbar"></div><div class="prog-txt" id="ptxt"></div></div>
<div id="summary" style="font-size:.85em;color:#4a5568"></div>
<button class="reset" onclick="resetAll()">チェックを全てリセット</button>
</div>
<div id="timeline"></div>
</div>
</div>

<script>
(function(){
var fs=document.getElementById('fiscal');
for(var i=1;i<=12;i++){var o=document.createElement('option');o.value=i;o.textContent=i+'月';if(i===3)o.selected=true;fs.appendChild(o);}
})();

var TASKS=[
{id:'t36',name:'36協定の届出・更新',cat:'labor',desc:'時間外・休日労働に関する協定届の届出（有効期間に注意）',month:3,all:true},
{id:'kensin',name:'定期健康診断の実施',cat:'safety',desc:'全従業員に年1回の健康診断を実施する義務',month:5,all:true},
{id:'roudou',name:'労働保険年度更新',cat:'tax',desc:'労災保険・雇用保険の年度更新手続き（6/1〜7/10）',month:6,all:true},
{id:'sanki',name:'社会保険算定基礎届',cat:'tax',desc:'4〜6月報酬に基づく届出（7/10期限）',month:7,all:true},
{id:'minwage',name:'最低賃金改定対応',cat:'labor',desc:'地域別最低賃金改定に伴う給与の確認・修正',month:10,all:true},
{id:'nencho',name:'年末調整',cat:'tax',desc:'従業員の所得税精算。書類回収・計算・納付',month:11,all:true},
{id:'hotei',name:'法定調書・給与支払報告書提出',cat:'tax',desc:'税務署・市区町村への各種法定調書提出（1/31期限）',month:1,all:true},
{id:'juminzei',name:'住民税特別徴収切替',cat:'tax',desc:'新年度の住民税特別徴収税額通知への対応',month:5,all:true},
{id:'syugyo',name:'就業規則の見直し',cat:'compliance',desc:'法改正に対応した就業規則の年次点検・届出',month:2,cond:function(e){return e>=10}},
{id:'pmark',name:'個人情報保護法対応点検',cat:'compliance',desc:'個人情報取扱状況・プライバシーポリシーの年次点検',month:4,all:true},
{id:'keiyaku',name:'主要契約の更新確認',cat:'contract',desc:'取引基本契約・業務委託契約等の更新時期チェック',month:0,all:true,every:true},
{id:'stress',name:'ストレスチェックの実施',cat:'safety',desc:'50人以上事業場の義務。年1回実施・報告',month:9,cond:function(e){return e>=50}},
{id:'sangyoi',name:'産業医の選任・面談',cat:'safety',desc:'50人以上事業場での産業医面談・職場巡視',month:4,cond:function(e){return e>=50}},
{id:'anbou',name:'安全衛生委員会の設置・運営',cat:'safety',desc:'50人以上事業場の月次開催義務',month:0,cond:function(e){return e>=50},every:true},
{id:'haiki',name:'産業廃棄物管理票報告',cat:'compliance',desc:'前年度のマニフェスト交付状況報告（6/30期限）',month:6,ind:['mfg','const']},
{id:'kensetsu',name:'建設業許可更新確認',cat:'compliance',desc:'5年ごとの建設業許可更新手続き確認',month:1,ind:['const']},
{id:'tokusho',name:'特定商取引法表示の点検',cat:'compliance',desc:'ECサイト・広告の特商法表示内容の確認',month:3,ind:['retail'],biz:['b2c','both']},
{id:'keihyo',name:'景品表示法チェック',cat:'compliance',desc:'広告・販促物の不当表示がないか点検',month:8,biz:['b2c','both']},
{id:'denshi',name:'電子契約・電子帳簿保存法対応',cat:'contract',desc:'電子取引データの保存要件充足を確認',month:1,ind:['it']},
{id:'haken',name:'派遣契約・業務委託適正化チェック',cat:'labor',desc:'偽装請負リスクの点検。契約と実態の整合確認',month:9,ind:['it','svc']},
{id:'shohi',name:'インボイス制度対応確認',cat:'tax',desc:'適格請求書発行事業者登録・発行要件の点検',month:3,all:true}
];

var MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var MCLR=['#e53e3e','#dd6b20','#d69e2e','#38a169','#319795','#3182ce','#5a67d8','#805ad5','#d53f8c','#e53e3e','#dd6b20','#d69e2e'];
var saved={};

function loadSaved(){try{saved=JSON.parse(localStorage.getItem('legalCal')||'{}');}catch(e){saved={};}}
function saveSt(){localStorage.setItem('legalCal',JSON.stringify(saved));}

function generate(){
loadSaved();
var ind=document.getElementById('industry').value;
var emp=parseInt(document.getElementById('empCount').value);
var fis=parseInt(document.getElementById('fiscal').value);
var biz=document.getElementById('bizType').value;

var monthTasks={};
for(var m=0;m<12;m++)monthTasks[m]=[];

TASKS.forEach(function(t){
var ok=false;
if(t.all)ok=true;
if(t.cond&&t.cond(emp))ok=true;
if(t.ind&&t.ind.indexOf(ind)>=0)ok=true;
if(!t.all&&!t.cond&&!t.ind)return;
if(t.ind&&t.ind.indexOf(ind)<0)return;
if(t.biz&&t.biz.indexOf(biz)<0&&!t.all)return;
if(t.cond&&!t.cond(emp))return;
if(!ok)return;
if(t.every){for(var m=0;m<12;m++)monthTasks[m].push(t);}
else{
var mo=t.month;
if(t.id==='houjin'){mo=(fis%12);}
monthTasks[mo].push(t);
}
});

// fiscal-relative tasks
var taxMonth=(fis+1)%12;
monthTasks[taxMonth].push({id:'houjin',name:'法人税・地方税申告',cat:'tax',desc:'決算日から2ヶ月以内に申告・納付',month:taxMonth,all:true});
var kesMonth=fis%12;
monthTasks[kesMonth].push({id:'kessan',name:'決算整理・棚卸',cat:'tax',desc:'決算月の帳簿締め・棚卸・残高確認',month:kesMonth,all:true});

var startM=(new Date().getMonth());
var html='';
for(var i=0;i<12;i++){
var m=(startM+i)%12;
var ts=monthTasks[m];
var doneC=0;ts.forEach(function(t){if(saved[t.id+'_'+m])doneC++;});
var clr=MCLR[m];
html+='<div class="month-sec"><div class="month-hd" style="background:'+clr+'22;color:'+clr+'" onclick="toggleM(this)">';
html+='<span class="arrow">▶</span>'+MN[m]+'（'+ts.length+'件）';
html+='<span class="badge" style="background:'+clr+'33">'+doneC+'/'+ts.length+' 完了</span></div>';
html+='<div class="month-body" id="mb_'+m+'">';
if(ts.length===0)html+='<div style="padding:8px;font-size:.85em;color:#a0aec0">該当タスクなし</div>';
ts.forEach(function(t){
var ck=saved[t.id+'_'+m]?true:false;
html+='<div class="task'+(ck?' done':'')+'" id="tw_'+t.id+'_'+m+'">';
html+='<input type="checkbox" '+(ck?'checked':'')+' onchange="toggle(\''+t.id+'\','+m+',this)">';
html+='<div class="info"><span class="tname">'+t.name+'</span><span class="tag tag-'+t.cat+'">'+{labor:'労務',tax:'税務・届出',compliance:'コンプライアンス',contract:'契約',safety:'安全衛生'}[t.cat]+'</span>';
html+='<div class="tdesc">'+t.desc+'</div></div></div>';
});
html+='</div></div>';
}
document.getElementById('timeline').innerHTML=html;
document.getElementById('calendar').style.display='block';
updateProg();

var cur=document.querySelector('.month-sec:first-child .month-hd');
if(cur)toggleM(cur);
}

window.toggleM=function(el){
var open=el.classList.toggle('open');
var body=el.nextElementSibling;
body.classList.toggle('show',open);
};

window.toggle=function(id,m,cb){
var key=id+'_'+m;
if(cb.checked)saved[key]=1;else delete saved[key];
saveSt();
var tw=document.getElementById('tw_'+id+'_'+m);
tw.classList.toggle('done',cb.checked);
var badge=tw.closest('.month-sec').querySelector('.badge');
var tasks=tw.closest('.month-body').querySelectorAll('.task');
var d=0;tasks.forEach(function(t){if(t.classList.contains('done'))d++;});
badge.textContent=d+'/'+tasks.length+' 完了';
updateProg();
};

function updateProg(){
var all=document.querySelectorAll('#timeline .task');
var done=document.querySelectorAll('#timeline .task.done');
var pct=all.length?Math.round(done.length/all.length*100):0;
document.getElementById('pbar').style.width=pct+'%';
document.getElementById('ptxt').textContent=done.length+'/'+all.length+' 完了（'+pct+'%）';
document.getElementById('summary').textContent='残りタスク: '+(all.length-done.length)+'件';
}

window.resetAll=function(){
if(!confirm('全てのチェックをリセットしますか？'))return;
saved={};saveSt();generate();
};
</script>
</body>
</html>
