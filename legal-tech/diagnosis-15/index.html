function toggle(id){document.getElementById(id).classList.toggle("open")}
function esc(s){return s.replace(/</g,"&lt;")}
function cp(btn){
const txt=btn.parentElement.textContent.replace("コピー","").replace("After（改善文例）","").trim();
if(navigator.clipboard){navigator.clipboard.writeText(txt);btn.textContent="✓"}
else{btn.textContent="✓"}
setTimeout(()=>{btn.textContent="コピー"},1500);
}
