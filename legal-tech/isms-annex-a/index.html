let checkedServices=new Set();
let activeCategory='all';

function init(){
const grid=document.getElementById('serviceGrid');
SERVICES.forEach(s=>{
const label=document.createElement('label');
label.className='service-label';
label.id='label-'+s.id;
label.innerHTML=`<input type="checkbox" value="${s.id}"><span class="icon">${s.icon}</span>${s.name}`;
label.querySelector('input').addEventListener('change',e=>{
if(e.target.checked){checkedServices.add(s.id);label.classList.add('checked')}
else{checkedServices.delete(s.id);label.classList.remove('checked')}
render();
});
grid.appendChild(label);
});
const tabs=document.getElementById('categoryTabs');
CATEGORIES.forEach(c=>{
const t=document.createElement('span');
t.className='cat-tab'+(c.id==='all'?' active':'');
t.textContent=c.name;
t.onclick=()=>{activeCategory=c.id;document.querySelectorAll('.cat-tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');render()};
tabs.appendChild(t);
});
document.getElementById('searchInput').addEventListener('input',render);
render();
}

function render(){
const tbody=document.getElementById('tbody');
const q=document.getElementById('searchInput').value.toLowerCase();
tbody.innerHTML='';
let count=0;
const filtered=CONTROLS.filter(c=>{
if(activeCategory!=='all'&&!c.id.startsWith(activeCategory+'.'))return false;
if(checkedServices.size>0&&!c.svc.some(s=>checkedServices.has(s)))return false;
if(checkedServices.size===0)return false;
if(q){
const hay=(c.id+' '+c.name+' '+c.ev.join(' ')+' '+c.svc.map(s=>SERVICES.find(x=>x.id===s)?.name).join(' ')).toLowerCase();
if(!hay.includes(q))return false;
}
return true;
});
filtered.forEach(c=>{
const tr=document.createElement('tr');
const visibleSvc=c.svc.filter(s=>checkedServices.size===0||checkedServices.has(s));
tr.innerHTML=`<td class="ctrl-id">A.${c.id}</td><td class="ctrl-name">${c.name}</td><td><div class="evidence-tags">${c.ev.map(e=>`<span class="ev-tag ${EV_CLASS[e]||'ev-config'}">${e}</span>`).join('')}</div></td><td><div class="svc-badges">${visibleSvc.map(s=>`<span class="svc-badge svc-${s}">${SERVICES.find(x=>x.id===s)?.name}</span>`).join('')}</div></td>`;
tbody.appendChild(tr);
count++;
});
document.getElementById('matchCount').textContent=count;
document.getElementById('totalChecked').textContent=checkedServices.size;
const coveredSet=new Set();
CONTROLS.forEach(c=>{if(c.svc.some(s=>checkedServices.has(s)))coveredSet.add(c.id)});
const pct=Math.round(coveredSet.size/93*100);
document.getElementById('coverageFill').style.width=pct+'%';
document.getElementById('coveragePct').textContent=pct+'%';
document.getElementById('emptyMsg').style.display=count===0?'block':'none';
document.querySelector('table').style.display=count===0?'none':'table';
}

init();
</script>
