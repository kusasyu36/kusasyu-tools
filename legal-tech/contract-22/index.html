.form-group input:focus,.form-group select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/legal-tech/" style="color:#4299e1;text-decoration:none;">kusasyu Legal Tech</a> &gt; <span style="color:#718096;">契約期限アラートダッシュボード</span></div>
<div class="banner">⚠ 定期的にJSONバックアップを取ってください <span>下のエクスポートボタンから保存できます</span></div>
<header>
<h1>📋 契約期限アラートダッシュボード</h1>
<p>締結済み契約の更新期限・解約通知期限を一覧管理（最大20件）</p>
</header>
<div class="container">
<div class="actions">
<button class="btn btn-primary" onclick="openModal()">＋ 契約を追加</button>
<button class="btn btn-export" onclick="exportJSON()">📥 JSONエクスポート</button>
<button class="btn btn-import" onclick="document.getElementById('importFile').click()">📤 JSONインポート</button>
<input type="file" id="importFile" accept=".json" onchange="importJSON(event)">
</div>
<div class="summary" id="summary"></div>
<div class="count-badge" id="countBadge"></div>
<div class="cards" id="cardList"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
<div class="modal">
<h2 id="modalTitle">契約を追加</h2>
<input type="hidden" id="editIndex" value="-1">
<div class="form-group"><label>取引先名 *</label><input id="fName" placeholder="例：株式会社〇〇"></div>
<div class="form-group"><label>契約種別 *</label><select id="fType"><option value="">選択してください</option><option>業務委託契約</option><option>売買契約</option><option>賃貸借契約</option><option>保守契約</option><option>ライセンス契約</option><option>秘密保持契約(NDA)</option><option>リース契約</option><option>その他</option></select></div>
<div class="form-row">
<div class="form-group"><label>契約開始日 *</label><input type="date" id="fStart"></div>
<div class="form-group"><label>契約終了日 *</label><input type="date" id="fEnd"></div>
</div>
<div class="form-row">
<div class="form-group"><label>自動更新</label><select id="fAutoRenew"><option value="yes">あり</option><option value="no">なし</option></select></div>
<div class="form-group"><label>解約通知期限（日前）</label><input type="number" id="fNotice" min="0" max="365" value="30" placeholder="30"></div>
</div>
<div class="form-group"><label>メモ</label><input id="fMemo" placeholder="備考があれば入力"></div>
<div class="modal-actions">
<button class="btn btn-cancel" onclick="closeModal()">キャンセル</button>
<button class="btn btn-primary" onclick="saveContract()">保存</button>
</div>
</div>
</div>

<script>
const STORAGE_KEY='kl_contracts';
let contracts=load();

function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[]}catch(e){return[]}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(contracts))}

function daysUntil(dateStr){
 const d=new Date(dateStr);d.setHours(0,0,0,0);
 const now=new Date();now.setHours(0,0,0,0);
 return Math.ceil((d-now)/864e5);
}

function getStatus(days){
 if(days<0)return{cls:'expired',badge:'badge-expired',text:'期限切れ'};
 if(days<30)return{cls:'red',badge:'badge-red',text:'残'+days+'日'};
 if(days<90)return{cls:'yellow',badge:'badge-yellow',text:'残'+days+'日'};
 return{cls:'green',badge:'badge-green',text:'残'+days+'日'};
}

function render(){
 const sorted=[...contracts].map((c,i)=>({...c,origIdx:i}));
 sorted.sort((a,b)=>new Date(a.endDate)-new Date(b.endDate));
 let red=0,yellow=0,green=0;
 sorted.forEach(c=>{const d=daysUntil(c.endDate);if(d<0||d<30)red++;else if(d<90)yellow++;else green++;});

 document.getElementById('summary').innerHTML=
  '<div class="summary-card s-total"><div class="num">'+contracts.length+'</div><div class="label">全契約</div></div>'+
  '<div class="summary-card s-red"><div class="num">'+red+'</div><div class="label">要対応</div></div>'+
  '<div class="summary-card s-yellow"><div class="num">'+yellow+'</div><div class="label">注意</div></div>'+
  '<div class="summary-card s-green"><div class="num">'+green+'</div><div class="label">余裕あり</div></div>';

 document.getElementById('countBadge').textContent='登録数: '+contracts.length+' / 20件';

 if(!sorted.length){
  document.getElementById('cardList').innerHTML='<div class="empty"><p>契約が登録されていません</p><p style="font-size:13px;color:#bbb">「＋ 契約を追加」ボタンから登録してください</p></div>';
  return;
 }

 let html='';
 sorted.forEach(c=>{
  const days=daysUntil(c.endDate);
  const s=getStatus(days);
  const noticeDays=daysUntil(c.endDate)-(c.noticeDays||0);
  let noticeText='';
  if(c.autoRenew==='yes'&&c.noticeDays>0){
   if(noticeDays<0)noticeText='<span style="color:#dc2626;font-weight:700">⚠ 解約通知期限超過</span>';
   else if(noticeDays<14)noticeText='<span style="color:#d97706;font-weight:600">解約通知まで残'+noticeDays+'日</span>';
   else noticeText='解約通知まで残'+noticeDays+'日';
  }
  html+='<div class="card '+s.cls+'">'+
   '<div class="card-actions">'+
   '<button class="btn btn-primary" style="padding:4px 10px;font-size:12px" onclick="editContract('+c.origIdx+')">編集</button>'+
   '<button class="btn btn-danger" onclick="deleteContract('+c.origIdx+')">削除</button></div>'+
   '<div class="card-header"><div class="card-title">'+esc(c.name)+'</div>'+
   '<span class="badge '+s.badge+'">'+s.text+'</span></div>'+
   '<dl class="card-info">'+
   '<dt>契約種別</dt><dd>'+esc(c.type)+'</dd>'+
   '<dt>期間</dt><dd>'+c.startDate+' 〜 '+c.endDate+'</dd>'+
   '<dt>自動更新</dt><dd>'+(c.autoRenew==='yes'?'あり':'なし')+'</dd>'+
   (noticeText?'<dt>解約通知</dt><dd>'+noticeText+'</dd>':'')+
   (c.memo?'<dt>メモ</dt><dd>'+esc(c.memo)+'</dd>':'')+
   '</dl></div>';
 });
 document.getElementById('cardList').innerHTML=html;
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function openModal(idx){
 document.getElementById('editIndex').value=idx!=null?idx:-1;
 document.getElementById('modalTitle').textContent=idx!=null?'契約を編集':'契約を追加';
 if(idx!=null){
  const c=contracts[idx];
  document.getElementById('fName').value=c.name;
  document.getElementById('fType').value=c.type;
  document.getElementById('fStart').value=c.startDate;
  document.getElementById('fEnd').value=c.endDate;
  document.getElementById('fAutoRenew').value=c.autoRenew;
  document.getElementById('fNotice').value=c.noticeDays||30;
  document.getElementById('fMemo').value=c.memo||'';
 }else{
  ['fName','fMemo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fType').value='';
  document.getElementById('fStart').value='';
  document.getElementById('fEnd').value='';
  document.getElementById('fAutoRenew').value='yes';
  document.getElementById('fNotice').value='30';
 }
 document.getElementById('modalOverlay').classList.add('active');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('active')}
function closeModalOutside(e){if(e.target===e.currentTarget)closeModal()}

function saveContract(){
 const name=document.getElementById('fName').value.trim();
 const type=document.getElementById('fType').value;
 const startDate=document.getElementById('fStart').value;
 const endDate=document.getElementById('fEnd').value;
 const autoRenew=document.getElementById('fAutoRenew').value;
 const noticeDays=parseInt(document.getElementById('fNotice').value)||0;
 const memo=document.getElementById('fMemo').value.trim();

 if(!name||!type||!startDate||!endDate){alert('必須項目を入力してください');return}
 if(new Date(endDate)<new Date(startDate)){alert('終了日は開始日以降にしてください');return}

 const idx=parseInt(document.getElementById('editIndex').value);
 const obj={name,type,startDate,endDate,autoRenew,noticeDays,memo};

 if(idx>=0){contracts[idx]=obj}
 else{
  if(contracts.length>=20){alert('登録上限（20件）に達しています');return}
  contracts.push(obj);
 }
 save();render();closeModal();
}

function editContract(idx){openModal(idx)}
function deleteContract(idx){if(confirm('「'+contracts[idx].name+'」を削除しますか？')){contracts.splice(idx,1);save();render()}}

function exportJSON(){
 const blob=new Blob([JSON.stringify(contracts,null,2)],{type:'application/json'});
 const a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 const d=new Date();
 a.download='contracts_backup_'+d.getFullYear()+(''+(d.getMonth()+1)).padStart(2,'0')+(''+d.getDate()).padStart(2,'0')+'.json';
 a.click();URL.revokeObjectURL(a.href);
}

function importJSON(e){
 const file=e.target.files[0];if(!file)return;
 const reader=new FileReader();
 reader.onload=function(ev){
  try{
   const data=JSON.parse(ev.target.result);
   if(!Array.isArray(data)){alert('無効なファイル形式です');return}
   if(data.length>20){alert('20件を超えるデータは読み込めません');return}
   if(!confirm('現在のデータを上書きしますか？（'+data.length+'件読み込み）'))return;
   contracts=data;save();render();
  }catch(err){alert('JSONの読み込みに失敗しました')}
 };
 reader.readAsText(file);
 e.target.value='';
}

render();
</script>
</body>
