*{margin:0;padding:0;box-sizing:border-box}
:root{--h:#dc2626;--m:#f59e0b;--l:#22c55e;--bg:#f8fafc;--card:#fff;--border:#e2e8f0;--text:#1e293b;--sub:#64748b;--accent:#2563eb}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.wrap{max-width:1100px;margin:0 auto;padding:16px}
h1{font-size:1.3rem;text-align:center;padding:20px 0 4px;color:var(--text)}
.sub{text-align:center;color:var(--sub);font-size:.82rem;margin-bottom:18px}
.ctrl{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:16px;padding:14px;background:var(--card);border-radius:10px;border:1px solid var(--border)}
.ctrl label{font-size:.82rem;font-weight:600;margin-right:4px}
.ctrl select,.ctrl button{padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:.85rem;background:#fff;cursor:pointer}
.ctrl select:focus{outline:2px solid var(--accent)}
.btn-p{background:var(--accent);color:#fff;border:none;font-weight:600}
.btn-p:hover{opacity:.85}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.stat{background:var(--card);border-radius:8px;padding:12px;text-align:center;border:1px solid var(--border)}
.stat .n{font-size:1.5rem;font-weight:700}
.stat .lb{font-size:.75rem;color:var(--sub)}
.s-h .n{color:var(--h)}.s-m .n{color:var(--m)}.s-l .n{color:var(--l)}.s-t .n{color:var(--accent)}
.prog{height:6px;background:#e2e8f0;border-radius:3px;margin-top:6px;overflow:hidden}
.prog div{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.cat{margin-bottom:12px}
.cat-h{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px 8px 0 0;cursor:pointer;user-select:none}
.cat-h h3{font-size:.92rem;display:flex;align-items:center;gap:6px}
.cat-h .arr{transition:transform .2s;font-size:.7rem}
.cat-h .arr.open{transform:rotate(90deg)}
.cat-b{border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;overflow:hidden}
.item{display:grid;grid-template-columns:28px 60px 1fr auto;align-items:center;gap:8px;padding:8px 12px;background:var(--card);border-bottom:1px solid #f1f5f9;font-size:.83rem;transition:background .15s}
.item:last-child{border-bottom:none}
.item.checked{background:#f0fdf4;opacity:.7}
.item input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent)}
.risk{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:700;color:#fff;text-align:center;min-width:28px}
.r-h{background:var(--h)}.r-m{background:var(--m);color:#1e293b}.r-l{background:var(--l)}
.iname{font-weight:500}
.law{color:var(--sub);font-size:.73rem;display:block;margin-top:1px}
.tags{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end}
.tag{font-size:.65rem;padding:1px 6px;border-radius:3px;background:#e0e7ff;color:#3730a3;white-space:nowrap}
.tag-製造{background:#dcfce7;color:#166534}
.tag-IT{background:#e0e7ff;color:#3730a3}
.tag-金融{background:#fef3c7;color:#92400e}
.tag-HC{background:#fce7f3;color:#9d174d}
.score-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.score-panel h2{font-size:1rem;margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:.8rem}
.bar-row .bl{width:80px;text-align:right;flex-shrink:0}
.bar-bg{flex:1;height:18px;background:#e2e8f0;border-radius:4px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:4px;transition:width .4s}
.bar-num{position:absolute;right:6px;top:0;line-height:18px;font-size:.7rem;font-weight:600;color:#fff}
.foot{text-align:center;color:var(--sub);font-size:.72rem;padding:16px 0}
@media(max-width:640px){
 .item{grid-template-columns:24px 44px 1fr;gap:4px;padding:6px 8px}
 .tags{display:none}
 .ctrl{flex-direction:column;align-items:stretch}
 h1{font-size:1.1rem}
}
</style>

{n:"越境データ移転(SCC/BCR)",r:"中",l:"GDPR Art.44-49",t:["IT","金融"]}
],知財:[
{n:"従業員発明の届出・補償",r:"中",l:"ArbNErfG §3-16",t:["製造","IT"]},
{n:"OSS著作権コンプライアンス",r:"低",l:"UrhG / EU指令2019/790",t:["IT"]},
{n:"特許権の共同所有リスク",r:"低",l:"PatG §6-7",t:["製造"]}
],税務:[
{n:"PE認定リスク(常設代理人)",r:"高",l:"AO §12-13 / 日独租税条約",t:["製造","IT","金融","HC"]},
{n:"移転価格文書化(MasterFile/LocalFile)",r:"高",l:"AStG §1 / GAufzV",t:["製造","IT","金融"]},
{n:"VAT(Umsatzsteuer)登録義務",r:"中",l:"UStG §1-3",t:["製造","IT","金融"]}
]}
};
const CI={外資規制:"⚖",競業避止:"🛡",労働法:"👥",データ保護:"🔒",知財:"💡",税務:"💰"};
let chk=JSON.parse(localStorage.getItem("ddchk")||"{}");
function sv(){localStorage.setItem("ddchk",JSON.stringify(chk))}
function key(c,cat,i){return c+"_"+cat+"_"+i}
function render(){
 const c=document.getElementById("cs").value;
 const rf=document.getElementById("rf").value;
 const d=D[c];if(!d)return;
 let h=0,m=0,lo=0,tot=0,done=0;
 let html="";
 const cats=Object.keys(d);
 cats.forEach(cat=>{
  const items=d[cat];
  let rows="";let catCnt=0;
  items.forEach((it,i)=>{
   if(rf&&it.r!==rf)return;
   const k=key(c,cat,i);
   const ck=chk[k]?"checked":"";
   if(chk[k])done++;
   tot++;
   if(it.r==="高")h++;else if(it.r==="中")m++;else lo++;
   const rc=it.r==="高"?"r-h":it.r==="中"?"r-m":"r-l";
   const tags=it.t.map(t=>`<span class="tag tag-${t==="ヘルスケア"?"HC":t}">${t==="HC"?"ヘルスケア":t}</span>`).join("");
   rows+=`<div class="item ${ck?"checked":""}" id="row_${k}">
    <input type="checkbox" ${ck} onchange="toggle('${k}',this)">
    <span class="risk ${rc}">${it.r}</span>
    <span><span class="iname">${it.n}</span><span class="law">${it.l}</span></span>
    <span class="tags">${tags}</span></div>`;
   catCnt++;
  });
  if(catCnt===0)return;
  html+=`<div class="cat"><div class="cat-h" onclick="togCat(this)">
   <h3>${CI[cat]||""} ${cat}<span style="color:var(--sub);font-size:.75rem;margin-left:6px">(${catCnt}項目)</span></h3>
   <span class="arr open">▶</span></div>
   <div class="cat-b">${rows}</div></div>`;
 });
 document.getElementById("out").innerHTML=html;
 const pct=tot?Math.round(done/tot*100):0;
 document.getElementById("stats").innerHTML=`
  <div class="stat s-h"><div class="n">${h}</div><div class="lb">高リスク</div></div>
  <div class="stat s-m"><div class="n">${m}</div><div class="lb">中リスク</div></div>
  <div class="stat s-l"><div class="n">${lo}</div><div class="lb">低リスク</div></div>
  <div class="stat s-t"><div class="n">${done}/${tot}</div><div class="lb">確認済</div><div class="prog"><div style="width:${pct}%"></div></div></div>`;
 renderScore(c,d,rf);
}
function renderScore(c,d,rf){
 const cats=Object.keys(d);
 let bars="";
 cats.forEach(cat=>{
  const items=d[cat];
  let fItems=[];
  items.forEach((it,i)=>{if(!rf||it.r===rf)fItems.push({it,i})});
  if(!fItems.length)return;
  let sc=0,mx=0;
  fItems.forEach(({it,i})=>{
   const w=it.r==="高"?10:it.r==="中"?5:2;
   mx+=w;
   const k=key(c,cat,i);
   if(!chk[k])sc+=w;
  });
  const pct=mx?Math.round(sc/mx*100):0;
  const cl=pct>66?"var(--h)":pct>33?"var(--m)":"var(--l)";
  bars+=`<div class="bar-row"><span class="bl">${CI[cat]} ${cat}</span>
   <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${cl}"></div>
   <span class="bar-num">${pct}%</span></div></div>`;
 });
 document.getElementById("scorePanel").innerHTML=`<h2>残存リスクスコア（未確認項目ベース）</h2>${bars}<p style="font-size:.73rem;color:var(--sub);margin-top:8px">※ 高=10pt, 中=5pt, 低=2pt。確認済み項目は0ptとして計算</p>`;
}
function toggle(k,el){
 if(el.checked)chk[k]=1;else delete chk[k];
 sv();
 const row=document.getElementById("row_"+k);
 if(row)row.classList.toggle("checked",el.checked);
 render();
}
function togCat(el){
 const b=el.nextElementSibling;
 const a=el.querySelector(".arr");
 if(b.style.display==="none"){b.style.display="";a.classList.add("open")}
 else{b.style.display="none";a.classList.remove("open")}
}
function resetAll(){
 if(!confirm("全チェックをリセットしますか？"))return;
 chk={};sv();render();
}
function exportCSV(){
 const c=document.getElementById("cs").value;
 const d=D[c];if(!d)return;
 let csv="カテゴリ,項目名,リスク,根拠法令,業種タグ,確認済\n";
 Object.keys(d).forEach(cat=>{
  d[cat].forEach((it,i)=>{
   const k=key(c,cat,i);
   csv+=`"${cat}","${it.n}","${it.r}","${it.l}","${it.t.join("/")}","${chk[k]?"済":"未"}"\n`;
  });
 });
 const blob=new Blob(["\uFEFF"+csv],{type:"text/csv"});
 const a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download=`DD_${c}_${new Date().toISOString().slice(0,10)}.csv`;
 a.click();
}
render();
</script>
</body>
</html>
