<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f0f2f5;color:#1a1a2e;line-height:1.6}
.wrap{max-width:960px;margin:0 auto;padding:12px}
header{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;padding:20px;border-radius:12px;margin-bottom:16px;text-align:center}
header h1{font-size:1.3em}

.steps{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}

.steps button.active{background:#302b63;color:#fff}
.panel{display:none;background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.panel.show{display:block}
.jtabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.jtabs button{padding:8px 16px;border:none;border-radius:6px 6px 0 0;cursor:pointer;font-weight:600;font-size:.85em}
.jtabs button.on{background:#302b63;color:#fff}
.jtabs button:not(.on){background:#e0e0e0}
.qcat{margin-bottom:14px;border:1px solid #e0e0e0;border-radius:8px;padding:10px}
.qcat h3{font-size:.95em;color:#302b63;margin-bottom:8px;border-bottom:1px solid #eee;padding-bottom:4px}
.q{margin-bottom:10px}
.q label{font-size:.85em;display:block;margin-bottom:4px}
.q select{width:100%;padding:6px;border:1px solid #ccc;border-radius:4px;font-size:.85em}
.actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn{padding:10px 20px;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-size:.9em}
.btn-p{background:#302b63;color:#fff}
.btn-s{background:#e8e8e8;color:#333}
.btn-g{background:#0a8754;color:#fff}
.btn-o{background:#e67e22;color:#fff}
.scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:16px}
.scard{border:1px solid #e0e0e0;border-radius:8px;padding:12px}
.scard h3{font-size:.95em;margin-bottom:8px}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:.82em}
.bar-bg{flex:1;height:18px;background:#eee;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
.bar-lbl{width:50px;text-align:right;font-weight:600}
.legend{display:flex;gap:16px;margin:12px 0;font-size:.82em;flex-wrap:wrap}
.legend span::before{content:'';display:inline-block;width:12px;height:12px;border-radius:2px;margin-right:4px;vertical-align:middle}
.lA::before{background:#e74c3c}.lB::before{background:#f39c12}.lC::before{background:#3498db}
table{width:100%;border-collapse:collapse;font-size:.82em;margin-top:8px}
th,td{border:1px solid #ddd;padding:6px;text-align:left}
th{background:#f5f5f5}
.pA{color:#e74c3c;font-weight:700}.pB{color:#f39c12;font-weight:700}.pC{color:#3498db}
.total-score{text-align:center;padding:16px;margin-bottom:16px}
.total-score .num{font-size:2.5em;font-weight:800}
.total-score .lbl{font-size:.9em;color:#666}
@media(max-width:600px){.scores{grid-template-columns:1fr}header h1{font-size:1.1em}}
</style>

<body>
<div class="wrap">
<header>
<h1>AI RegCheck — マルチ管轄コンプライアンス・ギャップ診断エンジン</h1>
<p>日本AI新法 / 韓国AI基本法 / カリフォルニア州AI規制 — 3管轄45問診断</p>
</header>
<div class="steps">
<button id="s1b" class="active" onclick="go(0)">STEP 1: 診断回答</button>
<button id="s2b" onclick="go(1)">STEP 2: 結果確認</button>
<button id="s3b" onclick="go(2)">STEP 3: 出力</button>
</div>
<div id="p0" class="panel show"></div>
<div id="p1" class="panel"></div>
<div id="p2" class="panel"></div>
</div>
<script>
const J=['日本AI新法','韓国AI基本法','CA州AI規制'];
const C=['リスク分類義務','透明性要件','人間監視義務','データガバナンス','届出・登録義務'];
const Q=[
[["高リスクAIの特定・分類を実施しているか","リスク評価の文書化・記録を行っているか","リスクレベルに応じた管理措置を定めているか"],
["AI利用の事実を利用者に通知しているか","AIの判断根拠を説明可能な仕組みがあるか","重要事項説明にAI利用を明記しているか"],
["高リスクAI判断への人間関与を確保しているか","異常時に人間が介入できる体制があるか","最終判断権限が人間にある旨を規定しているか"],
["学習データの品質管理プロセスがあるか","個人情報保護法との整合性を確認しているか","データの偏り(バイアス)検証を行っているか"],
["AI利用に関する届出要件を把握しているか","必要な届出・報告を所管省庁に行っているか","届出内容の変更管理体制があるか"]],
[["AIシステムのリスク分類基準を策定しているか","高影響AIの事前評価を実施しているか","リスク分類結果を定期的に見直しているか"],
["AI利用告知を韓国語で提供しているか","アルゴリズムの概要を利用者に開示しているか","自動化された意思決定の説明義務を果たしているか"],
["高リスクAIに人間監視プロセスがあるか","韓国ユーザーからの異議申立て対応体制があるか","緊急停止手順が文書化されているか"],
["韓国個人情報保護法との整合性を確認しているか","学習データの出所・適法性を管理しているか","データ主体の権利行使に対応できるか"],
["科技情報通信部への届出要件を把握しているか","高リスクAI事業者登録を完了しているか","年次報告義務に対応する体制があるか"]],
[["CA法に基づくリスク分類を実施しているか","自動意思決定の影響評価を行っているか","高リスクシステムのインベントリを管理しているか"],
["消費者へのAI利用通知を英語で提供しているか","AI生成コンテンツの明示(ウォーターマーク等)を行っているか","プロファイリングに関するオプトアウトを提供しているか"],
["人間によるレビュー体制を構築しているか","自動判断への不服申立て手段を提供しているか","バイアス監査を定期的に実施しているか"],
["CCPA/CPRAとの整合性を確保しているか","学習データの取得・利用の適法性を確認しているか","データ削除要求への対応プロセスがあるか"],
["CA州当局への届出要件を確認しているか","影響評価報告書の提出準備ができているか","コンプライアンス記録の保存体制があるか"]]
];
let cur=0;
function go(s){
 cur=s;
 document.querySelectorAll('.steps button').forEach((b,i)=>{b.classList.toggle('active',i===s)});
 document.querySelectorAll('.panel').forEach((p,i)=>{p.classList.toggle('show',i===s)});
 if(s===1)calcResults();
 if(s===2)buildOutput();
}
function buildForm(){
 let h='<div class="jtabs">';
 J.forEach((j,i)=>{h+=`<button class="${i===0?'on':''}" onclick="switchJ(${i},this)">${j}</button>`});
 h+='</div>';
 J.forEach((j,ji)=>{
  h+=`<div class="jzone" id="jz${ji}" style="display:${ji===0?'block':'none'}">`;
  C.forEach((c,ci)=>{
   h+=`<div class="qcat"><h3>${c}</h3>`;
   Q[ji][ci].forEach((q,qi)=>{
    let id=`q_${ji}_${ci}_${qi}`;
    h+=`<div class="q"><label>${qi+1}. ${q}</label><select id="${id}">`;
    h+=`<option value="-1">— 選択してください —</option>`;
    ['未対応(0)','着手中(1)','一部対応(2)','概ね対応(3)','完全対応(4)'].forEach((o,v)=>{h+=`<option value="${v}">${o}</option>`});
    h+=`</select></div>`;
   });
   h+=`</div>`;
  });
  h+=`</div>`;
 });
 h+=`<div class="actions"><button class="btn btn-p" onclick="go(1)">診断結果を見る →</button></div>`;
 document.getElementById('p0').innerHTML=h;
}
function switchJ(i,el){
 document.querySelectorAll('.jzone').forEach((z,j)=>{z.style.display=j===i?'block':'none'});
 document.querySelectorAll('.jtabs button').forEach(b=>b.classList.remove('on'));
 el.classList.add('on');
}
function getVal(ji,ci,qi){
 let v=parseInt(document.getElementById(`q_${ji}_${ci}_${qi}`).value);
 return v<0?0:v;
}
function calcResults(){
 let data=[],tasks=[];
 let totalPts=0,totalMax=0;
 J.forEach((j,ji)=>{
  let jd={name:j,cats:[],total:0,max:0};
  C.forEach((c,ci)=>{
   let pts=0;
   Q[ji][ci].forEach((q,qi)=>{
    let v=getVal(ji,ci,qi);
    pts+=v;
    if(v<3){
     let pri=v<=1?'A':v===2?'B':'C';
     tasks.push({j,c,q,v,pri});
    }
   });
   let mx=Q[ji][ci].length*4;
   let sc=Math.round(pts/mx*100);
   jd.cats.push({name:c,score:sc,pts,max:mx});
   jd.total+=pts;jd.max+=mx;
  });
  totalPts+=jd.total;totalMax+=jd.max;
  data.push(jd);
 });
 let totalSc=Math.round(totalPts/totalMax*100);
 tasks.sort((a,b)=>a.pri<b.pri?-1:a.pri>b.pri?1:a.v-b.v);
 window._data=data;window._tasks=tasks;window._totalSc=totalSc;
 renderResults(data,tasks,totalSc);
}
function scolor(s){return s>=80?'#27ae60':s>=60?'#f39c12':s>=40?'#e67e22':'#e74c3c'}
function renderResults(data,tasks,totalSc){
 let h=`<div class="total-score"><div class="lbl">総合コンプライアンススコア</div><div class="num" style="color:${scolor(totalSc)}">${totalSc}<span style="font-size:.4em">/ 100</span></div></div>`;
 h+=`<div class="scores">`;
 data.forEach(d=>{
  let js=Math.round(d.total/d.max*100);
  h+=`<div class="scard"><h3>${d.name}（${js}点）</h3>`;
  d.cats.forEach(c=>{
   h+=`<div class="bar-row"><span style="width:90px">${c.name}</span><div class="bar-bg"><div class="bar-fill" style="width:${c.score}%;background:${scolor(c.score)}"></div></div><span class="bar-lbl">${c.score}%</span></div>`;
  });
  h+=`</div>`;
 });
 h+=`</div>`;
 h+=`<h3>対応タスク一覧（${tasks.length}件）</h3>`;
 h+=`<div class="legend"><span class="lA">優先度A: 緊急対応</span><span class="lB">優先度B: 早期対応</span><span class="lC">優先度C: 計画的対応</span></div>`;
 h+=`<div style="overflow-x:auto"><table><tr><th>優先度</th><th>管轄</th><th>カテゴリ</th><th>項目</th><th>現状</th></tr>`;
 tasks.forEach(t=>{
  h+=`<tr><td class="p${t.pri}">${t.pri}</td><td>${t.j}</td><td>${t.c}</td><td>${t.q}</td><td>${t.v}/4</td></tr>`;
 });
 h+=`</table></div>`;
 h+=`<div class="actions"><button class="btn btn-s" onclick="go(0)">← 回答を修正</button><button class="btn btn-p" onclick="go(2)">出力へ →</button></div>`;
 document.getElementById('p1').innerHTML=h;
}
function buildOutput(){
 let h=`<h3>成果物の出力</h3><p style="margin:8px 0;font-size:.9em">診断結果を以下の形式で出力できます。</p>`;
 h+=`<div class="actions" style="margin-top:12px"><button class="btn btn-g" onclick="dlCSV()">対応タスクCSVダウンロード</button>`;
 h+=`<button class="btn btn-o" onclick="genReport()">経営報告HTMLを生成</button>`;
 h+=`<button class="btn btn-s" onclick="go(1)">← 結果に戻る</button></div>`;
 h+=`<div id="reportArea" style="margin-top:16px"></div>`;
 document.getElementById('p2').innerHTML=h;
}
function dlCSV(){
 let t=window._tasks||[];
 let csv='\uFEFF優先度,管轄,カテゴリ,診断項目,現状スコア,対応期限目安,担当部門\n';
 t.forEach(r=>{
  let dl=r.pri==='A'?'1ヶ月以内':r.pri==='B'?'3ヶ月以内':'6ヶ月以内';
  let dept=r.c.includes('データ')?'情報セキュリティ部':r.c.includes('届出')?'法務部':'コンプライアンス部';
  csv+=`${r.pri},"${r.j}","${r.c}","${r.q}",${r.v}/4,${dl},${dept}\n`;
 });
 let blob=new Blob([csv],{type:'text/csv'});
 let a=document.createElement('a');
 a.href=URL.createObjectURL(blob);
 a.download='AI_RegCheck_Tasks_'+new Date().toISOString().slice(0,10)+'.csv';
 a.click();
}
function genReport(){
 let d=window._data||[],ts=window._tasks||[],sc=window._totalSc||0;
 let today=new Date().toLocaleDateString('ja-JP');
 let aCount=ts.filter(t=>t.pri==='A').length;
 let bCount=ts.filter(t=>t.pri==='B').length;
 let cCount=ts.filter(t=>t.pri==='C').length;
 let rh=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>AI規制コンプライアンス経営報告</title>
<style>body{font-family:sans-serif;max-width:800px;margin:0 auto;padding:20px;color:#1a1a2e}
h1{font-size:1.3em;border-bottom:3px solid #302b63;padding-bottom:8px}
h2{font-size:1.05em;color:#302b63;margin-top:20px}
table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.85em}
th,td{border:1px solid #ccc;padding:6px}th{background:#f0f0f0}
.sc{font-size:2em;font-weight:800;text-align:center;margin:16px 0}
.pA{color:#e74c3c;font-weight:700}.pB{color:#f39c12;font-weight:700}.pC{color:#3498db}
@media print{body{padding:0}}</style></head><body>
<h1>AI規制コンプライアンス ギャップ診断報告書</h1>
<p>報告日: ${today} | 診断ツール: AI RegCheck v1.0</p>
<h2>1. 総合スコア</h2>
<div class="sc" style="color:${scolor(sc)}">${sc} / 100</div>
<p>判定: ${sc>=80?'良好 — 軽微な改善で対応完了':sc>=60?'要注意 — 複数の未対応項目あり':sc>=40?'要改善 — 重大なギャップが存在':'危険 — 早急な対応が必要'}</p>
<h2>2. 管轄別スコア</h2><table><tr><th>管轄</th><th>スコア</th>`;
 C.forEach(c=>{rh+=`<th>${c}</th>`});
 rh+=`</tr>`;
 d.forEach(j=>{
  let js=Math.round(j.total/j.max*100);
  rh+=`<tr><td><strong>${j.name}</strong></td><td>${js}%</td>`;
  j.cats.forEach(c=>{rh+=`<td>${c.score}%</td>`});
  rh+=`</tr>`;
 });
 rh+=`</table>
<h2>3. 対応タスクサマリ</h2>
<p>総タスク数: <strong>${ts.length}件</strong>（<span class="pA">A: ${aCount}件</span> / <span class="pB">B: ${bCount}件</span> / <span class="pC">C: ${cCount}件</span>）</p>`;
 if(aCount>0){
  rh+=`<h2>4. 優先度A（緊急）タスク</h2><table><tr><th>管轄</th><th>カテゴリ</th><th>項目</th></tr>`;
  ts.filter(t=>t.pri==='A').forEach(t=>{rh+=`<tr><td>${t.j}</td><td>${t.c}</td><td>${t.q}</td></tr>`});
  rh+=`</table>`;
 }
 rh+=`<h2>${aCount>0?'5':'4'}. 推奨アクション</h2><ul>`;
 if(aCount>0)rh+=`<li>優先度Aタスク${aCount}件を1ヶ月以内に対応開始</li>`;
 if(bCount>0)rh+=`<li>優先度Bタスク${bCount}件を四半期内に計画策定</li>`;
 rh+=`<li>各管轄の罰則規定を踏まえ、低スコア領域から着手</li>`;
 rh+=`<li>次回診断を3ヶ月後に実施し進捗を確認</li></ul>`;
 rh+=`<p style="margin-top:30px;font-size:.8em;color:#888">本報告書はAI RegCheck診断エンジンにより自動生成されました。法的助言ではありません。</p></body></html>`;
 let w=window.open('','_blank');
 w.document.write(rh);
 w.document.close();
 document.getElementById('reportArea').innerHTML='<p style="color:#0a8754;font-weight:600">経営報告HTMLを新しいタブに生成しました。ブラウザの印刷機能(Ctrl+P)でPDF保存できます。</p>';
}
buildForm();
</script>
</body>
