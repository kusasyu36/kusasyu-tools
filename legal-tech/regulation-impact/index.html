.ind-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.ind-btn{padding:14px 8px;border:2px solid #d1d9e6;border-radius:8px;background:#fff;cursor:pointer;text-align:center;font-size:14px;font-weight:600;transition:.2s}
.ind-btn:hover{border-color:#2d5a87;background:#eef3fa}
.ind-btn.active{border-color:#2d5a87;background:#2d5a87;color:#fff}
.ind-btn .icon{font-size:28px;display:block;margin-bottom:4px}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.stat{text-align:center;padding:14px 8px;border-radius:8px;background:#f7fafc}
.stat .num{font-size:28px;font-weight:700;color:#2d5a87}
.stat .label{font-size:12px;color:#666}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700;color:#fff}
.badge.high{background:#e53e3e}.badge.mid{background:#dd6b20}.badge.low{background:#38a169}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#edf2f7;text-align:left;padding:10px 8px;font-weight:600;white-space:nowrap}
td{padding:10px 8px;border-bottom:1px solid #e2e8f0;vertical-align:top}
tr:hover td{background:#f7fafc}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}
.btn-primary{background:#2d5a87;color:#fff}.btn-primary:hover{background:#1e3a5f}
.btn-outline{background:#fff;color:#2d5a87;border:2px solid #2d5a87}.btn-outline:hover{background:#eef3fa}
.chart-bar{height:18px;border-radius:4px;margin:2px 0;transition:width .4s}
.legend{display:flex;gap:16px;font-size:12px;margin-top:10px;flex-wrap:wrap}
.legend span::before{content:"";display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:4px;vertical-align:middle}
.legend .lh::before{background:#e53e3e}.legend .lm::before{background:#dd6b20}.legend .ll::before{background:#38a169}
.footer{text-align:center;padding:20px;font-size:11px;color:#999}
.hidden{display:none}
@media(max-width:600px){th,td{padding:6px 4px;font-size:12px}.summary{grid-template-columns:1fr 1fr}}
</style>

{authority:"厚生労働省",law:"再生医療等安全性確保法",source:"厚労省再生医療等評価部会",impact:"mid",action:"対象製品該当性を確認し、該当時は認定再生医療等委員会へ諮問"},
{authority:"個人情報保護委員会",law:"次世代医療基盤法",source:"PPC公表資料・内閣府健康医療戦略室",impact:"mid",action:"匿名加工医療情報の取扱規程を整備し社内研修を実施"},

],
"食品":[
{authority:"厚生労働省",law:"食品衛生法・HACCP制度化",source:"厚労省食品基準審査課通知",impact:"high",action:"HACCP計画の年次見直しと記録管理体制の点検を実施"},

{authority:"農林水産省",law:"JAS法・有機JAS規格",source:"農水省プレスリリース・JAS調査会",impact:"mid",action:"JAS規格改正時に認証範囲との整合性を確認し認証機関へ相談"},
{authority:"食品安全委員会",law:"食品安全基本法",source:"食品安全委員会評価書",impact:"mid",action:"リスク評価結果を原料調達基準に反映し、サプライヤー監査項目を更新"},
{authority:"環境省",law:"食品ロス削減推進法",source:"環境省・農水省共同公表",impact:"low",action:"削減目標・報告義務の対象拡大を注視し、社内廃棄データの記録体制を整備"}
],
"建設":[
{authority:"国土交通省",law:"建設業法・建設リサイクル法",source:"国交省建設業課通知・e-Gov",impact:"high",action:"許可要件・経営事項審査基準の改正を確認し社内体制を更新"},
{authority:"国土交通省",law:"建築基準法・省エネ基準",source:"国交省住宅局・建築基準整備促進事業",impact:"high",action:"省エネ基準適合義務の対象拡大スケジュールを設計部門と共有"},
{authority:"厚生労働省",law:"労働安全衛生法",source:"厚労省安全衛生部通達・労基署",impact:"mid",action:"特定元方事業者の安全管理体制を年次点検し教育計画を更新"},
{authority:"環境省",law:"土壌汚染対策法",source:"環境省水・大気環境局通知",impact:"mid",action:"土地取得・開発案件の事前調査フローに法改正を反映"},
{authority:"デジタル庁",law:"BIM/CIM活用ガイドライン",source:"国交省i-Construction推進・デジタル庁",impact:"low",action:"公共工事BIM義務化スケジュールを把握しツール導入計画を策定"}
]
};
var industries=[
{id:"金融",icon:"🏦"},{id:"製薬",icon:"💊"},{id:"化粧品",icon:"🧴"},{id:"食品",icon:"🍱"},{id:"建設",icon:"🏗️"}
];
var current=null;
function init(){
var g=document.getElementById("indGrid");
industries.forEach(function(ind){
var b=document.createElement("button");
b.className="ind-btn";b.dataset.id=ind.id;
b.innerHTML='<span class="icon">'+ind.icon+'</span>'+ind.id;
b.onclick=function(){select(ind.id)};
g.appendChild(b);
});
}
function select(id){
current=id;
document.querySelectorAll(".ind-btn").forEach(function(b){b.classList.toggle("active",b.dataset.id===id)});
render();
}
function render(){
var items=DATA[current];
var h=0,m=0,l=0;
items.forEach(function(r){if(r.impact==="high")h++;else if(r.impact==="mid")m++;else l++});
var total=items.length;
var score=Math.round((h*3+m*2+l*1)/total*33.3);
document.getElementById("summary").innerHTML=
'<div class="stat"><div class="num">'+total+'</div><div class="label">規制項目数</div></div>'+
'<div class="stat"><div class="num" style="color:#e53e3e">'+h+'</div><div class="label">高リスク</div></div>'+
'<div class="stat"><div class="num" style="color:#dd6b20">'+m+'</div><div class="label">中リスク</div></div>'+
'<div class="stat"><div class="num" style="color:#38a169">'+l+'</div><div class="label">低リスク</div></div>'+
'<div class="stat"><div class="num">'+score+'<span style="font-size:14px">/100</span></div><div class="label">総合リスクスコア</div></div>';
var maxW=100;
document.getElementById("barChart").innerHTML=
'<div style="margin-top:8px"><div style="display:flex;align-items:center;gap:6px;margin:4px 0"><span style="width:60px;font-size:12px;text-align:right">高リスク</span><div class="chart-bar" style="width:'+h/total*maxW+'%;background:#e53e3e"></div><span style="font-size:12px">'+h+'件</span></div>'+
'<div style="display:flex;align-items:center;gap:6px;margin:4px 0"><span style="width:60px;font-size:12px;text-align:right">中リスク</span><div class="chart-bar" style="width:'+m/total*maxW+'%;background:#dd6b20"></div><span style="font-size:12px">'+m+'件</span></div>'+
'<div style="display:flex;align-items:center;gap:6px;margin:4px 0"><span style="width:60px;font-size:12px;text-align:right">低リスク</span><div class="chart-bar" style="width:'+l/total*maxW+'%;background:#38a169"></div><span style="font-size:12px">'+l+'件</span></div></div>';
var tb=document.getElementById("tbody");tb.innerHTML="";
items.forEach(function(r,i){
var cls=r.impact==="high"?"high":r.impact==="mid"?"mid":"low";
var lbl=r.impact==="high"?"高":r.impact==="mid"?"中":"低";
var tr=document.createElement("tr");
tr.innerHTML='<td>'+(i+1)+'</td><td>'+r.authority+'</td><td>'+r.law+'</td><td>'+r.source+'</td><td><span class="badge '+cls+'">'+lbl+'</span></td><td>'+r.action+'</td>';
tb.appendChild(tr);
});
document.getElementById("result").classList.remove("hidden");
}
function exportCSV(){
if(!current)return;
var items=DATA[current];
var bom="\uFEFF";
var rows=["業種,No,規制当局,主要法令,監視情報源,影響度,推奨アクション"];
items.forEach(function(r,i){
var lbl=r.impact==="high"?"高":r.impact==="mid"?"中":"低";
rows.push([current,i+1,q(r.authority),q(r.law),q(r.source),lbl,q(r.action)].join(","));
});
var blob=new Blob([bom+rows.join("\n")],{type:"text/csv;charset=utf-8"});
var a=document.createElement("a");a.href=URL.createObjectURL(blob);
a.download="RegWatch_"+current+"_"+new Date().toISOString().slice(0,10)+".csv";
a.click();URL.revokeObjectURL(a.href);
}
function q(s){return '"'+s.replace(/"/g,'""')+'"'}
init();
</script>
