<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/legal-tech/" style="color:#4299e1;text-decoration:none;">kusasyu Legal Tech</a> &gt; <span style="color:#718096;">特許収益化ポテンシャル診断ツール</span></div>
<div class="wrap">
<h1>特許収益化ポテンシャル診断ツール</h1>
<p class="sub">保有特許（最大5件）の収益化可能性をスコアリングし、最適なアクションを提案します</p>
<div id="forms"></div>
<button class="btn btn-add" id="addBtn" onclick="addPatent()">＋ 特許を追加（最大5件）</button>
<button class="btn" onclick="diagnose()">診断を実行する</button>
<div id="result">
<div class="card"><h2>診断サマリー</h2><div class="summary" id="summary"></div></div>
<div class="card"><h2>個別スコア一覧</h2><table><thead><tr><th>#</th><th>技術分野</th><th>スコア</th><th>評価</th><th>スコアバー</th></tr></thead><tbody id="tbl"></tbody></table></div>
<div class="card"><h2>優先アクションプラン</h2><div id="actions"></div></div>
</div>
</div>
<script>
const CATS=[
{n:"機械・精密機器",c:1.0},{n:"電気・電子",c:1.2},{n:"化学・材料",c:1.1},{n:"IT・ソフトウェア",c:1.4},
{n:"バイオ・医薬",c:1.5},{n:"素材・ナノテク",c:1.1},{n:"エネルギー・環境",c:1.3},{n:"半導体・光学",c:1.35},
{n:"通信・ネットワーク",c:1.3},{n:"ロボティクス・AI",c:1.45}
];
let cnt=0;
function addPatent(){
if(cnt>=5)return;
cnt++;
const d=document.createElement("div");
d.className="card";
d.id="p"+cnt;
let opts=CATS.map((c,i)=>`<option value="${i}">${c.n}</option>`).join("");
d.innerHTML=`<button class="del" onclick="delPatent(${cnt})">✕</button><h2>特許 #${cnt}</h2>
<div class="row"><div class="field"><label>技術分野カテゴリ</label><select id="cat${cnt}">${opts}</select></div>
<div class="field"><label>IPCサブクラス（任意）</label><input id="ipc${cnt}" placeholder="例: H04L"></div></div>
<div class="row"><div class="field"><label>残存年数</label><input type="number" id="yr${cnt}" min="0" max="20" value="10"></div>
<div class="field"><label>独立請求項数</label><input type="number" id="cl${cnt}" min="1" max="50" value="3"></div>
<div class="field"><label>ライセンス実績</label><select id="lic${cnt}"><option value="no">なし</option><option value="yes">あり</option><option value="unknown">不明</option></select></div></div>`;
document.getElementById("forms").appendChild(d);
if(cnt>=5)document.getElementById("addBtn").style.display="none";
}
function delPatent(id){
const el=document.getElementById("p"+id);
if(el){el.remove();cnt--;rebuildIds();}
if(cnt<5)document.getElementById("addBtn").style.display="block";
}
function rebuildIds(){
const cards=document.getElementById("forms").querySelectorAll(".card");
cnt=0;
cards.forEach((c,i)=>{
cnt=i+1;
c.id="p"+cnt;
c.querySelector("h2").textContent="特許 #"+cnt;
c.querySelector(".del").setAttribute("onclick","delPatent("+cnt+")");
["cat","ipc","yr","cl","lic"].forEach(k=>{
const el=c.querySelector(`[id^="${k}"]`);if(el)el.id=k+cnt;
});
});
}
function calc(i){
const cat=parseInt(document.getElementById("cat"+i).value);
const yr=Math.max(0,Math.min(20,parseFloat(document.getElementById("yr"+i).value)||0));
const cl=Math.max(1,Math.min(50,parseFloat(document.getElementById("cl"+i).value)||1));
const lic=document.getElementById("lic"+i).value;
const coef=CATS[cat].c;
const sYr=(yr/20)*30;
const sCl=(Math.min(cl,10)/10)*25;
const sLic=lic==="yes"?20:lic==="unknown"?10:5;
const sField=((coef-1)/0.5)*25;
const raw=sYr+sCl+sLic+sField;
const score=Math.round(Math.min(100,raw));
let grade,gc;
if(score>=75){grade="A";gc="gA";}
else if(score>=50){grade="B";gc="gB";}
else if(score>=30){grade="C";gc="gC";}
else{grade="D";gc="gD";}
return{score,grade,gc,cat:CATS[cat].n,yr,cl,lic,coef};
}
function diagnose(){
if(cnt===0){alert("特許を1件以上追加してください");return;}
const results=[];
for(let i=1;i<=cnt;i++)results.push(calc(i));
results.forEach((r,i)=>r.idx=i+1);
const avg=Math.round(results.reduce((s,r)=>s+r.score,0)/results.length);
const best=results.reduce((a,b)=>a.score>=b.score?a:b);
const gradeCount={A:0,B:0,C:0,D:0};
results.forEach(r=>gradeCount[r.grade]++);
document.getElementById("summary").innerHTML=`
<div class="stat"><div class="num">${cnt}</div><div class="lbl">診断件数</div></div>
<div class="stat"><div class="num">${avg}</div><div class="lbl">平均スコア</div></div>
<div class="stat"><div class="num">${best.grade}</div><div class="lbl">最高評価</div></div>
<div class="stat"><div class="num">${gradeCount.A+gradeCount.B}</div><div class="lbl">収益化有望</div></div>`;
let thtml="";
results.forEach(r=>{
const col=r.gc==="gA"?"#38a169":r.gc==="gB"?"#4299e1":r.gc==="gC"?"#d69e2e":"#e53e3e";
thtml+=`<tr><td>${r.idx}</td><td>${r.cat}</td><td><b>${r.score}</b>/100</td>
<td><span class="grade ${r.gc}">${r.grade}</span></td>
<td><div class="bar-bg"><div class="bar-fg" style="width:${r.score}%;background:${col}"></div></div></td></tr>`;
});
document.getElementById("tbl").innerHTML=thtml;
const sorted=[...results].sort((a,b)=>b.score-a.score);
let ahtml="";
sorted.forEach((r,i)=>{
let act,cls,detail;
if(r.grade==="A"){
act="ライセンス供与を積極推進";cls="license";
detail=`技術分野「${r.cat}」は市場需要が高く、残存${r.yr}年のライセンス収入が見込めます。独占ライセンスで高額交渉、または非独占で複数先へ展開を推奨。`;
}else if(r.grade==="B"){
act="ライセンス供与を検討／条件次第で売却";cls="license";
detail=`収益化余地あり。まずライセンス候補先を3社以上リストアップし、反応を見て売却判断へ。請求項${r.cl}件の権利範囲を再確認してください。`;
}else if(r.grade==="C"){
act="売却を優先検討";cls="sell";
detail=`維持費対効果が低下するリスクあり。特許売買プラットフォームへの掲載や、同業他社への直接提案を検討してください。`;
}else{
act="放棄を含む戦略的判断";cls="abandon";
detail=`残存${r.yr}年・現在の市場環境では維持コストが収益を上回る可能性大。年間維持費を算出し、放棄も含めた判断を推奨します。`;
}
ahtml+=`<div class="action ${cls}"><span class="pri">優先${i+1}｜特許#${r.idx}（${r.grade}評価・${r.score}点）</span>${act}<br><span style="color:#4a5568">${detail}</span></div>`;
});
document.getElementById("actions").innerHTML=ahtml;
document.getElementById("result").style.display="block";
document.getElementById("result").scrollIntoView({behavior:"smooth"});
}
addPatent();
</script>
