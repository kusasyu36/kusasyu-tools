<script>
var D=[
{cat:"労働法",q:"従業員から未払い残業代を請求されたら？",lv:2,a:"まず勤怠記録と給与明細を突合し、実際の労働時間と支払額を確認します。36協定の届出状況も確認してください。未払いがあれば速やかに精算の意思を示すことが重要です。2年（悪質な場合3年）の消滅時効にも注意が必要です。",cl:["タイムカード・勤怠ログを過去2年分確認","36協定の届出有無と上限時間を確認","固定残業代制度の場合、就業規則の記載を確認","未払い額を概算し支払い原資を確保","労基署への相談記録があるか従業員に確認"]},
{cat:"労働法",q:"試用期間中の従業員を解雇できるか？",lv:1,a:"試用期間中でも解雇には合理的理由が必要です。14日以内であれば解雇予告なしで可能ですが、14日を超えると30日前の解雇予告または予告手当が必要です。能力不足の場合は指導記録の有無が重要になります。",cl:["試用期間の長さと就業規則の規定を確認","入社から14日以内か14日超かを確認","指導・改善指示の記録があるか確認","解雇理由を客観的に説明できるか確認"]},
{cat:"労働法",q:"パワハラの社内相談があった場合の初動は？",lv:1,a:"相談者のプライバシーを守りつつ、事実関係を速やかに調査する義務があります（2022年4月〜中小企業も義務化）。相談者への不利益取扱いは法律で禁止されています。調査は相談者・行為者・第三者からヒアリングし記録を残します。",cl:["相談者に秘密厳守を約束し記録を開始","相談窓口・対応フローが社内に整備されているか確認","行為者と相談者を業務上分離できるか検討","第三者へのヒアリング計画を策定","就業規則の懲戒規定を確認"]},
{cat:"契約",q:"取引先から届いたNDAの内容をどうチェックする？",lv:0,a:"秘密情報の定義範囲、有効期間、損害賠償の上限、準拠法・管轄の4点を優先的に確認します。自社に一方的に不利な条項（無制限の賠償責任等）がないかチェックし、修正を依頼しましょう。",cl:["秘密情報の定義が広すぎないか確認","有効期間と存続条項の年数を確認","損害賠償に上限があるか確認","準拠法と管轄裁判所を確認"]},
{cat:"契約",q:"契約書に押印がなくても有効か？",lv:0,a:"日本法上、契約は口頭でも成立します（民法522条2項）。押印がなくても契約は有効です。ただし、紛争時の証拠として書面・電子署名があると有利です。電子契約サービスの利用も法的に有効です。",cl:["契約内容が書面またはメールで記録されているか確認","相手方の同意の証拠（メール返信等）があるか確認","電子署名法に基づく電子契約の利用を検討","重要契約は書面化のうえ記名押印を推奨"]},
{cat:"契約",q:"取引先が契約に違反した場合の対応手順は？",lv:1,a:"まず違反の事実を証拠とともに整理し、書面で是正を求めます。契約書の紛争解決条項（協議→調停→訴訟等）を確認し、段階的に対応します。損害額が大きい場合は早期に弁護士へ相談してください。",cl:["違反の具体的事実と証拠を時系列で整理","契約書の違反時の条項（解除・賠償）を確認","内容証明郵便での是正催告を検討","損害額を概算し記録","紛争解決条項（仲裁・調停・訴訟）を確認"]},
{cat:"知的財産",q:"社員が業務中に作った発明は会社のものか？",lv:1,a:"職務発明は原則として発明者（社員）に特許を受ける権利がありますが、就業規則等であらかじめ会社に帰属させることが可能です（特許法35条）。その場合、相当の利益を社員に支払う必要があります。",cl:["就業規則に職務発明規程があるか確認","発明が業務範囲内で生まれたか確認","相当の利益（報奨金等）の支払い基準を策定","発明届出のフローが社内にあるか確認"]},
{cat:"知的財産",q:"自社サービス名が他社商標と似ていると指摘されたら？",lv:2,a:"J-PlatPat（特許庁DB）で指摘された商標を検索し、登録の有無・指定商品役務を確認します。類似性が高く同一区分であれば、サービス名の変更を検討する必要があります。警告書が届いた場合は弁護士（弁理士）に即相談してください。",cl:["J-PlatPatで相手方商標の登録状況を確認","自社サービスと相手方商標の指定区分を比較","使用開始時期の先後を証拠で確認","警告書・通知書が届いているか確認","弁理士または知財専門弁護士への相談を手配"]},
{cat:"知的財産",q:"Webサイトに他社の画像を使ってもよいか？",lv:0,a:"著作権者の許諾なく他社画像を使用すると著作権侵害になります。フリー素材でもライセンス条件（帰属表示・商用利用可否）の確認が必要です。引用（著作権法32条）の要件を満たす場合は例外的に可能です。",cl:["使用したい画像の著作権者とライセンスを確認","フリー素材サイトの利用規約を確認","引用の要件（主従関係・出典明示等）を満たすか確認","社内の画像使用ガイドラインを策定"]},
{cat:"個人情報",q:"顧客リストをメールで社外に送ってしまったら？",lv:2,a:"個人情報の漏えいに該当する可能性があります。速やかに送信先に削除を依頼し、漏えいの規模と影響を調査します。1,000人超または要配慮個人情報を含む場合、個人情報保護委員会への報告と本人通知が義務です。",cl:["送信先に即座に削除を依頼し確認を取得","漏えいした個人情報の件数と内容を特定","1,000人超・要配慮情報該当の場合は委員会に速報","影響を受ける本人への通知文を準備","再発防止策（誤送信防止ツール等）を検討"]},
{cat:"個人情報",q:"社員の健康診断結果を上司に共有してよいか？",lv:1,a:"健康診断結果は要配慮個人情報に該当し、本人の同意なく第三者提供はできません。ただし、労働安全衛生法に基づく事業者の安全配慮義務の範囲で、産業医を通じて就業上の措置として共有する場合は例外となりえます。",cl:["本人から明示的な同意を取得しているか確認","産業医の意見を経由しているか確認","共有範囲を必要最小限に限定","就業規則の健康情報取扱い規程を確認"]},
{cat:"個人情報",q:"プライバシーポリシーに最低限必要な記載事項は？",lv:0,a:"個人情報保護法に基づき、利用目的、第三者提供の有無、開示等請求の手続き、問い合わせ窓口は必須です。Cookieや分析ツールを使う場合はその旨も記載が推奨されます。",cl:["利用目的を具体的に記載しているか確認","第三者提供の有無と提供先を明記","開示・訂正・削除請求の手続きを記載","問い合わせ窓口（部署・メールアドレス）を明記"]},
{cat:"会社法",q:"取締役会の決議を書面だけで行えるか？",lv:0,a:"取締役全員が書面等で同意し、監査役が異議を述べない場合、取締役会決議を省略できます（会社法370条）。ただし定款にこの旨の定めが必要です。議事録の作成と10年間保存は必須です。",cl:["定款に書面決議の規定があるか確認","取締役全員の同意書を取得","監査役がいる場合、異議がないことを確認","議事録を作成し10年間保存"]},
{cat:"会社法",q:"株主総会の招集通知はいつまでに出す？",lv:0,a:"公開会社は2週間前、非公開会社は1週間前までに発送が必要です（会社法299条）。非公開会社は定款で短縮可能です。書面投票・電子投票を採用する場合は2週間前が必要です。",cl:["自社が公開会社か非公開会社か確認","定款で招集期間の短縮規定があるか確認","書面投票・電子投票の採用有無を確認","招集通知の記載事項（日時・場所・議題）を確認"]},
{cat:"会社法",q:"少数株主から株式買取請求が来たら？",lv:2,a:"株式買取請求は会社法で認められた株主の権利です。組織再編や事業譲渡等の決議に反対した株主が請求できます。買取価格は協議で決まらなければ裁判所が決定します。財務的影響が大きいため弁護士への相談を推奨します。",cl:["請求の法的根拠（会社法のどの条文か）を確認","株主の反対通知が適法に行われたか確認","買取価格の算定方法を検討","財務への影響額を試算","会社法専門の弁護士に相談を手配"]}
];
var LV=["自分で対応可","専門家に確認推奨","すぐ弁護士へ"];
var LC=["b-green","b-yellow","b-red"];
var cats=[];
for(var i=0;i<D.length;i++){if(cats.indexOf(D[i].cat)===-1)cats.push(D[i].cat);}
var selCat=null;
function init(){
 var cc=document.getElementById("cats");
 var html='<button class="cat-btn on" onclick="filter(null,this)">すべて</button>';
 for(var i=0;i<cats.length;i++){html+='<button class="cat-btn" onclick="filter(\''+cats[i]+'\',this)">'+cats[i]+'</button>';}
 cc.innerHTML=html;
 document.getElementById("kw").addEventListener("input",render);
 render();
}
function filter(c,el){
 selCat=c;
 var btns=document.querySelectorAll(".cat-btn");
 for(var i=0;i<btns.length;i++)btns[i].classList.remove("on");
 el.classList.add("on");
 render();
}
function render(){
 var kw=document.getElementById("kw").value.toLowerCase();
 var fd=[];
 for(var i=0;i<D.length;i++){
  var d=D[i];
  if(selCat&&d.cat!==selCat)continue;
  if(kw&&(d.q+d.a+d.cl.join("")).toLowerCase().indexOf(kw)===-1)continue;
  fd.push(d);
 }
 document.getElementById("stats").textContent="表示: "+fd.length+"件 / 全"+D.length+"件";
 var ls=document.getElementById("list");
 if(!fd.length){ls.innerHTML='<div class="none">該当するQ&Aが見つかりません</div>';return;}
 var html="";
 for(var i=0;i<fd.length;i++){
  var d=fd[i];
  var cli="";
  for(var j=0;j<d.cl.length;j++)cli+="<li>"+hl(d.cl[j],kw)+"</li>";
  html+='<div class="card" id="c'+i+'"><div class="card-head" onclick="toggle(\'c'+i+'\')"><span class="badge '+LC[d.lv]+'">'+LV[d.lv]+'</span><span class="q-text">'+hl(d.q,kw)+'</span><span class="arrow">▼</span></div><div class="card-body"><div class="ans">'+hl(d.a,kw)+'</div><div class="cl-title">確認チェックリスト</div><ul class="cl">'+cli+'</ul><span class="tag">'+d.cat+'</span></div></div>';
 }
 ls.innerHTML=html;
}
function hl(t,kw){
 if(!kw)return t;
 var r=new RegExp("("+kw.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
 return t.replace(r,'<mark style="background:#fff3cd;padding:0 2px;border-radius:2px">$1</mark>');
}
function toggle(id){document.getElementById(id).classList.toggle("open");}
init();
</script>
