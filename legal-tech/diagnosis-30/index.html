h+='<h2>1. エグゼクティブサマリー</h2><table><tr><th>企業名</th><td>'+esc(cn)+'</td><th>業種</th><td>'+iL+'</td></tr><tr><th>ステージ</th><td>'+stg+'</td><th>従業員数</th><td>'+emp+'名</td></tr><tr><th>IP資産数</th><td>'+assets.length+'件</td><th>IP保護総合評価</th><td><strong>'+grade+'</strong></td></tr></table><p style="margin:8px 0;font-size:.85em">'+esc(biz)+'</p>';

assets.forEach(function(a,i){var hi=emph.cats.indexOf(a.cat)>=0?' style="background:#fef9c3"':'';h+='<tr'+hi+'><td>'+(i+1)+'</td><td>'+esc(a.name)+'</td><td>'+esc(a.cat)+'</td><td>'+esc(a.type)+'</td><td><div class="bar"><div class="bf" style="width:'+a.status+'%"></div></div>'+a.status+'%</td></tr>'});
h+='</table>';

assets.forEach(function(a){var lv=a.status>=80?'●●●高':a.status>=60?'●●○中':'●○○低';h+='<tr><td>'+esc(a.name)+'</td><td style="font-size:.82em">'+esc(a.adv)+'</td><td>'+lv+'</td></tr>'});
h+='</table>';
h+='<h2>4. 収益化ロードマップ</h2><table><tr><th>フェーズ</th><th>施策</th><th>対象資産</th></tr>';
var ph=[['短期（0-6ヶ月）','既存IP資産の保護強化・権利化推進',assets.filter(function(a){return a.status<70}).map(function(a){return a.name}).join('、')||'—'],['中期（6-18ヶ月）','ライセンス・API提供等による収益多角化',assets.filter(function(a){return a.status>=60}).map(function(a){return a.name}).join('、')||'—'],['長期（18ヶ月〜）','IPポートフォリオのM&A・クロスライセンス活用',assets.map(function(a){return a.name}).join('、')]];
