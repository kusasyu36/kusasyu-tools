<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/legal-tech/" style="color:#4299e1;text-decoration:none;">kusasyu Legal Tech</a> &gt; <span style="color:#718096;">類似案件マッチング＆論点集計ツール</span></div>

<h1>類似案件マッチング＆論点集計ツール</h1>

<div class="card">
<h2>1. 過去案件CSVをアップロード</h2>
<p class="note">案件ナレッジ構造化テンプレート（CSV）をアップロードしてください。</p>
<div class="upload-area" id="dropZone" onclick="document.getElementById('csvFile').click()">
<div id="uploadMsg">📁 クリックまたはドラッグ＆ドロップでCSVを選択<br><span class="note">※ブラウザ内で処理。サーバーへの送信なし</span></div>
<input type="file" id="csvFile" accept=".csv" style="display:none">
</div>
<button class="sec" onclick="loadSample()">サンプルデータで試す</button>
<p class="note" id="csvStatus"></p>
</div>

<div class="card">
<h2>2. 新規案件の情報を入力</h2>
<div class="row">
<div><label>分野</label>
<select id="field"><option value="">選択してください</option><option>労働</option><option>不動産</option><option>相続</option><option>企業法務</option><option>債権回収</option><option>知的財産</option><option>家事事件</option><option>刑事</option></select></div>
<div><label>キーワード（カンマ区切り）</label>
<input id="keywords" placeholder="例: 固定残業代, 労働時間"></div>
</div>
<label>主要論点タグ（セミコロン区切り）</label>
<input id="issues" placeholder="例: 残業代;固定残業代;労働時間管理">
<label>適用条文（セミコロン区切り）</label>
<input id="laws" placeholder="例: 労基法37条;労基法32条">
<label>争点・概要メモ</label>
<textarea id="memo" placeholder="案件の概要や争点を自由記述"></textarea>
<button onclick="runMatch()">🔍 類似案件を検索</button>
</div>

<div id="result" class="card">
<h2>3. 類似案件トップ5</h2>
<div id="matchTable"></div>
</div>

<div id="agg" class="card">
<h2>4. 論点集計テーブル</h2>
<p class="note">事務所のノウハウ蓄積状況を論点タグ別に集計</p>
<div id="aggTable"></div>
</div>

<script>
let cases=[];
const SAMPLE=`案件番号,受任日,終了日,分野,案件名,主要論点タグ,適用条文,結果概要,結果区分,係争金額（万円）,回収・減額金額（万円）,担当弁護士,共同担当,クライアント業種,キーフレーズ,対応難易度,所要期間（月）,備考
LT-2024-001,2024-01-15,2024-06-30,労働,元従業員による残業代請求事件,残業代;固定残業代;労働時間管理,労基法37条;労基法32条;最判H12.3.9,固定残業代の有効性を立証し請求額の70%減額で和解成立,和解,1500,1050,山田太郎,,IT・ソフトウェア,固定残業代の明確区分性・対価性要件を充足する就業規則設計が鍵,B,5,就業規則改定も併せて助言
LT-2024-002,2024-02-01,2024-09-15,不動産,商業ビル賃貸借契約の解除・明渡請求,賃料不払い;信頼関係破壊;立退料,借地借家法28条;民法541条;最判S46.11.25,6ヶ月分賃料不払いによる信頼関係破壊を認定し明渡し認容。立退料なし,勝訴,3200,3200,佐藤花子,山田太郎,不動産管理,催告書の送付時期・回数の記録が信頼関係破壊の立証に直結,A,7,控訴なし確定
LT-2024-003,2024-03-10,2024-08-20,相続,遺留分侵害額請求事件,遺留分;特別受益;不動産評価,民法1042条;民法1043条;民法903条,不動産評価額で争いがあったが鑑定により時価8000万円と確定。遺留分2000万円の支払いで和解,和解,2000,2000,鈴木一郎,,個人,不動産の評価方法（路線価vs時価）の選択が遺留分算定に大きく影響,B,5,不動産鑑定士と連携
LT-2024-004,2024-04-01,2025-01-31,企業法務,業務委託先による営業秘密漏洩事件,営業秘密;不正競争;秘密管理性,不競法2条1項7号;不競法3条;不競法4条,秘密管理性の立証に成功し差止め＋損害賠償4500万円認容,勝訴,5000,4500,山田太郎,佐藤花子,製造業,秘密管理性三要件（秘密管理意思・認識可能性・アクセス制限）の事前整備が勝敗を分ける,S,10,情報セキュリティ体制構築も支援
LT-2024-005,2024-05-20,2024-11-30,企業法務,取引先との売買契約に関する製造物責任訴訟,PL法;製造物責任;因果関係,PL法3条;民法709条;民法415条,製品の欠陥と損害の因果関係の立証が不十分として請求棄却（被告側代理）,勝訴（被告側）,8000,8000,鈴木一郎,山田太郎,小売・流通,原告側の因果関係立証のハードルの高さと技術的反証資料の準備が防御の要,A,6,外部技術専門家の意見書活用`;

function parseCSV(t){
 let lines=t.split('\n').filter(l=>l.trim());
 if(lines.length<2)return[];
 let h=splitCSVLine(lines[0]);
 let res=[];
 for(let i=1;i<lines.length;i++){
  let v=splitCSVLine(lines[i]);
  if(v.length<5)continue;
  let o={};
  h.forEach((k,j)=>o[k.trim()]=v[j]?v[j].trim():'');
  res.push(o);
 }
 return res;
}
function splitCSVLine(line){
 let r=[],cur='',inQ=false;
 for(let c of line){
  if(c==='"'){inQ=!inQ}
  else if(c===','&&!inQ){r.push(cur);cur=''}
  else{cur+=c}
 }
 r.push(cur);return r;
}

document.getElementById('csvFile').addEventListener('change',function(e){
 let f=e.target.files[0];if(!f)return;
 let r=new FileReader();
 r.onload=function(ev){
  cases=parseCSV(ev.target.result);
  document.getElementById('dropZone').className='upload-area loaded';
  document.getElementById('uploadMsg').innerHTML='✅ '+f.name+' を読み込みました';
  document.getElementById('csvStatus').textContent='読み込み件数: '+cases.length+'件';
 };
 r.readAsText(f);
});

function loadSample(){
 cases=parseCSV(SAMPLE);
 document.getElementById('dropZone').className='upload-area loaded';
 document.getElementById('uploadMsg').innerHTML='✅ サンプルデータ（5件）を読み込みました';
 document.getElementById('csvStatus').textContent='読み込み件数: '+cases.length+'件';
}

function tokenize(s){return s.split(/[;；,、\s]+/).map(x=>x.trim().toLowerCase()).filter(x=>x)}

function runMatch(){
 if(!cases.length){alert('先にCSVをアップロードしてください');return}
 let field=document.getElementById('field').value;
 let kw=tokenize(document.getElementById('keywords').value);
 let iss=tokenize(document.getElementById('issues').value);
 let laws=tokenize(document.getElementById('laws').value);
 let memo=document.getElementById('memo').value.toLowerCase();

 let scored=cases.map(c=>{
  let s=0,details=[];
  if(field&&c['分野']===field){s+=20;details.push('分野一致(+20)')}
  let cIss=tokenize(c['主要論点タグ']||'');
  let im=0;iss.forEach(t=>{if(cIss.some(ci=>ci.includes(t)||t.includes(ci)))im++});
  if(im){s+=im*15;details.push('論点タグ'+im+'件一致(+'+(im*15)+')')}
  let cLaw=tokenize(c['適用条文']||'');
  let lm=0;laws.forEach(t=>{if(cLaw.some(cl=>cl.includes(t)||t.includes(cl)))lm++});
  if(lm){s+=lm*12;details.push('適用条文'+lm+'件一致(+'+(lm*12)+')')}
  let target=(c['キーフレーズ']||'')+' '+(c['案件名']||'')+' '+(c['結果概要']||'');
  target=target.toLowerCase();
  let km=0;kw.forEach(k=>{if(target.includes(k))km++});
  if(km){s+=km*10;details.push('キーワード'+km+'件一致(+'+(km*10)+')')}
  if(memo){let mm=0;cIss.concat(cLaw).forEach(t=>{if(memo.includes(t))mm++});
   if(mm){s+=mm*5;details.push('メモ関連'+mm+'件(+'+(mm*5)+')')}}
  return{c,score:s,details};
 });

 scored.sort((a,b)=>b.score-a.score);
 let top=scored.slice(0,5);
 let maxS=top[0]?top[0].score:1;

 let h='<table><tr><th>順位</th><th>案件番号</th><th>案件名</th><th>分野</th><th>スコア</th><th>一致内訳</th><th>結果区分</th><th>担当</th></tr>';
 if(!top.length||top[0].score===0){
  h+='<tr><td colspan="8" class="empty">一致する案件が見つかりませんでした。検索条件を変更してください。</td></tr>';
 }else{
  top.forEach((r,i)=>{
   if(r.score===0)return;
   h+='<tr><td><span class="rank">#'+(i+1)+'</span></td>';
   h+='<td>'+esc(r.c['案件番号'])+'</td>';
   h+='<td>'+esc(r.c['案件名'])+'</td>';
   h+='<td>'+esc(r.c['分野'])+'</td>';
   h+='<td><span class="score">'+r.score+'</span><div class="bar-bg"><div class="bar-fill" style="width:'+Math.round(r.score/maxS*100)+'%"></div><div class="bar-label">'+Math.round(r.score/maxS*100)+'%</div></div></td>';
   h+='<td>'+r.details.map(d=>'<span class="tag">'+esc(d)+'</span>').join('')+'</td>';
   h+='<td>'+esc(r.c['結果区分'])+'</td>';
   h+='<td>'+esc(r.c['担当弁護士'])+'</td></tr>';
  });
 }
 h+='</table>';
 document.getElementById('matchTable').innerHTML=h;
 document.getElementById('result').style.display='block';
 buildAgg();
}

function buildAgg(){
 let tagMap={};
 cases.forEach(c=>{
  let tags=tokenize(c['主要論点タグ']||'');
  tags.forEach(t=>{
   if(!tagMap[t])tagMap[t]={count:0,ids:[],fields:new Set()};
   tagMap[t].count++;
   tagMap[t].ids.push(c['案件番号']||'?');
   tagMap[t].fields.add(c['分野']||'');
  });
 });
 let arr=Object.entries(tagMap).sort((a,b)=>b[1].count-a[1].count);
 let mx=arr[0]?arr[0][1].count:1;
 let h='<table><tr><th>論点タグ</th><th>案件数</th><th>蓄積度</th><th>関連案件番号</th><th>関連分野</th></tr>';
 arr.forEach(([tag,d])=>{
  let pct=Math.round(d.count/mx*100);
  h+='<tr><td><strong>'+esc(tag)+'</strong></td><td style="text-align:center">'+d.count+'</td>';
  h+='<td><div class="bar-bg" style="width:120px"><div class="bar-fill" style="width:'+pct+'%;background:'+(pct>60?'#38a169':pct>30?'#d69e2e':'#e53e3e')+'"></div><div class="bar-label">'+d.count+'件</div></div></td>';
  h+='<td>'+d.ids.map(id=>'<span class="tag">'+esc(id)+'</span>').join('')+'</td>';
  h+='<td>'+[...d.fields].map(f=>'<span class="tag">'+esc(f)+'</span>').join('')+'</td></tr>';
 });
 h+='</table>';
 document.getElementById('aggTable').innerHTML=h;
 document.getElementById('agg').style.display='block';
 document.getElementById('agg').scrollIntoView({behavior:'smooth'});
}

function esc(s){let d=document.createElement('div');d.textContent=s;return d.innerHTML}

let dz=document.getElementById('dropZone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.borderColor='#3182ce'});
dz.addEventListener('dragleave',()=>{dz.style.borderColor=''});
dz.addEventListener('drop',e=>{
 e.preventDefault();dz.style.borderColor='';
 let f=e.dataTransfer.files[0];
 if(f){let r=new FileReader();r.onload=ev=>{
  cases=parseCSV(ev.target.result);
  dz.className='upload-area loaded';
  document.getElementById('uploadMsg').innerHTML='✅ '+f.name+' を読み込みました';
  document.getElementById('csvStatus').textContent='読み込み件数: '+cases.length+'件';
 };r.readAsText(f)}
});
</script>
