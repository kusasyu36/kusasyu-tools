<h1>契約書リスク診断ツール</h1>
<p class="sub">製造業特化｜12観点×選択式｜修正文案付き</p>
<div id="S"><div class="c"><h2>契約種別を選択</h2>
<div class="opt" id="tp"></div>
<button class="b" onclick="start()" id="sb" disabled>診断開始</button></div></div>
<div id="Q" style="display:none"><div class="prog"><div class="pf" id="pg"></div></div>
<div class="c"><h2 id="qn"></h2><div class="opt" id="qo"></div>

</div><script>
const T=["NDA（秘密保持契約）","売買基本契約","業務委託契約"],
D=[
["秘密保持の範囲",[["明確に限定定義",0],["やや広範だが合理的",1],["無制限または未定義",3]],"修正案:「秘密情報」を別紙で具体列挙し公知情報を除外する条項を追加"],
["損害賠償の上限",[["契約金額以内に限定",0],["上限なし・直接損害のみ",1],["上限なし・間接損害含む",3]],"交渉:「賠償額は受領済み対価を上限」とする条項の追加を要請"],
["知的財産権の帰属",[["自社に帰属と明記",0],["共有または協議で決定",1],["相手方に全帰属",3]],"修正案:「製造ノウハウは提供側に留保」と明記し改良発明は共有とする"],
["品質保証・瑕疵担保",[["検収後1年・修補優先",0],["検収後6ヶ月・代替納品",1],["無期限または記載なし",3]],"交渉:「瑕疵担保は検収後12ヶ月、修補→代品→減額の順」を提案"],
["納期遅延ペナルティ",[["遅延日数×定率で上限あり",0],["遅延で即時解除権が発生",2],["ペナルティ規定なし",1]],"修正案:「遅延損害金は納品額の0.1%/日、上限10%」に限定を要請"],
["検収条件",[["検査基準・期間を明記",0],["期間のみ記載あり",1],["みなし検収・条件不明",3]],"交渉:「検査基準書を別紙添付、検収14日、不合格は書面通知」を要請"],
["不可抗力条項",[["定義・通知義務・解除権あり",0],["定義のみ記載",1],["条項自体がない",3]],"修正案:「天災・疫病・輸出規制を含む不可抗力は免責、30日超で解除可」を追加"],
["再委託の制限",[["事前書面承諾が必要",0],["届出制（事後報告可）",1],["制限なし・記載なし",3]],"交渉:「再委託は書面承諾制、品質責任は受託者が負う」旨を追加"],
["契約解除条件",[["催告解除＋無催告事由を列挙",0],["任意解除権が一方のみ",2],["解除条項なし",3]],"修正案:「重大違反は催告14日、倒産等は即時解除、双方同条件」に修正"],
["競業避止義務",[["期間・地域・範囲が限定的",0],["範囲がやや広い",1],["無期限・広範・一方的",3]],"交渉:「競業避止は契約終了後1年、対象製品カテゴリのみ」に限定を要請"],
["準拠法・紛争解決",[["日本法・合意管轄を明記",0],["準拠法のみ記載",1],["記載なし・海外法",3]],"修正案:「準拠法は日本法、東京地裁を第一審の専属合意管轄」を追加"],
["契約期間・自動更新",[["期間明記・更新は書面合意",0],["自動更新・解約通知30日前",1],["自動更新・解約条件不明",3]],"交渉:「期間1年、更新は60日前に書面合意、デフォルトは終了」に変更を要請"]
];
let ct=-1,ci=0,ans=[];
const $=id=>document.getElementById(id);
T.forEach((t,i)=>{let l=document.createElement('label');
l.innerHTML='<input type="radio" name="ct" value="'+i+'" onchange="ct='+i+';$(\'sb\').disabled=false">'+t;$('tp').appendChild(l);});
function start(){$('S').style.display='none';$('Q').style.display='';show();}
function show(){let q=D[ci];$('qn').textContent='Q'+(ci+1)+'/12：'+q[0];
$('pg').style.width=(ci/12*100)+'%';let h='';
q[1].forEach((o,j)=>{h+='<label><input type="radio" name="qi" value="'+j+'" onchange="$(\'nb\').disabled=false">'+o[0]+'</label>';});
$('qo').innerHTML=h;$('nb').disabled=true;}
function next(){let v=+document.querySelector('input[name="qi"]:checked').value;
ans.push(v);ci++;if(ci<12)show();else result();}
function result(){$('Q').style.display='none';$('R').style.display='';
let total=0,h='<h2>診断結果【'+T[ct]+'】</h2>';
let items=D.map((q,i)=>{let s=q[1][ans[i]][1];total+=s;return{n:q[0],s:s,a:q[2]};});
let pct=Math.round((1-total/36)*100),lv=total<=8?'安全':total<=18?'要注意':'高リスク',
lc=total<=8?'#22c55e':total<=18?'#f59e0b':'#ef4444';
h+='<div style="text-align:center;padding:16px"><div style="font-size:2.8em;font-weight:900;color:'+lc+'">'+lv+'</div>';
h+='<div style="font-size:.9em;color:#666;margin:4px 0">総合スコア: '+total+'/36（安全度'+pct+'%）</div></div>';
items.forEach(it=>{let cl=it.s===0?'#22c55e':it.s<=1?'#f59e0b':'#ef4444',
c=it.s===0?'lo':it.s<=1?'mi':'hi',w=Math.round(it.s/3*100);
h+='<div style="margin-top:8px"><span class="tag" style="background:'+cl+'">'+(it.s===0?'低':it.s<=1?'中':'高')+'</span><b>'+it.n+'</b>';
h+='<div class="bar"><div class="bf '+c+'" style="width:'+w+'%"></div></div>';
if(it.s>=2)h+='<div class="adv">⚠ '+it.a+'</div>';h+='</div>';});
let hi=items.filter(i=>i.s>=2).length;
h+='<div style="margin-top:16px;padding:12px;background:#f0f4ff;border-radius:8px;font-size:.85em"><b>要対応: '+hi+'件</b><br>';
h+=hi===0?'重大リスクなし。軽微な改善点を確認してください。':hi<=3?hi+'件の高リスク観点について上記の修正案を参考に相手方と協議してください。':'高リスク多数。契約締結前に弁護士への相談を強く推奨します。';
h+='</div><button class="b" onclick="location.reload()" style="margin-top:12px">もう一度診断する</button>';
$('rs').innerHTML=h;}
</script></body></html>
