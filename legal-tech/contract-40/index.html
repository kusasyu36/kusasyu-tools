var re=document.getElementById('res'),msg,ctx='';
if(lv===0)msg='この条件は自社基準の範囲内です。そのまま受諾できます。';
else if(lv===2)msg='この条件は自社基準を大きく逸脱しています。法務部門にエスカレーションしてください。';
else msg='この条件は交渉の余地があります。以下の交渉文案をご活用ください。';
if(c.d!=='cat')ctx='自社基準: '+(c.d==='low'?'受諾OK ≤ '+d.ok+c.u+' ／ 拒否 ≥ '+d.ng+c.u:'受諾OK ≥ '+d.ok+c.u+' ／ 拒否 ≤ '+d.ng+c.u);
var th='';if(lv===1&&d.t)th='<div class="nb"><strong>交渉文案：</strong><br>'+esc(d.t)+'</div>';
if(lv===2)th='<div class="nb" style="border-color:#fca5a5"><strong>推奨アクション：</strong><br>1. 法務部門へ即時エスカレーション<br>2. 相手方に条件見直しを要請<br>3. 代替条件の提案を法務と検討</div>';
re.className='res '+JC[lv];
re.innerHTML='<div class="bdg">'+JL[lv]+'</div><h2>'+c.nm+'：'+esc(vd)+'</h2><p>'+msg+'</p>'+(ctx?'<div class="ctx">'+ctx+'</div>':'')+th;
re.style.display='block';
hist.unshift({dt:new Date().toLocaleString('ja-JP'),cat:c.nm,val:vd,lv:lv});
if(hist.length>30)hist.pop();localStorage.setItem(KH,JSON.stringify(hist));renHi()}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function renHi(){var a=document.getElementById('hiA');if(!hist.length){a.innerHTML='';return}
var g=0,y=0,r=0;hist.forEach(function(x){if(x.lv===0)g++;else if(x.lv===1)y++;else r++});
var h='<h3>判定履歴（直近'+hist.length+'件）</h3>';
h+='<div style="font-size:.82em;margin-bottom:6px"><span class="dot g"></span>受諾OK: '+g+'件　<span class="dot y"></span>要交渉: '+y+'件　<span class="dot r"></span>拒否: '+r+'件</div>';
h+='<table><tr><th>日時</th><th>条項</th><th>値</th><th>判定</th></tr>';
hist.forEach(function(x){h+='<tr><td>'+x.dt+'</td><td>'+esc(x.cat)+'</td><td>'+esc(x.val)+'</td><td><span class="dot '+JC[x.lv]+'"></span>'+JL[x.lv]+'</td></tr>'});
h+='</table><div class="acts" style="margin-top:8px"><button class="btn bs" onclick="clrHi()">履歴クリア</button>';
h+='<button class="btn bs" onclick="window.print()">印刷 / PDF出力</button></div>';a.innerHTML=h}
function clrHi(){hist=[];localStorage.removeItem(KH);renHi();document.getElementById('res').style.display='none'}
window.onbeforeprint=function(){document.getElementById('pd').textContent=new Date().toLocaleDateString('ja-JP');readPB()};
init();
</script>
</body>
</html>
