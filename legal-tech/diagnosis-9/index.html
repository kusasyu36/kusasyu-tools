NYY:{c:"名誉毀損・業務妨害",w:"弁護士",co:"30〜60万円",u:0,s:["投稿を証拠保全（スクショ+URL）","発信者情報開示請求を検討","損害額の算出準備"]},

NNY:{c:"軽度の中傷・悪口",w:"自力対応",co:"0円",u:2,s:["スクリーンショットを保存","サイトの通報機能で報告","削除依頼フォームから申請"]},
NNN:{c:"ネット上の軽微トラブル",w:"自力対応",co:"0円",u:2,s:["該当投稿を記録","各SNSの通報機能を利用","誹謗中傷ホットライン(SIA)へ"]}}}

const WD={弁護士:"専門性が高く訴訟代理が可能",司法書士:"140万円以下の案件に対応",行政書士:"書類作成の専門家","法テラス":"無料相談・弁護士紹介（収入要件あり）","自力対応":"まず公的窓口に相談"};
const UL=[["高","high"],["中","mid"],["低","low"]];
let S={cat:null,qi:0,ans:""};
function render(){
const a=document.getElementById("a");
if(!S.cat){
let h='<div class="card"><p style="margin-bottom:12px">トラブルのカテゴリを選んでください</p>';
for(let k in D)h+=`<button class="cb" onclick="sel('${k}')">${D[k].nm}</button>`;
h+=`<button class="cb" onclick="other()">相続・刑事・その他</button></div><p class="nt">※一般的な情報提供であり法的助言ではありません（弁護士法72条の範囲内）。<br>個別の判断は必ず専門家にご相談ください。</p>`;
a.innerHTML=h;return}
const d=D[S.cat];
if(S.qi<d.qs.length){
a.innerHTML=`<div class="card"><p style="font-size:.9em;color:#666">${d.nm}（${S.qi+1}/${d.qs.length}）</p><p style="font-size:1.1em;font-weight:bold;margin:16px 0">${d.qs[S.qi]}</p><button class="y" onclick="ans('Y')">はい</button><button class="n" onclick="ans('N')">いいえ</button><button class="bk" onclick="back()">← 戻る</button></div>`;return}
const r=d.r[S.ans],u=UL[r.u];
a.innerHTML=`<div class="card"><h2 style="font-size:1.1em;color:#1a237e;margin-bottom:12px">診断結果</h2><div class="rb"><b>分類：</b>${r.c}</div><div class="rb"><b>緊急度：</b><span class="tag ${u[1]}">${u[0]}</span></div><div class="rb"><b>推奨相談先：</b>${r.w}<br><span style="font-size:.85em;color:#666">${WD[r.w]}</span></div><div class="rb"><b>費用目安：</b>${r.co}</div><div class="rb"><b>今すぐできる初期対応：</b><ol>${r.s.map(x=>"<li>"+x+"</li>").join("")}</ol></div><button class="y" onclick="reset()">最初からやり直す</button></div><p class="nt">※費用は一般的な目安です。案件により異なります。<br>※弁護士法72条に基づく情報提供であり、法的助言ではありません。</p>`}
function sel(k){S={cat:k,qi:0,ans:""};render()}
function ans(v){S.ans+=v;S.qi++;render()}
function back(){if(S.qi>0){S.qi--;S.ans=S.ans.slice(0,-1)}else S.cat=null;render()}
function reset(){S={cat:null,qi:0,ans:""};render()}
function other(){document.getElementById("a").innerHTML=`<div class="card"><h2 style="font-size:1.1em;color:#1a237e;margin-bottom:12px">相続・刑事・その他のトラブル</h2><div class="rb"><p>これらの分野は専門性が高いため、まず<b>法テラス</b>にご相談ください。</p><p style="margin-top:8px"><b>法テラス（日本司法支援センター）</b><br>☎ 0570-078374（平日9〜21時／土9〜17時）<br>収入要件を満たせば無料で弁護士に相談できます。</p></div><button class="bk" onclick="reset()">← カテゴリ選択に戻る</button></div>`}
render();
</script>
