<script>
var D=[
{n:"労務管理（未払残業代・36協定）",iw:[7,5,9,6,8],tw:[8,6],doc:"賃金台帳,36協定届出,就業規則,タイムカード記録",how:"直近3年の残業実態を賃金台帳と突合。36協定届出の有無・上限時間を確認",cat:"労務"},
{n:"許認可・ライセンス",iw:[8,4,9,10,5],tw:[6,9],doc:"許認可一覧,許可証原本,届出書控え",how:"業種固有の許認可リストと照合し、有効期限・承継可否を確認",cat:"許認可"},
{n:"知的財産権",iw:[7,10,3,8,4],tw:[7,8],doc:"特許登録証,商標登録証,ライセンス契約書,職務発明規程",how:"知財の権利帰属・有効期限・第三者ライセンスの有無を確認",cat:"知財"},
{n:"訴訟・紛争リスク",iw:[6,6,7,8,6],tw:[8,5],doc:"訴訟一覧,内容証明送受信履歴,和解書",how:"係属中・過去の訴訟と潜在的クレームをヒアリング。弁護士意見書を要請",cat:"訴訟"},
{n:"税務コンプライアンス",iw:[7,6,7,7,7],tw:[7,8],doc:"税務申告書3期分,税務調査通知書,修正申告書",how:"直近3期の申告内容と税務調査指摘事項を確認。繰越欠損金の有効性を検証",cat:"税務"},
{n:"環境規制・有害物質",iw:[10,2,5,7,3],tw:[7,9],doc:"環境測定報告書,PCB届出書,土壌調査報告書",how:"工場・事業所の環境基準適合状況と過去の是正命令を確認",cat:"環境"},
{n:"不動産・賃貸借契約",iw:[8,4,9,6,9],tw:[5,8],doc:"登記簿謄本,賃貸借契約書,原状回復条項",how:"物件の権利関係・賃貸借条件・COC条項の有無を確認",cat:"不動産"},
{n:"主要取引先契約（COC条項）",iw:[7,8,7,6,8],tw:[9,7],doc:"主要取引基本契約書,取引先一覧（売上上位20社）",how:"売上上位20社の契約にCOC条項・解除権が含まれるか精査",cat:"契約"},
{n:"個人情報保護・データ管理",iw:[5,10,6,9,7],tw:[7,8],doc:"プライバシーポリシー,個人情報管理台帳,情報セキュリティ規程",how:"個人データの取得・保管・委託先管理体制を確認。漏洩事故歴の有無",cat:"情報"},
{n:"社会保険・年金",iw:[6,5,8,6,7],tw:[7,5],doc:"社会保険届出書,労働保険料申告書,年金記録",how:"加入漏れ・届出遅延の有無を確認。未払保険料の試算",cat:"労務"},
{n:"関連当事者取引",iw:[6,6,5,5,5],tw:[8,4],doc:"関連当事者取引一覧,取締役会議事録",how:"役員・親族企業との取引条件が市場価格と乖離していないか検証",cat:"ガバナンス"},
{n:"偶発債務・保証",iw:[7,5,4,5,5],tw:[9,5],doc:"保証契約書,デリバティブ取引一覧,偶発債務メモ",how:"簿外債務・保証債務・デリバティブの時価評価を確認",cat:"財務"},
{n:"株主構成・新株予約権",iw:[5,8,3,6,4],tw:[10,2],doc:"株主名簿,定款,新株予約権発行要項,株主間契約書",how:"少数株主の権利、種類株式、新株予約権の行使条件を精査",cat:"ガバナンス"},
{n:"業法固有の規制対応",iw:[7,6,8,10,6],tw:[6,8],doc:"業法関連届出書,監督官庁指導記録,コンプライアンス報告書",how:"業種固有の規制（薬機法・食品衛生法等）への適合状況を確認",cat:"許認可"},
{n:"在庫・棚卸資産の適正性",iw:[9,2,7,4,9],tw:[5,7],doc:"棚卸報告書,在庫評価基準書,滞留在庫リスト",how:"実地棚卸との差異・滞留在庫の評価減処理の適正性を確認",cat:"財務"}
];
var emp=document.getElementById("emp"),rev=document.getElementById("rev"),empV=document.getElementById("empV"),revV=document.getElementById("revV");
emp.oninput=function(){empV.textContent=this.value};
rev.oninput=function(){revV.textContent=this.value};
function calc(){
var i=+document.getElementById("ind").value,t=+document.getElementById("typ").value,e=+emp.value,r=+rev.value;
var sm=1+(e>200?.15:e>100?.08:0)+(r>20?.15:r>10?.08:0);
var items=D.map(function(d){var s=d.iw[i]*0.5+d.tw[t]*0.3+5*0.2;s*=sm;return{n:d.n,s:Math.min(s,10),doc:d.doc,how:d.how,cat:d.cat}}).sort(function(a,b){return b.s-a.s});
var avg=items.reduce(function(a,b){return a+b.s},0)/items.length;
var g,gc,gl;
if(avg>=7.5){g="D";gc="#dc2626";gl="高リスク — 専門家への早期相談を強く推奨"}
else if(avg>=6){g="C";gc="#ea580c";gl="要注意 — 重点項目について弁護士確認を推奨"}
else if(avg>=4.5){g="B";gc="#ca8a04";gl="中程度 — 社内精査後に必要箇所のみ外部相談"}
else{g="A";gc="#16a34a";gl="低リスク — 基本的な確認で対応可能"}
var h='<div class="card score-box" style="background:'+gc+'22;border:2px solid'+gc+'"><div class="grade" style="color:'+gc+'">'+g+'</div><div class="lbl" style="color:'+gc+'">総合リスクランク: '+gl+'</div><div class="sv" style="margin-top:8px">平均スコア: '+avg.toFixed(1)+' / 10</div></div>';
h+='<div class="card"><h2>重点チェック項目（優先度順）</h2>';
items.forEach(function(it,idx){
var bc=it.s>=7.5?"#dc2626":it.s>=6?"#ea580c":it.s>=4.5?"#ca8a04":"#16a34a";
var bl=it.s>=7.5?"S":it.s>=6?"A":it.s>=4.5?"B":"C";
h+='<div class="item"><div class="item-hd"><strong>'+(idx+1)+'. '+it.n+'</strong><span class="badge '+bl+'">'+bl+' ('+it.s.toFixed(1)+')</span></div>';
h+='<div class="det"><b>分類:</b> <span>'+it.cat+'</span> <b>確認方法:</b> '+it.how+'</div>';
h+='<div class="det" style="margin-top:4px"><b>必要書類:</b> '+it.doc.split(",").map(function(d){return'<span>'+d+'</span>'}).join("")+'</div>';
h+='<div class="bar"><div style="width:'+it.s*10+'%;background:'+bc+'"></div></div></div>';
});
h+='</div>';
document.getElementById("result").innerHTML=h;
}
</script>
