<div style="padding:10px 16px;font-size:13px;background:#f7fafc;border-bottom:1px solid #e2e8f0;"><a href="https://kusasyu36.github.io/kusasyu-tools/" style="color:#4299e1;text-decoration:none;">kusasyu tools</a> &gt; <a href="https://kusasyu36.github.io/kusasyu-tools/legal-tech/" style="color:#4299e1;text-decoration:none;">kusasyu Legal Tech</a> &gt; <span style="color:#718096;">判例テキスト構造化ツール（APIキー持込型）</span></div>
<div class="wrap">
<h1>判例テキスト構造化ツール</h1>
<p class="sub">判例文をAIが5要素に自動分解 ― 争点・事実認定・判示・結論・適用法条</p>
<div class="notice"><b>🔒 プライバシー保護:</b> 入力データはお客様が指定したAIプロバイダ（Claude/OpenAI）にのみ送信されます。本ツールのサーバーには一切保存・送信されません。APIキーはブラウザ内のみで使用されます。</div>
<div class="card">
<h2>API設定</h2>
<div class="row">
<div><label>AIプロバイダ</label><select id="prov"><option value="claude">Claude (Anthropic)</option><option value="openai">OpenAI</option></select></div>
<div><label>モデル</label><select id="model"></select></div>
</div>
<div><label>APIキー</label><input type="password" id="key" placeholder="sk-... または sk-ant-..."></div>
</div>
<div class="card">
<h2>判例テキスト入力</h2>
<textarea id="txt" placeholder="裁判所の判例全文をここにペーストしてください...&#10;&#10;例：最判令和○年○月○日　民集○巻○号○頁&#10;主文・事実及び理由を含む全文を貼り付けると精度が向上します。"></textarea>
<div style="margin-top:12px"><button class="btn btn-main" id="go" onclick="run()">構造化分析を実行</button></div>
</div>
<div id="out"></div>
</div>
<script>
const models={claude:["claude-sonnet-4-20250514","claude-haiku-4-20250414"],openai:["gpt-4o","gpt-4o-mini"]};
const P=document.getElementById("prov"),M=document.getElementById("model");
function setM(){M.innerHTML="";models[P.value].forEach(m=>{const o=document.createElement("option");o.value=m;o.textContent=m;M.appendChild(o)})}
P.onchange=setM;setM();
const PROMPT=`あなたは日本法の判例分析の専門家です。以下の判例テキストを分析し、次の5要素を抽出してください。

必ず以下のJSON形式のみで回答してください（説明文不要）:
{"issues":"争点（箇条書き）","facts":"事実認定（要約）","holdings":"判示（裁判所の判断の要旨）","conclusion":"結論（主文の要旨）","laws":"適用法条（条文番号を列挙）"}

各要素は日本語で、簡潔かつ正確に記載してください。判例テキストから読み取れない要素は「テキストから特定できず」と記載してください。`;

let result=null;
async function run(){
const key=document.getElementById("key").value.trim();
const txt=document.getElementById("txt").value.trim();
const out=document.getElementById("out");
const btn=document.getElementById("go");
if(!key){out.innerHTML='<div class="err">APIキーを入力してください。</div>';return}
if(!txt||txt.length<30){out.innerHTML='<div class="err">判例テキストを入力してください（30文字以上）。</div>';return}
btn.disabled=true;
out.innerHTML='<div id="status"><span class="spin"></span>AIが判例を分析中です…（数十秒かかる場合があります）</div>';
try{
let json;
if(P.value==="claude"){
const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:M.value,max_tokens:2048,messages:[{role:"user",content:PROMPT+"\n\n【判例テキスト】\n"+txt}]})});
if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||"API Error "+r.status)}
const d=await r.json();json=d.content[0].text;
}else{
const r=await fetch("https://api.openai.com/v1/chat/completions",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},body:JSON.stringify({model:M.value,max_tokens:2048,messages:[{role:"system",content:PROMPT},{role:"user",content:txt}]})});
if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.error?.message||"API Error "+r.status)}
const d=await r.json();json=d.choices[0].message.content;
}
const m=json.match(/\{[\s\S]*\}/);
if(!m)throw new Error("AIの応答からJSONを抽出できませんでした。");
result=JSON.parse(m[0]);
const labels=[["issues","争点"],["facts","事実認定"],["holdings","判示"],["conclusion","結論"],["laws","適用法条"]];
let h='<div class="card"><h2>分析結果</h2><table>';
labels.forEach(([k,l])=>{h+=`<tr><th>${l}</th><td>${esc(result[k]||"—")}</td></tr>`});
h+='</table><button class="btn btn-csv" onclick="dl()">CSVダウンロード</button></div>';
out.innerHTML=h;
}catch(e){out.innerHTML=`<div class="err">エラー: ${esc(e.message)}</div>`}
btn.disabled=false;
}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")}
function dl(){
if(!result)return;
const rows=[["要素","内容"],["争点",result.issues],["事実認定",result.facts],["判示",result.holdings],["結論",result.conclusion],["適用法条",result.laws]];
const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(",")).join("\n");
const b=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
const a=document.createElement("a");a.href=URL.createObjectURL(b);
a.download="hanrei_analysis_"+new Date().toISOString().slice(0,10)+".csv";a.click();
}
</script>
