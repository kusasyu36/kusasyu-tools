const DOMS=['法務','財務','税務','労務','許認可'];
const SEVL={3:{l:'高',c:'bg-h'},2:{l:'中',c:'bg-m'},1:{l:'低',c:'bg-l'}};
let risks=[],checklists={};
const CL_DATA={
'製造業':{
'法務':['知的財産権(特許・商標)の帰属確認','製造物責任(PL法)リスク評価','環境規制・排出基準の遵守状況','取引基本契約書の不利条項','下請法違反リスクの確認','秘密保持契約(NDA)の網羅性','ライセンス契約の継続性','競業避止義務の範囲','保証条項・免責条項の妥当性','紛争解決条項の確認'],
'財務':['在庫評価方法と実態乖離','設備投資計画と減価償却','原価計算の正確性','売掛金回収サイトの分析','簿外債務の有無','運転資金の適正水準','設備稼働率と収益性','補助金・助成金の返還リスク','為替リスクのヘッジ状況','キャッシュフロー予測の妥当性'],
'税務':['移転価格税制リスク','研究開発税制の適用状況','設備投資減税の活用','消費税の処理適正性','固定資産税の評価額確認','税務調査の指摘履歴','繰越欠損金の利用計画','グループ通算制度の影響','源泉徴収の処理確認','国際取引の課税リスク'],
'労務':['労働安全衛生法の遵守','残業時間と36協定の整合性','技能実習生の管理体制','就業規則の法令適合性','未払残業代リスク','ハラスメント防止体制','有給休暇取得率の確認','退職金規程と引当金','労働組合との協定内容','社会保険の適用漏れ'],
'許認可':['工場設置許可の有効性','消防法関連の届出状況','産業廃棄物処理の許可','建築基準法の適合確認','危険物取扱の資格管理','ISO認証の維持状況','輸出管理(該非判定)','食品衛生関連許可','計量法の遵守状況','各種届出の更新期限']},
'IT':{
'法務':['SaaS利用規約の権利関係','OSSライセンス違反リスク','個人情報保護法対応状況','知的財産権の帰属(開発委託)','SLA条項の履行可能性','データ移行時の権利関係','API利用契約の制限事項','競業避止・引抜防止条項','第三者ソフトウェアの権利処理','サイバーセキュリティ契約責任'],
'財務':['ARR/MRR成長率の検証','ソフトウェア開発費の資産計上','顧客獲得コスト(CAC)分析','チャーンレートの推移確認','サーバー費用の将来予測','売上認識基準の適正性','研究開発費の妥当性','ストックオプション費用','未消化の前受収益','フリーキャッシュフロー分析'],
'税務':['ソフトウェア償却の適正性','研究開発税制の適用','電子取引データ保存法対応','消費税のリバースチャージ','海外子会社との移転価格','税務上の繰延資産処理','仮想通貨関連の税務','クラウド費用の損金算入','外形標準課税の影響','インボイス制度対応状況'],
'労務':['裁量労働制の適法運用','SES契約と偽装請負リスク','リモートワーク規程整備','エンジニア競業避止の有効性','フリーランス活用の法的整理','深夜勤務(障害対応)の管理','メンタルヘルス対策','副業・兼業規程の整備','外国人エンジニアの在留資格','退職時の知的財産取扱い'],
'許認可':['電気通信事業届出の有無','Pマーク/ISMS認証維持','資金決済法対応(該当時)','古物営業許可(該当時)','医療機器プログラム該当性','個人情報保護委員会届出','GDPR等海外規制対応','暗号資産交換業登録','特定電子メール法対応','各種認証の有効期限管理']},
'小売業':{
'法務':['フランチャイズ契約の適正性','景品表示法違反リスク','消費者契約法の遵守','テナント賃貸借契約条件','PB商品の製造委託契約','電子商取引の特商法対応','ポイント制度の法的整理','商標権の保護状況','返品・交換ポリシーの適法性','広告表現の法的リスク'],
'財務':['在庫回転率と滞留在庫','店舗別損益の把握','既存店売上高の推移','出店計画と投資回収','ロス率(廃棄・万引)分析','季節変動と資金繰り','仕入先集中リスク','EC売上比率と成長性','設備投資(改装)計画','リース債務の把握'],
'税務':['軽減税率の処理適正性','ポイント引当金の税務','棚卸資産の評価方法','固定資産(内装)の償却','インボイス制度対応','免税販売の手続確認','消費税の簡易課税判定','交際費の損金算入','海外仕入の関税処理','電子帳簿保存法対応'],
'労務':['パート・アルバイト管理体制','同一労働同一賃金対応','シフト管理と労働時間','最低賃金の遵守確認','外国人従業員の管理','年次有給休暇の管理','労災事故の発生状況','雇用契約書の整備','教育研修体制の確認','退職率と人材確保策'],
'許認可':['食品衛生法の許可状況','酒類販売免許の確認','たばこ販売許可の確認','医薬品販売業の許可','古物営業許可の確認','消防法の防火管理','食品表示法の遵守','計量法の遵守状況','各自治体の条例対応','営業許可の更新管理']}
};
const INDUSTRIES=Object.keys(CL_DATA);
let curInd=0;
function initCL(){INDUSTRIES.forEach(ind=>{if(!checklists[ind]){checklists[ind]={};DOMS.forEach(d=>{checklists[ind][d]=CL_DATA[ind][d].map(t=>({text:t,done:false,risk:'未',who:''}))})}})}
initCL();
function showTab(n){document.querySelectorAll('.pnl').forEach((p,i)=>{p.classList.toggle('on',i===n)});document.querySelectorAll('.tabs button').forEach((b,i)=>{b.classList.toggle('on',i===n)});if(n===0)render();if(n===2)renderCL()}
function addRisk(){const d=document.getElementById('rDom').value,s=+document.getElementById('rSev').value,desc=document.getElementById('rDesc').value.trim(),act=document.getElementById('rAct').value.trim();if(!desc){alert('発見事項を入力してください');return}risks.push({domain:d,severity:s,description:desc,action:act,id:Date.now()});document.getElementById('rDesc').value='';document.getElementById('rAct').value='';render();renderEdit()}
function delRisk(id){risks=risks.filter(r=>r.id!==id);render();renderEdit()}
function render(){renderHmap();renderSummary();renderRiskList();renderStats()}
function renderHmap(){const t=document.getElementById('hmap');let h='<tr><th>領域</th><th>高</th><th>中</th><th>低</th><th>件数</th></tr>';DOMS.forEach(d=>{const rs=risks.filter(r=>r.domain===d);const c=[3,2,1].map(s=>rs.filter(r=>r.severity===s).length);const tot=rs.length;h+=`<tr><td style="font-weight:600;text-align:left">${d}</td>${c.map((n,i)=>`<td><div class="hc h${n>2?4:n>0?3-i:0}">${n||'-'}</div></td>`).join('')}<td><strong>${tot}</strong></td></tr>`});t.innerHTML=h}
function renderSummary(){const el=document.getElementById('summary');const sorted=[...risks].sort((a,b)=>b.severity-a.severity).slice(0,5);if(!sorted.length){el.innerHTML='<p style="color:#666;font-size:.85em">リスクが未登録です。「リスク入力」タブから発見事項を登録してください。</p>';return}let h='';sorted.forEach((r,i)=>{h+=`<div class="sum"><strong>${i+1}. [${r.domain}] ${SEVL[r.severity].l}リスク</strong><br>${r.description}${r.action?'<br><span style="color:#065f46">→ '+r.action+'</span>':''}</div>`});el.innerHTML=h}
function renderRiskList(){const el=document.getElementById('riskList');if(!risks.length){el.innerHTML='<p style="color:#999;font-size:.85em;padding:8px">登録なし</p>';return}el.innerHTML=risks.map(r=>`<div class="ri"><span><span class="badge ${SEVL[r.severity].c}">${SEVL[r.severity].l}</span> [${r.domain}] ${r.description}</span></div>`).join('')}
function renderEdit(){const el=document.getElementById('riskEdit');if(!risks.length){el.innerHTML='<p style="color:#999;font-size:.85em;padding:8px">登録なし</p>';return}el.innerHTML=risks.map(r=>`<div class="ri"><span><span class="badge ${SEVL[r.severity].c}">${SEVL[r.severity].l}</span> [${r.domain}] ${r.description}</span><button class="btn btn-d" style="padding:2px 8px;font-size:.75em" onclick="delRisk(${r.id})">削除</button></div>`).join('')}
function renderStats(){const el=document.getElementById('stats');const tot=risks.length,hi=risks.filter(r=>r.severity===3).length;let clDone=0,clTot=0;INDUSTRIES.forEach(ind=>DOMS.forEach(d=>{const items=checklists[ind]?.[d]||[];clTot+=items.length;clDone+=items.filter(i=>i.done).length}));const pct=clTot?Math.round(clDone/clTot*100):0;const col=pct>=80?'#16a34a':pct>=50?'#f59e0b':'#dc2626';el.innerHTML=`<div class="ps"><div class="num">${tot}</div><div class="lbl">発見事項合計</div></div><div class="ps"><div class="num" style="color:#dc2626">${hi}</div><div class="lbl">高リスク件数</div></div><div class="ps"><div class="num" style="color:${col}">${pct}%</div><div class="lbl">チェックリスト進捗</div><div class="prog"><div class="prog-bar" style="width:${pct}%;background:${col}"></div></div></div><div class="ps"><div class="num">${DOMS.filter(d=>risks.some(r=>r.domain===d)).length}/5</div><div class="lbl">調査済み領域</div></div>`}
function renderCL(){const tabEl=document.getElementById('indTabs');tabEl.innerHTML=INDUSTRIES.map((ind,i)=>`<button class="${i===curInd?'on':''}" onclick="curInd=${i};renderCL()">${ind}</button>`).join('');const area=document.getElementById('clArea');const ind=INDUSTRIES[curInd];let h='';DOMS.forEach(d=>{const items=checklists[ind][d];const done=items.filter(i=>i.done).length;const pct=Math.round(done/items.length*100);h+=`<details class="cl-sec" open><summary>${d}（${done}/${items.length} 完了 ${pct}%）</summary>`;items.forEach((it,idx)=>{h+=`<div class="cl-item"><input type="checkbox" ${it.done?'checked':''} onchange="toggleCL('${ind}','${d}',${idx},this.checked)"><span class="itxt">${it.text}</span><select onchange="setCLRisk('${ind}','${d}',${idx},this.value)"><option${it.risk==='未'?' selected':''}>未</option><option${it.risk==='低'?' selected':''}>低</option><option${it.risk==='中'?' selected':''}>中</option><option${it.risk==='高'?' selected':''}>高</option></select><input type="text" placeholder="担当者" value="${it.who}" onchange="setCLWho('${ind}','${d}',${idx},this.value)"></div>`});h+='</details>'});area.innerHTML=h}
function toggleCL(ind,d,i,v){checklists[ind][d][i].done=v;renderCL();renderStats()}
function setCLRisk(ind,d,i,v){checklists[ind][d][i].risk=v}
function setCLWho(ind,d,i,v){checklists[ind][d][i].who=v}
function exportJSON(){const data=JSON.stringify({risks,checklists,exportDate:new Date().toISOString(),tool:'DD統合ダッシュボード'},null,2);const blob=new Blob([data],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='dd-dashboard-'+new Date().toISOString().slice(0,10)+'.json';a.click()}
function loadJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.risks)risks=d.risks;if(d.checklists)checklists=d.checklists;initCL();render();renderEdit();renderCL();alert('読込完了: リスク'+risks.length+'件')}catch(err){alert('JSONの読込に失敗: '+err.message)}};r.readAsText(f);e.target.value=''}
function importTool1(){document.getElementById('t1In').click()}
function loadTool1(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.categories){const domMap={'チェンジ・オブ・コントロール':'法務','表明保証':'法務','補償・損害賠償':'法務','競業避止':'法務','秘密保持':'法務','知的財産':'法務','契約解除':'法務','支払条件':'財務','価格調整':'財務','雇用・労務':'労務'};d.categories.forEach(cat=>{const dom=domMap[cat.name]||'法務';if(cat.score!==undefined&&cat.score>=50){risks.push({domain:dom,severity:cat.score>=80?3:cat.score>=50?2:1,description:'['+cat.name+'] リスクスコア: '+cat.score+'点',action:cat.details||'',id:Date.now()+Math.random()*1000|0})}});render();renderEdit();alert('ツール1データ取込完了: '+risks.length+'件')}else{alert('DD契約条項リスク評価ツールのJSON形式ではありません')}}catch(err){alert('読込失敗: '+err.message)}};r.readAsText(f);e.target.value=''}
function clearAll(){if(!confirm('全データをクリアしますか？'))return;risks=[];checklists={};initCL();render();renderEdit();renderCL()}
render();renderEdit();
</script>
</body>
</html>
