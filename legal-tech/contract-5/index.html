desc:"支払いサイトが長期、または手形による支払い条件が設定されています。下請法が適用される場合は違法の可能性もあります。",

ps:[/秘密保持.*(?:期間|義務).*(?:永久|無期限|終了後.*(?:\d+|[０-９]+)年)/,/一切.*情報.*秘密/,/秘密.*(?:違反|漏洩).*損害.*(?:全額|全て|一切)/],
law:"不正競争防止法2条6項（営業秘密）",
desc:"秘密保持義務の範囲が広すぎる、または期間が長すぎる可能性があります。",
act:2,actText:"修正交渉すべき：秘密情報の定義と義務期間を限定してください。",

const MISS=[
{name:"準拠法の定めなし",kw:[/準拠法/,/適用.*法/,/(?:日本|日本国).*法.*(?:準拠|適用|従う)/],

alt:"「本契約は日本法を準拠法とする。」"},
{name:"管轄裁判所の合意なし",kw:[/管轄/,/裁判所/,/(?:専属的|合意).*管轄/],
law:"民事訴訟法11条（管轄の合意）",desc:"紛争時にどの裁判所で争うかが不明確です。遠方の裁判所になる可能性があります。",

alt:"「各当事者は反社会的勢力に該当しないことを表明保証し、該当が判明した場合は催告なく解除できる。」"},
{name:"不可抗力条項なし",kw:[/不可抗力/,/天災/,/(?:地震|台風|感染症).*(?:免責|責任.*負わ)/],
law:"民法419条3項、民法415条但書",desc:"天災・感染症等で履行不能になった場合の免責規定がありません。",
alt:"「天災・感染症・戦争等の不可抗力により履行不能となった場合、いずれの当事者も責任を負わない。」"},
{name:"個人情報の取扱い規定なし",kw:[/個人情報/,/個人データ/,/プライバシー/],
law:"個人情報保護法23条〜25条",desc:"業務上個人情報を取り扱う可能性がある場合、取扱い規定の欠如はリスクです。",
alt:"「乙は業務上取得した個人情報を善管注意義務をもって管理し、本契約の目的以外に使用しない。」"}

function analyze(){
const t=document.getElementById("inp").value.trim();
if(!t){alert("契約書の条文を貼り付けてください。");return}
let findings=[];
RULES.forEach(r=>{
let matched=r.ps.some(p=>p.test(t));
if(matched)findings.push({type:"detect",...r});
});
MISS.forEach(m=>{
let found=m.kw.some(k=>k.test(t));
if(!found&&t.length>100)findings.push({type:"miss",level:"miss",...m,act:2,actText:"修正交渉すべき：この条項の追加を申し入れてください。"});
});
render(findings);
}
function render(f){
const el=document.getElementById("results");
if(!f.length){el.innerHTML='<div class="empty" style="color:#20c997;font-weight:600">✓ 主要なリスクパターンは検出されませんでした。<br><span style="font-size:.85em;font-weight:400;color:#6c757d">※パターンマッチングの限界により検出漏れの可能性があります</span></div>';return}
let h=f.filter(x=>x.level==="high").length,m=f.filter(x=>x.level==="mid").length,l=f.filter(x=>x.level==="low").length,ms=f.filter(x=>x.level==="miss").length;
let html=`<div class="summary">
<div class="stat s-high"><div class="num">${h}</div><div class="lbl">高リスク</div></div>
<div class="stat s-mid"><div class="num">${m}</div><div class="lbl">中リスク</div></div>
<div class="stat s-low"><div class="num">${l}</div><div class="lbl">低リスク</div></div>
<div class="stat s-miss"><div class="num">${ms}</div><div class="lbl">条項欠如</div></div>
</div>`;
let sorted=[...f].sort((a,b)=>{let o={high:0,mid:1,miss:2,low:3};return(o[a.level]??9)-(o[b.level]??9)});
sorted.forEach(i=>{
let lvl=i.level,label=lvl==="high"?"高":"mid"===lvl?"中":lvl==="miss"?"欠如":"低";
let actCls=i.act===3?"act3":i.act===2?"act2":"act1";
let actLabel=i.act===3?"③ 弁護士相談必須":i.act===2?"② 修正交渉すべき":"① このまま署名可";
html+=`<div class="card ${lvl}">
<span class="badge ${lvl}">${label==="欠如"?"条項欠如":"リスク："+label}</span>
<h3>${i.type==="miss"?"⚠ ":""}${i.name}</h3>
<div class="detail">${i.desc}</div>
<div class="law">📖 根拠：${i.law}</div>
<div class="action ${actCls}"><b>${actLabel}</b>：${i.actText}</div>
${i.alt?`<div class="alt"><b>💡 修正・追加の申し入れ文例：</b>${i.alt}</div>`:""}
</div>`;
});
el.innerHTML=html;
}
